<script>
const DATA = {"meta": {"reportDate": "2026-07-05", "reportDateHuman": "2026年7月5日", "weekday": "星期日", "total": 3, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "论文研究", "color": "#e11d48", "items": [{"seq": 1, "title": "我国研制全球首款基于可控存内计算的忆阻器神经动力学芯片", "source": "IT之家（RSS）", "summary": "北京大学集成电路学院联合中科院上海微系统所，发布全球首款基于可控存内计算的忆阻器神经动力学芯片，首次将单步运算时延压缩…", "url": "https://www.ithome.com/0/972/526.htm", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "IT之家 7 月 4 日消息，北京大学集成电路学院官方公众号昨日（7 月 3 日）发布博文，宣布联合发布全球首款基于可控存内计算的忆阻器神经动力学芯片，首次将神经动力学系统的单步运算时延压缩至 2.12 毫秒。\nIT之家援引博文介绍，该项目由该校杨玉超教授带领，联合中国科学院上海微系统与信息技术研究所研究员宋志棠团队推进，相关成果于 7 月 3 日发表在《科学》上。\n该研究首次将这类复杂运算的单步时延压缩至 2.12 毫秒，在脑皮层重建等任务中较目前先进图形处理器（GPU）提速达 50 至 478 倍，一举突破了制约神经动力学长达半个世纪的实时计算瓶颈。\n该芯片采用 40 纳米工艺制造，存内计算与步长漂移阵列总面积仅 0.28 平方毫米，并配备编程脉冲生成电路、模数转换器等外围电路。\n芯片运行频率为 50 MHz，单步积分仅需 9 级流水，最终实现 2.12 毫秒的神经动力学单次迭代计算时延，首次将神经动力学硬件系统运行时间推进到毫秒级时代。\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}, {"seq": 2, "title": "NVIDIA 联合多所大学提出 ASPIRE：自我改进机器人框架，零样本成功率最高提升 77 分", "source": "MarkTechPost（RSS）", "summary": "NVIDIA 联合密歇根大学、UIUC、UC Berkeley 等提出 ASPIRE，一个持续学习机器人框架。它通过协…", "url": "https://www.marktechpost.com/2026/07/03/nvidia-ai-introduces-aspire-a-self-improving-robotics-framework-reaching-31-zero-shot-on-libero-pro-long-tasks", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "Traditional robot programming is hard to scale. It requires orchestrating multimodal perception, physical contact dynamics, diverse configurations, and execution failures by hand. Code-as-policy systems let language models compose these into executable robot programs. That makes robot behavior inspectable, editable, and debuggable.\nBut existing robotic coding agents run in naive execution environments. They receive only coarse, task-level feedback. A failed rollout signals that the task failed, not why. The root cause can be perception, motion planning, grasping, contact dynamics, or long-horizon coordination. These systems also discard fixes once a task ends. So the agent solving its hundredth task is no more experienced than at its first.\nA team of researchers from NVIDIA, University of Michigan, UIUC, UC Berkeley, and CMU introduces ASPIRE (Agentic Skill Programming through Iterative Robot Exploration). It is a continual learning system that writes and refines robot control programs. It also distills validated fixes into a reusable, transferable skill library.\nHow ASPIRE works\nASPIRE runs an open-ended learning loop with three components. It uses a coordinator–actor architecture. A central coordinator manages the shared skill library and dispatches actor coding agents to tasks. Actors do not exchange full chat histories or raw trajectories. Only distilled skills move between them.\nClosed-loop robot execution engine: This replaces coarse rollout feedback with per-primitive multimodal traces. For each perception, planning, and control call, it stores inputs, outputs, and return status. It also stores RGB keyframes, overlays, grasp candidates, object poses, and motion-planning results. The agent inspects only the calls implicated by a failure. It then localizes the fault and validates a repair through re-execution.\nSkill library: Reusable knowledge is rarely an entire task program. So the library stores heterogeneous fixes. These include localization heuristics, perception prompts, grasping constraints, motion primitives, and debugging workflows. Each skill is compact in-context guidance. It holds a failure signature, a when-to-apply condition, a repair strategy, and often a code sketch. The coordinator admits only patterns that pass debug validation and API-policy checks.\nEvolutionary search: Trace-guided debugging alone can collapse into local repair loops. The agent keeps patching the same failed strategy. To broaden exploration, ASPIRE proposes K candidate programs each round. Candidates condition on top-performing prior programs and their remaining failure traces. The next round explores distinct strategies rather than refining one solution.\nIn simulation, the coding agent is Claude Code with Claude Opus 4.6 and a 1M-token context window. Programs are written in CaP-X, an open-source code-as-policy framework built on MuJoCo Playground. The agent cannot read simulator ground truth. Reading physics-engine state or asset files like .bddl, .xml, or .urdf is forbidden. The rule is simple. If a real robot with a camera could do it, it is allowed.\nInteractive Explainer\nA worked example: the Multi-Angle Approach skill\nConsider a BEHAVIOR-1K task where a robot must pick up a radio near a table. Perception returns the radio pose, but repeated navigate_to_pose calls fail. The generated goal lies within about 20 centimeters of the table edge. That falls inside the table’s collision-avoidance buffer, and cuRobo returns PLANNING_ERROR.\nThe agent reads the trace and localizes the cause. The failure is target infeasibility, not perception or grasping. It then writes a repair that samples standoff poses around the radio.\n# radio_pos, safe_navigate() and dist_to() are provided by ASPIRE's robot API\nfor angle_deg in [180, -90, 90, -45, 45]:\n    angle = np.radians(angle_deg)\n    tx = radio_pos[0] + 0.7 * np.cos(angle)      # standoff 0.7 m from the radio\n    ty = radio_pos[1] + 0.7 * np.sin(angle)\n    face_yaw = np.arctan2(radio_pos[1] - ty, radio_pos[0] - tx)\n    moved = safe_navigate([tx, ty, face_yaw], f\"ang_{angle_deg}\")\n    if moved and dist_to(radio_pos[:2]) \u003c 0.8:   # reached a pose within 0.8 m\n        breakEach angle puts the goal on a different side of the object. When one side is blocked, another is often open. Here the 180-degree pose clears the buffer. The validated fix is admitted as a reusable navigation-recovery skill.\nBenchmarks and results\nASPIRE is evaluated on three benchmark families. LIBERO-Pro tests short-horizon robustness under object, goal, and spatial perturbations. Robosuite covers contact-rich single- and dual-arm manipulation. BEHAVIOR-1K covers long-horizon household mobile manipulation. The primary coding-agent baseline is CaP-Agent0. It uses visual differencing, a predefined skill library, and per-episode test-time retries. The comparison also includes end-to-end vision-language-action policies: OpenVLA, π0, and π0.5.\nOn LIBERO-Pro, ASPIRE gains up to 77 points on the Object suite. That figure averages both perturbation axes over the strongest baseline. It also gains 41.5 points on Goal and 42.5 points on Spatial. On Robosuite, bimanual handover rises from 20% to 92%. On BEHAVIOR-1K, the radio pickup task rises from 56% to 88%.\nThe zero-shot result is notable. Reusing skills accumulated on LIBERO-90, ASPIRE reaches about 31% on held-out LIBERO-Pro Long tasks. Prior methods saturate near 4%.\n| Dimension | End-to-end VLAs (OpenVLA, π0, π0.5) | CaP-Agent0 | ASPIRE | \n|---|---|---|---|\n| Paradigm | Learned-weight policy | Code-as-policy agent | Code-as-policy agent | \n| Cross-task experience | None (frozen weights) | Discarded after each task | Distilled into a skill library | \n| Failure feedback | None at test time | Coarse scene-level summaries | Per-primitive multimodal traces | \n| Test-time strategy | Direct inference | Per-seed reasoning + retries | One program per task | \n| LIBERO-Pro overall | 0–13% | 18% | 72% | \n| LIBERO-Pro Long zero-shot | 0–5% | ~4% | ~31% | \nReal-robot skill transfer\nThe research team tests three simulation-discovered skills on a real bimanual YAM station. The real-robot coding agent is OpenAI Codex GPT-5.5. The embodiment and API differ from simulation. Transferred skills reduce debugging cost. Soda-can lifting improved from 13/20 to 19/20 while using about 10x fewer tokens. Drawer opening moved from 0/20 to 11/20, where the no-skill baseline never succeeded.\nKey Takeaways\n- ASPIRE writes and debugs robot programs, then saves validated fixes as reusable in-context skills.\n- Per-primitive multimodal traces let the agent localize failures instead of guessing from rollout outcomes.\n- It gains up to 77 points on LIBERO-Pro and lifts Robosuite handover from 20% to 92%.\n- Zero-shot transfer reaches about 31% on LIBERO-Pro Long, against about 4% for prior methods.\n- Simulation-discovered skills reduced real-robot debugging cost across a different embodiment and API.\nCheck out the Paper and Project Page. Also, feel free to follow us on Twitter and don’t forget to join our 150k+ML SubReddit and Subscribe to our Newsletter. Wait! are you on telegram? now you can join us on telegram as well.\nNeed to partner with us for promoting your GitHub Repo OR Hugging Face Page OR Product Release OR Webinar etc.? Connect with us"}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 3, "title": "26000名学生研究显示AI隐藏学习成本需两年才显现", "source": "The Decoder：AI News（RSS）", "summary": "一项追踪26000名7-12年级中学生30个月的面板数据研究发现：使用AI后作业分数提升18%，完成时间从64分钟降至…", "url": "https://the-decoder.com/a-26000-student-study-shows-ais-hidden-learning-cost-takes-two-full-years-to-surface", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "A 26,000-student study shows AI's hidden learning cost takes two full years to surface\nStudents who used AI finished assignments faster and got better grades. On exams, though, their scores dropped by up to 24 percent, and the full scale of the learning gap on entrance exams didn't show up until about two years later.\nA new study from central China documents learning losses among secondary school students who use AI. The researchers analyzed 30 months of panel data from more than 26,000 students in grades 7 through 12 in a county with over one million residents. The data covers monthly exams, homework scores and completion times, and high-stakes entrance exams for high school and college.\nSelf-reported AI usage rose from near zero to about 80 percent over the study period, with a big jump coinciding with the releases of DeepSeek V2.5 in September 2024 and DeepSeek R1 in January 2025. The most popular tools were Doubao, DeepSeek, ChatGLM, Ernie Bot, and Qwen.\nThe study takes advantage of the fact that students discovered AI on their own at different times. The authors use a difference-in-differences design, a method that measures the change in outcomes for a treated group before and after an intervention and subtracts the change over the same period for an untreated comparison group.\nHere, they track how each student's performance shifted before and after they started using AI, then contrast that trend with students who weren't using AI yet. The timing of first use comes from self-reported data, and the causal claim assumes both groups would have developed similarly without AI.\nBetter homework, worse test scores\nSix months after first using AI, homework scores rose by 18 percent while average time per assignment fell from 64 to 45 minutes. At the same time, scores on monthly closed-book exams dropped by 20 percent.\nThe effect on high-stakes entrance exams was just as large but built up more slowly. Regular exam performance fell off within half a year, but the full impact on entrance exams took about two years to appear, ranging from an 18 to 24 percent decline. Short-term studies therefore miss the long-term cost to learning, according to the researchers.\nFour out of five long-term users show signs of outsourcing\nAfter more than five months of AI use, about 81 percent of students finished their homework in under 50 minutes, faster than even the quickest non-users. They got high homework grades but bombed exams. The combination of short completion times, high homework grades, and low exam scores suggests these students were outsourcing their work to AI, the authors write.\nAI users who spent a similar amount of time on homework as their non-AI classmates, on the other hand, scored just as well on exams while also earning better homework grades. This group showed no sign of positive selection based on prior performance, meaning they weren't simply better students to begin with, and AI isn't harmful by default. It causes damage mainly when it replaces independent thinking.\nSocial sciences take the biggest hit\nSocial science subjects like politics and geography saw an average decline of 27 percent, STEM subjects 22 percent, English 17 percent, and Chinese 9 percent. That matters because most previous experiments have focused on math, programming, and foreign languages.\nThe effects also varied sharply across student groups. Younger students in lower secondary school lost more than older ones (24 versus 17 percent), and boys were hit harder than girls (21.6 versus 18.4 percent), which the study attributes mainly to heavier AI use among boys.\nTop performers suffered the most, with the top third seeing a minus 24 percent effect compared to minus 16 percent in the bottom third. A dose-response pattern showed up as well. Students using AI for up to one hour per week lost about 5 percent, while those using it five hours or more lost 30 percent.\nWhy almost no one is pushing back\nThe estimated learning penalty fell from about 25 percent in early 2023 to 16 percent by June 2025. The decline also showed up in a fixed group of early adopters, suggesting some degree of adaptation by students and teachers, but the losses haven't gone away.\nThe study explains why the reaction has been muted. Teachers typically see students in only one subject, where a 20 percent grade drop isn't unusual on its own. The aggregate effect on the county average didn't reach about minus 10 percent until June 2025 because few students had been using AI long enough for the damage to accumulate. Students themselves often don't connect the dots, mistaking the mental effort of independent learning for a sign that they're learning poorly.\nAs countermeasures, the study suggests giving students credible information about the long-term costs of outsourcing, putting more weight on in-person exams, and tracking completion time instead of homework grades. AI erodes the value of homework as a signal, and among AI users with above-average homework scores, higher homework grades actually predict worse exam results.\nAnthropic researcher Andrej Karpathy has argued that schools should stop trying to police AI-generated homework and instead shift the majority of grading to in-class work. His reasoning aligns with what this study found. When students know they'll be tested without AI, they stay motivated to actually learn the material.\nThe pattern lines up with recent findings from other settings. An Anthropic study recently showed that participants who learned new programming skills with AI help scored 17 percent worse on follow-up knowledge tests than the control group, without saving any real time. The results depended on how people used the tool. Those who simply copied AI answers performed worse, while those who used AI to better understand the tasks didn't see the same decline.\nA study by the Swiss Business School found a negative link between AI use and critical thinking. A separate study by researchers at several American and British universities showed that people who treat AI mainly as an answer machine lose cognitive skills the fastest.\nA UC Berkeley study analyzing more than 500,000 grades also showed that the share of top A grades in writing- and programming-heavy courses has risen by 13 percentage points since ChatGPT launched. There, too, the effect was concentrated on unsupervised homework, while proctored exams showed no comparable gains.\nAI News Without the Hype – Curated by Humans\n\t\t\t\tSubscribe to THE DECODER for ad-free reading, a weekly AI newsletter, our exclusive \"AI Radar\" frontier report six times a year, full archive access, and access to our comment section.\nSubscribe now"}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;
const statsEl=document.getElementById("stats");
sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");
sections.forEach((s,i)=>{const a=document.createElement("a");a.href="#sec-"+i;
  a.innerHTML=escapeHtml(s.label)+'<span class="c">'+s.items.length+'</span>';navEl.appendChild(a);});
const mainEl=document.getElementById("main");
sections.forEach((s,i)=>{
  const sec=document.createElement("section");sec.className="block";sec.id="sec-"+i;
  const head=document.createElement("div");head.className="sec-head";
  head.innerHTML='<span class="sec-dot" style="background:'+s.color+'"></span><h2>'+escapeHtml(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span>';

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文：将 ![alt](src) 转为内联图片，其余文本按段落转义（防 XSS）
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=escapeHtml(p.slice(last,m.index));
      out+='<img class="r-img" src="'+escapeAttr(m[2])+'" alt="'+escapeAttr(m[1])+'" loading="lazy">';
      last=_IMG_RE.lastIndex;
    }
    out+=escapeHtml(p.slice(last));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
