const DATA = {"meta": {"reportDate": "2026-07-05", "reportDateHuman": "2026年7月5日", "weekday": "星期日", "total": 3, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "论文研究", "color": "#e11d48", "items": [{"seq": 1, "title": "我国研制全球首款基于可控存内计算的忆阻器神经动力学芯片", "source": "IT之家（RSS）", "summary": "北京大学集成电路学院联合中科院上海微系统所，发布全球首款基于可控存内计算的忆阻器神经动力学芯片，首次将单步运算时延压缩至2.12毫秒。芯片采用40纳米工艺，存内计算阵列与外围电路总面积0.28平方毫米，运行频率50 MHz，单步积分仅需9级流水。在脑皮层重建等任务中较当前GPU提速50至478倍，突破神经动力学实时计算瓶颈。相关成果7月3日发表于《科学》。", "url": "https://www.ithome.com/0/972/526.htm", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "IT之家 7 月 4 日消息，北京大学集成电路学院官方公众号昨日（7 月 3 日）发布博文，宣布联合发布全球首款基于可控存内计算的忆阻器神经动力学芯片，首次将神经动力学系统的单步运算时延压缩至 2.12 毫秒。 IT之家援引博文介绍，该项目由该校杨玉超教授带领，联合中国科学院上海微系统与信息技术研究所研究员宋志棠团队推进，相关成果于 7 月 3 日发表在《科学》上。 该研究首次将这类复杂运算的单步时延压缩至 2.12 毫秒，在脑皮层重建等任务中较目前先进图形处理器（GPU）提速达 50 至 478 倍，一举突破了制约神经动力学长达半个世纪的实时计算瓶颈。 该芯片采用 40 纳米工艺制造，存内计算与步长漂移阵列总面积仅 0.28 平方毫米，并配备编程脉冲生成电路、模数转换器等外围电路。 芯片运行频率为 50 MHz，单步积分仅需 9 级流水，最终实现 2.12 毫秒的神经动力学单次迭代计算时延，首次将神经动力学硬件系统运行时间推进到毫秒级时代。 广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}, {"seq": 2, "title": "NVIDIA 联合多所大学提出 ASPIRE：自我改进机器人框架，零样本成功率最高提升 77 分", "source": "MarkTechPost（RSS）", "summary": "NVIDIA 联合密歇根大学、UIUC、UC Berkeley 等提出 ASPIRE，一个持续学习机器人框架。它通过协调器-执行器架构、闭环执行引擎、技能库和进化搜索，编写并优化机器人控制程序。编程智能体使用 Claude Code（Claude Opus 4.6，1M token 上下文窗口）。在 LIBERO-Pro 上最高比最强基线提升 77 分；Robosuite 双手交接成功率从 20% 提升至 92%；BEHAVIOR-1K 收音机拾取任务从 56% 提升至 88%。利用 LIBERO-90 积累的技能，ASPIRE 在零样本条件下对 LIBERO-Pro Long 任务达到约 31% 成功率，此前方法饱和在 4% 附近…", "url": "https://www.marktechpost.com/2026/07/03/nvidia-ai-introduces-aspire-a-self-improving-robotics-framework-reaching-31-zero-shot-on-libero-pro-long-tasks", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "传统机器人编程难以规模化。它需要手动协调多模态感知、物理接触动力学、多样化配置以及执行故障。代码即策略系统让语言模型将这些要素组合成可执行的机器人程序，使机器人行为变得可检查、可编辑、可调试。\n\n但现有机器人编程智能体运行在简陋的执行环境中，仅能接收粗粒度的任务级反馈。一次失败的任务执行只能表明任务未完成，却无法揭示失败原因。根本问题可能出在感知、运动规划、抓取、接触动力学或长周期协调上。这些系统还会在任务结束后丢弃修复方案，因此智能体解决第一百个任务时，与解决第一个任务时相比并无经验积累。\n\n来自英伟达、密歇根大学、伊利诺伊大学厄巴纳-香槟分校、加州大学伯克利分校和卡内基梅隆大学的研究团队提出了ASPIRE（通过迭代机器人探索实现智能技能编程）。这是一个持续学习系统，能编写并优化机器人控制程序，同时将经过验证的修复方案提炼为可复用、可迁移的技能库。\n\n**ASPIRE的工作原理**\n\nASPIRE运行一个开放式学习循环，包含三个组件。它采用协调器-执行器架构：中央协调器管理共享技能库，并将编码智能体分派至各任务。执行器之间不交换完整聊天记录或原始轨迹，仅传递经过提炼的技能。\n\n- **闭环机器人执行引擎**：用每个原语的多模态轨迹替代粗粒度的任务反馈。针对每次感知、规划和控制调用，存储输入、输出及返回状态，同时保存RGB关键帧、叠加层、抓取候选点、物体姿态和运动规划结果。智能体仅检查与故障相关的调用，定位问题后通过重新执行验证修复方案。\n\n- **技能库**：可复用知识很少是整个任务程序。因此技能库存储异构修复方案，包括定位启发式规则、感知提示词、抓取约束、运动原语和调试工作流。每个技能都是紧凑的上下文指导，包含故障特征、应用条件、修复策略及代码框架。协调器仅收录通过调试验证和API策略检查的模式。\n\n- **进化搜索**：仅靠轨迹引导调试可能陷入局部修复循环——智能体会持续修补同一失败策略。为拓宽探索范围，ASPIRE每轮提出K个候选程序，这些候选程序基于表现最优的先前程序及其剩余故障轨迹。下一轮将探索不同策略，而非优化单一解决方案。\n\n在仿真环境中，编码智能体为Claude Code（搭载Claude Opus 4.6和100万token上下文窗口）。程序使用CaP-X编写，这是一个基于MuJoCo Playground的开源代码即策略框架。智能体无法读取仿真器真实数据，禁止访问物理引擎状态或.bddl、.xml、.urdf等资产文件。规则很简单：只有真实机器人配合摄像头能实现的操作才被允许。\n\n**交互式案例：多角度接近技能**\n\n以BEHAVIOR-1K任务为例：机器人需从桌旁拾取收音机。感知模块返回收音机姿态，但重复调用navigate_to_pose均失败。生成的目标点位于桌沿约20厘米范围内，落入桌子碰撞规避缓冲区内，导致cuRobo返回PLANNING_ERROR。\n\n智能体读取轨迹并定位故障原因。本次失败源于目标不可达，而非感知或抓取问题。随后它编写修复方案，在收音机周围采样对峙位姿。 # radio_pos、safe_navigate()和dist_to()由ASPIRE机器人API提供 for angle_deg in [180, -90, 90, -45, 45]: angle = np.radians(angle_deg) tx = radio_pos[0] + 0.7 * np.cos(angle)      # 距收音机0.7米对峙距离 ty = radio_pos[1] + 0.7 * np.sin(angle) face_yaw = np.arctan2(radio_pos[1] - ty, radio_pos[0] - tx) moved = safe_navigate([tx, ty, face_yaw], f\"ang_{angle_deg}\") if moved and dist_to(radio_pos[:2]) \u003c 0.8:   # 到达距目标0.8米内的位姿 break每个角度将目标置于物体不同侧。当一侧受阻时，另一侧往往畅通。此处180度位姿清除了缓冲区。验证通过的修复方案被收录为可复用的导航恢复技能。\n\n**基准测试与结果** ASPIRE在三个基准系列上接受评估。LIBERO-Pro测试物体、目标和空间扰动下的短时程鲁棒性。Robosuite涵盖接触丰富的单臂和双臂操作。BEHAVIOR-1K覆盖长时程家庭移动操作。主要编码智能体基线为CaP-Agent0，采用视觉差分、预定义技能库和逐回合测试时重试。对比还包括端到端视觉-语言-动作策略：OpenVLA、π0和π0.5。\n\n在LIBERO-Pro上，ASPIRE在物体套件中提升高达77个百分点。该数值取最强基线在两个扰动轴上的平均值。在目标和空间套件上分别提升41.5和42.5个百分点。在Robosuite中，双手交接成功率从20%升至92%。在BEHAVIOR-1K中，收音机拾取任务从56%提升至88%。\n\n零样本结果尤为显著。复用LIBERO-90积累的技能，ASPIRE在保留的LIBERO-Pro长时程任务上达到约31%成功率，而先前方法饱和于4%附近。\n\n| 维度 | 端到端VLA (OpenVLA, π0, π0.5) | CaP-Agent0 | ASPIRE | |---|---|---|---| | 范式 | 学习权重策略 | 代码即策略智能体 | 代码即策略智能体 | | 跨任务经验 | 无（冻结权重） | 每任务后丢弃 | 蒸馏至技能库 | | 失败反馈 | 测试时无反馈 | 粗粒度场景级摘要 | 逐原语多模态轨迹 | | 测试时策略 | 直接推理 | 逐种子推理+重试 | 每任务单程序 | | LIBERO-Pro总体 | 0–13% | 18% | 72% | | LIBERO-Pro长时程零样本 | 0–5% | ~4% | ~31% |\n\n**真实机器人技能迁移** 研究团队在真实双臂YAM工作站上测试三项仿真习得技能。真实机器人编码智能体为OpenAI Codex GPT-5.5。实体与API均与仿真不同。迁移技能降低了调试成本。易拉罐举升从13/20提升至19/20，同时token消耗减少约10倍。抽屉开启从0/20提升至11/20，无技能基线从未成功。\n\n**核心要点**\n- ASPIRE编写并调试机器人程序，将验证通过的修复方案保存为可复用的上下文技能。\n- 逐原语多模态轨迹使智能体能定位故障，而非通过回合结果猜测。\n- 在LIBERO-Pro上提升高达77个百分点，将Robosuite双手交接成功率从20%提升至92%。\n- 零样本迁移在LIBERO-Pro长时程任务上达到约31%，先前方法仅约4%。\n- 仿真习得技能在不同实体和API下降低了真实机器人调试成本。\n\n查阅论文与项目页面。欢迎关注我们的Twitter账号，别忘了加入我们超过15万成员的机器学习Reddit社区，并订阅我们的新闻通讯。等等！你在用Telegram吗？现在你也可以通过Telegram加入我们。 需要与我们合作推广你的GitHub仓库、Hugging Face页面、产品发布或网络研讨会等？请联系我们。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 3, "title": "26000名学生研究显示AI隐藏学习成本需两年才显现", "source": "The Decoder：AI News（RSS）", "summary": "一项追踪26000名7-12年级中学生30个月的面板数据研究发现：使用AI后作业分数提升18%，完成时间从64分钟降至45分钟，但闭卷考试分数下降20%，升学考试成绩下降18%至24%，且完全影响约两年才显现。81%长期用户作业完成时间低于50分钟（外包迹象）。社会学科下降27%，STEM下降22%，英语下降17%，语文下降9%。每周使用AI一小时损失约5%，五小时损失30%。早期损失从约25%降至16%但未消失。", "url": "https://the-decoder.com/a-26000-student-study-shows-ais-hidden-learning-cost-takes-two-full-years-to-surface", "publishedAt": "2026-07-05T00:00:00.000Z", "exact": false, "content": "一项覆盖2.6万名学生的研究表明，人工智能的隐性学习成本需要整整两年才会显现。\n\n使用人工智能的学生完成作业更快、成绩更好。然而在考试中，他们的分数却下降了高达24%，而升学考试中学习差距的全貌直到大约两年后才完全显现。\n\n中国中部地区的一项新研究记录了使用人工智能的初中生和高中生所面临的学习损失。研究人员分析了来自一个百万人口大县超过2.6万名7至12年级学生的30个月面板数据。这些数据涵盖了月考成绩、作业分数与完成时间，以及中考和高考等重要升学考试。\n\n在研究期间，学生自报的人工智能使用率从接近零上升至约80%，其中在2024年9月DeepSeek V2.5和2025年1月DeepSeek R1发布后出现了大幅增长。最常用的工具包括豆包、DeepSeek、智谱清言、文心一言和通义千问。\n\n该研究利用了学生自行发现人工智能时间不同的特点。作者采用双重差分法，这是一种衡量干预前后处理组结果变化，并减去同期未处理对照组变化的方法。\n\n具体而言，他们追踪了每位学生在开始使用人工智能前后成绩的变化，然后与尚未使用人工智能的学生进行对比。首次使用的时间点来自学生自报数据，因果推断的前提是假设两组学生在没有人工智能的情况下会有相似的发展轨迹。\n\n**作业更好，考试成绩更差**\n\n首次使用人工智能六个月后，学生的作业分数提高了18%，而每项作业的平均完成时间从64分钟降至45分钟。与此同时，月考闭卷考试的分数下降了20%。\n\n人工智能对升学考试的影响同样显著，但显现得更慢。常规考试成绩在半年内就出现下滑，但对升学考试的全面影响大约需要两年才显现，降幅在18%至24%之间。因此，研究人员指出，短期研究无法捕捉到学习的长期成本。\n\n**五分之四的长期用户存在\"外包\"迹象**\n\n在使用人工智能超过五个月后，约81%的学生在50分钟内完成作业，甚至快于最快的非使用者。他们作业分数高，但考试成绩糟糕。作者写道，完成时间短、作业分数高、考试成绩低这一组合表明，这些学生将作业外包给了人工智能。\n\n另一方面，那些在作业上花费时间与非人工智能同学相近的人工智能使用者，考试成绩同样出色，同时作业分数也更高。这一群体并未表现出基于先前成绩的正向选择迹象，这意味着他们并非一开始就是更优秀的学生，而人工智能本身也并非有害。它主要是在取代独立思考时才会造成损害。\n\n**社会科学类科目受影响最大**\n\n政治、地理等社会科学类科目的平均成绩下降了27%，STEM（科学、技术、工程和数学）科目下降了22%，英语下降了17%，语文下降了9%。这一点很重要，因为此前大多数实验都集中在数学、编程和外语领域。\n\n不同学生群体受到的影响也存在显著差异。初中低年级学生比高年级学生损失更大（24%对17%），男生比女生受影响更严重（21.6%对18.4%），研究认为这主要源于男生更频繁使用AI。成绩优异的学生损失最为惨重，排名前三分之一的学生受到的影响为负24%，而排名后三分之一的学生仅为负16%。剂量反应模式同样显现：每周使用AI不超过1小时的学生成绩下降约5%，而使用5小时及以上的学生则下降30%。\n\n## 为何几乎无人反对\n\n据估算，学习损失从2023年初的约25%降至2025年6月的16%。这一下降趋势在早期采用者的固定群体中同样存在，表明学生和教师已进行了一定程度的适应调整，但损失并未完全消失。\n\n研究解释了为何外界反应平淡。教师通常只关注单科成绩，而单科20%的分数波动本身并不罕见。直到2025年6月，全县平均成绩才累计下降约10%，因为此前很少有学生长期使用AI导致损害累积。学生自身往往难以察觉问题，误将独立学习时的脑力付出视为学习效果不佳的表现。\n\n作为应对措施，研究建议向学生提供关于外包学习长期代价的可信信息，提高线下考试权重，并追踪作业完成时间而非评分。AI正在削弱作业作为学习信号的价值——在作业成绩高于平均水平的AI使用者中，更高的作业分数反而预示着更差的考试成绩。\n\nAnthropic研究员安德烈·卡帕西主张，学校应停止监管AI生成的作业，转而将大部分评分工作转向课堂任务。这一观点与研究发现不谋而合：当学生知道考试将禁止使用AI时，他们才会保持学习动力。\n\n这一规律与近期其他研究结果吻合。Anthropic的一项研究显示，借助AI学习新编程技能的参与者，在后续知识测试中比对照组得分低17%，且并未节省实际时间。结果取决于工具使用方式：直接复制AI答案者表现更差，而利用AI理解任务者则未出现同样下滑。\n\n瑞士商学院的研究发现，AI使用与批判性思维能力呈负相关。英美多所大学研究人员的另一项研究表明，将AI主要视为答案生成工具的人群，认知能力下降最快。\n\n加州大学伯克利分校分析超过50万份成绩的研究显示，自ChatGPT推出以来，写作和编程密集型课程中A级成绩的比例上升了13个百分点。同样，这种影响集中在无人监督的作业上，而监考考试中并未出现类似提升。\n\n**去芜存菁的AI新闻——由人类精选** 订阅《解码者》即可享受无广告阅读、每周AI简报、每年六期独家\"AI雷达\"前沿报告、完整档案访问权限及评论区互动。 **立即订阅**", "zh": true}]}]};

  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;

sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
