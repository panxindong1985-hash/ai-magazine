const DATA = {"meta": {"reportDate": "2026-06-01", "reportDateHuman": "2026年6月1日", "weekday": "星期一", "total": 6, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 1, "title": "OpenAI发布生物防御AI工具Rosalind", "source": "X：Sam Altman (@sama)", "summary": "我们希望帮助世界在生物防御领域抢占先机：", "url": "https://x.com/sama/status/2061101875303530871", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "We want to help the world get a head start on biodefense: https://t.co/gDQfOZrLA4 Sam Altman@samaWe want to help the world get a head start on biodefense: Strengthening societal resilience with Rosalind BiodefenseFrom openai.com15:05 · 2026年5月31日29万Views3203201701701.6K1.6K317317Read 320 replies", "zh": true}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 2, "title": "OpenAI正式进军机器人领域并启动招聘", "source": "X：Sam Altman (@sama)", "summary": "OpenAI宣布成立OpenAI Robotics团队，并开始招聘全栈硬件、系统及ML工程师，以编程和制造能服务社会的机器人。该项目由Aditya Ramesh领导，其世界模拟研究计划已演变为机器人研究，强调硬件与ML研究的协同设计。短期目标是支持技术工人构建未来基础设施，长期愿景是为每个人提供个人机器人。", "url": "https://x.com/sama/status/2061117302528188712", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "OpenAI Robotics 正在招聘，寻找杰出的全栈硬件、运营、系统及机器学习工程师，共同编程和制造对社会有用的机器人。\n\n人工智能应能在物理世界中帮助人类。短期内，我们专注于开发机器人以支持技术工人建设未来基础设施；长期来看，我们设想每个人都能拥有个人机器人，完成任何所需任务。\n\n由 Aditya Ramesh（@model_mechanic）领导的世界模拟研究项目，在过去一年中已发展为 OpenAI Robotics。进展迅速，其基础是机器人硬件与机器学习研究的协同设计。\n\n如果你热爱亲自动手处理机器人全栈工作，并希望构建未来，请考虑加入我们。请将你的背景资料及杰出成就证明发送至：[email protected]", "zh": true}, {"seq": 3, "title": "苹果WWDC将推AI升级：Gemini蒸馏模型本地运行，但技术栈外部依赖显著", "source": "X：Kim (@kimmonismus)", "summary": "苹果下月WWDC将重点展示延迟已久的Siri及设备端AI升级，核心是在iPhone芯片本地运行从Google Gemini蒸馏而来的更小模型，以强调隐私与降低token成本。但该技术栈大部分源自外部：本地模型由Gemini蒸馏，设备无法处理的复杂查询将路由至Google Cloud处理，并采用了Nvidia的机密计算技术。苹果据称正在寻觅小型设备端AI初创公司以加速模型缩减工作。此外，苹果2024年承诺的Private Cloud Compute方案原计划使用苹果芯片，因无法承载完整Gemini模型，现已部分转向谷歌云，但该名称仍将保留。", "url": "https://x.com/kimmonismus/status/2061058117304262999", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "苹果AI的最新动态：随着苹果全球开发者大会（WWDC）下月召开，长期延迟的Siri及设备端AI升级预计将成为核心亮点：一款基于谷歌Gemini精简版的小型模型将本地运行于iPhone芯片上，主打隐私保护与更低Token成本。\n\n该技术栈大部分来自外部。本地模型由Gemini蒸馏而来。超出设备处理能力的查询将路由至谷歌云（！），苹果现已批准在该平台使用英伟达的机密计算技术进行处理。据称苹果还在积极寻找小型设备端AI初创公司以加速模型压缩工作，已考察过Liquid AI等企业。\n\n与2024年发布计划的一个悄然变化：苹果当时承诺任何离开iPhone的数据都将在私有云计算（Private Cloud Compute）的苹果芯片上处理。但由于无法让完整版Gemini在此运行，相关查询现改由谷歌云处理。不过\"私有云计算\"这一名称仍将保留。消息来源：The Information", "zh": true}, {"seq": 4, "title": "6000 多公里全程零干预：特斯拉 FSD 完成全球首次横穿加拿大自动驾驶", "source": "IT之家（RSS）", "summary": "一辆特斯拉汽车搭载 FSD V14.3.3 版本软件，完成了全球首次全程零人工干预、横穿加拿大的自动驾驶行程。车辆从温哥华出发，历时 4 天 21 小时，行驶 3760 英里（6051 公里）抵达哈利法克斯，全程所有驾驶操作（包括高速并线、应对复杂路况与自动泊车）均由系统自主完成，无任何系统退出或人工修正。该版本随 2026.14.6.6 更新推送，整合了春季软件功能。", "url": "https://www.ithome.com/0/957/718.htm", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "IT之家 5 月 31 日消息，特斯拉车主在北美成功完成了一项曾被视作自动驾驶测试领域终极目标的挑战。一群热衷电动汽车的爱好者，完成了全球首趟全程无人工干预、横穿加拿大的不间断自动驾驶之旅，车辆在纵贯整个加拿大的行驶过程中，所有操作全部由 FSD 完成，全程无需人为修正操作。 参与者戴维・莫斯（账号 @DavidMoss）在社交平台 X 上公布了这一里程碑成果，宣布团队顺利完成了这场跨加拿大自动驾驶实测。车辆从不列颠哥伦比亚省温哥华的马蹄湾码头出发，历时 4 天 21 小时，最终抵达新斯科舍省哈利法克斯的特斯拉官方展厅。此次长途行程共计行驶 3760 英里（6051 公里），途经加拿大路况差异极大的各类道路。 六千公里全程零接管 这场公路测试之所以成为汽车技术领域的标志性事件，在于其执行标准极为严苛。据莫斯介绍，整段旅程全程零系统退出、零任何形式的人工介入。特斯拉人工智能主管阿肖克・埃卢斯瓦米也对此项成果表示认可，向莫斯及其团队送上祝贺并致谢。 车辆全程自主完成多项高难度操作：驶入高速主干道、应对多变天气、顺利通过复杂施工路段。更值得一提的是，每一处停靠点的泊车流程也均由系统全自动完成。行驶途中，车辆途经多个特斯拉超级充电站，全程自动转向、对位、倒车入位，驾驶员全程未触碰方向盘与踏板。 搭载春季新版固件系统 本次跨洲行程全程依靠特斯拉最新推送的 FSD V14.3.3 版本运行。该版本随 2026.14.6.6 软件更新于本月上旬逐步推送，整合了外界期待已久的 2026 春季软件更新功能，并将其正式纳入自动驾驶固件体系。 除优化底层路径规划神经网络外，V14.3.3 版本的车载界面与座舱功能升级也收获大量好评。该版本放宽了驾驶员监测相关判定标准，带来更接近专职司机代驾的轻松体验，也让驾驶员在这场耗时近五天的长途穿越中更加舒适。 自动驾驶创下空前优异表现 此番横穿加拿大的全程零干预驾驶是一项全新纪录，而莫斯今年已接连创下多项自动驾驶佳绩。今年春季早些时候，他就因完成美国境内 2700 英里（IT之家注：约 4345 公里）跨东西海岸 FSD 自动驾驶行程登上新闻，全程同样零人工介入，证实这套系统可独立完成从洛杉矶到南卡罗来纳州的全程行驶。 此外，他的车辆也成为测试车队长期稳定性的重要参照。此前莫斯就曾分享，车辆搭载 V14.2 版本系统时，已累计实现近 13000 英里（约 20921 公里）的零干预自动驾驶里程。 目前，监督版 FSD 在官方定义中仍属于二级驾驶辅助系统，按照规范仍需驾驶员时刻监管。但这些由民间实测完成的数千公里长距离路测预示着，无监督 FSD 落地已不远。 广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 5, "title": "我花200英镑把一台数据中心级GPU装进了我的游戏电脑", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "一名用户以200英镑的价格购入了一块数据中心级GPU，并将其成功安装到自己的游戏电脑中。文章记述了这一非标准硬件改装过程、遇到的技术挑战以及最终实现本地运行大语言模型的体验。", "url": "https://blog.tymscar.com/posts/v100localllm", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "我已经有一块RTX 4080了。16GB显存，打游戏绰绰有余，但跑本地模型就不太够用了。想在GPU上更进一步，要么花大价钱买块显存更大的显卡，要么另辟蹊径。 我选择了后者。 我买了一块连标准PCIe接口都没有的数据中心GPU，用转接卡塞进了我的游戏PC。现在，我拥有两块GPU共32GB显存，能以每秒32个token的速度运行一个270亿参数的模型。整套花费只花了我200英镑。\n\n**这块GPU#** 这是一块Tesla V100 SXM2 16GB。它专为NVIDIA的DGX服务器和超大规模机架设计。SXM2封装意味着它没有PCIe插槽、没有显示输出接口、也没有标准电源接口。它原本是插在服务器机架内的专用板卡上，通过NVLink通信。 你没法直接把它插到主板上——除非借助外力。 但关键在于：这是一块Volta架构GPU，拥有16GB HBM2显存、5120个CUDA核心，而我在eBay上只花了约150英镑就买到了。它的算力依然能打，显存也货真价实。更让人意外的是它的显存带宽。\n\nHBM2是另一种级别的显存。V100拥有4096位显存总线，带宽高达900 GB/s。对比一下：我的RTX 4080虽然搭载了花哨的GDDR6X显存，带宽只有736 GB/s。2017年的V100，比2022年发布的显卡带宽还高出22%。 这还不只是NVIDIA消费级显卡的差距。苹果M3 Max带宽400 GB/s，M4 Max 546 GB/s，而全新M5 Max（搭载它的笔记本售价超过3000英镑）也只有614 GB/s。一块2017年的GPU，在带宽上碾压了所有Mac。\n\n与我的4080最接近的AMD竞品是RX 7900 XTX，它拥有24GB GDDR6显存和960 GB/s带宽。理论上它略胜V100，但7900 XTX售价700英镑以上，且ROCm对LLM推理的支持相比CUDA仍显粗糙。而V100用不到四分之一的价钱实现了它94%的带宽，还能完美兼容llama.cpp。 唯一能轻松超越它的消费级GPU是RTX 5090（带宽1792 GB/s），但那张卡售价超过2000英镑。对于LLM推理而言，显存带宽是决定每秒token数的瓶颈，这一点比几乎其他所有因素都重要。 唯一的问题是接口。\n\n**转接卡#** 结果还真有人做SXM2转PCIe的转接卡。不是NVIDIA官方出品，也没有任何官方支持。它就是一块裸露的PCB，一边是SXM2插槽，另一边是PCIe金手指。我花了约50英镑买下它——其中一半可能都用在铜材上了。 所以，总共花了约200英镑，我就得到了一块能插进主板、与RTX 4080并存的16GB显存GPU。总计32GB显存。而一块32GB显存的RTX 5090售价超过2000英镑。我不是说体验相同，而是说显存容量一样。\n\n**地狱级风扇#** 在让V100干活之前，我得先解决风扇问题。 V100 SXM2原本设计在配备工业级散热的2U服务器内部工作。转接卡上的风扇可一点都不含蓄——不安静，不适合放在你睡觉的房间里。 我用Apple Watch测了一下： 82分贝。介于垃圾处理器和割草机之间，远超“电脑很吵”的范畴，进入了“我在自己家该不该戴耳塞”的领域。\n\n最糟糕的是：你无法控制它。我试过 nvidia-smi，在 Linux 上扫描过，甚至在 Windows 上试过 Afterburner（稍后会详述，整个配置在 Windows 上几乎无法正常工作）。全都没用。这个适配器上的风扇设计上就不受控制。它注定要在服务器机架中以 100% 的转速永远运行，那里没人会听到它的声音。\n\n这是我尝试找出风扇引脚定义的场景。我猜测它可能是一个标准机箱风扇的引脚定义，只是用了奇怪的接口，于是我把两根跳线插到 VCC 和地线上，用 9V 电池去碰触它们。风扇转了。而且比它正常运行的 12V 电压下安静得多：\n\n这确认了引脚定义，也让我看到了驯服风扇的希望。\n\n让风扇听从指挥#\n\n9V 电池测试告诉我，引脚定义属于标准机箱风扇范畴，只是接口特殊。接下来的问题是，如果我把转速计和 PWM 引脚连接到主板上，风扇是否真的会对 PWM 控制做出响应。\n\n于是我把跳线塞进接口，另一端插到一个空闲的风扇插头上（请调高音量）：\n\n成功了。主板可以读取转速，风扇也能响应 PWM 控制。我把它保持在 10% 的转速。即使在满负载下，温度也从未超过 50°C，而且几乎听不到声音。\n\n现在我需要一根像样的线缆，而不是靠运气维持的跳线。\n\n适配器上的风扇接口是一个四针的小型 JST PH2.0 插头。主板风扇插头采用标准的 0.1 英寸（2.54mm）间距。GPU 风扇使用的是 2.0mm 间距的 JST PH 接口。引脚间距更小，插头也更小。\n\n解决方案是一根 2.54mm 公头转 PH2.0 母头的跳线。PH2.0 母头端插入风扇的转速计和 PWM 引脚，2.54mm 公头端插入主板上一个空闲的风扇插头：\n\n这从 82dB 的听力损伤级别，变成了我能实际接受的噪音水平。\n\n用低成本翻倍显存#\n\n解决了风扇问题后，V100 顺利地与我的 4080 并肩工作：\n\n- RTX 4080：16GB 显存，Ada 架构\n- Tesla V100：16GB 显存，Volta 架构\n- 总计：两块 GPU 共 32GB 显存\n\nllama.cpp 可以通过张量分割将模型分配到两块 GPU 上。它通过 PCIe 总线流水线化各层，让 4080 处理一部分层，V100 处理其余部分。虽然不如单块 32GB 显存的 GPU 快，但确实能用，而且成本大约只有 32GB 显存 GPU 的 10%。值得一提的是，我见过 V100 的最高功耗约为 150W。这不算低，但对于运行本地 LLM 推理的 GPU 来说，并非高得离谱。\n\n等等，你还能更大#\n\nV100 还有 32GB 显存的版本。价格比我买的贵一倍以上，但依然只需几百英镑就能获得单卡 32GB 的 HBM2 显存。两块这样的卡能提供 64GB 显存，成本大约只有当今市场上 RTX 5090 价格的 20%。\n\n你还可以将它们集群使用。SXM2 格式原生支持 NVLink，这意味着如果你在搭建真正的多 GPU 系统，这些卡可以以非常高的带宽相互通信。即使通过 PCIe 适配器，张量分割性能也相当扎实。\n\n软件方面#\n\n得益于 NixOS，这部分出奇地顺利。V100 是 Volta 芯片。NVIDIA 从驱动分支 560 开始放弃了对 Volta 的支持。最后一个同时支持我的 RTX 4080（Ada）和 V100（Volta）的驱动是分支 550.x，在 NixOS 上对应 nvidiaPackages.legacy_535。\n\n该驱动程序仅支持CUDA 12.2及以下版本。当前nixpkgs最低搭载CUDA 12.6，因此我不得不从nixpkgs 24.05中提取CUDA 12.2。 此外，该驱动程序需要内核6.6。旧版驱动不支持更新的内核版本。 还有一个奇怪的问题：尽管这是一台无头推理服务器，但必须启用`services.xserver.enable = true`，否则NVIDIA内核模块无法加载。 NixOS让大部分配置变得简单。以下是正确配置驱动和内核的关键设置： ```nix boot.kernelPackages = pkgs.linuxPackages_6_6; hardware.nvidia.package = config.boot.kernelPackages.nvidiaPackages.legacy_535; services.xserver.enable = true; services.xserver.videoDrivers = [ \"nvidia\" ]; ``` 由于当前nixpkgs仅提供CUDA 12.6+，需要从旧版nixpkgs加载CUDA 12.2： ```nix nixpkgs.overlays = [ (final: prev: { cudaPackages_12_2 = nixpkgs-cuda.legacyPackages.${prev.system}.cudaPackages_12_2; }) ]; ``` 关键在于：它确实能运行。两块GPU均正常识别，CUDA功能完整，NixOS优雅地处理了整个过程。如需复现，完整机器定义（包括llama.cpp服务定义和锁定正确版本的自定义构建）均位于我的dotfiles仓库的该提交中。\n\n**运行模型** 我运行的是Qwen3.6-27B-MTP的Q5_K_M量化版，约19GB。双GPU配置下，整个模型可完全载入显存并留有上下文空间：\n\n| 设置项 | 数值 | |---|---| | 模型 | Qwen3.6-27B-MTP Q5_K_M (19GB) | | 上下文长度 | 128k tokens | | GPU层数 | 99（全部卸载） | | 张量分割 | `-ts 1.0,1.0`（双GPU均匀分配） |\n\n性能表现：\n\n| 指标 | 数值 | |---|---| | 推理速度 | ~32 tok/s | | 提示处理 | ~133-160 tok/s |\n\n每秒32个token足以满足交互式使用。考虑到网络延迟，这比大多数云端API端点更快。而且这是通过PCIe连接两种不同GPU架构进行张量分割的结果。\n\n**这个模型确实优秀** 我想明确一点：这不是“对本地模型来说不错”，也不是“降低期望后尚可接受”。Qwen3.6-27B在Artificial Analysis的Agentic Index上与Claude Sonnet 4.6持平，在MMMU-Pro和Terminal-Bench 2.0上甚至超越Sonnet 4.6。一个运行在二手硬件上的270亿参数模型，竟能与Anthropic最新的云端模型真正一较高下。\n\n诚然，Sonnet 4.6在GPQA和SWE-Bench Verified上略胜一筹——毕竟它是庞大的专有模型。若追求极致性能，Opus 4.8确实存在，但其每20分钟重度使用的费用，已超过我购买整套GPU和转接器的总成本。然而差距已小得惊人：我们已到达这样的阶段——卧室里运行的模型，已能与按token收费的云端模型同台竞技。\n\n**多Token预测** 模型名称中的MTP代表多Token预测。传统LLM推理每次预测一个token：预测→接受→预测下一个→重复。MTP通过让模型同时预测多个未来token，再验证正确性来改变这一过程。被接受的token几乎零成本，错误预测则回退到常规路径。\n\n结果是在不损失准确率的情况下，生成速度提升约1.5-2倍。在我的配置中，当MTP充分发挥时（尤其在代码等可预测输出场景），推理速度可从约32 tok/s提升至50-60 tok/s。\n\n关键在于 llama.cpp 对 MTP 的支持是新增功能。nixpkgs 中的版本不支持 Qwen3.6 MTP 架构，因此我必须从特定提交的源代码构建 llama.cpp 以添加支持。在 NixOS 上，这毫无痛苦。我拥有一个自定义派生，固定到正确的提交，整个过程是可复现的。当我想更新模型或更改 llama.cpp 版本时，只需在配置中修改一行，运行 nixos-rebuild switch，就完成了。没有依赖地狱，无需手动重新安装，也不用担心是否针对正确的 CUDA 版本构建。\n\n**视觉：模型如何“看”图像**\n\nQwen3.6-27B 模型通过一个独立的多模态投影仪文件（mmproj）支持图像输入。这额外增加了约 928MB，非常有趣。\n\n其工作原理是：视觉编码器（类似于 ChatGPT 和 Claude 使用的）将图像像素转换为 LLM 的 token 嵌入空间。模型并不像人类那样“看”图像。相反，视觉编码器将图像压缩成一系列向量，这些向量存在于与文本 token 相同的数学空间中。然后，LLM 将这些向量视为另一系列 token 进行处理。\n\n实际意义是：你可以向模型发送图像 URL 以及文本提示，它就能描述、分析并推理所见内容。整个视觉能力仅为模型大小增加了约 1GB。仅此而已。一 GB 就能让你的本地 LLM 读取图像。\n\n在 llama.cpp 中，标志很简单： ``` --mmproj /mnt/nas/llamacpp/mmproj-F16.gguf --mmproj-offload ``` `--mmproj-offload` 标志将视觉编码器与模型一起加载到 GPU 上，因此即使处理图像，你仍能获得快速推理。\n\n**通过 OpenCode 运行**\n\n我使用此设置与 OpenCode 配合，这是一个 AI 编码助手，可以针对本地模型运行。LLM 服务器运行在我的台式机上，但我并不在该机器上使用它。我通过网络在家中任何其他机器上使用，或通过 Tailscale 从外部使用（但这是另一篇博客文章的内容）。将 OpenCode 指向 llama.cpp 服务器只需设置 API URL。模型在本地运行，响应迅速，且没有任何数据离开我的网络。\n\n**NAS 和 USB 驱动器**\n\n所有模型都存储在我的 TrueNAS 服务器上，通过 NFS 挂载： ``` fileSystems.\"/mnt/nas\" = { device = \"truenas-nfs.tymscar.com:/mnt/oasis/services\"; fsType = \"nfs\"; options = [ \"nfsvers=4\" \"_netdev\" \"auto\" \"nofail\" ]; }; ``` llama.cpp 服务依赖于 mnt-nas.mount，因此在 NAS 可用之前不会启动。这意味着我可以存储数 TB 的模型，而无需担心本地磁盘空间。\n\n整个操作系统运行在 DockCase USB-C NVMe 外壳中的 Corsair MP600 MINI 上。无需修改内部驱动器。当我想玩游戏时，拔下驱动器，重新启动到主 Windows 安装，在 4080 上正常游戏。当我想做 LLM 相关工作时，重新插上驱动器，启动到 NixOS，两个 GPU 都可用。\n\n这不如双启动菜单优雅，但简单且有效。没有 GRUB，没有引导加载程序冲突，没有分区管理。只是一个物理开关。\n\n**一个烦人的问题**\n\n在热重启（操作系统重启但主板保持通电）后，V100 偶尔会从 lspci 和 nvidia-smi 中消失。这似乎是 PCIe 插槽的 ACPI 枚举问题。冷重启（物理断电，等待几秒，再通电）总能恢复它。\n\n当V100显卡缺失时，llama.cpp无法启动，因为模型无法装入单块16GB显存的GPU。服务会陷入崩溃循环，直到显卡恢复。实际操作中这不算大问题——因为我通常在重启时在场——但值得留意。这让我想起臭名昭著的AMD显卡重置bug：将AMD显卡直通给虚拟机后关闭，会导致显卡陷入只有完全重启宿主机才能修复的状态。\n\n最终成果# 花费200英镑，我获得了：\n- 一块16GB数据中心级GPU与游戏显卡协同运行\n- 总计32GB显存用于本地大语言模型推理\n- 在27B参数模型上实现每秒32个token\n- 128k token上下文窗口\n- 支持图像输入的视觉功能\n- 完全本地运行的模型，无需云端，无需按token付费\n\n唯一的代价是噪音，而我用价值2英镑的跳线和一番接口探索解决了这个问题。V100并非最快的推理显卡，跨两种不同架构的张量拆分也不如单卡流畅。但就这个价格而言，性价比高得离谱。\n\n如果你想在本地运行像样的模型，不妨关注二手服务器GPU市场。你甚至不需要现有显卡。我恰好有块4080装在游戏PC里，但单块V100配合廉价服务器机箱，就能用很少的钱获得16GB显存和完全可用的本地大语言模型。V100 SXM2并非唯一选择——P40能提供24GB显存。", "zh": true}, {"seq": 6, "title": "教皇似乎比Geoffrey Hinton更懂人工智能", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "这一观点强调，单纯分析AI的输出内容，无法还原其生成过程与背后的推理逻辑，触及了当前AI可解释性研究的核心挑战。", "url": "https://garymarcus.substack.com/p/the-pope-appears-to-understand-ai", "publishedAt": "2026-06-01T00:00:00.000Z", "exact": false, "content": "教皇似乎比杰弗里·辛顿更懂人工智能。 事物的表述方式并不能揭示其生成机制。 辛顿最新访谈： 我可以写一篇长文来解释为何这种观点站不住脚，就像我最近针对理查德·道金斯类似错误所写的文章那样——核心论点如下。只需替换加粗词汇即可。 根本问题在于，[知名资深人士姓名]并未反思[AI]输出的生成机制。克劳德的输出本质上是模仿的产物，而非真实内在状态的呈现。 意识关乎内在状态；无论模仿多么精妙，都无法证明实质问题。道金斯似乎认为，既然大语言模型能说出人类的话语，它们必然具备人类特质——这种推论根本不成立。 在他的框架中，[资深人士X]混淆了概念，对意识[及存在本质]的认知造成了扭曲。你不能仅凭输出结果，在不探究底层机制的情况下，就断定两个输出相似的实体是通过相似方式达成结果的。而两者差异巨大：大语言模型本质上是记忆了整个互联网，人类则是通过世界经验构建心智模型。 但何必重写那篇文章？ 就在辛顿访谈前两天，教皇利奥十四世用一条推文（延续其卓越的《通谕》）更精辟地概括了这一点： 真正的理解源于体验，而非文本近似。 § 正如瓦莱里奥·卡普拉罗所言，教皇的观点与我们二月在《自然》杂志上与沃尔特·夸特罗乔基共同提出的观点高度一致： § 大语言模型研究者并非在创造生命。 他们是在训练能够预测真实生命语言模式的交互式虚构作品。 这两者截然不同。 而辛顿本该更清楚这一点。 附注：想了解我对大语言模型内部\"情感\"状态的看法，以及为何它们缺乏说服力？敬请期待后续文章。作为彩蛋，可查阅我与艺术家/音乐人格莱姆斯就AI与意识问题展开的两场即兴辩论（链接在此处及此处）。", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;

sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
