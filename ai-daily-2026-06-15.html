决策，但此举加剧了关于AI进步将如何影响全球科技工作未来、以及这对印度作为工程人才枢纽地位意味着什么的广泛讨论。 超越Anthropic事件 除了初创企业和AI开发者，Anthropic事件还引发了印度科技领袖对依赖外国AI基础设施的广泛辩论。 印度SaaS公司Zoho创始人斯里达尔·文布表示，此举表明\"技术才是终极武器\"，并敦促印度机构更多采用小型及开源模型。 \"政府现在能做什么？确保印度机构拥抱小型模型，包括印度和中国的开源模型，\"文布在X平台写道。 投资者、前Infosys高管莫汉达斯·派在X平台回应文布时指出，这一发展凸显了制定更具雄心的国家AI战略的必要性，并呼吁政府大幅增加对AI、计算基础设施和深度技术的投资。 \"我们已严重落后，需要国家使命来快速推进，\"派写道，敦促政府设立每年5000亿卢比（约50亿美元）的AI与深科技基金，同时配套2万亿卢比（约210亿美元）的信贷担保计划，以支持云基础设施、硬件和半导体发展。 派的提议将使印度现有AI投入相形见绌。2024年，新德里批准了印度AI使命计划，五年内拨款1037.2亿卢比（约12亿美元），旨在扩展计算基础设施、支持初创企业并发展本土AI能力。 尽管印度对AI的兴趣日益浓厚，且新德里正推动发展本土能力，但该国在前沿模型开发领域仍属小角色。仅有少数初创企业致力于基础AI模型研发，包括今年早些时候发布开源模型的Sarvam。 而另一家备受瞩目的AI初创公司Krutrim，在最初定位为基础模型开发后，已转向云和AI基础设施服务。 印度AI生态系统的重心更多集中在基于现有基础模型构建的应用和专用模型上。近期案例包括Avataar AI，该公司本周早些时候推出了视频生成模型，旨在以更低成本替代谷歌Veo、Kling、Luma和Runway等竞品。 并非所有人都认为主要挑战在于资金匮乏。针对Pai的评论，Lightspeed合伙人Hemant Mohapatra指出，打造具有全球竞争力的AI公司面临的最大制约因素是人才、算力获取和执行能力，而非单纯的投资规模。 Mohapatra估算，训练前沿AI模型的成本可能从数亿美元到数十亿美元不等（具体取决于技术路线），但强调成功的AI公司历来都是随着用户增长逐步扩大资本需求。 然而在部分政策观察人士看来，此事的影响远不止AI初创公司或模型提供商。常驻新德里的科技政策专家Prasanto Roy（为跨国公司提供咨询）表示，该事件可能加剧印度政府对战略自主的担忧，并将其与多国从俄罗斯因入侵乌克兰而失去SWIFT等全球金融系统接入权中汲取的教训相类比。 他向TechCrunch指出，此举很可能在印度引发强烈的民族主义反弹，并称这是华盛顿方面考虑欠妥的决定，其影响将远超Anthropic本身。 \"即便此事得到纠正或逆转，Anthropic事件表明根本不存在地缘政治中立的境外大语言模型，\"Roy表示，\"美国AI模型必然受制于美国地缘政治。\"", "zh": true}, {"seq": 2, "title": "Meta 开始撤销 20 亿美元收购 Manus 的交易", "source": "TechCrunch：AI（RSS）", "summary": "据 TechCrunch 报道，Meta 已开始撤销对 Manus 的 20 亿美元收购交易，此前北京要求该交易必须反转。目前收购解除程序已启动。", "url": "https://techcrunch.com/2026/06/13/meta-reportedly-moves-to-unwind-2b-manus-deal-after-beijings-demand", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "Meta已开始拆解其20亿美元收购Manus的交易，完成与这家中国背景AI初创公司的运营分离，并停止双方数据共享。这是北京方面约两个月前以国家安全为由发布剥离令后，Meta采取的最实质性合规举措。 据彭博社报道，Meta已将Manus从其内部系统中切断，禁止员工在内部项目中使用Manus工具，两家公司正走向完全分离。 与此同时，根据5月报道，Manus联合创始人已就向外部投资者融资约10亿美元以从Meta手中回购该公司进行初步讨论。此举可能为建立中国合资企业架构铺平道路，并最终在香港上市——该交易所今年已迎来MiniMax、智谱等中国AI初创公司的上市热潮。 这宗本应成为中国AI标志性退出案例的交易正迅速瓦解。此举凸显北京方面无论企业是否在离岸注册，都决心保持对战略敏感技术的控制权。 除强制剥离外，中国当局已将旅行限制扩大至私营企业的研究人员和高管，要求他们在出国 e Can Trust（RSS）", "summary": "白宫周五做出的AI监管决定被指偏袒OpenAI、亚马逊等企业，同时对Anthropic施压不足24小时，缺乏透明度和事实依据。Gary Marcus、Dean W Ball及卡托研究所Kevin Frazier等专家指出，这种由少数人闭门快速决策的做法带有腐败嫌疑，可能促使其他国家加速发展“主权AI”甚至中国AI，并导致美国人才流失。Anthropic声明称政府应在法定程序中基于技术事实阻止不安全部署，而非当前方式。Marcus呼吁建立独立机构负责AI监管，确保公平、清晰、基于证据的执行。", "url": "https://garymarcus.substack.com/p/what-washington-must-do", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "**华盛顿必须做什么** \"唯一的出路是直面问题\" 华盛顿已经制造了一个巨大的烂摊子。 就连右翼的一些人也看到了这一点，比如帮助现任特朗普政府制定AI政策的迪恩·W·鲍尔。 白宫的做法似乎很武断，甚至可能涉及腐败。 周五的决定帮助了OpenAI，而其总裁格雷格·布罗克曼是特朗普的主要捐赠者，这无助于改善局面。 周五的决定帮助了贾里德·库什纳的兄弟乔什，他是OpenAI的主要投资者，这无助于改善局面。 周五的决定帮助了亚马逊（并由亚马逊的一份报告引发），而亚马逊是OpenAI的主要投资者，这无助于改善局面。它还间接帮助了与政府有联系的杰夫·贝佐斯，这同样无助于改善局面。 皮特·赫格塞斯似乎对Anthropic怀有个人恩怨，这更无助于改善局面： 这让整件事显得格局很小。 诚然，Anthropic自身也有责任。推特上充斥着嘲笑Anthropic的梗图，比如这些： Anthropic既过度炒作Mythos，又疏远了白宫，确实扮演了推波助澜的角色。 但美国政府的职责是充当房间里的大人，做出对国家有利的决策。 讽刺的是，他们实际上恰恰证实了阿莫迪的说法，即某些AI可能需要监管，并可能需要出口管制。 由马克·安德森等人推广的、荒谬但流行的\"AI零监管\"理念（正确地）已经夭折。周五之后，白宫再也无法可信地声称任何模型都不应受到监管。白宫已经承认某些模型可能存在风险；现在我们只是在争论细节。 华盛顿现在必须做的是，以清晰透明的方式做出这些决策，避免腐败的嫌疑。 § 白宫平息这场风暴的首次努力似乎是一种半道歉。大卫·萨克斯在X上发布了一份长篇声明，从他的角度解释了发生的事情。不幸的是，他的声明（a）对于问题有多严重、问题究竟是什么、是否有任何影响、或者问题是否只存在于Fable/Mythos等方面含糊其辞。对于为何如此迅速地做出一个影响深远的决定，没有给出真正的理由。 贯穿始终的真正问题是急躁和自我。白宫想要按自己的方式行事，没有立即得到满足，就试图立刻强加自己的意志——几乎没有给Anthropic留出处理问题的时间。（为什么是不到24小时，而不是比如72小时？） 看起来他们是在找借口整Anthropic，而对更大的后果视而不见。 这种仓促且看似毫无原则的决定，将导致世界其他国家（例如欧洲或加拿大公司制造的\"主权AI\"，甚至中国AI）争相发展，而不是应对美国的不确定性——在那里，任何模型都可能随时在没有警告和明确解释的情况下被关闭。 此外，由于该命令的构建针对的是外国人——甚至包括像安德烈·卡帕西这样长期在美国生活和工作的杰出人士——这可能导致大规模人才流失。 并且这将拖慢美国领先AI实验室之一的步伐。 这对习近平来说是一场盛宴。 正如Anthropic上周五所言：“政府应有权阻止不安全的部署，这应作为法定程序的一部分，且该程序必须透明、公平、清晰，并基于技术事实。而这一行动并未遵循这些原则。” 自由派智库卡托研究所的Kevin Frazier昨日在博客中呼应了这一观点，他表示： “透明度、公平性、清晰度以及基于证据的执法，应成为AI治理的核心要素。只要AI政策决策仍由少数人闭门造车、依据非公开报告行事，我们就远未达到这一标准。” 这正是Ball试图表达的观点，也是我想说的。 事已至此，已无退路。各国政府未来必须判断哪些部署存在安全隐患，并予以阻止。 但这一切必须以透明、公平、清晰的方式推进，基于技术事实，且不能有任何腐败嫌疑。 § 今天读到的最佳内容来自加州国会议员Ro Khanna，他既精准剖析了问题，又指出了我认为的最佳解决方案（与我长期以来的建议一致）： 设立独立机构。而非由少数小圈子在最后一刻做出不透明的决策，暗含偏袒与腐败之嫌。 若做不到这一点，美国AI产业将前途尽失。", "zh": true}, {"seq": 6, "title": "Satya Nadella：没有生态的前沿不稳定", "source": "X：Satya Nadella (@satyanadella)", "summary": "微软CEO Satya Nadella认为，AI驱动的平台转变首次实现人与数字系统间的认知循环。企业需同时构建人力资本（知识、判断、关系）与token资本（自有的AI能力），且人力资本不会贬值，反而随token资本增长而增值。真正的机会在于建立人力资本与token资本复合增长的学习循环——企业应能替换通用模型而不丢失已内化的专家知识，通过私有评估和强化学习让模型从内部真实轨迹中持续提升。他警告，若所有价值被少数模型吞噬，将重演全球化空心化悲剧，呼吁构建前沿生态系统，让每家企业、行业和国家拥有自己的学习循环。", "url": "https://x.com/satyanadella/status/2066182223213293753", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "I’ve been thinking a lot about the future of the firm in an AI-driven economy. This transition is different than any previous platform shift. In the past, we used digital systems to enhance human...", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
</body></html>
