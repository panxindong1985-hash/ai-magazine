const DATA = {"meta": {"reportDate": "2026-06-15", "reportDateHuman": "2026年6月15日", "weekday": "星期一", "total": 6, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "行业动态", "color": "#d97706", "items": [{"seq": 1, "title": "Anthropic 暂停新模型访问，印度辩论 AI 未来", "source": "TechCrunch：AI（RSS）", "summary": "Anthropic 暂停了新模型的访问权限，印度科技领袖围绕这一事件展开辩论，探讨其是否是对该国 AI 雄心的警示。", "url": "https://techcrunch.com/2026/06/13/as-anthropic-suspends-access-to-new-models-india-debates-its-ai-future", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "Anthropic’s sudden move to suspend access to its newest AI models following a U.S. government directive has raised fresh questions across the global technology industry. In India, the decision has reignited a long-running debate over whether one of the world’s largest AI markets can afford to rely on technologies built and controlled elsewhere.\nThe announcement came late Friday, when Anthropic said it had received the U.S. government directive requiring it to suspend access to its recently launched Fable 5 and Mythos 5 models for all foreign nationals, including its own foreign national employees. The move came shortly after the company announced a partnership with Indian IT services giant Tata Consultancy Services to expand enterprise AI adoption in India, underlining how closely the country’s AI ambitions have become tied to technologies developed and governed in the U.S.\nWhile the broader implications remain unclear, some reports said the initial security concerns were first reported to the government by Amazon CEO Andy Jassy. And The Information said the White House is unlikely to extend similar restrictions to other AI companies and is privately blaming Anthropic’s handling of alleged jailbreak vulnerabilities. Anthropic has disputed the government’s characterization and argued the action should not have been taken.\nRegardless, the development has triggered debate among Indian founders, investors, and policy experts over whether the country should accelerate efforts to build domestic AI capabilities, deepen investment in open source alternatives, or continue relying on a handful of U.S. frontier model providers. For some, the episode is a wake-up call on technological dependence. For others, it is a reminder that access to increasingly critical AI systems can be shaped by geopolitical decisions beyond India’s control.\nIndia has become one of the most important markets for frontier AI companies. Anthropic and OpenAI have both described the South Asian nation as their second-largest market after the U.S., reflecting its growing importance in the global AI race. The companies have already set up their offices in India, expanded local hiring, partnerships, and enterprise initiatives in recent months, betting on India’s vast base of developers, startups, and businesses to accelerate adoption of their latest technologies.\nFor many in India’s technology sector, Anthropic’s Friday announcement was about more than just one AI company. It reopened questions about the country’s long-term AI strategy and whether India could afford to remain dependent on a small number of foreign frontier AI providers.\n“It completely changes things,” said Aakrit Vaish, founder of Indian AI venture platform Activate, referring to Anthropic’s decision. “I think this materially changes the way all of us should be thinking about sovereign AI in India.”\nVaish told TechCrunch that he woke up on Saturday morning “shocked and confused” by the announcement and said it strengthened the case for developing domestic AI capabilities. He expects startups to increasingly turn to open source models and plans to encourage companies in his portfolio to reduce their dependence on a small number of frontier AI providers.\nFor some founders, the bigger concern was what restrictions on frontier AI access could mean for competitiveness. Vijay Rayapati, co-founder and CEO of Atomicwork, told TechCrunch that the episode highlighted the risks facing startups whose teams span multiple countries if access to advanced AI systems increasingly becomes subject to geopolitical restrictions.\nAtomicwork has around 25 employees in the U.S., though much of its product engineering team is based in Bengaluru, India.\n“If your AI team is not made up entirely of U.S. citizens, you are at a competitive disadvantage,” Rayapati said, arguing that unequal access to frontier AI models could give some companies a significant edge over rivals.\nThe concern comes as parts of India’s tech sector are already grappling with questions about how AI could reshape the economics of global talent. This week, U.S. real estate technology company Opendoor shut its India office less than two years after expanding in the country, with CEO Kaz Nejatian citing a push to bring operational work closer to customers in the U.S. and a shift toward smaller AI-native teams.\nWhile Opendoor did not specify how much of the decision was driven by AI-related efficiencies, the move added to a broader debate about how advances in AI could affect the future of global technology work and what that might mean for India’s position as an engineering talent hub.\nBeyond Anthropic\nIn addition to startups and AI builders, the Anthropic episode also prompted a broader debate among India’s technology leaders about dependence on foreign AI infrastructure.\nSridhar Vembu, founder of Indian SaaS company Zoho, said the move showed that “technology is the ultimate weapon” and urged Indian organizations to increasingly embrace smaller and open source models.\n“What can our government do right now? Ensure that orgs in India embrace smaller models, both Indian and Chinese open source ones,” Vembu wrote on X.\nInvestor and former Infosys executive Mohandas Pai responded to Vembu on X, arguing that the development highlighted the need for a far more ambitious national AI strategy and calling on the government to substantially increase investments in AI, computing infrastructure, and deep technology.\n“We are way behind and need a national mission to get going quickly,” Pai wrote, urging the government to create an annual ₹500 billion (about $5 billion) fund for AI and deep tech, alongside a ₹2 trillion (around $21 billion) credit guarantee program to support cloud infrastructure, hardware, and semiconductor development.\nPai’s proposal would dwarf India’s existing AI efforts. In 2024, New Delhi approved the IndiaAI Mission with an outlay of ₹103.72 billion (about $1.2 billion) over five years, aimed at expanding compute infrastructure, supporting startups, and developing indigenous AI capabilities.\nDespite growing interest in AI and New Delhi’s push to develop domestic capabilities, India remains a relatively small player in frontier model development. Only a handful of startups are pursuing foundational AI models, including Sarvam, which released open source models earlier this year. However, another high-profile AI startup, Krutrim, pivoted toward cloud and AI infrastructure services after initially positioning itself around foundational model development.\nMuch of India’s AI ecosystem has instead concentrated on applications and specialized models built on top of existing foundation models. Recent examples include Avataar AI, which launched a video-generation model earlier this week aimed at providing a lower-cost alternative to offerings from rivals including Google’s Veo, Kling, Luma, and Runway.\nNot everyone agrees that the primary challenge is a lack of capital. Responding to Pai’s comments, Lightspeed partner Hemant Mohapatra argued that the biggest constraints to building globally competitive AI companies are talent, access to computing resources, and execution, rather than simply the size of investment commitments.\nMohapatra estimated that training a frontier AI model could cost anywhere from hundreds of millions to several billion dollars, depending on the approach, but said successful AI companies have historically scaled their capital requirements over time as adoption grew.\nYet for some policy observers, the implications extend well beyond AI startups or model providers.\nPrasanto Roy, a New Delhi-based technology policy expert who advises multinational companies, said the episode would likely reinforce concerns within the Indian government about strategic autonomy, comparing it to the lesson many countries drew from Russia’s loss of access to SWIFT and other parts of the global financial system following its invasion of Ukraine.\nHe told TechCrunch that the move was likely to provoke a significant nationalist backlash in India and described it as a poorly considered decision by Washington, with consequences extending far beyond Anthropic itself.\n“Even if this is corrected or reversed, the Anthropic episode shows there’s no such thing as a geopolitically neutral foreign LLM,” Roy said. “American AI models are bound to American geopolitics.”", "zh": false}, {"seq": 2, "title": "Meta 开始撤销 20 亿美元收购 Manus 的交易", "source": "TechCrunch：AI（RSS）", "summary": "据 TechCrunch 报道，Meta 已开始撤销对 Manus 的 20 亿美元收购交易，此前北京要求该交易必须反…", "url": "https://techcrunch.com/2026/06/13/meta-reportedly-moves-to-unwind-2b-manus-deal-after-beijings-demand", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "Meta has begun dismantling its $2 billion acquisition of Manus, completing an operational separation from the Chinese-founded AI startup and halting data sharing between the two companies. This is the most concrete step yet toward complying with a divestiture order Beijing issued roughly two months ago on national security grounds.\nMeta has cut Manus off from its internal systems, Bloomberg reported, preventing employees from using Manus tools for internal projects as the two companies move toward a full separation.\nMeanwhile, according to May reports, the co-founders of Manus have held preliminary discussions about raising approximately $1 billion from outside investors to reclaim the startup from Meta, a move that could pave the way for a Chinese joint venture structure and an eventual listing in Hong Kong, a venue that has seen a surge in AI listings this year for Chinese AI startups like MiniMax and Zhipu.\nWhat was supposed to be a landmark exit for Chinese AI is quickly unraveling. The move underscores Beijing’s determination to retain control over strategically sensitive technology, regardless of a company’s offshore incorporation.\nIn addition to the forced divestiture, Chinese authorities have since expanded travel restrictions to researchers and executives at private firms, requiring government approval before heading abroad. China is also tightening its grip on foreign capital, with reports indicating that top AI firms, including Moonshot AI, StepFun, and ByteDance, will need government sign-off before accepting U.S. investment, adding another layer to Beijing’s sweeping effort to control its AI sector.\nEven as Meta moves to sever ties with Manus, the agentic AI startup has continued to ship new features, rolling out integrations with Similarweb and Shopify.\nManus, which went viral with a demo of its AI agent, relocated its staff to Singapore in mid-2025 before announcing a $2 billion acquisition by Meta in December. Chinese regulators moved to scrutinize the transaction earlier this year, citing potential violations of technology export controls and foreign investment rules.\nManus investors, including California-based venture firm Benchmark, have already received their proceeds from the acquisition, while Asian backers, including Tencent, HSG, and ZhenFund, have indicated they will cooperate with the unwinding process, according to the Wall Street Journal.\nManus’ Chinese origins with parent company Butterfly Effect drew scrutiny on both sides of the Pacific, with Senator John Cornyn questioning whether American capital should flow to a Chinese-linked firm.\nMeta and Manus did not immediately respond to a request for comment outside regular business hours.", "zh": false}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 3, "title": "乔木小说创作 Skill 开源发布", "source": "X：Vista (@vista8)", "summary": "开源乔木小说创作 Skill，用户只需说“我想写一个小说”或指定风格，AI 自动生成剧情梗概、人物设定、钩子、经典桥段…", "url": "https://x.com/vista8/status/2066165703443726749", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "想写职场、武侠、修仙等任意风格小说？\n可自己完全没有思路，能创作吗？必须可以！\n今天开源一个乔木小说创作 Skill。\n你只需说：“我想写一个小说” 或 “想写一个类似xxx的小说”。\nAI自动给出剧情梗概，人物设定，还能把钩子、经典桥段、人物欲望、冲突升级和结尾自动处理好。\n跟AI讨论没问题后，再生成完整、低 AI 味的小说。\n小说 Skill 安装：\nnpx skills add joeseesun/qiaomu-novel-generator\nGithub免费开源，地址见评论区", "zh": true}, {"seq": 4, "title": "Anthropic 上市前夕", "source": "X：小互 (@xiaohu)", "summary": "Anthropic CEO Dario Amodei透露内部模型Mythos有上千漏洞，能黑银行、窃取国家机密；预言A…", "url": "https://x.com/xiaohu/status/2065991805238497732", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "Anthropic 上市前夕\n彭博社采访了Anthropic 公司俩兄妹，在这次采访中（Fable 5 还没有被封杀）Dario Amodei极度的渲染了Mythos的威力和AI的威胁\n当然这也是他一贯的主张，呼吁政府对AI监管，当然他呼吁的是对所有公司监管...\n下面是一些采访片段剪辑（完全由Claude Code 翻译并剪辑）\n• 一个强到自己都不敢发布的模型 Mythos：上千个漏洞,能黑银行、撬国家机密,连 NSA 都抢着要用\n• Dario 预言:AI 可能一到五年内，砍掉一半入门级白领工作\n• Claude 被美军用进了对伊朗的战争，一所女校 150 人死亡的拷问\n• 他头一次说清为什么离开 OpenAI：不是安全分歧,是信任崩了\n • 当面回怼黄仁勋的\"末日营销\":把这说成廉价营销,本身才是廉价营销\n• 文明崩溃概率 10% 到 25%，他拿\"飞机会不会坠毁\"给你算账", "zh": true}, {"seq": 5, "title": "白宫AI监管决定被指偏袒OpenAI与亚马逊", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "白宫周五做出的AI监管决定被指偏袒OpenAI、亚马逊等企业，同时对Anthropic施压不足24小时，缺乏透明度和事…", "url": "https://garymarcus.substack.com/p/what-washington-must-do", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "What Washington must do\n”The only way out is through”\nWashington has made a huge mess.\nEven some people on the right see this, like Dean W Ball, who helped the current Trump administration establish its AI policy\nWhat the White House did seems arbitrary. And maybe even corrupt\nIt doesn’t help that Friday’s decision helped OpenAI, whose President, Greg Brockman, is a huge Trump donor.\nIt doesn’t help that Friday’s decision helped Jared Kushner’s brother Josh, who is a big investor in OpenAI.\nIt doesn’t help that Friday’s decision helped Amazon (and was sparked by a report from Amazon), a huge investor in OpenAI. It doesn’t help that it indirectly helped Jeff Bezos, who has ties to the administration.\nAnd it doesn’t help that Pete Hegseth seems to have a personal grudge against Anthropic:\nWhich makes the whole thing feel petty.\nTo be sure, Anthropic contributed to the situation. The Twitterverse is full of memes mocking Anthropic like these\nAnthropic certainly played a role both by overhyping Mythos and by alienating the White House.\nBut it is the job of the US government to be the adult in the room, and to make decisions that are sound for the nation.\nEffectively — and ironically — they have actually vindicated Amodei’s claim that some AI might need to be regulated and might require export controls.\nThe ridiculous but fashionable idea of zero-regulation around AI, made popular by folks like Marc Andreessen, is (rightly) dead in the water. After Friday, the White House can no credibly say that no model ever should be regulated. The White House has acknowledged that some models might be risky; now we are just arguing about the details.\nWhat Washington must do now is make those calls in a clear and transparent way, in a way that doesn’t reek of corruption.\n§\nThe White House’s first effort at tamping down the firestorm seems to have been to have been a sort of half-apology. David Sacks put out a long statement on X explaining (from his perspective) what happened. Unfortunately. his statement is (a) desperately vague about how serious the problem was, or what exactly the problem was, whether anything was affected, or whether the problem was unique to Fable/Mythos and so on. There was no real justification for the speed at which a decision with such lasting consequences was made.\nWhat really comes through above all else is impatience and ego. The White House wanted its way, didn’t get it instantaneously, and attempted to impose its will immediately — giving Anthropic almost no time to address the issues. (Why less than 24 hours rather than say 72?)\nIt looks like they were looking for an excuse to screw Anthropic, and blind to the larger consequences.\nThue rushed and seemingly unprincipled decision will leave the rest of the world rushing towards “sovereign AI” (made for example by European or Canadian companies) and even Chinese AI, rather than deal with the uncertainty in the US, in which any model can be shut down at any time without warning and without clear explanation.\nMoreover, because the construction of the order targeted foreigners — even eminent ones who have long lived and worked in the US such as Andrej Karpathy – it may lead to a massive brain drain.\nAnd it will slow down one of the leading US AI labs.\nIt is a feast for Xi Jinping.\n§\nAs Anthropic put it on Friday : “the government should have the ability to block unsafe deployments as part of a statutory process that is transparent, fair, clear, and grounded in technical facts. This action does not adhere to those principles.”\nKevin Frazier of the libertarian Cato Institute echoed this saying in a blog yesterday, saying\n“Transparency, fairness, clarity, and evidence-driven enforcement should be core components of AI governance. So long as AI policy decisions are driven by a few actors taking action behind closed doors in response to non-public reports, we will be far short of that standard.”\nThat’s what Ball is also trying to say, and what I am trying to say.\nAt this point, there is no turning back. Governments going forward will have to consider which deployments are unsafe, and block those that are.\nBut they must do this transparently, and with fairness, and clarity, based on technical facts, and without the appearance of corruption.\n§\nThe best thing I read today came from the California Congressmen Ro Khanna, who both distills the problem and points to what I think is the best solution is (in line with what I have long recommended):\nAn independent agency. Not last minute, opaque decisions made by a small cabal that hint at favoritism and corruption.\nWithout that, the US AI industry is lost.", "zh": false}, {"seq": 6, "title": "Satya Nadella：没有生态的前沿不稳定", "source": "X：Satya Nadella (@satyanadella)", "summary": "微软CEO Satya Nadella认为，AI驱动的平台转变首次实现人与数字系统间的认知循环。企业需同时构建人力资本…", "url": "https://x.com/satyanadella/status/2066182223213293753", "publishedAt": "2026-06-15T00:00:00.000Z", "exact": false, "content": "I’ve been thinking a lot about the future of the firm in an AI-driven economy.\nThis transition is different than any previous platform shift. In the past, we used digital systems to enhance human...", "zh": false}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

      '<p class="summary">'+escapeHtml(it.summary)+'</p>'+
      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
