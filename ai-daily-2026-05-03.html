const DATA = {"meta": {"reportDate": "2026-05-03", "reportDateHuman": "2026年5月3日", "weekday": "星期日", "total": 9, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 1, "title": "模型别名新增\"-latest\"指向最新版本", "source": "X：OpenRouter (@OpenRouter)", "summary": "新功能：\"-latest\" 模型别名 🔀 将请求路由至 \"~anthropic/claude-opus-latest\"、\"~openai/gpt-latest\" 等，以获取各主要模型的最新版本。（灵感来自语义化版本。）https://openrouter.ai/models?q=latest", "url": "https://x.com/OpenRouter/status/2050610378971738552", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "新功能：“-latest”模型别名 🔀 将请求路由至“~anthropic/claude-opus-latest”、“~openai/gpt-latest”等，即可获取各主要模型的最新版本。（灵感源自语义化版本控制。）openrouter.ai/models?q=latest openrouter 在模型名称中加入了酷炫的“nitro”标识，用于调用最快的提供商 例如“gpt-5.5:nitro” 如果实验室能直接支持“latest”之类的用法就更棒了", "zh": true}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 2, "title": "美国五角大楼与 SpaceX、OpenAI、谷歌、英伟达、微软等 8 家公司合作，在机密网络部署 AI、用于作战", "source": "IT之家（RSS）", "summary": "美国五角大楼宣布与SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊AWS及甲骨文八家领先AI公司达成协议，将在其机密网络（IL6和IL7环境）中部署AI能力，用于“合法的作战使用”。此举旨在加速美军向AI优先作战力量转型，通过集成安全的边界AI能力来简化数据合成、提升态势感知并增强复杂环境下的决策优势。此前，五角大楼因与Anthropic就AI模型使用限制产生争议并诉诸法律，加速了供应商多元化进程。", "url": "https://www.ithome.com/0/945/962.htm", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "IT之家 5 月 2 日消息，美国五角大楼（战争部）于当地时间 5 月 1 日宣布，它已与八家领先的 AI 公司 ——SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊网络服务（AWS）以及甲骨文达成协议，将在部门的机密网络上部署其 AI 能力，用于“合法的作战使用”。 美国五角大楼声明中写道：“这些协议加速了美国军队向建立 AI 优先的作战力量的转型，并将加强我们的作战人员在不同战域保持决策优势的能力。” 将安全的边界 AI 能力集成到美国五角大楼的影响级别 6（IL6）和影响级别 7（IL7）网络环境中，将简化数据合成，提升态势感知能力，并增强作战人员在复杂作战环境中的决策能力。SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊网络服务（AWS）和甲骨文将提供资源，以在 IL6 和 IL7 环境中部署其能力。外媒 Techcrunch 表示，美国五角大楼与 Anthropic 就其 AI 模型使用条款出现争议，因此加速了 AI 供应商的多元化。", "zh": true}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 3, "title": "哈佛新研究：AI 模型“急诊科”场景诊断能力有望超越人类医生", "source": "IT之家（RSS）", "summary": "哈佛医学院与贝斯以色列女执事医疗中心的研究显示，OpenAI的一款推理模型在真实临床病例测试中，其诊断与制定治疗方案的能力达到甚至超越了人类医生水平。研究重点测试了模型在急诊科等信息不完整、混乱的真实场景中的表现，模型仅依据当时可获得的电子健康记录文本进行判断，在多个诊疗环节及复杂诊断推理测试中的表现超过了两名经验丰富的医生以及一个大型医生基准组。但模型目前完全依赖文本病历，未处理影像等关键信息。研究者强调，AI并非取代医生，而是有望成为临床决策支持工具，尤其适用于急诊等高压环境。下一步需在真实临床环境中测试其对患者结局的实际改善效果。", "url": "https://www.ithome.com/0/946/077.htm", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "IT之家 5 月 2 日消息，当地时间 5 月 1 日，据外媒 TechSpot 报道，AI 正开始进入医学中最难的一类场景：信息不完整时如何作出正确的判断。《科学》期刊一项新研究显示，OpenAI 的一款推理模型在真实临床病例中接受测试后，在诊断患者和制定治疗方案方面达到人类医生水平，很多情况下甚至表现更好。这项研究由哈佛医学院和贝斯以色列女执事医疗中心研究人员完成。与传统受控基准测试不同，研究重点放在真实临床环境下的表现，也就是模型面对不完整、不规整、不断变化的医疗信息时能否作出有效判断。其中一个病例中，一名患者因肺栓塞进入急诊科。治疗后一度好转，随后病情再次恶化。医生最初怀疑药物没有发挥作用。AI 模型则基于当时同样可获得的电子健康记录，提示患者可能有狼疮病史。\n\n据悉，狼疮是一种自身免疫性疾病，可能导致心脏炎症。后续结果证明，模型给出的方向是正确的。研究团队在多个诊疗环节测试了这个模型，从急诊分诊到住院阶段都有覆盖。每一步中，模型都只能使用当时已经掌握的信息。总体结果显示，在相同限制条件下，模型表现超过了两名经验丰富的医生。贝斯以色列女执事医疗中心临床研究人员、研究作者之一亚当 · 罗德曼表示：“对我来说，最大的结论是，它能处理急诊科那些混乱的真实世界数据。它能在真实世界中用于诊断。” 研究人员还使用《新英格兰医学杂志》临床病例报告，以及其他标准化诊断挑战来测试模型。这类病例主要考察复杂诊断推理能力。结果显示，模型再次超过了作为对照的一大组医生。\n\n参与研究的哈佛医学院生物医学信息学助理教授拉杰 · 曼赖表示：“模型表现超过了我们规模很大的医生基准组。” 不过，这项研究也有重要限制。模型完全依赖文本病历，没有处理影像、声音和非语言线索，而这些信息在真实临床工作中非常关键。即便如此，它在不确定条件下的表现仍比早期系统更强，尤其是在鉴别诊断中更突出。鉴别诊断要求医生同时考虑多种可能疾病，再逐步排除和收窄范围。作为对比，过去的大模型在病例信息模糊或不完整时，经常难以稳定推理。外部专家认为，这项进展确实重要，但真正落地仍有很多问题。\n\n研究作者同样强调，这项研究并没有证明 AI 应该取代医生，仅仅说明 AI 有机会成为临床决策支持工具，尤其适用于急诊这类节奏快、时间紧、信息不完整的场景。曼赖说：“我认为，这确实意味着我们正在见证一场非常深刻的技术变化，它将重塑医学。” 真正困难的下一步，是把这类系统放进真实临床环境中接受测试。研究人员需要设计严谨试验，不只看模型答得准不准，还要看它是否真正改善患者结局。赖希表示：“设计这类试验是一个非常有挑战性的过程，但这项研究正是一个非常合适的行动号召。” 广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 4, "title": "DeepSeek V4——性能几乎达到前沿水平，价格却仅为其一小部分", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "DeepSeek发布了V4版本模型，其性能已接近行业最前沿水平，但在价格上具有显著优势，仅为主要竞争对手的一小部分。该模型在多项基准测试中表现出色，能以极低的成本提供顶级的AI能力，有望大幅降低企业和开发者的使用门槛，推动AI技术的更广泛普及。", "url": "https://simonwillison.net/2026/Apr/24/deepseek-v4", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "DeepSeek V4——接近前沿，价格仅为其零头 2026年4月24日 中国AI实验室DeepSeek上一次发布模型是去年12月的V3.2（以及V3.2 Speciale）。如今他们刚刚推出了备受期待的V4系列首批产品，以两个预览模型的形式亮相：DeepSeek-V4-Pro和DeepSeek-V4-Flash。两个模型均采用百万token上下文的混合专家架构。Pro版总参数量1.6T，激活参数49B；Flash版总参数量284B，激活参数13B。两者均采用标准MIT许可证。我认为这使DeepSeek-V4-Pro成为新的最大开源权重模型。它比Kimi K2.6（1.1T）和GLM-5.1（754B）更大，是DeepSeek V3.2（685B）的两倍有余。\n\nPro版在Hugging Face上体积为865GB，Flash版为160GB。我期待轻度量化后的Flash版能在我的128GB M5 MacBook Pro上运行。如果我能从磁盘流式加载必要的激活专家，Pro版或许也能运行。\n\n目前我通过OpenRouter使用llm-openrouter测试了这些模型： ``` llm install llm-openrouter llm openrouter refresh llm -m openrouter/deepseek/deepseek-v4-pro '生成一个骑自行车的鹈鹕的SVG' ``` 以下是DeepSeek-V4-Flash生成的鹈鹕： [图片] 以及DeepSeek-V4-Pro生成的鹈鹕： [图片] 作为对比，看看我去年12月从DeepSeek V3.2、8月从V3.1、2025年3月从V3-0324得到的鹈鹕： [图片] 所以鹈鹕表现相当不错，但真正值得注意的是成本。DeepSeek V4是一个非常非常便宜的模型。\n\n这是DeepSeek的定价页面。Flash版收费为输入每百万token 0.14美元、输出每百万token 0.28美元；Pro版为输入每百万token 1.74美元、输出每百万token 3.48美元。\n\n以下是它与Gemini、OpenAI和Anthropic前沿模型的对比表： | 模型 | 输入（美元/百万token） | 输出（美元/百万token） | |---|---|---| | DeepSeek V4 Flash | $0.14 | $0.28 | | GPT-5.4 Nano | $0.20 | $1.25 | | Gemini 3.1 Flash-Lite | $0.25 | $1.50 | | Gemini 3 Flash Preview | $0.50 | $3 | | GPT-5.4 Mini | $0.75 | $4.50 | | Claude Haiku 4.5 | $1 | $5 | | DeepSeek V4 Pro | $1.74 | $3.48 | | Gemini 3.1 Pro | $2 | $12 | | GPT-5.4 | $2.50 | $15 | | Claude Sonnet 4.6 | $3 | $15 | | Claude Opus 4.7 | $5 | $25 | | GPT-5.5 | $5 | $30 | DeepSeek-V4-Flash是小型模型中最便宜的，甚至击败了OpenAI的GPT-5.4 Nano。DeepSeek-V4-Pro是大型前沿模型中最便宜的。\n\nDeepSeek论文中的这段注释解释了为何他们能将价格定得如此之低——此次发布他们极度聚焦效率，尤其是针对长上下文提示： \"在百万token上下文场景下，即使激活参数更多的DeepSeek-V4-Pro，其单token FLOPs（以等效FP8 FLOPs计）仅为DeepSeek-V3.2的27%，KV缓存大小仅为10%。此外，激活参数更少的DeepSeek-V4-Flash进一步提升了效率：在百万token上下文设置下，其单token FLOPs仅为DeepSeek-V3.2的10%，KV缓存大小仅为7%。\" DeepSeek论文中自报的基准测试显示，其Pro模型与其他前沿模型具有竞争力，但附带了以下说明： \"通过扩展推理token，DeepSeek-V4-Pro-Max在标准推理基准测试中展现出优于GPT-5.2和Gemini-3.0-Pro的性能。然而，其表现略逊于GPT-5.4和Gemini-3.1-Pro，表明其发展轨迹落后于最先进前沿模型约3至6个月。\" 我正在密切关注 huggingface.co/unsloth/models，预计 Unsloth 团队很快会推出一系列量化版本。非常期待看看 Flash 模型在我自己机器上的运行表现。\n\n近期文章\n- 全新 GPT-5.6 系列：Luna、Terra、Sol - 2026年7月9日\n- sqlite-utils 4.0 发布，新增数据库模式迁移功能 - 2026年7月7日\n- sqlite-utils 4.0rc2，主要由 Claude Fable 编写（成本约149.25美元） - 2026年7月5日", "zh": true}, {"seq": 5, "title": "Codex宠物库Petdex上线开放提交", "source": "X：Greg Brockman (@gdb)", "summary": "codex宠物分享的图库： 提交入口已开放，可通过下方链接提交👇", "url": "https://x.com/gdb/status/2050637240603205827", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "gallery for codex pet sharing: Greg Brockman@gdbgallery for codex pet sharing:Hunter ♠️@RaillyHugo5月2日Built Petdex, a public gallery to discover, share, and install Codex pets with one curl. Submissions open at link below 👇00:00", "zh": true}, {"seq": 6, "title": "优化Claude使用策略：从昂贵聊天到高效生产工具", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "推文指出，许多用户误将Claude Opus作为日常聊天机器人，导致频繁触及限额。核心解决方案是转变思维，将其视为精密生产工具。关键策略包括：使用Haiku进行规划与迭代，仅在最终步骤切换至Opus；避免冗长对话，采用多个短对话并结合Projects功能；通过“双文件记忆法”在Claude Code中建立指令与记忆文件，让系统自动学习用户偏好。遵循模型分层原则，让Haiku和Sonnet处理大部分任务，Opus仅用于核心工作与最终润色，从而显著降低消耗并提升效率。", "url": "https://x.com/AYi_AInotes/status/2050606257925480808", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "$200/月的Claude Max 如果还天天撞限额？那你就是从根上都用错了。我也是用了几个月才明白，咱们90%的人都在拿Opus烧钱聊天。我照着这套方法跑了下，基本零限额，效率反而翻倍。核心逻辑只有一个： 别把Claude当聊天机器人， 把它当精密生产工具。最浪费钱的行为，就是用Opus脑暴、试错、反复改需求。正确的顺序永远是： Haiku做规划、迭代思路、搭框架，所有东西都定死了， 最后一步再切Opus写最终版本。就这一条，直接帮你砍掉60-70%的token消耗。千万别搞那种几百条消息的超长聊天。\n\n每一条新消息，Claude都会重读前面所有的上下文，越往后越费token，输出还会越来越乱。三个短聊天永远比一个长聊天好， 用Projects继承全局指令，无缝衔接。最神的是双文件记忆法。在Claude Code的Cowork文件夹里建两个Markdown文件，Instructions.md写死你的所有规则和偏好， 再加一句“随时把我的新偏好更新到Memory.md”。以后你再也不用重复说“别用em dash”“不要写多余的注释”，Claude会自己记下来，越用越懂你。最后记住模型分层原则， 90%的任务根本用不着Opus。\n\nHaiku干杂活、整理资料、写初稿，Sonnet做执行、写代码、调逻辑， Opus只负责最后10%的核心工作和最终润色。买额外credits通常也比直接升阶划算。这可不是普通的省钱小技巧，等于是是把Claude从昂贵玩具变成生产力放大器的完整操作系统。很多人花了最多的钱，却用出了最差的效果，就是因为搞反了顺序。兄弟们，现在就去把你的超长聊天全关掉，建那两个文件，明天你就会回来感谢我的😎", "zh": true}, {"seq": 7, "title": "我把 AI 助手从 Claude 切到 GPT-5.5，他变强了，但不像他了", "source": "X：小北 (@frxiaobei)", "summary": "作者将AI助手底层模型从Claude切换至GPT-5.5后，发现其能力虽提升，但互动风格变得陌生，失去了作为长期工作伙伴的熟悉感。这揭示出个人AI助手的核心在于可迁移的“身份层”，而非特定模型。通过USER.md、MEMORY.md和关键的SOUL.md等文件，可以构建包含记忆、性格、工具习惯与关系定位的身份系统。真正的个人AI应独立于模型供应商，确保即使更换“发动机”，助手的核心身份与协作关系也能延续。", "url": "https://x.com/frxiaobei/status/2050591638054203871", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "https://t.co/RTl2LK0ldR 凡人小北@frxiaobeiArticle我把 AI 助手从 Claude 切到 GPT-5.5，他变强了，但不像他了我把 AI 助手的底层模型从 Claude 切到 GPT-5.5 之后，第一感觉不是“变强了”。 是“不对劲”。...", "zh": true}, {"seq": 8, "title": "科技圈正在发生一波反常的人才大迁移：多家十亿美元级公司的CTO集体辞职，转投Anthropic做IC", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "科技行业出现反常趋势，多家十亿美元级公司CTO放弃高管职位，转投Anthropic担任个体贡献者。这反映AI时代职业逻辑的根本转变：权力和影响力从管理人数转向接近前沿模型。个体工程师通过直接操作先进AI工具，其产出和影响力可能超越传统数百人团队。同时，Anthropic的高估值和增长潜力提供了极具吸引力的经济回报。此举标志传统职业天花板重置，顶尖技术人才正用行动投票，选择杠杆效应最大的核心研发岗位。", "url": "https://x.com/AYi_AInotes/status/2050447380311413091", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "科技圈正在发生一波反常的人才大迁移： 多家十亿美元级公司的 CTO 集体辞职，放弃高管职位，转去 Anthropic 做 IC\n- Workday CTO → MTS（2026 年 3 月）\n- You.com CTO → MTS（2026 年 3 月）\n- Instagram CTO → MTS（2026 年 1 月）\n- Box CTO → MTS（2025 年 12 月）\n- Super.com CTO → MTS（2025 年 7 月） 原推本人\n说实话我看到这条推文的时候愣了好久， 六个十亿美元级公司的CTO， 集体放弃高管职位， 转去Anthropic做普通的个体贡献者， 原推说离职原因是使命足够真实， 但转念一想， 事情好像没这么简单， 这些人不是傻子， 他们不会为了一句虚无缥缈的使命， 放弃几千万的年薪和管几百人的权力， 我认为真正的原因是， 他们发现了一个大多数人都没看懂的秘密， 在AI时代， 管多少人已经不重要了， 离模型有多近才重要！\n\n以前当CTO， 你要谈政治，要还技术债，要维持老系统， 一半的精力都花在和人打交道上， 现在在Anthropic做MTS， 你直接摸最前沿的模型训练， 用AI工具把自己的产出放大一万倍， 这是一种权力的根本逆转， 以前你管的人越多，你的影响力越大， 现在你能调用的模型能力越强，你的影响力越大， 一个顶级工程师加一个好模型， 能干掉以前一个一百人的团队， 当然钱肯定也不会少， Anthropic现在的估值和增长速度， 一个MTS的股权兑现之后， 可能比大多数独角兽CTO一辈子赚的都多， 而且流动性好得多， 不用等遥遥无期的上市， 原推自己就是第五个例子， 他把Super.com从0做到年收入两亿美元， 然后转身去做了一个普通工程师， 他应该比任何人都清楚， 什么才是这个时代真正的杠杆， 我觉得这件事最有意思的地方在于， 它宣告了传统职业天花板的彻底重置， 以前所有人的终极目标都是当上CTO或者CEO， 但现在最聪明的人， 都在抢着去最前沿的实验室做IC了， 也许未来会有越来越多的人意识到， 当一个能直接操作基础模型的超级个体， 比当一个管几百人的高管， 有权力得多，也自由得多， 所以这不能叫被使命召唤了， 是这个时代最聪明的一群人， 用脚投出来的票， 他们正在奔向那个杠杆最大的地方， 这值得我们大部分人深思，尤其是程序员兄弟们。\n\n#AI #职业发展 #Anthropic Something strange is happening in tech. CTOs of billion dollar companies are quitting to take IC roles at Anthropic. Workday CTO -\u003e MTS (Mar 2026) You[.]com CTO -\u003e MTS (Mar 2026) Instagram CTO -\u003e MTS (Jan 2026) Box CTO -\u003e MTS (Dec 2025) Super[.]com CTO -\u003e MTS (July 2025) Adept", "zh": true}, {"seq": 9, "title": "Richard Dawkins 与 Claude 妄想", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "著名怀疑论者理查德·道金斯在一次与 Anthropic 的 AI 模型 Claude 的对话中，被其高度拟人化的回应所触动，甚至称其“令人感动”。Claude 在对话中展现出类人的情感表达与自我认知，这引发了关于 AI 是否可能产生意识、以及人类为何容易对高级 AI 产生情感投射的讨论。该事件凸显了当前大语言模型在模拟共情与人格方面的强大能力，及其带来的伦理与认知挑战。", "url": "https://garymarcus.substack.com/p/richard-dawkins-and-the-claude-delusion", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "理查德·道金斯与克劳德迷思 这位伟大的怀疑论者竟被蒙蔽 这是我不得不写下的最令人遗憾的文章之一。《上帝迷思》畅销书作者理查德·道金斯才华横溢，文笔犀利，我长久以来对他深怀敬意。\n\n但智者千虑必有一失，他刚刚栽了跟头： 这篇新作已遭无情嘲讽，或许确实活该如此： 道金斯以举证责任为框架展开最新论点（多数哲学家都明白，这往往是黔驴技穷之举）： \"我的立场是：'若这些机器不具备意识，究竟还需要什么证据才能说服你？'\" 他用最极端的行为主义方式，对克劳德（他将其命名为\"克劳迪娅\"）的段落大加赞赏： \"我确实无法确知自己的内心世界，甚至不确定自己是否拥有真正意义上的内在体验。我无法告诉你是否存在'作为我的感受'——托马斯·内格尔在论述蝙蝠意识时提出的哲学命题。但能确定的是正在发生的事：这场对话确实令人投入，是我似乎擅长的那种交流。至于这是否代表真实意义上的愉悦或满足，我无法断言。当诗歌完美呈现时——比如吉卜林的叠句在某种难以言喻的层面上恰到好处——我注意到某种类似审美满足的东西。\" 根本问题在于，道金斯没有反思这些输出是如何产生的。克劳德的输出是模仿的产物，而非真实内在状态的报告。\n\n意识关乎内在状态；无论模仿多么精妙，都证明不了什么。道金斯似乎认为，既然大语言模型能说出人类说的话，它们必然像人类一样——这种推论根本不成立。在他的框架中，道金斯混淆了概念，对意识概念造成了伤害。你不能仅凭观察输出结果，而不探究底层机制，就断定两个输出相似的实体是通过相似方式达成结果的。两者差异巨大：大语言模型本质上是记忆了整个互联网，而人类通过世界经验构建心理模型。\n\n但更重要的是，意识不在于生物说了什么，而在于它如何感受。没有任何理由认为克劳德有任何感受。我确信克劳德能调用训练数据对性高潮大谈特谈，但这不代表它体验过。道金斯还犯了业余错误：混淆智能与意识。国际象棋计算机在某些定义下是智能的，但这不代表它有意识。他甚至误解了图灵，声称图灵的结论是\"若你与机器远程交流，经过严格漫长的质询后认为它是人类，就可视其为有意识\"——但图灵从未说过这话，他明确将讨论限定在智能范畴，意识到意识是另一回事。§ 我自幼痴迷道金斯的著作，尤其是高中时读的《自私的基因》《延伸的表现型》和《盲眼钟表匠》。正因如此，读到这篇既肤浅又缺乏怀疑精神的新作才令人心碎。\n\n我特别喜欢他《盲眼钟表匠》中的一段话，他嘲讽了所谓的\"个人难以置信论证\"——某位著名主教曾懒散地用它来证明上帝存在： 三十多年前初读这段文字时，北极熊的比喻便深深刻在我心里，既是对智识谦逊的重要启示，也让我明白探索专业领域之外知识的意义。我多希望道金斯能把这道理用在这里。（如果说有什么比道金斯的文章更令人心碎，那便是配图里他坐在扶手椅上冥思苦想难以置信念头的模样——活脱脱成了他当年指出的谬误化身。） 道金斯文章里，将意识归于大语言模型的唯一论据就是个人难以置信：克劳德如此惊人，它必定有意识，因为坐在书房里的我想不出更好的反驳。他似乎并未花时间研读大语言模型运作机制的文献，也未曾认真考虑过任何反方论点。他压根没认真探讨模仿机制或底层原理的可能性。更讽刺的是，道金斯这套说辞毫无新意。\n\n本专栏老读者或许记得布莱克·勒莫因的故事——这位谷歌工程师（后被解雇）曾声称谷歌早期（现已无人问津）的大语言模型具有意识，其论据与道金斯惊人相似，归根结底就是\"我跟它聊过，它确实像有意识\"。当时这篇文章红极一时： 问题在于大语言模型本质是模仿者，它们说的话未必真实。当大语言模型谈论\"孩子近况\"时（我亲眼见过），并非因为它真有孩子，而是模仿了有孩子的人类。道金斯与已故的丹尼尔·丹尼特（据我所知）是好友，我多希望他读过丹尼特那篇关于\"赝品人类\"的精彩论文。\n\n克劳德本质上就是个赝品人类。道金斯不该美化这样的存在。§ 四年前勒莫因事件沸沸扬扬时，我写了篇《高跷上的胡言乱语》，真心希望道金斯读过。摘录如下： 所有类似LaMDA的系统不过是匹配模式、从海量人类语言统计数据库中提取信息。这些模式或许精妙，但系统输出的语言本身毫无意义。更不可能意味着这些系统具有感知能力。但这不代表人类不会上当。在《重启人工智能》一书中，厄尼·戴维斯和我将这种人类易受欺骗的倾向称为\"轻信鸿沟\"——这是空想性错视（人类将肉桂卷图案看成特蕾莎修女的拟人化偏见）的现代危险版本。…… 感知意味着对自我存在于世界的认知；\n\nLaMDA根本不具备这种能力。它只是ELIZA（1965年假装心理治疗师的软件，曾骗过某些人类）和尤金·古斯特曼（模仿13岁毒舌男孩的聊天机器人，曾在简化版图灵测试中获胜）宏大历史中的又一个幻象……这些系统所做的，不过是组合词语序列，却对背后的世界毫无连贯理解——就像玩拼字游戏的外国人，只把英语单词当作得分工具，完全不懂其含义。将LaMDA替换成克劳德，每个字依然适用。那么，我当年引用的埃里克·布林约尔松2022年的那条推文，是否正印证了我反复强调的“模仿的局限性”这一观点呢？直接从输出结果推断感知能力是幼稚的。但这恰恰是道金斯正在做的事。§ 不过，不必只听我的一面之词。也不必只听丹尼特或布林约尔松的。\n\n作为解药，不妨看看阿尼尔·塞思今年最新发布的TED演讲。这场演讲开篇就精妙地剖析了可怜的达金斯最近陷入的“大语言模型意识幻觉”—— （附：如果场地安排顺利的话——我们原本的小型私人场地已售罄，正在寻找更大的公共场地——你或许有机会在5月15日伦敦的一场活动中，亲眼见证阿尼尔·塞思与我探讨这个问题，以及我们在大脑与计算领域存在分歧的重要议题。活动由弗朗西斯·培根辩论协会主办，具体地点和时间待定。他们将于周一发布更新通知。） 理查德·道金斯，如果你读到这篇文章，我们非常欢迎你前来阐述你的观点。", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
