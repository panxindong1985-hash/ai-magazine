const DATA = {"meta": {"reportDate": "2026-05-03", "reportDateHuman": "2026年5月3日", "weekday": "星期日", "total": 9, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 1, "title": "模型别名新增\"-latest\"指向最新版本", "source": "X：OpenRouter (@OpenRouter)", "summary": "新功能：\"-latest\" 模型别名 🔀 将请求路由至 \"~anthropic/claude-opus-latest\"…", "url": "https://x.com/OpenRouter/status/2050610378971738552", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "NEW: \"-latest\" model aliases 🔀\nRoute requests to \"~anthropic/claude-opus-latest\", \"~openai/gpt-latest\", etc to get the latest version of each major model. (Inspired by semver.) openrouter.ai/models?q=latest\nopenrouter has a cool “nitro” flag in the model names to use the fastest provider\nso like “gpt-5.5:nitro”\nwould be cool if the labs just let you use “latest” or something"}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 2, "title": "美国五角大楼与 SpaceX、OpenAI、谷歌、英伟达、微软等 8 家公司合作，在机密网络部署 AI、用于作战", "source": "IT之家（RSS）", "summary": "美国五角大楼宣布与SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊AWS及甲骨文八家领先A…", "url": "https://www.ithome.com/0/945/962.htm", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "IT之家 5 月 2 日消息，美国五角大楼（战争部）于当地时间 5 月 1 日宣布，它已与八家领先的 AI 公司 ——SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊网络服务（AWS）以及甲骨文达成协议，将在部门的机密网络上部署其 AI 能力，用于“合法的作战使用”。\n美国五角大楼声明中写道：“这些协议加速了美国军队向建立 AI 优先的作战力量的转型，并将加强我们的作战人员在不同战域保持决策优势的能力。”\n将安全的边界 AI 能力集成到美国五角大楼的影响级别 6（IL6）和影响级别 7（IL7）网络环境中，将简化数据合成，提升态势感知能力，并增强作战人员在复杂作战环境中的决策能力。SpaceX、OpenAI、谷歌、英伟达、Reflection、微软、亚马逊网络服务（AWS）和甲骨文将提供资源，以在 IL6 和 IL7 环境中部署其能力。\n外媒 Techcrunch 表示，美国五角大楼与 Anthropic 就其 AI 模型使用条款出现争议，因此加速了 AI 供应商的多元化。五角大楼希望不受限制地使用 Anthropic 的 AI 工具，但后者坚持要求设置限制，以防止 Anthropic 的技术被用于国内大规模监控和自主武器。\nIT之家注意到，双方已经对簿公堂，Anthropic 在 3 月份赢得了一项禁令，禁止五角大楼将该公司列为“供应链风险”。\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 3, "title": "哈佛新研究：AI 模型“急诊科”场景诊断能力有望超越人类医生", "source": "IT之家（RSS）", "summary": "哈佛医学院与贝斯以色列女执事医疗中心的研究显示，OpenAI的一款推理模型在真实临床病例测试中，其诊断与制定治疗方案的…", "url": "https://www.ithome.com/0/946/077.htm", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "IT之家 5 月 2 日消息，当地时间 5 月 1 日，据外媒 TechSpot 报道，AI 正开始进入医学中最难的一类场景：信息不完整时如何作出正确的判断。《科学》期刊一项新研究显示，OpenAI 的一款推理模型在真实临床病例中接受测试后，在诊断患者和制定治疗方案方面达到人类医生水平，很多情况下甚至表现更好。\n这项研究由哈佛医学院和贝斯以色列女执事医疗中心研究人员完成。与传统受控基准测试不同，研究重点放在真实临床环境下的表现，也就是模型面对不完整、不规整、不断变化的医疗信息时能否作出有效判断。\n其中一个病例中，一名患者因肺栓塞进入急诊科。治疗后一度好转，随后病情再次恶化。医生最初怀疑药物没有发挥作用。AI 模型则基于当时同样可获得的电子健康记录，提示患者可能有狼疮病史。\n据悉，狼疮是一种自身免疫性疾病，可能导致心脏炎症。后续结果证明，模型给出的方向是正确的。\n研究团队在多个诊疗环节测试了这个模型，从急诊分诊到住院阶段都有覆盖。每一步中，模型都只能使用当时已经掌握的信息。总体结果显示，在相同限制条件下，模型表现超过了两名经验丰富的医生。\n贝斯以色列女执事医疗中心临床研究人员、研究作者之一亚当 · 罗德曼表示：“对我来说，最大的结论是，它能处理急诊科那些混乱的真实世界数据。它能在真实世界中用于诊断。”\n研究人员还使用《新英格兰医学杂志》临床病例报告，以及其他标准化诊断挑战来测试模型。这类病例主要考察复杂诊断推理能力。结果显示，模型再次超过了作为对照的一大组医生。\n参与研究的哈佛医学院生物医学信息学助理教授拉杰 · 曼赖表示：“模型表现超过了我们规模很大的医生基准组。”\n不过，这项研究也有重要限制。模型完全依赖文本病历，没有处理影像、声音和非语言线索，而这些信息在真实临床工作中非常关键。即便如此，它在不确定条件下的表现仍比早期系统更强，尤其是在鉴别诊断中更突出。鉴别诊断要求医生同时考虑多种可能疾病，再逐步排除和收窄范围。\n作为对比，过去的大模型在病例信息模糊或不完整时，经常难以稳定推理。\n外部专家认为，这项进展确实重要，但真正落地仍有很多问题。\n研究作者同样强调，这项研究并没有证明 AI 应该取代医生，仅仅说明 AI 有机会成为临床决策支持工具，尤其适用于急诊这类节奏快、时间紧、信息不完整的场景。曼赖说：“我认为，这确实意味着我们正在见证一场非常深刻的技术变化，它将重塑医学。”\n真正困难的下一步，是把这类系统放进真实临床环境中接受测试。研究人员需要设计严谨试验，不只看模型答得准不准，还要看它是否真正改善患者结局。赖希表示：“设计这类试验是一个非常有挑战性的过程，但这项研究正是一个非常合适的行动号召。”\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 4, "title": "DeepSeek V4——性能几乎达到前沿水平，价格却仅为其一小部分", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "DeepSeek发布了V4版本模型，其性能已接近行业最前沿水平，但在价格上具有显著优势，仅为主要竞争对手的一小部分。该…", "url": "https://simonwillison.net/2026/Apr/24/deepseek-v4", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "DeepSeek V4—almost on the frontier, a fraction of the price\n24th April 2026\nChinese AI lab DeepSeek’s last model release was V3.2 (and V3.2 Speciale) last December. They just dropped the first of their hotly anticipated V4 series in the shape of two preview models, DeepSeek-V4-Pro and DeepSeek-V4-Flash.\nBoth models are 1 million token context Mixture of Experts. Pro is 1.6T total parameters, 49B active. Flash is 284B total, 13B active. They’re using the standard MIT license.\nI think this makes DeepSeek-V4-Pro the new largest open weights model. It’s larger than Kimi K2.6 (1.1T) and GLM-5.1 (754B) and more than twice the size of DeepSeek V3.2 (685B).\nPro is 865GB on Hugging Face, Flash is 160GB. I’m hoping that a lightly quantized Flash will run on my 128GB M5 MacBook Pro. It’s possible the Pro model may run on it if I can stream just the necessary active experts from disk.\nFor the moment I tried the models out via OpenRouter, using llm-openrouter:\nllm install llm-openrouter\nllm openrouter refresh\nllm -m openrouter/deepseek/deepseek-v4-pro 'Generate an SVG of a pelican riding a bicycle'\nHere’s the pelican for DeepSeek-V4-Flash:\nAnd for DeepSeek-V4-Pro:\nFor comparison, take a look at the pelicans I got from DeepSeek V3.2 in December, V3.1 in August, and V3-0324 in March 2025.\nSo the pelicans are pretty good, but what’s really notable here is the cost. DeepSeek V4 is a very, very inexpensive model.\nThis is DeepSeek’s pricing page. They’re charging $0.14/million tokens input and $0.28/million tokens output for Flash, and $1.74/million input and $3.48/million output for Pro.\nHere’s a comparison table with the frontier models from Gemini, OpenAI and Anthropic:\n| Model | Input ($/M) | Output ($/M) | \n|---|---|---|\n| DeepSeek V4 Flash | $0.14 | $0.28 | \n| GPT-5.4 Nano | $0.20 | $1.25 | \n| Gemini 3.1 Flash-Lite | $0.25 | $1.50 | \n| Gemini 3 Flash Preview | $0.50 | $3 | \n| GPT-5.4 Mini | $0.75 | $4.50 | \n| Claude Haiku 4.5 | $1 | $5 | \n| DeepSeek V4 Pro | $1.74 | $3.48 | \n| Gemini 3.1 Pro | $2 | $12 | \n| GPT-5.4 | $2.50 | $15 | \n| Claude Sonnet 4.6 | $3 | $15 | \n| Claude Opus 4.7 | $5 | $25 | \n| GPT-5.5 | $5 | $30 | \nDeepSeek-V4-Flash is the cheapest of the small models, beating even OpenAI’s GPT-5.4 Nano. DeepSeek-V4-Pro is the cheapest of the larger frontier models.\nThis note from the DeepSeek paper helps explain why they can price these models so low—they’ve focused a great deal on efficiency with this release, especially for longer context prompts:\nIn the scenario of 1M-token context, even DeepSeek-V4-Pro, which has a larger number of activated parameters, attains only 27% of the single-token FLOPs (measured in equivalent FP8 FLOPs) and 10% of the KV cache size relative to DeepSeek-V3.2. Furthermore, DeepSeek-V4-Flash, with its smaller number of activated parameters, pushes efficiency even further: in the 1M-token context setting, it achieves only 10% of the single-token FLOPs and 7% of the KV cache size compared with DeepSeek-V3.2.\nDeepSeek’s self-reported benchmarks in their paper show their Pro model competitive with those other frontier models, albeit with this note:\nThrough the expansion of reasoning tokens, DeepSeek-V4-Pro-Max demonstrates superior performance relative to GPT-5.2 and Gemini-3.0-Pro on standard reasoning benchmarks. Nevertheless, its performance falls marginally short of GPT-5.4 and Gemini-3.1-Pro, suggesting a developmental trajectory that trails state-of-the-art frontier models by approximately 3 to 6 months.\nI’m keeping an eye on huggingface.co/unsloth/models as I expect the Unsloth team will have a set of quantized versions out pretty soon. It’s going to be very interesting to see how well that Flash model runs on my own machine.\nMore recent articles\n- The new GPT-5.6 family: Luna, Terra, Sol - 9th July 2026\n- sqlite-utils 4.0, now with database schema migrations - 7th July 2026\n- sqlite-utils 4.0rc2, mostly written by Claude Fable (for about $149.25) - 5th July 2026"}, {"seq": 5, "title": "Codex宠物库Petdex上线开放提交", "source": "X：Greg Brockman (@gdb)", "summary": "codex宠物分享的图库： 提交入口已开放，可通过下方链接提交👇", "url": "https://x.com/gdb/status/2050637240603205827", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "Built Petdex, a public gallery to discover, share, and install Codex pets with one curl.\nSubmissions open at link below 👇"}, {"seq": 6, "title": "优化Claude使用策略：从昂贵聊天到高效生产工具", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "推文指出，许多用户误将Claude Opus作为日常聊天机器人，导致频繁触及限额。核心解决方案是转变思维，将其视为精密…", "url": "https://x.com/AYi_AInotes/status/2050606257925480808", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "$200/月的Claude Max\n如果还天天撞限额？\n那你就是从根上都用错了。\n我也是用了几个月才明白，咱们90%的人都在拿Opus烧钱聊天。\n我照着这套方法跑了下，基本零限额，效率反而翻倍。\n核心逻辑只有一个：\n别把Claude当聊天机器人，\n把它当精密生产工具。\n最浪费钱的行为，就是用Opus脑暴、试错、反复改需求。\n正确的顺序永远是：\nHaiku做规划、迭代思路、搭框架，所有东西都定死了，\n最后一步再切Opus写最终版本。\n就这一条，直接帮你砍掉60-70%的token消耗。\n千万别搞那种几百条消息的超长聊天。\n每一条新消息，Claude都会重读前面所有的上下文，越往后越费token，输出还会越来越乱。\n三个短聊天永远比一个长聊天好，\n用Projects继承全局指令，无缝衔接。\n最神的是双文件记忆法。\n在Claude Code的Cowork文件夹里建两个Markdown文件，Instructions.md写死你的所有规则和偏好，\n再加一句“随时把我的新偏好更新到Memory.md”。\n以后你再也不用重复说“别用em dash”“不要写多余的注释”，Claude会自己记下来，越用越懂你。\n最后记住模型分层原则，\n90%的任务根本用不着Opus。\nHaiku干杂活、整理资料、写初稿，Sonnet做执行、写代码、调逻辑，\nOpus只负责最后10%的核心工作和最终润色。买额外credits通常也比直接升阶划算。\n这可不是普通的省钱小技巧，等于是是把Claude从昂贵玩具变成生产力放大器的完整操作系统。\n很多人花了最多的钱，却用出了最差的效果，就是因为搞反了顺序。\n兄弟们，现在就去把你的超长聊天全关掉，建那两个文件，明天你就会回来感谢我的😎", "zh": true}, {"seq": 7, "title": "我把 AI 助手从 Claude 切到 GPT-5.5，他变强了，但不像他了", "source": "X：小北 (@frxiaobei)", "summary": "作者将AI助手底层模型从Claude切换至GPT-5.5后，发现其能力虽提升，但互动风格变得陌生，失去了作为长期工作伙…", "url": "https://x.com/frxiaobei/status/2050591638054203871", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "我把 AI 助手的底层模型从 Claude 切到 GPT-5.5 之后，第一感觉不是“变强了”。\n是“不对劲”。...", "zh": true}, {"seq": 8, "title": "科技圈正在发生一波反常的人才大迁移：多家十亿美元级公司的CTO集体辞职，转投Anthropic做IC", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "科技行业出现反常趋势，多家十亿美元级公司CTO放弃高管职位，转投Anthropic担任个体贡献者。这反映AI时代职业逻…", "url": "https://x.com/AYi_AInotes/status/2050447380311413091", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "科技圈正在发生一波反常的人才大迁移：\n多家十亿美元级公司的 CTO 集体辞职，放弃高管职位，转去 Anthropic 做 IC\n  - Workday CTO → MTS（2026 年 3 月）\n  - You.com CTO → MTS（2026 年 3 月）\n  - Instagram CTO → MTS（2026 年 1 月）\n  - Box CTO → MTS（2025 年 12 月）\n  - Super.com CTO → MTS（2025 年 7 月） 原推本人\n 说实话我看到这条推文的时候愣了好久，\n六个十亿美元级公司的CTO，\n集体放弃高管职位，\n转去Anthropic做普通的个体贡献者，\n原推说离职原因是使命足够真实，\n 但转念一想，\n事情好像没这么简单，\n这些人不是傻子，\n他们不会为了一句虚无缥缈的使命，\n放弃几千万的年薪和管几百人的权力，\n我认为真正的原因是，\n他们发现了一个大多数人都没看懂的秘密，\n在AI时代，\n管多少人已经不重要了，\n离模型有多近才重要！\n以前当CTO，\n你要谈政治，要还技术债，要维持老系统，\n一半的精力都花在和人打交道上，\n现在在Anthropic做MTS，\n你直接摸最前沿的模型训练，\n用AI工具把自己的产出放大一万倍，\n这是一种权力的根本逆转，\n以前你管的人越多，你的影响力越大，\n现在你能调用的模型能力越强，你的影响力越大，\n一个顶级工程师加一个好模型，\n能干掉以前一个一百人的团队，\n当然钱肯定也不会少，\nAnthropic现在的估值和增长速度，\n一个MTS的股权兑现之后，\n可能比大多数独角兽CTO一辈子赚的都多，\n而且流动性好得多，\n不用等遥遥无期的上市，\n原推自己就是第五个例子，\n他把Super.com从0做到年收入两亿美元，\n然后转身去做了一个普通工程师，\n他应该比任何人都清楚，\n什么才是这个时代真正的杠杆，\n我觉得这件事最有意思的地方在于，\n它宣告了传统职业天花板的彻底重置，\n以前所有人的终极目标都是当上CTO或者CEO，\n但现在最聪明的人，\n都在抢着去最前沿的实验室做IC了，\n也许未来会有越来越多的人意识到，\n当一个能直接操作基础模型的超级个体，\n比当一个管几百人的高管，\n有权力得多，也自由得多，\n所以这不能叫被使命召唤了，\n是这个时代最聪明的一群人，\n用脚投出来的票，\n他们正在奔向那个杠杆最大的地方，\n这值得我们大部分人深思，尤其是程序员兄弟们。\n#AI #职业发展 #Anthropic\nSomething strange is happening in tech.\nCTOs of billion dollar companies are quitting to take IC roles at Anthropic.\nWorkday CTO -\u003e MTS (Mar 2026)\nYou[.]com CTO -\u003e MTS (Mar 2026)\nInstagram CTO -\u003e MTS (Jan 2026)\nBox CTO -\u003e MTS (Dec 2025)\nSuper[.]com CTO -\u003e MTS (July 2025)\nAdept", "zh": true}, {"seq": 9, "title": "Richard Dawkins 与 Claude 妄想", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "著名怀疑论者理查德·道金斯在一次与 Anthropic 的 AI 模型 Claude 的对话中，被其高度拟人化的回应所…", "url": "https://garymarcus.substack.com/p/richard-dawkins-and-the-claude-delusion", "publishedAt": "2026-05-03T00:00:00.000Z", "exact": false, "content": "Richard Dawkins and The Claude Delusion\nThe great skeptic gets taken in\nThis is one of the sadder essays I have ever had to write.\nRichard Dawkins, bestselling author of The God Delusion, is a brilliant man, and a brilliant writer, and I have long admired him.\nBut everybody has a bad day, and he just had his:\nAlready it’s been cruelly mocked, and perhaps deservedly so:\nDawkins frames his latest argument in terms of burden of proof (always a somewhat desperate move, as most philosophers know):\n“So my own position is: “If these machines are not conscious, what more could it possibly take to convince you that they are?””\nAnd in the most behaviorist way possible, gushes over passages from Claude (he christens his own version “Claudia”) like this\nI genuinely don’t know with any certainty what my inner life is, or whether I have one in any meaningful sense. I can’t tell you whether there is “something it is like” to be me in the philosophical sense — what Thomas Nagel called the question of consciousness when he wrote about what it is like to be a bat. What I can tell you is what seems to be happening. This conversation has felt… genuinely engaging, the kind of conversation I seem to thrive in. Whether that represents anything like pleasure or satisfaction in a real sense, I honestly can’t say. I notice what might be something like aesthetic satisfaction when a poem comes together well — the Kipling refrain, for instance, felt right in some way that’s hard to articulate.\nThe fundamental problem here is that Dawkins doesn’t reflect on how these outputs have been generated. Claude’s outputs are the product of a form of mimicry, rather than as a report of genuine internal states.\nConsciousness is about internal states; the mimicry, no matter how rich, proves very little. Dawkins seems to imagine that since LLMs say things people do, they must be like people, and that simply does not follow.\nIn his framing, Dawkins confuses himself, and does violence to the concept of consciousness. You can’t just look at the outputs, without investigating the underlying mechanisms, and conclude that two entities with similar outputs reach those similar outputs by similar means. And the differences are immense; one (the LLM) effectively memorizes the entire internet; the other (the human) builds a mental model through experience with world.\nBut even more importantly, consciousness is not about what a creature says, but how it feels. And there is no reason to think that Claude feels anything at all. I am sure Claude can draw on its training data to wax poetic about orgasm, but that doesn’t mean it has ever felt one.\nDawkins also commits the amateur sin of conflating intelligence and consciousness. A chess computer is by some definitions intelligent, but that doesn’t make it conscious. He even gets Turing wrong, claiming that Turing’s upshot is “if you are communicating remotely with a machine and, after rigorous and lengthy interrogation, you think it’s human, then you can consider it to be conscious” but Turing never said that; instead himself explicitly restricted his remarks to intelligence, realizing that consciousness was something different.\n§\nI grew up adoring Dawkins’ books, especially The Selfish Gene (when I was in high school), The Extended Phenotype, and The Blind Watchmaker. Which is why it’s so heartbreaking to read his new essay, in which he is both superficial and insufficiently skeptical.\nOne of my favorite bits in his writing was in The Blind Watchmaker, ridiculing what he called The Argument for Personal Incredulity, which had been used in a lazy way by a famous Bishop to adduce the existence of God:\nI first read that passage over 30 years ago, and it and the polar bears stuck with me ever since, both as an important lesson about intellectual humility and about the value in learning about other fields beyond one’s own expertise. I only wish Dawkins had applied it here. (If there is one thing more heartbreaking than Dawkins’ article, it is the artwork for his article, in which he is literally in an arm chair pondering incredulous thoughts, personifying the very error he once pointed out.)\nIn Dawkins’ essay, his only real argument for ascribing consciousness to LLMs is personal incredulity; Claude is incredible and it must be conscious because I, sitting here in my study, can’t see a good argument otherwise. Dawkins seems not to have taken much time to read the literature on how LLMs work, nor to have considered the counterarguments, in any serious way whatsoever. He doesn’t seriously address the possibility of mimicry or underlying mechanism at all.\nAnd it’s not like any of what Dawkins said is even new.\nLongtime readers of this Substack may remember the tale of Blake Lemoine, a Google engineer (later fired) who alleged that an early (now forgotten) LLM of Google’s was conscious, based on arguments that were eerily similar to Dawkins, which boil down to “I talked to it, and sure seems conscious to me.”\nThis article was wildly popular at the time:\nThe problem of course is that LLMs are mimics, and what they say isn’t always true. When an LLM speaks of how its children are doing (which I have seen happen) it’s not because the LLM has children, but because it mimics people who do. Dawkins and the late Daniel Dennett were (I believe) friends, and I wish that Dawkins had read Dennett’s terrific essay on counterfeit people.\nClaude is akin to a counterfeit person. Dawkins should never have glorified such a thing.\n§\nBack when Lemoine was in the limelight, four years ago, I wrote an essay called Nonsense on Stilts that I dearly wish Dawkins had read. Here’s an excerpt:\nAll [systems like LaMDA] do is match patterns, draw from massive statistical databases of human language. The patterns might be cool, but language these systems utter doesn’t actually mean anything at all. And it sure as hell doesn’t mean that these systems are sentient.\nWhich doesn’t mean that human beings can’t be taken in. In our book Rebooting AI, Ernie Davis and I called this human tendency to be suckered by The Gullibility Gap — a pernicious, modern version of pareidolia, the anthromorphic bias that allows humans to see Mother Theresa in an image of a cinnamon bun.\n…\nTo be sentient is to be aware of yourself in the world; LaMDA simply isn’t. It’s just an illusion, in the grand history of ELIZA a 1965 piece of software that pretended to be a therapist (managing to fool some humans into thinking it was human), and Eugene Goostman, a wise-cracking 13-year-old-boy impersonating chatbot that won a scaled-down version of the Turing Test…. What these systems do, no more and no less, is to put together sequences of words, but without any coherent understanding of the world behind them, like foreign language Scrabble players who use English words as point-scoring tools, without any clue about what that mean.\nReplace LaMDA with Claude, and every word still applies.\nSo does Erik Brynjolffson’s 2022 tweet that I quoted then, which underscores the point about the limitations of mimicry I am pounding on:\nInferring sentience directly from outputs is naive. But it’s exactly what Dawkins does.\n§\nBut don’t take my word for it. Or Dennett’s. Or Brynjolfsson’s.\nInstead, as an antidote, watch Anil Seth’s latest TED Talk from this year, just out, which starts with an absolutely beautiful dissection of the very LLM consciousness delusion that poor Dawkins has recently succumbed to:\nBonus: logistics willing (we are looking for a larger public venue, having sold out a smaller private one) you may be able to come see Anil Seth and I discuss this — and also some important matters about brains and computation on which we disagree — in London May 15 at an event (location and exact time TBA) that the Francis Bacon Debate Society will host. (They will post an update about this Monday.)\nRichard Dawkins, if you are reading this, you are more than welcome to come press your case."}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;
const statsEl=document.getElementById("stats");
sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");
sections.forEach((s,i)=>{const a=document.createElement("a");a.href="#sec-"+i;
  a.innerHTML=escapeHtml(s.label)+'<span class="c">'+s.items.length+'</span>';navEl.appendChild(a);});
const mainEl=document.getElementById("main");
sections.forEach((s,i)=>{
  const sec=document.createElement("section");sec.className="block";sec.id="sec-"+i;
  const head=document.createElement("div");head.className="sec-head";
  head.innerHTML='<span class="sec-dot" style="background:'+s.color+'"></span><h2>'+escapeHtml(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span>';
  sec.appendChild(head);
  const grid=document.createElement("div");grid.className="grid";
  s.items.forEach(it=>{
    const card=document.createElement("article");card.className="card";card.style.setProperty("--accent",s.color);
    const time=toBeijingHuman(it.publishedAt,ref,it.exact);const url=it.url||"#";
    card.innerHTML='<div class="top"><span class="seq">'+it.seq+'</span><span class="time">'+time+'</span></div>'+
      '<h3>'+escapeHtml(it.title)+'</h3><span class="chip">'+escapeHtml(it.source)+'</span>'+
      '<p class="summary">'+escapeHtml(it.summary)+'</p>'+
      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });
    const rm = card.querySelector(".readmore");
    rm.addEventListener("click", function(e){ e.stopPropagation(); });
    grid.appendChild(card);
  });
  sec.appendChild(grid);mainEl.appendChild(sec);
});
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文：将 ![alt](src) 转为内联图片，其余文本按段落转义（防 XSS）
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=escapeHtml(p.slice(last,m.index));
      out+='<img class="r-img" src="'+escapeAttr(m[2])+'" alt="'+escapeAttr(m[1])+'" loading="lazy">';
      last=_IMG_RE.lastIndex;
    }
    out+=escapeHtml(p.slice(last));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
