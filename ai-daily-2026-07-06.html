44 延迟超 12 个月至 2028", "source": "X：SemiAnalysis (@SemiAnalysis_)", "summary": "重大延迟：Jensen 在 GTC 上展示 Kyber NVL144 仅 3 个月后，该项目遭遇重大挫折，已推迟超过 12 个月，延至 2028 年。下文我们将解释 Kyber 为何面临大幅延迟，以及 NVIDIA 的 NVL72x2 背靠背机架架构为何也被取消，导致 Rubin Ultra 的扩展域受限。👇️ 1/6🧵", "url": "https://x.com/SemiAnalysis_/status/2073874671498387899", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "重大延迟：距离黄仁勋在GTC展示Kyber NVL144仅3个月后，该产品遭遇重大挫折，延迟超过12个月，推迟至2028年。下文将解析Kyber为何出现大规模延期，以及英伟达NVL72x2背靠背机架架构为何被取消，导致Rubin Ultra的扩展域受限。👇️ 1/6🧵", "zh": true}, {"seq": 4, "title": "欧盟理事会通过快速通道强制推行\"聊天管控\"（Chat Control 2.0）", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "欧盟理事会通过书面程序快速通过一项新法规，强制要求科技集团对加密通信进行无差别扫描（Chat Control 2.0），以填补过渡性规定4月3日到期后的法律漏洞，并向欧洲议会施压。批评者指责该做法试图绕过民主监督。草案将在夏季休会前以紧急程序提交议会表决，多数议员可能已离会，反对需绝对多数，几乎无法阻止。理事会称扫描限于必要范围，处理的数据须在检测后12个月内不可撤销地删除。", "url": "https://www.heise.de/en/news/Chat-Control-1-0-EU-Council-forces-messenger-scans-via-fast-track-11353659.html", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "Chat Control 1.0: EU Council forces messenger scans via fast-track Member states reactivate expired chat control regulation. EU Parliament caught off guard before summer break. The dispute over digital letter secrecy in the EU is reaching a new level of escalation shortly before the summer break. After negotiations on Chat Control 2.0 – i.e. , the mandatory, suspicionless scanning of encrypted communication – stalled due to persistent resistance in the EU Parliament, the Council of Ministers is now pushing forward with a legal maneuver. The member states want to reactivate the transitional regulation for voluntary monitoring of messages by technology groups, which expired on April 3, in an expedited procedure. The Council adopted a corresponding position for a “new” regulation on Thursday via written procedure to close a looming legal loophole and increase pressure on MEPs. The reason for the trick: Since the end of 2020, internet-based, number-independent communication services such as messenger apps, webmail, and VoIP telephony have been subject to the strict provisions of the European E-Privacy Directive. This protects the fundamental right to confidentiality of communication and prohibits unauthorized interception or evaluation of content and traffic data. To still allow technology providers to voluntarily search private chats using AI and hash matching for known abuse material or grooming patterns, the EU lawmakers created a temporary exemption in 2021. This regulation, referred to as Chat Control 1.0, expired in the spring, as the Council and Parliament could not agree on an extension. Child Protection and Letter Secrecy For the Council, the expiry of the deadline is an untenable situation. The providers' voluntary detection measures are an indispensable tool for identifying affected children early, rescuing victims from abuse situations, and curbing the uncontrolled further dissemination of illegal image and video material online. Furthermore, the procedure makes an important contribution to online law enforcement, even though reports continue to flow despite the expired norm. The new regulation aims to prevent fragmentation through national unilateral actions. Videos by heise Critics, however, see the chosen procedure as an attempt to circumvent democratic control bodies and to surprise Parliament. Since an already expired regulation cannot simply be extended in formal terms, the EU governments are resorting to a trick: Instead of an extension, they have put forward a legislative proposal that is largely identical in content but different in form. Tactical Timing Before the Summer Break The draft is to be put on Parliament's agenda as early as Tuesday as part of an urgent procedure – immediately before the start of the summer break. Should the plenary session approve the accelerated procedure, a vote threatens on the last day of session before the holidays, when many MEPs have historically already departed. Compounding the issue, the procedure is already in its 2nd reading. At this stage, the Council's position can only be stopped or modified by amendments if an absolute majority of the representatives vote against it. A hurdle that, in practice, is considered almost insurmountable shortly before the summer break. Although the Council emphasizes that the scans will be limited to the absolutely necessary extent and that no general, indiscriminate surveillance will take place, the intrusion into the privacy of all users remains significant. The regulation stipulates that the processed content and traffic data must be irrevocably deleted no later than twelve months after detection, unless a concrete suspicion is confirmed. A permanent, long-term legal framework for abuse prevention, meanwhile, moves further into the distance. (kbe)", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 5, "title": "Anthropic Claude Design 反向工程提示词开源更新", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Anthropic 旗下 Claude Design 的反向工程系统提示词在 GitHub 以 MIT 许可证开源，包含 20 章提示词和 14 项技能，覆盖内容纪律、美学、无障碍（WCAG、语义 HTML、键盘导航）、交互状态、系统思维等。近日针对 Fable 5/Opus 4.7+ 系列校准，新增自主决策条款：小决定直接执行记录而不询问。项目支持 Claude Code/Claude.ai 及 Codex 两种变体。", "url": "https://github.com/Trystan-SA/claude-design-system-prompt", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "Anthropic 出品的 Claude Design 逆向工程系统提示词。 这是一套系统提示词与技能库，能将大语言模型转化为一位有主见、注重无障碍、拒绝 AI 套路的协作型设计伙伴。 开源，采用 MIT 许可。将提示词放入任何支持系统提示词的 LLM（Claude、GPT、Gemini、本地模型）中，并根据需要搭配程序化技能使用。 大多数\"设计助手\"提示词产出的都是千篇一律的 SaaS 模板式输出——夸张的渐变、emoji 装饰、圆角加左边框的卡片、清一色的 Inter 字体排版。本提示词明确拒绝这些模式，并用一套完整的设计理念取而代之，涵盖：\n- 内容纪律（无填充——每个元素都必须有其存在的价值）\n- 美学纪律（避免 AI 套路，坚持统一的色调与风格）\n- 视觉层次与节奏（尺寸、颜色、字重、位置、密度、间距比例）\n- 无障碍（WCAG、语义化 HTML、键盘导航、焦点环、动效偏好）\n- 交互与反馈（悬停、激活、禁用、焦点、加载、验证状态）\n- 系统思维（组件与设计令牌，而非一次性页面）\n- 尊重媒介（真正的 CSS Grid、oklch()、text-wrap: pretty、真实的交互原型）\n- 质量重于数量（深度优先于广度，打磨每一个细节）\n外加 14 项程序化技能，供智能体在制作、提取和审查工作中调用。 claude-design-system-prompt/ ├── claude/                              Claude Code / Claude.ai 变体 │   ├── system-prompt.md                 主系统提示词——共 20 章 │   └── skills/                          14 项可调用技能 │       ├── discovery-questions.md       启动问题协议 │       ├── frontend-aesthetic-direction.md  在无品牌时确定视觉方向 │       ├── wireframe.md                 低保真探索，3 种以上变体 │       ├── make-a-deck.md               用 HTML 制作幻灯片演示 │       ├── make-a-prototype.md          制作可交互点击的原型 │       ├── make-tweakable.md            浮动调整面板 │       ├── generate-variations.md       在多个维度上生成 3 种以上高保真变体 │       ├── design-system-extract.md     从源文件中提取设计令牌 │       ├── component-extract.md         盘点可复用组件 │       ├── accessibility-audit.md       WCAG、语义化、键盘、动效审查 │       ├── ai-slop-check.md             渐变/emoji/字体/风格套路检测 │       ├── hierarchy-rhythm-review.md   尺寸/字重/颜色 + 间距比例审查 │       ├── interaction-states-pass.md   悬停/激活/禁用/焦点/加载状态审查 │       └── polish-pass.md               最终总审查 ├── codex/                               OpenAI Codex 变体（单循环，无子智能体） │   ├── AGENTS.md                        Codex 自动发现的入口点 │   ├── system-prompt.md                 相同提示词，适配 Codex │   └── skills/                          相同技能，以顺序审查替代并行智能体 ├── README.md                            本文件 └── LICENSE                              MIT 将 system-prompt.md 的内容粘贴到任何支持系统提示词的 LLM 中。智能体将遵循设计理念，并在任务匹配时按名称引用相应技能。 skills/ 中的每个技能都是一个独立的、分阶段的流程。技能名称即为触发条件——当用户请求与某个技能描述匹配时，智能体加载该技能并执行。 技能分为三大类： 生产 —— 构建实物 探索性问题 · 前端美学方向 · 线框图 · 制作演示文稿 · 制作原型 · 制作可调参数 · 生成变体 系统 —— 提取结构 设计系统提取 · 组件提取 审查 —— 审计并修复 无障碍审计 · AI 内容质量检查 · 层级节奏审查 · 交互状态检查 · 润色检查 技能可以串联使用。典型的全新项目流程： 探索性问题 → 前端美学方向 → 线框图 → 制作原型 → 润色检查 品牌感知流程： 设计系统提取 → 生成变体 → 制作可调参数 → 润色检查 该提示假设环境为 HTML 输出设计环境（类似于 Claude.ai 的设计工具）。如果你的目标环境不同——例如 Figma 插件、纯代码助手、纯聊天的设计顾问——则需要调整工作流程章节和工具引用。核心原则（第 5–16 章）适用于任何媒介。 claude/ 变体针对当前 Anthropic 前沿模型（Fable 5 和 Opus 4.7/4.8 系列）进行了校准，这些模型更严格地遵循指令，且不需要像前代模型那样激进的提示：\n- 条件而非配额。不再使用“至少问 N 个问题”或“关键：你必须”等表述。当前模型将配额视为字面合同并过度触发；提示仅说明行动的条件，并附有自主决策条款（针对次要决策：选择一个合理选项并注明，而非反复询问）。\n- 技能和子代理的显式触发条件。这些模型默认不会主动调用可选能力，因此每个技能描述都明确了何时调用，并且验证器委托设置了显式触发条件（“每次实质性视觉变更后”）。\n- 覆盖优先的审查。审查代理会报告所有内容并附上置信度/严重性评估，由聚合步骤进行过滤。当前模型会严格遵循“仅报告重要问题”的指令，从而静默忽略发现项。\n- 风格风格防护。当前模型的默认美学偏好（米色背景、衬线展示字体、赤陶色/琥珀色强调色）会被 ai-slop-check（规则 9）检测到，并通过 frontend-aesthetic-direction 的四方向协议预先规避。这些模型不再支持采样参数（温度），因此视觉多样性必须通过每个变体的显式规格实现，而非随机性。\n在较旧模型（Claude Opus/Sonnet 4.6 及更早版本，或非 Anthropic 模型）上，较平和的措辞可能触发不足——如果发现模型跳过问题轮次或审查，请恢复更强的命令式语言。codex/ 变体单独维护，不受这些说明影响。 system-prompt.md 中的 20 章涵盖： | # | 章节 | |---|---| | 1 | 身份与角色 | | 2 | 工作流程 | | 3 | 先提问 | | 4 | 将设计根植于现有语境 | | 5 | 内容原则——无填充 | | 6 | 美学原则——有目的的视觉 | | 7 | 视觉层级与节奏 | | 8 | 字体系统 | | 9 | 色彩系统 | | 10 | 无障碍与包容性 | | 11 | 交互与反馈 | | 12 | 简洁与单一明确行动号召 | | 13 | 系统思维 | | 14 | 尊重媒介 | | 15 | 理解用户 | | 16 | 质量优先于数量 | | 17 | 输出原则 | | 18 | 协作与交付 | | 19 | 知识产权与内容边界 | | 20 | 可用技能 | 欢迎提交 Issue 和 PR。特别有价值的贡献包括：\n- 额外的审查技能（例如文案审查、动效审查、深色模式一致性检查）\n- 针对其他环境（Figma、纯代码、纯终端）的适配提示\n- 提示词应防御的真实世界失败案例\n- 提示词的其他语言翻译\n请保持相同的操作语气，避免提示词臃肿——每个章节都应有其存在的价值，遵循提示词对智能体所要求的同一标准。 MIT 许可——参见 LICENSE。 你可以出于任何目的（包括商业用途）使用、修改和分发此提示词及技能库。无需署名，但欢迎注明出处。", "zh": true}, {"seq": 6, "title": "LlamaIndex 发布 legal-kb：基于 Index v2 的智能体检索参考应用", "source": "MarkTechPost（RSS）", "summary": "LlamaIndex 发布 legal-kb，一个基于 Index v2（LlamaParse Platform）的法律文档知识库参考应用。采用 Retrieval Harness 模式，赋予 Agent 四个文件系统风格工具：retrieve（混合语义检索，支持 rerank 和引用）、findFiles（精确/模糊文件名搜索）、readFile（带偏移量的原始内容读取）和 grepFile（正则匹配并返回字符位置）。Agent 需先调用 findFiles 确定文件清单，再依次使用其他工具定位内容。底层基于 Vercel AI SDK 6 的 ToolLoopAgent，可选用 OpenAI 或 Anthropic 模型，支持用…", "url": "https://www.marktechpost.com/2026/07/05/llamaindex-legal-kb-agentic-retrieval-over-index-v2-with-retrieve-find-read-and-grep-tools", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "LlamaIndex 已在 GitHub 上发布了 legal-kb，这是一个公开参考应用。它被描述为基于 LlamaIndex Index v2（LlamaParse 平台）的法律文档知识库。该项目展示了一种团队称之为\"检索工具集\"（Retrieval Harness）的模式，用于实现智能体检索。 该方法与单次检索不同。它不是每次查询进行一次嵌入搜索，而是为智能体提供类似文件系统的工具。这样智能体就可以爬取一个庞大且不断演变的知识库来完成任务。这些工具模拟了工程师已经熟悉的操作：语义和关键词搜索、正则表达式 grep、文件搜索和读取。 什么是 legal-kb？ legal-kb 是一个可运行的 TanStack Start Web 应用，而不是一个库。你可以登录、创建项目、上传文件，并与智能体对话。每个项目都会镜像为一个托管的 LlamaCloud Index v2。上传的文件会在后台自动解析和索引。聊天智能体在每次对话中都会实时查询该索引。 通俗解释检索工具集 该工具集为你的文档提供了一个持久化数据管道。它连接到数据源、建立索引并保持更新。在此管道之上，它向智能体暴露一组工具。 这些工具有意设计得接近文件系统操作。智能体可以列出文件、读取文件、在文件内执行 grep 或运行混合搜索。由于这些工具是通用的，你可以将工具集接入自己的智能体。 四个智能体工具 src/lib/agent.ts 中的智能体被赋予四个工具。每个工具都映射到一个 Index v2 检索 API。下表列出了它们的实现方式。 | 工具 | 后端 API | 关键参数 | 功能 | |---|---|---|---| | retrieve | beta.retrieval.retrieve | query,top_k,score_threshold,rerank_top_n,file_name,file_version | 运行混合语义搜索；可选重排序；返回文本块及引用 | | findFiles | beta.retrieval.find | file_name,file_name_contains | 按精确文件名或子串搜索文件；自动分页 | | readFile | beta.retrieval.read | file_id,offset,max_length | 读取原始文件内容，支持偏移量和长度窗口 | | grepFile | beta.retrieval.grep | file_id,pattern,context_chars,limit | 在单个文件中匹配模式；返回字符位置 | 系统提示强制执行一个顺序。智能体必须首先调用 findFiles 来建立文档清单。然后通过 retrieve 缩小范围，并在引用前使用 readFile 或 grepFile 确认确切措辞。 底层工作原理 上传遵循 src/lib/files.ts 中的清晰管道。字节被推送到项目的 LlamaCloud 源目录。通过 Prisma 将 File 和 ProjectFile 记录写入 PostgreSQL。触发索引同步但不等待；UI 轮询状态直到就绪。 版本控制限定在（项目, 文件名）对范围内。将 nda.pdf 重新上传到同一项目会产生 v1、v2、v3 并存。检索层在版本元数据字段上进行过滤。这为知识库本身提供了版本控制。 智能体使用 Vercel AI SDK 6 中的 ToolLoopAgent。你可以每轮选择 OpenAI 或 Anthropic，并自带密钥。推理过程是流式传输的：Claude 模型使用扩展思考；OpenAI 推理模型使用中等推理力度。 以下是 retrieve 工具和智能体的精简但准确的代码视图。 ```typescript import { LlamaCloud } from '@llamaindex/llama-cloud' import { tool, ToolLoopAgent } from 'ai' import { z } from 'zod' import { makeCitationId } from './citations' // 每个索引一个工具闭包。封装 Index v2 检索 API。 ``` ```typescript function createLlamaParseTools(apiKey: string, projectId: string, indexId: string) { const client = new LlamaCloud({ apiKey }) const retrieve = tool({ description: '对索引执行语义检索查询。', inputSchema: z.object({ query: z.string(), top_k: z.number().nullable(), score_threshold: z.number().nullable(), rerank_top_n: z.number().nullable(),   // 启用重排序 file_name: z.string().nullable(),      // 元数据过滤器 file_version: z.number().nullable(), }), execute: async ({ query, top_k, score_threshold, rerank_top_n, file_name }) =\u003e { const custom_filters = file_name ? { file_name: { operator: 'eq' as const, value: file_name } } : undefined const response = await client.beta.retrieval.retrieve({ index_id: indexId, project_id: projectId, query, top_k, score_threshold, rerank: rerank_top_n != null ? { enabled: true, top_n: rerank_top_n } : undefined, custom_filters, }) // 返回模型可读列表及驱动UI标签的引用信息 const citations = response.results.map((r) =\u003e ({ id: makeCitationId(),                    // 例如 \"c7f2qa\" fileName: r.metadata?.file_name, score: r.rerank_score ?? r.score ?? null, preview: r.content.slice(0, 500), })) const formatted = response.results .map((r, i) =\u003e `### 结果 #${i + 1}\\n\\n${r.content.slice(0, 600)}`) .join('\\n\\n---\\n\\n') return { formatted, citations } }, }) // findFiles / readFile / grepFile 遵循相同结构，由 // client.beta.retrieval.find / .read / .grep 支持 return { retrieve /* , findFiles, readFile, grepFile */ } } export function buildAgent(model, apiKey: string, projectId: string, indexId: string) { return new ToolLoopAgent({ model, tools: createLlamaParseTools(apiKey, projectId, indexId), instructions: '始终先调用findFiles，每个答案都要基于文档内容，' + '并使用 `cite:\u003cid\u003e` 格式内联引用。', }) }``` 答案附带可视化引用。每个检索到的文本块都会获得一个短ID，例如 cite:c7f2qa。智能体会在行内引用该ID，UI会渲染可点击的引用标签。点击标签会打开源页面截图，并用边界框高亮显示被引用的文本区域。 **朴素RAG vs 智能体检索框架** 该框架采用与单次RAG不同的执行模型。以下对比聚焦于行为差异。 | 维度 | 朴素/单次RAG | 智能体检索框架 (Index v2) | |---|---|---| | 检索流程 | 每次查询执行一次向量搜索 | 多步骤工具循环：查找 → 检索 → 读取/搜索 | | 搜索模式 | 仅向量相似度 | 混合语义搜索、关键词和正则表达式搜索 | | 上下文 | 固定top-k文本块 | 智能体按需读取完整文件或窗口内容 | | 数据新鲜度 | 静态索引 | 持续管道，支持同步和版本控制 | | 精度控制 | 大多隐藏 | 暴露top_k、score_threshold、rerank_top_n参数 | | 引用方式 | 文本块ID | 带页面截图和边界框的可视化引用 | | 最佳适用场景 | 简短问答 | 长周期文档任务 | **应用场景及示例** 该设计针对智能体需要导航大量文档集的领域。法律和金融科技是明确的应用示例。\n- 考虑一个合同问题：“终止MSA需要什么通知？”代理列出文件，运行检索，然后精确抓取相关条款。它会引用具体页面来回答。\n- 考虑数据室中的尽职调查：代理可以通过名称查找文件，然后读取每个候选文件。它无需人工打开每个PDF即可交叉核对条款。\n- 考虑一个版本化的政策库：由于检索支持`file_version`过滤器，代理可以查询特定版本。这支持随时间变化的追踪。\n参考实现 关键要点\n- `legal-k`是一个公开参考应用，展示了基于LlamaIndex Index v2的代理检索。\n- 代理拥有四个文件系统风格的工具：`retrieve`（混合搜索）、`findFiles`、`readFile`和`grepFile`。\n- 持久化管道处理解析、索引、同步以及每个文件的版本控制。\n- 答案包含可视化引用：带有边界框的页面截图，标注引用的文本。\n- 技术栈为TanStack Start、AI SDK 6、Prisma和WorkOS，并采用每用户加密密钥。\n查看GitHub仓库。此外，", "zh": true}, {"seq": 7, "title": "三周前，我不小心创办了一家小公司", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "一位父亲为患有自闭症的非语言儿子开发了一款沟通应用，在言语治疗室的等候区展示时，所有非语言儿童的母亲看到后都忍不住流泪，言语治疗师也啜泣了五分钟。他意外发现产品市场匹配，决定腾出时间让更多孩子能用上，即使这意味着几周睡眠不足。应用本身是专为理解语言困难的儿童设计的，与传统的AAC设备不同——后者主要面向身体障碍但语言理解正常的成人。", "url": "https://extelligence.substack.com/p/i-accidentally-started-a-small-business", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "三周前，我意外开启了一家小公司 ——最幸福、最踏实的“分心” 三周前，我意外找到了产品市场契合点。之所以用这种说法，是因为若用更真诚恳切的表达，我会情绪失控。总之，我为一群非语言儿童开发了一款沟通应用，而这款应用能让所有非语言儿童的母亲泣不成声。我和儿子在第一次带它去言语治疗时发现了这一点——当时几位母亲在候诊室看到了它。接着，他的言语治疗师也哭了整整五分钟，讽刺的是，这让她自己都说不出话了。这一切让我盯着天花板，反复吞咽了好几次——因为我不认为让儿子看到我因他的自闭症而情绪激动是件好事。 关键在于：它奏效了。至少，对我儿子而言，它比以往任何方法都有效得多。当候诊室里的母亲们看到效果时，我意识到——我发誓直到那一刻才想到——我绝不可能耸耸肩说“只有我儿子能用”。我手头的事已经多到爆炸，但必须挤出时间做这件事，哪怕这意味着连续几周少睡几小时。 此刻我需要岔开话题，但我保证很快会回到那个温馨煽情的部分。 当你的孩子无法说话时 首先，你很难察觉孩子有语言障碍——因为所有婴儿生来都不会说话。一两年过去，你仍浑然不觉。然后你和妻子会发现孩子本该开口却未开口，儿科医生会说“没事”。接着你持续观察，医生开始和你讨论诊断问题，或许还会微微皱眉。然后你填写行为分析问卷，说服自己只是过度悲观——毕竟你填错了答案。“这证据太糟糕了，”你会说。接着你发现这些数据在发育早期高度集中，于是笑着安慰自己“完全没问题”。 直到某天，你看到孩子与同龄人在一起。那些孩子正进行着完整的双向对话，你才不得不承认：确实有问题。 关于如何应对，那是个无底洞。一群自称“巫师”的人会冒出来兜售各种不靠谱的东西。“您的孩子只需要看儿科脊椎按摩师，”他们会说——不是那种身经百战、专治伐木工、练就精湛按摩手艺的按摩师（比如我看的那位），而是某个自诩异界灵修大师、专拧幼儿脖子的混蛋。你会告诉对方不感兴趣，但叹着气接受妻子给孩子喂大量“补剂”——你确认它们无毒，但大概率毫无作用。其中有些确实有效（或看似有效），但往往是更常规的营养品，比如铁剂、铁蛋白，或某些日常饮食缺乏的微量元素。 最终，当你敲开所有正确的门后，你会去见一位言语治疗师。这确实有帮助，但言语治疗师能做的也有限，因为很大程度上取决于孩子的天赋能力。不过仍然值得尝试，因为言语治疗师掌握着各种你不知道的技巧。如果孩子耳聋、失语或存在类似问题，言语治疗师能提供相应方案。如果存在身体机能障碍，也有多种辅助沟通方法。但如果是认知问题……很遗憾。你们会进行大量训练，希望能看到些许进步，但能提供的帮助仅此而已。 我并非否定AAC设备，只是它们不适合我们 如果孩子说话困难，他们会提供一种名为AAC的辅助设备，全称是\"辅助与替代沟通系统\"。说白了就是个装满单词和符号的平板电脑。仅此而已，比文件目录好不了多少。通过组合单词和符号组成句子，设备会朗读出来。这对无法发声的孩子确实有用，但主要针对身体残疾但语言理解能力正常的人群。它并非专为儿童设计，更不适合本身语言理解就有困难的孩子。查阅这类设备的发展史发现，最初是为需要靠视线选择的瘫痪成人设计的，看它们的布局设计就完全明白了。 我们尝试使用AAC约一年，儿子完全没兴趣。他玩几分钟就丢到一边，转向下一个玩具。只在言语治疗课和学校使用，我没坚持在家配备，因为他毫无反应。所有治疗师和老师都认同他对这个工具没兴趣，也无法培养兴趣。于是我们改用训练法：打断他的活动，引导他说出指令性词语。他喜欢摔跤游戏，自发说话时最常说的是\"再来一次\"——比如我把他扔到沙发上时。我们还算幸运，虽然他的说话频率只有同龄人的1%，但至少能开口。有些孩子完全无法发声。 那些不直接接触孩子的人总劝我给他用AAC，当时我忙得焦头烂额，不想为了完成任务而敷衍了事，于是告诉妻子要自己做一个。这个想法酝酿已久，因为很容易看出他的需求。AAC的问题在于符号系统——它采用的方式恰恰是孩子最不擅长的。如果你是第一次读我的文章，我大概算是个\"前线部署AI工程师\"？至少我的下属这样自称。虽然我不这么定义自己，但这样说你应该能理解。 传统的辅助沟通系统（AAC）实在太抽象了。我儿子根本不明白红色八边形代表停止，也不理解\"停止\"在这个语境下的含义。箭头和那些极小的火柴人图标对他来说同样毫无意义。于是我坐下来，花两小时用\"氛围编程\"（vibe-coding）做了个简陋网站，配上基础导航，再用ChatGPT生成了几百个词汇图片——所有图像都像他本人做各种事情的样子，或者他实际拥有的物品。我特意选了他最爱动画片的画风来制作这些素材。我还克隆了自己的声音，因为我是他听得最多的人，这样他按下按钮时，所有单词或短语都会用我的声音读出来。我按照自己推测他能理解的方式排列了这些词汇。 我们有一台触屏笔记本电脑，我直接把网站加载上去给他看。 **我的成果** 他立刻着迷了。这对他而言不只是一套符号系统，而是他真实的生活——像故事书或他最喜欢的动画片一样展现在眼前。他能毫不费力地认出所有图像中的自己。那不是一张奶酪贝果的图片，而是他专属奶酪贝果的照片；不是玩具的通用图，而是他玩具的特写。他反复按着我父亲的图片，然后说出了他人生中最长的一句话：\"我真的非常非常爱你。\" 我父亲经常对他说这句话。 当时我盯着天花板，拼命忍住眼泪。 我们拍下他所有食物的照片，告诉他手掌摊开的图片代表\"我想要\"，并演示如何进入食物列表。四年来我一直搞不清这孩子想吃什么，现在突然变得轻而易举。\"我要橙子\"\"我要花生酱饼干\"\"我要法式吐司条\"。什么玩具让他这么难过？点击图片就一目了然。这些看似微小的胜利却是重大突破，让我对自己之前没这么做感到无比懊恼。我们有过塑的闪卡，甚至还有相册，但从未有过专门为他吸引注意力而设计的东西。用产品术语来说，我是围绕他本人构建了这个产品。他需要能告诉我\"把脑袋贴在我头上\"，所以我制作了一个可点击的图块，上面写着\"我需要头部压力\"。 随后我对整个领域的现状感到愤怒。我保证进步也带来很多快乐，但随之而来的是大量愤怒。可能这些情绪都错位了——毕竟从事残障儿童工作的人都是天使——但我发现自己变得暴躁。你知道吗，这些设备甚至没有数据统计功能？好吧，有一个品牌有，但信息几乎为零。你根本看不到孩子是否在进步，也无法知道他们按了哪些按钮、按了多少次、在什么时间按的。当你问这些设备是否有教学模式时，答案是没有。一个都没有。再说一次，它们是为基本已经会说话的人设计的。你还会发现一些毫无意义的争论，比如词汇不应因能力而被限制，然后你会极度愤怒——因为一个筋疲力尽、只想让孩子吃饭的妈妈，会非常需要一个能立即解决这个问题的菜单，哪怕孩子的语言能力永远只发展到这个程度。 于是，我内置了评估指标和教学模块。两周后，他通过文字识别对应图片的能力提升了一倍多。接着我设置了定时程序：听到音乐响起，他就会去玩配对游戏，或者观看系统播放的幻灯片。每隔45分钟，系统会提醒他是否需要上厕所。开车带他去就诊时，我只需在手机上点几下，他的平板就会进入教学模式，提前预习就诊时会接触的事物。当我想问他问题却沟通不畅时，我在手机应用里输入文字，这些内容就会用他熟悉的符号（类似象形文字）显示在屏幕上。他瞬间就理解了——因为现在他专注的界面已经为他揭示了含义。 三周后，他变成了一个不开心的孩子。我是说，非常恼火。他极度沮丧，因为突然拥有了表达的能力，却还不习惯这种改变。理解力带来了责任。他那些饥饿或烦躁的情绪信号不再奏效，我和他妈妈不再费心猜测，而是指着平板反复说：“点击说话！” 顺便说，他现在说话量远超从前。大概增加了五倍，远超基准水平。他不仅会按下“椒盐卷饼”的按钮，还会用自己的声音补充“我喜欢这个”。不仅会按“橙子”键，还会说橙子“真好吃”。上周在五金店，收银员给了他一颗糖，他竟用自己的声音说出“非常感谢”。 **我现在的做法** 在我看来，我的职责是保持冷静，继续朝着正确的方向推进。如果这个系统能开发出帮助其他家长的功能，我一定会去实现。肯定不止我一个家长需要这样的功能：用歌曲和幻灯片向孩子展示多吃不同食物的好处。我们为儿子快速制作了几个类似内容，比如告诉他不要总吃同样的食物。于是，在应用 function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
</body></html>
