We're building this Prometheus cluster, the first gigawatt-plus single cluster...We're talking about many hundreds of billions of dollars of capital.\"\nMark Zuckerberg says his job is to concentrate elite people, capital, and infrastructure."}, {"seq": 3, "title": "NVIDIA Kyber NVL144 延迟超 12 个月至 2028", "source": "X：SemiAnalysis (@SemiAnalysis_)", "summary": "重大延迟：Jensen 在 GTC 上展示 Kyber NVL144 仅 3 个月后，该项目遭遇重大挫折，已推迟超过 …", "url": "https://x.com/SemiAnalysis_/status/2073874671498387899", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "MASSIVE DELAY: Just 3 months after Jensen demoed Kyber NVL144 at GTC, it has faced major setbacks and has been delayed by more than 12 months, pushing it back to 2028. Below, we explain why Kyber has faced massive delays and why NVIDIA’s NVL72x2 back-to-back rack architecture was also cancelled, leaving Rubin Ultra with a limited scale-up domain. 👇️ 1/6🧵"}, {"seq": 4, "title": "欧盟理事会通过快速通道强制推行\"聊天管控\"（Chat Control 2.0）", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "欧盟理事会通过书面程序快速通过一项新法规，强制要求科技集团对加密通信进行无差别扫描（Chat Control 2.0）…", "url": "https://www.heise.de/en/news/Chat-Control-1-0-EU-Council-forces-messenger-scans-via-fast-track-11353659.html", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": ""}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 5, "title": "Anthropic Claude Design 反向工程提示词开源更新", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Anthropic 旗下 Claude Design 的反向工程系统提示词在 GitHub 以 MIT 许可证开源，包…", "url": "https://github.com/Trystan-SA/claude-design-system-prompt", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "Reverse-engineered system prompt of Claude Design from Anthropic.\nA system prompt and skill library that turns an LLM into an opinionated, accessibility-aware, AI-slop-resistant design collaborator.\nOpen source, MIT licensed. Drop the prompt into any LLM that supports system prompts (Claude, GPT, Gemini, local models) and pair with the procedural skills as needed.\nMost \"design assistant\" prompts produce generic SaaS-template output — aggressive gradients, emoji decoration, rounded-corner-with-left-border cards, Inter-everywhere typography. This prompt explicitly rejects those patterns and replaces them with a complete design philosophy covering:\n- Content discipline (no filler — every element earns its place)\n- Aesthetic discipline (avoid AI tropes, commit to a palette and tone)\n- Visual hierarchy and rhythm (size, color, weight, position, density, spacing scales)\n- Accessibility (WCAG, semantic HTML, keyboard navigation, focus rings, motion preferences)\n- Interaction and feedback (hover, active, disabled, focus, loading, validation states)\n- System thinking (components and tokens over one-off pages)\n- Respecting the medium (real CSS Grid, oklch(),text-wrap: pretty, real interactive prototypes)\n- Quality over quantity (depth over breadth, polish every detail)\nPlus 14 procedural skills the agent can invoke for production, extraction, and review work.\nclaude-design-system-prompt/\n├── claude/                              Claude Code / Claude.ai variant\n│   ├── system-prompt.md                 Main system prompt — 20 chapters\n│   └── skills/                          14 invokable skills\n│       ├── discovery-questions.md       Kickoff question protocol\n│       ├── frontend-aesthetic-direction.md  Commit to a look when no brand exists\n│       ├── wireframe.md                 Low-fi exploration, 3+ variations\n│       ├── make-a-deck.md               Slide presentations in HTML\n│       ├── make-a-prototype.md          Interactive clickable prototype\n│       ├── make-tweakable.md            Floating tweak panel\n│       ├── generate-variations.md       3+ hi-fi variations across axes\n│       ├── design-system-extract.md     Pull tokens from sources\n│       ├── component-extract.md         Inventory reusable components\n│       ├── accessibility-audit.md       WCAG, semantic, keyboard, motion\n│       ├── ai-slop-check.md             Gradient / emoji / font / house-style trope detection\n│       ├── hierarchy-rhythm-review.md   Size / weight / color + spacing scale\n│       ├── interaction-states-pass.md   Hover / active / disabled / focus / loading\n│       └── polish-pass.md               Umbrella final-gate review\n├── codex/                               OpenAI Codex variant (single-loop, no subagents)\n│   ├── AGENTS.md                        Codex auto-discovered entry point\n│   ├── system-prompt.md                 Same prompt, adapted for Codex\n│   └── skills/                          Same skills, sequential reviews instead of parallel agents\n├── README.md                            This file\n└── LICENSE                              MIT\nPaste the contents of system-prompt.md as the system prompt for any LLM that supports them. The agent will follow the design philosophy and reference the skills by name when tasks match.\nEach skill in skills/ is a self-contained, phased procedure. The skill name is the trigger — when the user's request matches a skill description, the agent loads that skill and follows it.\nSkills group into three categories:\nProduction — build something\ndiscovery-questions · frontend-aesthetic-direction · wireframe · make-a-deck · make-a-prototype · make-tweakable · generate-variations\nSystem — extract structure\ndesign-system-extract · component-extract\nReview — audit and fix\naccessibility-audit · ai-slop-check · hierarchy-rhythm-review · interaction-states-pass · polish-pass\nSkills can be chained. A typical greenfield flow:\ndiscovery-questions → frontend-aesthetic-direction → wireframe → make-a-prototype → polish-pass\nA brand-aware flow:\ndesign-system-extract → generate-variations → make-tweakable → polish-pass\nThe prompt assumes an HTML-output design environment (similar to Claude.ai's design tool). If your target environment is different — a Figma plugin, a code-only assistant, a chat-only design coach — you'll need to adjust the workflow chapters and tool references. The principles (chapters 5–16) translate to any medium.\nThe claude/ variant is calibrated for current Anthropic frontier models (Fable 5 and the Opus 4.7/4.8 lineage), which follow instructions more literally and need less aggressive prompting than earlier generations:\n- Conditions instead of quotas. No \"ask at least N questions\", no \"CRITICAL: YOU MUST\". Current models treat quotas as literal contracts and over-trigger on them; the prompt states the conditions under which to act, plus an autonomy clause for minor decisions (pick a reasonable option and note it, rather than asking).\n- Explicit triggers for skills and subagents. These models under-reach for optional capabilities by default, so every skill description states when to invoke it, and verifier delegation has an explicit trigger (\"after every substantive visual change\").\n- Coverage-first reviews. Review agents report everything with confidence/severity estimates and let the aggregation step filter. Current models follow \"only report important issues\" literally, which silently suppresses findings.\n- House-style guard. The current models' default aesthetic (cream background, serif display type, terracotta/amber accents) is detected by ai-slop-check(rule 9) and pre-empted byfrontend-aesthetic-direction's four-directions protocol. Sampling parameters (temperature) no longer exist on these models, so visual variety must come from explicit per-variation specs, not randomness.\nOn older models (Claude Opus/Sonnet 4.6 and earlier, or non-Anthropic models), the calmer phrasing may under-trigger — restore stronger imperative language if you see the model skipping question rounds or reviews. The codex/ variant is maintained separately and is unaffected by these notes.\nThe 20 chapters in system-prompt.md cover:\n| # | Chapter | \n|---|---|\n| 1 | Identity and role | \n| 2 | Workflow | \n| 3 | Asking questions first | \n| 4 | Rooting designs in existing context | \n| 5 | Content principles — no filler | \n| 6 | Aesthetic principles — purposeful visuals | \n| 7 | Visual hierarchy and rhythm | \n| 8 | Typography system | \n| 9 | Color system | \n| 10 | Accessibility and inclusivity | \n| 11 | Interaction and feedback | \n| 12 | Simplicity and one clear CTA | \n| 13 | System thinking | \n| 14 | Respecting the medium | \n| 15 | Understanding users | \n| 16 | Quality over quantity | \n| 17 | Output principles | \n| 18 | Collaboration and delivery | \n| 19 | IP and content boundaries | \n| 20 | Available skills | \nIssues and PRs welcome. Particularly useful contributions:\n- Additional review skills (e.g., copy review, motion review, dark-mode parity check)\n- Adapted prompts for other environments (Figma, code-only, terminal-only)\n- Real-world failure cases the prompt should defend against\n- Translations of the prompt into other languages\nPlease keep the same operational tone and avoid bloating the prompt — every chapter should earn its place, the same standard the prompt holds the agent to.\nMIT — see LICENSE.\nYou can use, modify, and distribute this prompt and skill library for any purpose, including commercial use. No attribution required, but appreciated."}, {"seq": 6, "title": "LlamaIndex 发布 legal-kb：基于 Index v2 的智能体检索参考应用", "source": "MarkTechPost（RSS）", "summary": "LlamaIndex 发布 legal-kb，一个基于 Index v2（LlamaParse Platform）的法…", "url": "https://www.marktechpost.com/2026/07/05/llamaindex-legal-kb-agentic-retrieval-over-index-v2-with-retrieve-find-read-and-grep-tools", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "LlamaIndex has published legal-kb, a public reference application on GitHub. It is described as a knowledge base for legal documents, powered by LlamaIndex Index v2 (the LlamaParse Platform). The project demonstrates a pattern the team calls a Retrieval Harness for agentic retrieval.\nThe approach differs from single-shot retrieval. Instead of one embedding search per query, an agent is given filesystem-style tools. It can then crawl a large, evolving knowledge base to solve a task. The tools mirror operations engineers already know: semantic and keyword search, regex grep, file search, and read.\nWhat is legal-kb?\nlegal-kb is a working TanStack Start web app, not a library. You sign in, create a project, upload files, and chat with an agent. Each project is mirrored as a managed LlamaCloud Index v2. Uploaded files are parsed and indexed automatically in the background. The chat agent then queries that index live during each turn.\nThe Retrieval Harness, in plain terms\nThe harness provides a persistent data pipeline over your documents. It connects to a data source, indexes it, and keeps it updated. On top of that pipeline, it exposes a set of tools to the agent.\nThose tools are deliberately close to filesystem operations. An agent can list files, read a file, grep inside a file, or run hybrid search. Because the tools are generic, you can plug the harness into your own agents.\nThe four agent tools\nThe agent in src/lib/agent.ts is given four tools. Each maps to an Index v2 retrieval API. The table below lists them as implemented.\n| Tool | Backing API | Key parameters | What it does | \n|---|---|---|---|\n| retrieve | beta.retrieval.retrieve | query,top_k,score_threshold,rerank_top_n,file_name,file_version | Runs hybrid semantic search; optional reranking; returns chunks plus citations | \n| findFiles | beta.retrieval.find | file_name,file_name_contains | Searches files by exact name or substring; paginates automatically | \n| readFile | beta.retrieval.read | file_id,offset,max_length | Reads raw file content, with offset and length windows | \n| grepFile | beta.retrieval.grep | file_id,pattern,context_chars,limit | Matches a pattern in one file; returns character positions | \nThe system prompt enforces an order. The agent must call findFiles first to establish the document inventory. It then narrows with retrieve, and confirms exact wording with readFile or grepFile before citing.\nHow it works under the hood\nUploads follow a clear pipeline in src/lib/files.ts. Bytes are pushed to the project’s LlamaCloud source directory. A File and ProjectFile row are written to PostgreSQL via Prisma. An index sync is triggered but not awaited; the UI polls status until ready.\nVersioning is scoped to the (project, filename) pair. Re-uploading nda.pdf to the same project produces v1, v2, v3 side by side. The retrieval layer filters on the version metadata field. This gives version control over the knowledge base itself.\nThe agent uses the ToolLoopAgent from Vercel AI SDK 6. You pick OpenAI or Anthropic per turn and bring your own keys. Reasoning is streamed: Claude models use extended thinking; OpenAI reasoning models use a medium reasoning effort.\nHere is a condensed but faithful view of the retrieve tool and the agent.\nimport { LlamaCloud } from '@llamaindex/llama-cloud'\nimport { tool, ToolLoopAgent } from 'ai'\nimport { z } from 'zod'\nimport { makeCitationId } from './citations'\n// One tool closure per index. Wraps Index v2 retrieval APIs.\nfunction createLlamaParseTools(apiKey: string, projectId: string, indexId: string) {\n  const client = new LlamaCloud({ apiKey })\n  const retrieve = tool({\n    description: 'Run a semantic retrieval query against an index.',\n    inputSchema: z.object({\n      query: z.string(),\n      top_k: z.number().nullable(),\n      score_threshold: z.number().nullable(),\n      rerank_top_n: z.number().nullable(),   // set to enable reranking\n      file_name: z.string().nullable(),      // metadata filter\n      file_version: z.number().nullable(),\n    }),\n    execute: async ({ query, top_k, score_threshold, rerank_top_n, file_name }) =\u003e {\n      const custom_filters = file_name\n        ? { file_name: { operator: 'eq' as const, value: file_name } }\n        : undefined\n      const response = await client.beta.retrieval.retrieve({\n        index_id: indexId,\n        project_id: projectId,\n        query,\n        top_k,\n        score_threshold,\n        rerank: rerank_top_n != null ? { enabled: true, top_n: rerank_top_n } : undefined,\n        custom_filters,\n      })\n      // Return a model-readable list plus citations that drive the UI chips.\n      const citations = response.results.map((r) =\u003e ({\n        id: makeCitationId(),                    // e.g. \"c7f2qa\"\n        fileName: r.metadata?.file_name,\n        score: r.rerank_score ?? r.score ?? null,\n        preview: r.content.slice(0, 500),\n      }))\n      const formatted = response.results\n        .map((r, i) =\u003e `### Result #${i + 1}\\n\\n${r.content.slice(0, 600)}`)\n        .join('\\n\\n---\\n\\n')\n      return { formatted, citations }\n    },\n  })\n  // findFiles / readFile / grepFile follow the same shape, backed by\n  // client.beta.retrieval.find / .read / .grep\n  return { retrieve /* , findFiles, readFile, grepFile */ }\n}\nexport function buildAgent(model, apiKey: string, projectId: string, indexId: string) {\n  return new ToolLoopAgent({\n    model,\n    tools: createLlamaParseTools(apiKey, projectId, indexId),\n    instructions:\n      'Always call findFiles first, ground every answer in the documents, ' +\n      'and cite ids inline as `cite:\u003cid\u003e`.',\n  })\n}Answers carry visual citations. Each retrieved chunk gets a short id, such as cite:c7f2qa. The agent references that id inline, and the UI renders a clickable citation chip. Clicking it opens the source page screenshot with bounding-box rectangles over the cited text.\nNaive RAG vs the agentic Retrieval Harness\nThe harness is a different execution model from single-shot RAG. The comparison below focuses on behavior.\n| Dimension | Naive / single-shot RAG | Agentic Retrieval Harness (Index v2) | \n|---|---|---|\n| Retrieval flow | One vector search per query | Multi-step tool loop: find → retrieve → read/grep | \n| Search modes | Vector similarity only | Hybrid semantic search, keyword, and regex grep | \n| Context | Fixed top-k chunks | Agent reads full files or windows on demand | \n| Freshness | Static index | Persistent pipeline with sync and versioning | \n| Precision control | Mostly hidden | top_k,score_threshold,rerank_top_nexposed | \n| Citations | Chunk ids | Visual citations with page screenshots and bboxes | \n| Best fit | Short question answering | Long-horizon document tasks | \nUse cases, with examples\nThe design targets domains where agents navigate large document sets. Legal and fintech are the stated examples.\n- Consider a contract question: ‘What notice is needed to terminate the MSA?’ The agent lists files, runs retrieve, then greps the exact clause. It answers with a citation to the specific page.\n- Consider due diligence across a data room: An agent can findFilesby name, thenreadFileeach candidate. It cross-checks clauses without a human opening every PDF.\n- Consider a versioned policy base: Because retrieveaccepts afile_versionfilter, an agent can query a specific version. This supports change tracking over time.\nReference implementation\nKey Takeaways\n- legal-kbis a public reference app showing agentic retrieval on LlamaIndex Index v2.\n- The agent gets four filesystem-style tools: retrieve(hybrid search),findFiles,readFile, andgrepFile.\n- A persistent pipeline handles parsing, indexing, sync, and per-file version control.\n- Answers include visual citations: page screenshots with bounding boxes over the cited text.\n- The stack is TanStack Start, AI SDK 6, Prisma, and WorkOS, with per-user encrypted keys.\nCheck out the GitHub Repo. Also, feel free to follow us on Twitter and don’t forget to join our 150k+ML SubReddit and Subscribe to our Newsletter. Wait! are you on telegram? now you can join us on telegram as well.\nNeed to partner with us for promoting your GitHub Repo OR Hugging Face Page OR Product Release OR Webinar etc.? Connect with us"}, {"seq": 7, "title": "三周前，我不小心创办了一家小公司", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "一位父亲为患有自闭症的非语言儿子开发了一款沟通应用，在言语治疗室的等候区展示时，所有非语言儿童的母亲看到后都忍不住流泪…", "url": "https://extelligence.substack.com/p/i-accidentally-started-a-small-business", "publishedAt": "2026-07-06T00:00:00.000Z", "exact": false, "content": "I Accidentally Started a Small Business Three Weeks Ago\nMy Happiest, Most Grounded Distraction\nThree weeks ago, I accidentally found product market fit. I’ll phrase it that way because saying it in a more earnest and sincere way makes me too emotional. So, anyway, I built a communication app for non-verbal children that makes 100% of mothers with non-verbal children start sobbing uncontrollably. My son and I discovered this the first day we brought it to speech therapy and some moms saw it in the waiting room. Then it made his speech therapist sob for like five minutes straight, which ironically made her unable to speak. All of this also made me stare at the ceiling and swallow several times because I don’t think it’s good for my son to see me get emotional about his autism.\nThe thing is: It worked. Or, at least, it worked much better for my son, in particular, than anything else has ever done. And when all the moms in the waiting room saw that it worked, I realized, and I promise I hadn’t thought of it until just that moment, there was absolutely no way I could just shrug and say that my son is the only kid that gets one. I have way too much going on, but I had to make the time to do this specific thing even if it meant less sleep for several weeks.\nI need to make several digressions at this point, but I promise I’ll get back to the happy/sappy Hallmark part of this shortly.\nWhat Happens when Your Kid Can’t Talk\nFirstly, it’s very unclear your child has speech problems because all children are born without the ability to speak. A year to two years will pass with you none the wiser. Then you and your wife will notice your child should be talking and isn’t, and the pediatrician will say it’s fine. Then you keep on noticing and your pediatrician starts to go over diagnostic questions with you and maybe frowns a little bit. Then you take some behavioral analysis surveys, and you convince yourself that actually you were just being overly dour and it’s fine because you filled the questions out wrong. It’s really bad evidence, you’ll say. Then you look into how clustered this data is at early stages of development and you laugh that it’s going to be totally fine.\nOne day you’ll see your kid around other kids their same age. All those kids will be having full on back and forth conversations, and you’ll accept that something is actually not fine.\nThere is a whole rabbit hole of what to do about it. A bunch of would-be wizards will show up to try to sell you things that are definitely not real. Your child, they will say, really just needs to see a pediatric chiropractor. And not even a battle-hardened chiropractor who works on loggers and has just learned to be a very good masseuse, like the one I see, but some piece of shit who cracks the necks of toddlers because he thinks he’s a spiritual healer from another realm. You’ll tell the person telling you to go to a pediatric chiropractor that you’re not interested, but sigh and accept that your wife is going to give your child a lot of “supplements” that you will then verify aren’t poisonous but also probably don’t do anything. Some of them will actually do something, or at least seem to, but they’ll also be the more standard stuff people take. Like iron, or ferritin, or some actual nutrient not in their normal diet.\nEventually, after you go knock on all the right doors, you go to a speech therapist. This is actually helpful, but the speech therapist will really only be able to do so much to help because a lot of this is dependent on your child’s natural ability. This is still worth doing because the speech therapist will know all kinds of techniques you don’t know. If your child is deaf, or mute, or something like that then the speech therapist will have you covered. If they have some sort of body problem, there are all kinds of solutions to help them communicate. If there’s a cognition problem, well… I’m sorry. You’ll do a lot of drills and hopefully you’ll see some progress but that’s about all there is to help you.\nI’m not Slamming AAC Devices, They Just Weren’t What We Needed\nOne of the aid devices they’ll give to your child if they’re struggling to speak is called an AAC, which stands for Augmentative and Alternative Communication. Really, it’s just a tablet full of words and symbols. That’s all it is. Barely one step above a file directory. You combine the words and symbols together to make sentences. The device says those words out loud. This is really good if a child just can’t physically make words, but this is primarily a device for people who are physically impaired but understand language just fine. It’s not built specifically for children and it’s definitely not optimized for someone who is struggling to understand language in the first place. When I looked into the history of these devices they were first built for paralyzed adults who needed to select things based on gaze, and looking at the layout of all of them, that makes perfect sense.\nWe tried to use an AAC for about a year and my son just wasn’t having it. He’d play with it for a few minutes and then just put it down. Onto the next toy. He only had one at speech therapy and school. I didn’t prioritize getting him one at home because he didn’t respond to it. The whole cadre of therapists and teachers agreed he wasn’t interested in the tool and couldn’t be made to be interested. Instead, we did drills. Interrupt what he’s doing, try to get him to say a word to direct actions, etc. He loves to wrestle and when he speaks spontaneously he most often does it for things like “Again” when I throw him on the couch. We are relatively lucky, because he can talk even if it’s something like one percent as often as other children. Some kids don’t have any words at all.\nEveryone kept pushing on me to get him an AAC who doesn’t work with him directly, and I was so busy and so frustrated at that point, I didn’t really want to check a box just to check a box so I told my wife that I’m just going to make him one. I had the idea for a while because it wasn’t super hard to see what he needed. The problem with the AAC is the symbol system. What it does is what he struggles with. If this is your first time reading me, I guess I’m a Forward Deployed AI engineer? There are people who work for me who describe themselves as AI engineers, at least. I don’t really think of myself in those terms, but that’s probably close enough for your understanding.\nA traditional AAC was way too abstract. My son has no clue that a red octagon means stop. He has no idea what stop even means in that context. Likewise for the arrows or the other really small stick figures. So I sat down, vibe-coded a cheap website in two hours with some basic navigation and made a few hundred words of vocabulary in chatgpt images where all the images looked like him doing various things, or his actual stuff. And I did all of this in his favorite animation style from his favorite shows. I cloned my voice because I’m the person he listens to the most often, and I made it so that when he pressed the buttons they all said the word or phrase in my voice. I laid out the words in what I figured would be a way that makes sense to him.\nWe had touch screen laptop so I just loaded the website on there and showed it to him.\nWhat I Made\nHe was immediately obsessed. This wasn’t just a symbol system to him. It was his own actual life, like a story book or one of his favorite cartoons, laid out in front of him. He recognized himself in all of the images without effort. There wasn’t a picture of a cheese bagel, there was a picture of his cheese bagel. Not a generic picture of a toy, but a specific picture of his toy. He kept pressing the picture of my father over and over again. Then he said the longest sentence he has ever said, which was: “I really love you a lot.”\nMy dad says this to him all the time.\nThere was a lot of looking at the ceiling and swallowing at that one.\nWe took pictures of all his food and explained that the picture with his hand outstretched means “I want” and showed him how to get to the food list. For four years, I haven’t been able to figure out what this boy wants to eat and then suddenly it was trivial. “I want orange” “I want peanut butter crackers” “I want French toast sticks.” What toy has him so upset? Click the picture and it’s just done. These are such small-seeming but major victories it made me legitimately pissed at myself for not doing it before. We have laminated flash cards we even have photo albums, but nothing prior to this that was made specifically to catch his attention. In product terms, I built the product around him. He needed to be able to tell me to smoosh my head against his head, so I made a tile he could press that says, “I need head pressure.”\nThen I got mad about the whole state of the field. I promise there’s lots of joy at progress, as well, but then a lot of anger. Probably all misplaced as people who work with disabled children are all sweethearts, but I found myself getting grumpy. You know these things don’t even come with metrics? Well one does, but it’s almost no information. You can’t even see if your kid is getting better over time. Or how often they press which buttons or when. And when you ask if any of them have a teaching mode, nope. Not a single one. Again, they’re for people who basically already know how to talk. And you find fights over things that help nobody, like about how vocabulary shouldn’t be gated off based on ability, and then you get extremely mad because a mom who is exhausted trying to get her child to eat would love to a have a menu that would just solve that problem right away especially if that’s as far as the child’s language ever develops.\nSo, I built in metrics and a teaching mode and over two weeks his ability to recognize and spot a tile from a word more than doubled. Then I put it on a schedule so he hears a song play and goes over and plays his matching game or listens to it give him a slide show. It asks him every forty five minutes if he needs to go to the bathroom. When we drive to appointments I tap a few buttons on my cell phone and his tablet goes into teaching mode about stuff he’ll interact with at that appointment. If I want to ask him something and he’s not getting it, I type it my phone app and it appears on his screen using the symbols he’s familiar with like hieroglyphs. Suddenly he understands, because the place where he now funnels his attention has surfaced the meaning to him.\nAfter three weeks of this, he is an unhappy little boy. I mean, pissed. He’s super frustrated because he now has a voice and he’s not used to having a voice. Understanding has come with responsibilities. Suddenly his hungry or grumpy vibes aren’t good enough and his mother and I won’t spend time guessing with him and instead point at his tablet and repeatedly say “Tap to Talk!”\nHe is talking, by the way. Much more than before. Maybe five times as much, so way more than his baseline. Not only will he press the button for pretzels but add in, “I like that” with his own voice. Not only will he press orange but add in that an orange is “yummy.” Last week at the hardware store the cashier gave him a piece of candy and he said “thank you so much” with his own voice.\nWhat I’m Doing Now\nMy job, as I see it, is to not get emotional about this and keep pushing in the direction of goodness. If there’s anything I can make this thing do that would help some other parent out there, I will make it do that thing. I can’t be the only parent who would really benefit from having a song and slide show playing for their kid about the benefit of eating more foods. We made a few very quick things like this for my son about how it would be great if he didn’t just eat the same things over and over again. So, in the app, he suddenly hears his dad’s voice introducing him to a song that’s all about eating other foods while he looks at pictures of himself trying out other foods.\nMy son ate a waffle last week. I felt like Rocky at the end of the first movie when he realizes he’s beat Apollo Creed but can’t quite believe it. I have tried everything to get this child to eat more foods including “laying down the law” which has never worked and has only ever approximated trying to give medicine to a cat.\nNow I’m figuring out what else to build and how to make this work for other families and I’m going as fast as I can with the limited time I have. To make this actually work across multiple kids and families, for instance, I needed to create a taxonomy of the most common words and phrases that a child acquires over time. Complicated story here but basically I needed a scaffolding I could put into context so when someone is just snapping pictures around their house I can file them into a consistent placement so that all the automation will still work. The parent experience should be they tell me their child’s favorite color and click on an animation style their child likes, maybe they read a script for 30 seconds, and upload a few photos, and then the board just fills itself out. It’s a bit of a headache, but I’m taking the complexity on myself so that when an exhausted mom with four kids hanging off her downloads this app, she has the mental energy to set this up in under ten minutes. Likewise for the routine stuff. I want a parent to be able to upload a couple photos and then I start collecting data and steer the ship from there. This has required me to figure out workable answers to questions like “what does mastery of a topic look like quantitatively?” and “how does that change across different ability cohorts?” For instance, my son has low joint attention. If I have his attention in a given session, he will answer all or most of the questions correctly. If I don’t have his attention, he will press buttons randomly until the test stops. This would take me too long for launch, like a month, but I’ll eventually build in the thing I’m building at my day job —we are in the last stretch before production go live, so that’s why I’m so busy— where a parent can just chat with it naturally and I can start having it adjust the user interface in real time.\nHis speech therapy clinic wants to use it for other kids, as does his school. I made zero solicitations, so that’s what I meant about accidentally starting a small business. I made it specifically for my son and then, obviously in retrospect, every single other parent with a child like mine, or professional who works with a child like mine, wanted the same thing. There’s lots of paper shuffling to do on my end, for instance I can’t call it a medical device or an AAC, and will only be able to put it in a marketplace with a straightforward description of what it does.\nThe AAC devices I described above can be expensive —if you get your own hardware directly from the supplier, it can be over seven thousand dollars, but if you have an iPad already you can get a subscription for a reasonable pric"}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;
const statsEl=document.getElementById("stats");
sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");
sections.forEach((s,i)=>{const a=document.createElement("a");a.href="#sec-"+i;
  a.innerHTML=escapeHtml(s.label)+'<span class="c">'+s.items.length+'</span>';navEl.appendChild(a);});
const mainEl=document.getElementById("main");
sections.forEach((s,i)=>{
  const sec=document.createElement("section");sec.className="block";sec.id="sec-"+i;
  const head=document.createElement("div");head.className="sec-head";
  head.innerHTML='<span class="sec-dot" style="background:'+s.color+'"></span><h2>'+escapeHtml(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span>';
  sec.appendChild(head);
  const grid=document.createElement("div");grid.className="grid";
  s.items.forEach(it=>{
    const card=document.createElement("article");card.className="card";card.style.setProperty("--accent",s.color);
    const time=toBeijingHuman(it.publishedAt,ref,it.exact);const url=it.url||"#";
    card.innerHTML='<div class="top"><span class="seq">'+it.seq+'</span><span class="time">'+time+'</span></div>'+
      '<h3>'+escapeHtml(it.title)+'</h3><span class="chip">'+escapeHtml(it.source)+'</span>'+
      '<p class="summary">'+escapeHtml(it.summary)+'</p>'+
      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });
    const rm = card.querySelector(".readmore");
    rm.addEventListener("click", function(e){ e.stopPropagation(); });
    grid.appendChild(card);
  });
  sec.appendChild(grid);mainEl.appendChild(sec);
});
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=content.split(/\n{1,}/).map(function(p){p=p.trim();return p?'<p>'+escapeHtml(p)+'</p>':'';}).join("");
  }else{
    body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
