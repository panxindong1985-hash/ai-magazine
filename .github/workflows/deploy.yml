name: 部署 AI资讯杂志

on:
  push:                     # 推送即部署（含本文件的本次推送也会触发）
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00，每日自动更新
  workflow_dispatch:       # 也支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install trafilatura

      - name: Generate / update archive
        run: python generate_archive.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
