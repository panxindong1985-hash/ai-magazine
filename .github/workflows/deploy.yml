name: 部署 AI资讯杂志

on:
  push:
  schedule:
    # 每 2 小时一次（北京时间 02/04/06/08/10/12/14/16/18/20/22/00 的 :07 分）。
    # 关键背景：GitHub Actions 定时任务跑在共享基础设施上，实测常延迟 6–9 小时甚至被跳过；
    # 高频触发可自愈，配合 generate_archive.py 内置的「近 10 天缺口补抓」，保证不漏任何一天。
    - cron: '7 */2 * * *'
  workflow_dispatch:       # 也支持手动触发（Actions 页面 → Run workflow），用于即时补抓/重部署

permissions:
  contents: write
  pages: write
  id-token: write

# push 与 schedule 用不同并发组，且取消在途任务 = false：
# 避免一次 push（很快）把正在跑的 schedule 抓取取消掉，从而导致当天漏抓。
concurrency:
  group: ai-magazine-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 防御：即使翻译端点异常，也最多跑 30 分钟，避免占满超时拖死更新
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install trafilatura

      # 记录抓取前的期数，用于判断本次是否真正「新增了日期」
      - name: 记录抓取前期数
        id: before
        run: echo "count=$(python -c "import json;print(len(json.load(open('archive.json'))))")" >> "$GITHUB_OUTPUT"

      # 统一跑完整模式（增量抓取：已生成的天跳过，只补最近缺失的天；自动翻译+排版+渲染）。
      # push 也走完整模式 -> 任何时候推送代码都会顺带自愈补抓缺失的最近几天。
      - name: Generate / update archive
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python generate_archive.py

      # 仅当「真正新增了日期」才提交并回推，避免渲染时间戳变化导致的无限循环：
      # 新增当天 -> 提交一次 -> 触发的新一轮 run 看到日期已存在 -> 期数不变 -> 跳过提交 -> 循环自然终止。
      - name: 统计新增期数并提交（如有）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          AFTER=$(python -c "import json;print(len(json.load(open('archive.json'))))")
          echo "before=${{ steps.before.outputs.count }} after=$AFTER"
          if [ "$AFTER" -gt "${{ steps.before.outputs.count }}" ]; then
            git pull --rebase --autostash
            git add archive.json index.html ai-daily.html "ai-daily-*.html" ratings_cache.json
            git commit -m "chore: 自动同步 AI HOT 日报（$(date -u +%Y-%m-%dT%H:%M:%SZ)）"
            git push
          else
            echo "无新增日期，跳过提交"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
