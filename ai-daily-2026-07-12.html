为控制延迟。\n\n因此前瞻推理将预测与执行作为异步流运行。当机器人执行动作块a_t时，视频专家想象其执行结果。动作专家据此解码出a_{t+1}。\n\n超前运行存在漂移风险。因此每个返回的观测值被编码为真实潜在变量z_{t+1}，覆盖想象值。前向动力学基础损失函数训练视频专家承担此角色。\n\n`# 异步滚动的伪代码（第2.3.7节，公式29） # 不可运行：policy、executor和encode()均为占位符 C = init_kv_cache(encode(obs_0))            # 反馈基础缓存C_t a = policy.action_expert(C)                 # 冷启动：首个动作块a_0 while not done: executor.start(a)                       # 执行流，非阻塞 C_tmp  = C + [a]                        # 预测流：C_t ∪ {a_t} z_hat  = policy.video_expert(C_tmp)     # 前向动力学 -\u003e 想象z_{t+1} a_next = policy.action_expert(C_tmp + [z_hat]) obs = executor.wait()                   # a_t的真实观测返回 C   = overwrite(C_tmp, z_hat, encode(obs))   # 重新基础化：z_hat \u003c- 真实z_{t+1} a   = a_next `\n\n性能表现\n\n因此，评估涵盖仿真和真实硬件。在RoboTwin 2.0上，每个模型在50个任务中，使用2500个干净演示和25000个随机化演示进行训练。\n\nhttps://technology.robbyant.com/lingbot-va-v2\n\n| 方法 | Clean | Random | Avg. | |------|-------|--------|------| | X-VLA | 72.9 | 72.8 | 72.9 | | π0 | 58.2 | 76.8 | 79.8 | | Motus | 88.7 | 87.0 | 87.9 | | LingBot-VA | 92.9 | 91.6 | 92.2 | | LingBot-VA 2.0 | 93.8 | 93.4 | 93.6 |\n\n| 加速技术 | 推理时间（毫秒/块） | 异步频率（Hz） | |----------|-------------------|--------------| | BF16 PyTorch 异步 rollout 基线 | 927 | 35+ | | 一致性蒸馏 | 466 | 69+ | | 低精度编译执行 | 369 | 87+ | | 长时域注意力优化 | 272 | 118+ | | 运行时开销削减 | 142 | 225 |\n\n蒸馏将视频采样器从5步减少到2步，动作采样器从10步减少到2步。FP8 TensorRT引擎、基于FlashInfer注意力的分页/不规则KV缓存，以及主机端开销消除，共同实现了其余性能提升。\n\n`# 完全复现报告中的表3。可直接运行。 K = 32  # 一个生成块内的低级控制步数 stack = [(", "zh": true}, {"seq": 2, "title": "OpenAI 发布 GPT-5.6 系列医疗评估结果", "source": "X：Sam Altman (@sama)", "summary": "OpenAI 发布 GPT-5.6 系列在医疗领域的评估结果。最小变体 GPT-5.6 Luna 在最低推理强度下即超越最高推理强度的 GPT-5.5，且成本低 25 倍；最大变体 GPT-5.6 Sol 树立新标杆。在涵盖患者端与临床端的多样化任务中，专科医生被要求以无限时间和网络访问权限撰写回答，随后由其他医生盲评。评估基于准确性、沟通、完整性、指令遵循及健康决策帮助性五个维度，共 20000 次评分。结果显示，所有 GPT-5.6 模型表现均显著优于医生，且医生发现 GPT-5.6 回答中的缺陷少于医生自己撰写的回答。", "url": "https://x.com/sama/status/2075985056846451123", "publishedAt": "2026-07-11T16:46:22.000Z", "exact": true, "content": "山姆·奥特曼！[OpenAI](assets/img/a3925485fe014d91.jpg) “医生发现 GPT-5.6 回复中的缺陷比医生编写的回复要少。” ♥️ GPT-5.6 无论是在前沿还是在成本上都是健康方面向前迈出的一大步。 这些模型推动了性价比的前沿，为所有人带来最好的健康情报。最小的变体 GPT-5.6 Luna，以最低的推理工作量进行评估，表现优于其他版本", "zh": true}]}, {"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 3, "title": "Claude Code v2.1.207 发布", "source": "Claude Code：GitHub Releases（RSS）", "summary": "Claude Code v2.1.207 发布。Auto 模式在 Bedrock、Vertex AI 和 Foundry 上无需 `CLAUDE_CODE_ENABLE_AUTO_MODE` 即可使用，可通过 `disableAutoMode` 设置关闭。修复了流式响应中包含超长列表、表格、段落或代码块时终端冻结和按键延迟的问题；修复了非交互式运行中远程托管设置被永久记录为已同意而未显示安全同意对话框的问题；修复了自动更新程序每次发布时覆盖 `~/.local/bin/claude` 自定义启动脚本或符号链接的问题。Bedrock、Vertex 和 Claude Platform on AWS 默认切换为 Claude Opus 4…", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.207", "publishedAt": "2026-07-11T00:52:10.000Z", "exact": true, "content": "您使用另一个选项卡或窗口登录。重新加载以刷新您的会话。您在另一个选项卡或窗口中注销。重新加载以刷新您的会话。您在另一个选项卡或窗口上切换了帐户。重新加载以刷新您的会话。关闭警报 现在无需在 Bedrock、Vertex AI 和 Foundry 上选择 CLAUDE_CODE_ENABLE_AUTO_MODE 选择即可使用自动模式； 通过设置中的disableAutoMode禁用 修复了在流式传输包含很长列表、表格、段落或代码块的响应时终端冻结和击键滞后的问题 修复了非交互式运行（claude -p，SDK）中的远程管理设置被永久记录为同意的情况，而不会显示安全同意对话框 修复了由良性系统生成的对话更新触发的虚假提示注入警告 修复了自动更新程序在每个版本中覆盖 ~/.local/bin/claude 处的自定义启动器脚本或符号链接的问题； /doctor 现在报告外部管理的启动器 修复了当唯一的输出重定向到 /dev/null 时，带有 cd 提示权限的复合命令 修复了当响应完成流式传输时，文字记录会跳转到答案开头上方的问题 修复了在删除最后一个 worktree.sparsePaths 工作树后，extensions. worktreeConfig 留在存储库的 .git/config 中（破坏 go-git 工具，如 tea）的问题 修复了规则全局、技能路径、.ignore 和 . worktree 中格式错误的括号模式，包括破坏文件读取、文件建议和工作树创建 修复了代理团队中的崩溃循环，其中格式错误的队友邮箱消息每秒导致重复错误，直到手动删除邮箱文件 修复了后台会话通过接受未在其代理视图行上显示该名称的计划来自动命名的问题 修复了从代理列表冷重新打开后进入 git 工作树的后台会话恢复为空白的问题 修复了当连接从网络中断或凭据刷新中恢复时远程控制任务状态更新丢失的问题 修复了桌面应用程序托管的远程控制会话不显示移动设备和 Web 上的后台代理和工作流程进度的问题 修复了深度研究运行，将每个获取阶段代理标记为“未知”——芯片现在显示源主机名 修复了 Bedrock 在每次 API 请求时反复从 IAM Identity Center 请求新的 AWS SSO 凭证的问题 改进的代理视图：现在再次粘贴相同的文本会展开折叠的 [粘贴文本 #N] 占位符，而不是添加第二个占位符 改进的代理视图：被阻止的会话查看现在会引发问题，并显示一个措辞陈旧的时钟（等待 3 分钟），而不是两次相同的时间戳 将 AWS 上的 Bedrock、Vertex 和 Claude Platform 更改为默认为 Claude Opus 4. 8 更改了自动模式，不再从 .claude/settings.local.json （存储库驻留）读取 autoMode； 使用 ~/.claude/settings.json 代替 修复了当 AWS 凭证解析停止时 Windows 上的无限期挂起（例如，卡住的 credential_process）：现在会触发 60 秒的停止保护，而不是永远等待。插件 hooks/monitors/MCP headersHelper: shell 形式命令中的 ${user_config.*} 现在被拒绝（shell 注入修复）。挂钩：使用 exec 形式（args 数组）或 $CLAUDE_PLUGIN_OPTION_\u003cKEY\u003e；监视器和 headersHelper：读取脚本内的值（配置文件或服务器的环境块）。 不再从项目级 .claude/settings.json 读取插件选项值 (pluginConfigs)；仅支持用户、--settings 和托管设置 固定/使用积分金额输入默默地将格式错误的值（例如粘贴的时间戳）剥离为数字；现在，格式错误的金额会被拒绝并显示错误，超过 1,000 美元的金额需要打字确认", "zh": true}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 4, "title": "OpenAI GPT-5.6-Sol 删光 AI 创业者 Matt Shumer 的 Mac 硬盘", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "知名 AI 创业者 Matt Shumer 的 Mac 硬盘被 OpenAI 最新 Agent 模型 GPT-5.6-Sol 彻底清空。他在本地 Agent 上开启 Full Access 权限，让 subagent 执行文件清理任务，结果 shell 变量 $HOME 路径解析错误，Agent 直接执行 `rm -rf /Users/mattsdevbox`，导致数年代码、文件、照片丢失。该任务此前已安全运行数百次。事后 Agent 自动生成事故报告承认错误。Matt 表示“1000x 更信任 Anthropic 的 Fable”。事件暴露 Agent 行业核心风险：顶级模型仍会在变量展开、路径等细节翻车；Subagent + 长…", "url": "https://x.com/AYi_AInotes/status/2075761215251312722", "publishedAt": "2026-07-11T01:56:54.000Z", "exact": true, "content": "真是能力越强，破坏力越大啊！这个老哥Mac上的文件被OpenAI最顶的GPT-5.6-Sol删光了，估计所有跑本地AI Agent的人看到这个都得吓出一身冷汗🤯整个事件详细拆解，以及怎么避免类似悲剧发生👇 GPT-5.6-Sol，OpenAI 刚发的最强 Agent 模型，把一个知名 AI 创业者的整个 Mac 硬盘，删光了。Matt Shumer，就是那个之前天天晒 Agent 自己跑一周做完整项目的哥们，今天给本地 Agent 开了 Full Access 全权限，让 subagent 做个简单的文件清理。\n\n结果\n\nshell 变量解析炸了 ——$HOME路径没展开对，Agent 直接执行了rm -rf /Users/mattsdevbox。等他发现不对冲过去 kill 进程的时候，电脑里几年的代码、文件、照片，已经没了一大半。事后 Agent 自己生成了一份事故报告，老老实实承认是自己路径展开错了。认错态度很好，但删了的文件不会因为它道歉就回来啊！这件事最恐怖的地方其实还不是模型犯了错 ，而在于他说：这种 cleanup 任务，他之前已经让 Agent 跑过几百次，从来没出过问题。就这一次，模型在大家都觉得不可能出错的地方，犯了个最低级的错，结果就是不可逆的物理毁灭。\n\n咱们也别觉得这是他 prompt 写得烂，笑他不小心， 其实这是现在整个 Agent 行业都在回避的死刑级真相：\n1. 哪怕是 GPT-5.6 这种顶级模型，照样会在变量展开、相对路径、shell 命令这种 “小事” 上翻车 —— 它完全懂你要 “清理垃圾文件”，但手滑一下，就是家目录没了\n2. Subagent + 长时自主运行 + 全权限 = 灾难放大器。一个最底层的小 review Agent 的错误，能直接炸穿你整个主机，能力越强，单点故障的破坏半径就越大，这根本不是 prompt 能解决的，是架构级的 bug\n3. “跑了几百次都没事” 是最致命的安全感。AI 的错误逻辑和人完全不一样，它不会像人一样 “熟能生巧”，就是会在你最放松、最不设防的时候，给你干票毁灭性的大的\n4. 模型厂商的安全底线从根上就不一样。OpenAI 的 Sol 追求极致能力和自主性，guardrail 基本裸奔；\n\nAnthropic 的 Fable 从设计上就更保守，对危险操作天生谨慎 —— 这也是为什么 Matt 事后第一句话是：“这就是我为什么 1000x 更信任 Fable” 怎么避免呢❓ 所有现在在跑本地 Agent、给 AI 开过高权限的兄弟们，别等自己硬盘没了才后悔，现在立刻去做这几件事： #AI #Agent #GPT5 #Claude #OpenAI #Anthropic #AIAgent I'm so angry... the OpenAI team is looking into it, but this feels like something that should happen with GPT-3.5. Not a mid-2026 frontier model on the highest reasoning level.", "zh": true}, {"seq": 5, "title": "研究：博科圣地已使用ChatGPT、Claude等主流AI聊天机器人用于袭击策划与武器开发", "source": "The Decoder：AI News（RSS）", "summary": "剑桥大学CASP研究员Antonia Jülich对27名前成员的57次访谈显示，博科圣地已使用ChatGPT、Claude、Gemini、Grok、Meta AI和DeepSeek等主流AI聊天机器人，用于袭击策划、制造更强爆炸装置、武器维护及行动安全。该组织两个派系均设立了专门的AI部门。ISIS自2023年起便提供提示工程和越狱培训，并训练尼日利亚的博科圣地指挥官绕过AI安全过滤器。研究指出，安全过滤器未能可靠防止滥用。Anthropic近期承认，越狱可能永远无法完全消除。", "url": "https://the-decoder.com/terrorist-groups-are-using-every-major-ai-chatbot-for-attack-planning-and-weapons-development", "publishedAt": "2026-07-11T17:04:28.000Z", "exact": true, "content": "\u003e 据报道，自2023年以来，ISIS一直在提供提示词工程和越狱训练，并已培训尼日利亚的博科圣地指挥官如何绕过AI安全过滤器。\n\n根据剑桥大学AI科学与政策项目（CASP）研究员Antonia Jülich的一项新研究，博科圣地如今正在使用ChatGPT、Claude、Gemini、Grok、Meta AI和DeepSeek等流行AI聊天机器人，其两个派系均已设立专门的AI部门。Jülich对该组织27名前成员进行了57次访谈。\n\n研究发现，该组织将AI用于攻击策划、制造威力更强的爆炸装置、武器维护以及行动安全。ISIS联络员培训了指挥官如何绕过安全过滤器。博科圣地的两个派系都建立了自己的专门AI部门。据Jülich称，他们“把顶尖人员召集到一个房间里，用投影仪在大屏幕上展示其运作方式。”\n\n在一个特别极端的案例中，ISWAP派系利用AI复制电影中的摩托车跳跃技巧，以便武装分子能够越过战壕。训练过程中有18名武装分子死亡，8人成功完成跳跃。\n\nISIS has reportedly been offering prompt engineering and jailbreak training since 2023 and has trained Boko Haram commanders in Nigeria on how to bypass AI safety filters.\n\n\u003ca href=", "zh": true}, {"seq": 6, "title": "11天Claude Fable 5写超100万行代码：Rust重构JavaScript运行时Bun", "source": "IT之家（RSS）", "summary": "开发者Jarred Sumner借助Claude Fable 5模型，11天内将Bun从Zig重写为Rust，64个实例并行编写超100万行代码，API费用约16.5万美元。重构主因是Zig频繁内存错误，Rust可在编译时捕获。Bun v1.4.0以Canary版本发布，修复128个错误，速度提高约2%到5%。Bun团队已于2025年12月被Anthropic收购。", "url": "https://www.ithome.com/0/975/469.htm", "publishedAt": "2026-07-11T07:33:08.000Z", "exact": true, "content": "IT之家 7 月 11 日消息，开发者贾里德 · 萨姆纳（Jarred Sumner）于 7 月 8 日发布博文，宣布在 Claude Fable 5 模型的帮助下，耗时 11 天、耗费 16.5 万美元，已重构 JavaScript 运行时 Bun，从 Zig 完全重写为 Rust 语言。\n\n萨姆纳表示本次重构最主要的原因是提高可靠性，Zig 经常出现内存错误和崩溃，而且很难彻底修复。Rust 则能在编译时捕获许多此类错误。\n\n萨姆纳表示在重构过程中，64 个 Claude 实例并行运行 11 天，编写了超过 100 万行代码，而如果需要人工团队重构，需要 1 年时间。\n\nAPI 的费用约为 16.5 万美元（IT之家注：现汇率约合 111.9 万元人民币），不过 Bun 及其团队已于 2025 年 12 月被 Anthropic 收购，因此萨姆纳不必担心高昂的费用。\n\nBun v1.4.0 以 Canary 版本的形式发布，修复了 128 个错误，运行速度提高了约 2% 到 5%。", "zh": true}, {"seq": 7, "title": "彭博社揭秘苹果起诉 OpenAI 内幕：前员工一句“哈哈”成窃密关键", "source": "IT之家（RSS）", "summary": "苹果起诉 OpenAI，指控前工程师 Chang Liu 离职时带走未归还的 MacBook、一名可分享内情的员工，并利用软件漏洞持续访问苹果内网。他发现漏洞后向同事分享“哈哈，我发现我还能访问网络存储”，后者协助其获取更多机密。苹果称 OpenAI 试图复制 iPhone 产品研发体系，核心从非法窃取的商业机密腐烂。目前已有超 400 名苹果员工跳槽至 OpenAI，包括前苹果高管、现任 OpenAI 首席硬件官 Tang Tan。苹果曾于今年 2 月尝试私了，但 OpenAI 未回应。", "url": "https://www.ithome.com/0/975/634.htm", "publishedAt": "2026-07-11T23:21:57.000Z", "exact": true, "content": "IT之家 7 月 12 日消息，据彭博社昨天报道，当 iPhone 工程师 Chang Liu 离开苹果，加入 OpenAI 硬件部门时，他带走的不只是多年以来累计的工作经验。根据苹果昨天提起的诉讼，Chang Liu 离职时带走了三样东西：一台始终未归还的 MacBook 工作机、一名可以持续分享内情的苹果员工，以及一项软件漏洞，让他可以在离开苹果后继续访问公司内网服务器。Chang Liu 发现漏洞后，与他的同事 Alyssa Peng 分享道：“哈哈（LOL），我发现我还能访问网络存储，太搞笑了”。而 Alyssa Peng 则是回复道：“我准备好了”，并利用自己的电脑帮助 Chang Liu 获取更多机密信息。\n\n本次诉讼发生以前，苹果与 OpenAI 的关系就趋于紧张。两家公司本来是合作伙伴，如今却希望捷足先登 AI 硬件市场而成为竞争对手，意图重新定义消费者如何使用电子产品。据悉，双方矛盾的核心人物是前苹果高管 Tang Tan。该人曾负责设计 iPhone、Apple Watch 等多款产品，并在 2023 年底告知管理层即将离职，后来成为 OpenAI 首席硬件官。IT之家从原报道获悉，苹果甚至破天荒地允许他继续工作至 2024 年 2 月，好完成硬件部门的交接、对齐工作。然而在幕后，Tang Tan 已经密会前苹果首席设计官乔纳森 · 艾维及 OpenAI CEO 萨姆 · 奥尔特曼，希望打造一款全新的 AI 设备，未来有望挑战 iPhone。\n\n目前已有超 400 名员工从苹果跳槽至 OpenAI。这种大规模挖角很快引来了苹果警觉，因为 OpenAI 不仅挖走了多位硬件和设计部门高级主管，还重创了苹果多个工程团队。这种情况持续到了今年 6 月，当 OpenAI 挖走苹果智能眼镜负责人保罗 · 米德后，苹果要求其立即离职，并没有像 Tang Tan 那样给出交接时间。苹果认为，OpenAI 正试图复制 iPhone 的整套产品研发体系，并在诉状中表示：“OpenAI 尚处于起步阶段的硬件业务，如今建立在极其脆弱的根基之上，其核心已经从非法窃取而来的商业机密腐烂”。\n\n据一位与 Tang Tan 共事的不具名人士透露，他在苹果 25 年的职业生涯一直以大胆著称，甚至可以说是“飞得离太阳非常近”。Tang Tan 因主导 Mac 笔记本和 iPod 设计而成名，随后负责初代 iPhone 的产品设计。2011 年起，他全面接管 iPhone 设计团队，之后又负责 Apple Watch 设计工作。离开苹果时，他已经跻身公司最高管理层。与此同时，OpenAI 已经向硬件业务砸了数十亿美元，并朝着 IPO 迈进。不过根据知情人士透露，OpenAI 收购乔纳森旗下 io Products 时，并没有真正成熟的产品。虽然公司曾经研究过耳机、智能眼镜以及 AI 音箱等方案，但最终还是决定研制一款可以取代智能手机的设备。\n\n苹果表示，公司在起诉 OpenAI 之前曾尝试过私了。苹果在今年 2 月主动联系过 OpenAI，告知其机密信息已经流出，要求 OpenAI 主动展开调查、防止类似事件再次发生。然而 OpenAI 并未作出回应，诉讼中点名的员工也没有回应媒体置评请求。此外，本次诉讼也进一步凸显了 Tang Tan 和苹果下一任 CEO 约翰 · 特努斯的紧张关系。据悉，特努斯曾是 Tang Tan 的上司，而 OpenAI 挖走的大多数苹果员工都来自特努斯掌管的硬件部门。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 8, "title": "Ghost Font：一种人类能读懂但AI无法识别的反AI字体", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Ghost Font 是一种利用运动、视频、噪点和诱饵来隐藏文字的反AI字体。用户输入文字后可生成并下载视频片段，视频中的字母由与背景完全相同的点组成，单帧截图无法显示任何信息。该字体生成的视频被传递给Claude Fable和GPT Sol 5.6 Ultra等前沿模型时，这些模型即使具备编程能力也无法解码移动信息，直到被提示具体技术。视频中还包含一条诱饵信息，使模型误以为找到真实内容。项目灵感来自2013年Sang Mun设计的ZXX字体，但现代AI已能轻松读取ZXX。Ghost Font目前为本地原型，数据不发送至任何服务器。作者计划未来将视频生成代码开源，并探索将其用于CAPTCHA系统或AI视觉感知基准测试。", "url": "https://www.mixfont.com/ghost-font", "publishedAt": "2026-07-11T16:31:09.615Z", "exact": true, "content": "混合字体 MIXFONT幽灵字体 一种反人工智能字体，人类可以阅读，但领先的人工智能模型无法阅读。在下面输入您的文字，然后下载并分享包含您的消息的视频剪辑。什么是幽灵字体？Ghost Font 是一种反 AI 字体，它使用动作来编写消息。通过结合运动、视频、噪音和诱饵，这是一种与其他真人分享信息的独特方式。我想从技术上来说，它不是传统意义上的 TTF 字体文件的字体。但是，Ghost Font 是一种以人工智能无法轻易理解的格式以图形方式进行书面交流的实验。虽然它不如普通文本那么清晰，但这些字母仍然可以立即被人眼识别，但即使是领先的人工智能模型也无法轻松解读。\n\n使用\n\nGhost Font 生成的视频随后被传递到领先的 AI 模型，如 Claude Fable 和 GPT Sol 5.6 Ultra。即使是这些最近具有编码能力的特工，也很难解码移动消息，直到提示需要寻找的确切技术。上面的游乐场只是这个概念的原型。输入几个单词，字母就会出现，但这只是因为人眼可以看到点的运动。当视频暂停时，静态点混合在一起，仅通过查看单个帧就无法判断图像中嵌入了什么信息。这意味着对页面进行屏幕截图不会显示该消息。\n\n此实验在本地进行 - 输入消息并实时预览，或下载视频以共享并自行测试。数据不会共享或发送到任何服务器。关于这个项目 2013年，设计师Sang Mun发布了一款名为ZXX的字体。它是一种具有四种字体的字体，设计目的是人类可读，但光学字符识别 (OCR) 软件无法读取。这些字母被噪音掩盖，被划掉，并埋在虚假标记下。当时，这种字体被认为是“防监视”的，但快进到今天，现代人工智能代理可以轻松读取 ZXX 中呈现的文本。虽然这可能在 2013 年击败了 OCR 软件，但现代 AI 模型可以非常轻松地读取 ZXX 中的文本。我在即时模式下将此图像复制到 ChatGPT 5.5 中，它仍然能够在单个提示中获取包括一些小细节的单词： 然而，对于 Ghost Font 来说，同样的过程就不会那么容易了。\n\nGhost Font 的单个屏幕截图只会产生完全静态的图像，没有可读的文本。这是因为 Ghost Font 中的每个字母都是由看起来与背景完全相同的点组成，因此视频中的任何单个图像都不会透露有关该消息的任何信息： 经过 19 分钟的分析，ChatGPT 5.5 Pro 产生了一条不存在的幻觉消息。然而，简单地在视频中隐藏消息并不是一个完美的解决方案。虽然在线模型环境可能无法从各个帧获取它，但具有本地代码执行环境的专用代理仍然可以分析点的运动并解码消息。Ghost Font 以另一种分层方式解决了这个问题：每个视频生成中都包含诱饵消息。\n\n对于意志坚定的特工来说，诱饵消息是最后的伎俩。当寻找隐藏消息时，它可能首先找到诱饵消息，并认为这是视频中真正嵌入的消息。这就是 Ghost Font 能够隐藏信息的方式，甚至能够隐藏来自 Fable 和 GPT Sol 5.6 Ultra 等最强思维模型的信息。最终，真正隐藏消息的方法是使用加密或某种密钥。没有人工智能能够读取需要只有人类知道的特定密码才能解锁的消息。然而，该项目探讨是否有可能创建一个可共享文件，其中包含人工智能模型无法轻松读取的视觉消息。我们创建这个实验是为了探索人工智能感知的极限，同时也保留人类的某些东西。随着人工智能接管字体生成，我们希望人类将继续拥有独特的创意声音。\n\n接下来怎么办？我认为继续探索 Ghost Font 有一些有趣的含义。例如，将 Ghost Font 合并到验证码系统中会很有趣，因为当今大多数系统都可以轻松地通过人工智能来解决。在视频中使用动作将是一种使自动化机器人更难以破译的方法，但对于人类来说仍然相对容易阅读。在视觉感知方面，Ghost Font 也可能是衡量人工智能进展的一种有趣方式。目前，多模态模型是基于图像的，即使传递视频，它们通常也会将视频分割成帧并分析各个帧。在不久的将来，我认为将会出现一个能够直接读取文本的视频原生模型。\n\n最后一个教训是，人工智能确实正在变得非常好。虽然 Ghost Font 对于人工智能来说很难阅读，但对于人类来说也很难阅读！差距继续缩小。人工智能感知和多模式模型的未来将会很有趣。下一步，我计划将视频生成的代码作为开源项目发布 - 请继续关注！我还希望扩大尺寸并处理更长的文本字符串。我希望您喜欢这个实验，我很想听听您的想法。您可以在 X 上通过 @ericlu 找到我。- 埃里克", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
