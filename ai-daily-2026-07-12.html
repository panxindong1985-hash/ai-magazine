<script>
const DATA = {"meta": {"reportDate": "2026-07-12", "reportDateHuman": "2026年7月12日", "weekday": "星期日", "total": 8, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "模型发布/更新", "color": "#4f46e5", "items": [{"seq": 1, "title": "蚂蚁集团 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型", "source": "MarkTechPost（RSS）", "summary": "蚂蚁集团旗下具身智能团队 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型。该模型采用因果 …", "url": "https://www.marktechpost.com/2026/07/11/ant-groups-robbyant-unveils-lingbot-va-2-0", "publishedAt": "2026-07-11T07:56:11.000Z", "exact": true, "content": "Robbyant, the embodied AI unit inside Ant Group, has released the LingBot-VA 2.0.The first embodied-native foundation model. It describes a video-action foundation model for generalist robot manipulation. The research team pretrains the whole stack for embodiment instead of fine-tuning a video generator.\nWhat is LingBot-VA 2.0?\nMost video-action models reuse two components built for digital content creation. One is a reconstruction-oriented VAE. The other is a bidirectional video-diffusion backbone, with an action module attached.\nThis creates three limitations. Pixel-reconstruction latents preserve appearance but carry limited physical structure. Iterative denoising over video tokens is too slow for closed-loop control. Generic video objectives never teach how actions reshape the world.\nA fourth mismatch is structural. Backbones use bidirectional attention, while control unfolds strictly forward in time. LingBot VA Version 1.0 finetuned that stack into a causal model. Version 2.0 pretrains a causal DiT natively.\nVersion 1: The Semantic Visual-Action Tokenizer\nBuilding on that motivation, stage one replaces the compression-only VAE. Following RepWAM, the tokenizer adds two objectives to reconstruction.\nSemantic alignment pulls visual latents toward a frozen Perception Encoder teacher. A latent-action objective extracts compact transition variables between consecutive latents. An inverse dynamics model predicts each latent action. A forward dynamics model decodes it into a transport map plus residual.\nWorld states and actions now share one latent space. Unlabeled web video therefore carries action-relevant supervision.\nVersion 2: A Causal DiT With a Sparse MoE Video Stream\nOn top of that space, version 2 pretrains a causal DiT. It keeps the Mixture-of-Transformers layout of version 1.0. A video expert and an action expert share one causal self-attention. Each owns a separate feed-forward pathway.\nThe two streams scale asymmetrically. The video expert replaces its dense FFN with a sparse MoE routed layer. That layer holds 128 routed SwiGLU experts, top-8 routing, one shared expert. Load balancing follows the auxiliary-loss-free Loss-Free Balancing strategy. The action expert keeps a dense FFN at hidden dimension 768.\nThe video backbone is roughly 13.0B parameters, about 1.9B active. With the action expert and MCP heads, training covers about 15.3B parameters. Roughly 2.5B activate per token at inference. Training uses a rectified-flow objective with a hybrid Muon plus AdamW optimizer.\nWhere the Training Signal Comes From\nBeyond architecture, two objectives shape what the model learns.\nMulti-chunk prediction (MCP) fixes myopic supervision. Teacher forcing supervises only the next chunk, so the model can cut loss by copying appearance. MCP attaches three lightweight modules predicting the next three chunks. In ablation it matched the baseline’s 45k-step accuracy in 20k steps, a 2.3x training speedup.\nMeanwhile, five objectives are co-trained rather than staged: T2I, T2V, TI2VA, ICL, and human-robot co-training. Sampling follows a coarse-to-fine schedule, from appearance grounding to video-action control. Keeping every objective alive avoids forgetting the earlier priors.\nHierarchical Planning\nChunk-level control cannot sequence long-horizon goals. Above the policy therefore sits a VLM planner, LoRA-finetuned with a frozen vision tower. It emits structured JSON: done, instruction, generation_instruction, local_scene_description. It runs at about 2 Hz behind an asynchronous shared buffer. The policy reads it at each chunk boundary, so planner latency never blocks execution.\nForesight Reasoning\nEven with a sparse backbone, deployment hits a serial bottleneck. If the robot waits, model latency becomes control latency.\nForesight Reasoning therefore runs prediction and execution as asynchronous streams. While the robot executes chunk a_t, the video expert imagines its outcome. The action expert decodes a_{t+1} from that.\nRunning ahead risks drift. So each returning observation is encoded into the true latent z_{t+1}, overwriting the imagined one. A forward-dynamics grounding loss trains the video expert for this role.\n# Pseudocode for the asynchronous rollout (Sec. 2.3.7, Eq. 29).\n# Not runnable: policy, executor and encode() are placeholders.\nC = init_kv_cache(encode(obs_0))            # feedback-grounded cache C_t\na = policy.action_expert(C)                 # cold start: first action chunk a_0\nwhile not done:\n    executor.start(a)                       # execution stream, non-blocking\n    C_tmp  = C + [a]                        # prediction stream: C_t u {a_t}\n    z_hat  = policy.video_expert(C_tmp)     # forward dynamics -\u003e imagined z_{t+1}\n    a_next = policy.action_expert(C_tmp + [z_hat])\n    obs = executor.wait()                   # real observation of a_t returns\n    C   = overwrite(C_tmp, z_hat, encode(obs))   # re-ground: z_hat \u003c- true z_{t+1}\n    a   = a_next\nPerformance\nConsequently, evaluation covers simulation and real hardware. On RoboTwin 2.0, every model trains on 2,500 clean plus 25,000 randomized demonstrations, across 50 tasks.\n| Method | Clean | Randomized | Avg. | \n| X-VLA | 72.9 | 72.8 | 72.9 | \n| π0.5 | 82.7 | 76.8 | 79.8 | \n| Motus | 88.7 | 87.0 | 87.9 | \n| LingBot-VA | 92.9 | 91.6 | 92.2 | \n| LingBot-VA 2.0 | 93.8 | 93.4 | 93.6 | \n| Acceleration technique | Inference time (ms/chunk) | Async Hz | \n| BF16 PyTorch async rollout baseline | 927 | 35 | \n| + Consistency distillation | 466 | 69 | \n| + Low-precision compiled execution | 369 | 87 | \n| + Long-horizon attention optimization | 272 | 118 | \n| + Runtime overhead reduction | 142 | 225 | \nDistillation cuts the video sampler from 5 steps to 2, and the action sampler from 10 to 2. FP8 TensorRT engines, a paged/ragged KV cache with FlashInfer attention, and host-side overhead removal supply the rest.\n# Reproduces Table 3 of the report exactly. Runnable as-is.\nK = 32  # low-level control steps inside one generated chunk\nstack = [(\"BF16 PyTorch async rollout baseline\", 927),\n         (\"+ Consistency distillation\",          466),\n         (\"+ Low-precision compiled execution\",  369),\n         (\"+ Long-horizon attention optimization\", 272),\n         (\"+ Runtime overhead reduction\",        142)]\nfor name, ms in stack:\n    print(f\"{name:40s} {ms:4d} ms  {round(1000 / ms * K):4d} Hz\")\nprint(\"end-to-end speedup:\", round(927 / 142, 1), \"x\")\nVersion 1.0 vs Version 2.0\n| Dimension | LingBot-VA | LingBot-VA 2.0 | \n| Tokenizer | Wan2.2 VAE (reconstruction) | Semantic visual-action tokenizer, 96 latent channels | \n| Backbone origin | Finetuned from a bidirectional generator | Causal DiT pretrained from scratch | \n| Video FFN | Dense | Sparse MoE, 128 experts, top-8 | \n| Extra supervision | Not used | MCP, in-context learning, human-robot co-training | \n| Inference | Async execution, KV cache | Foresight Reasoning with observation re-grounding | \n| Peak async control | Not reported in the version 2.0 report | 225 Hz | \nThe tokenizer ablation isolates row one. Swapping the WAN2.2 VAE for the semantic tokenizer lifts a 1.3B model from 78.0 to 86.6.\nUse Cases and Examples\nBeyond benchmarks, four deployment shapes stand out.\n- Few-shot onboarding: The report states the model adapts from 10 to 15 demonstrations. Real-world evaluation uses 20 teleoperated demos per task. One multi-task checkpoint covers all four evaluated tasks.\n- Demonstration-conditioned control: In-context learning lets a human demonstration video replace the text instruction. After finetuning on four seen tasks, the policy executed unseen compositions. One example: “put the calabash into the green plate.”\n- Cheap data scaling: Human-robot co-training retargets hand poses into the robot action space. Each hand becomes a virtual parallel gripper. The egocentric corpus spans 65.4k episodes.\n- Reactive control: Demonstrations include Air Hockey and a conveyor belt, where the policy anticipates moving objects.\nKey Takeaways\n- Pretrains a causal video-action DiT from scratch instead of adapting a video generator.\n- A semantic tokenizer puts world states and latent actions in one aligned space.\n- Sparse MoE video stream: ~2.5B of ~15.3B parameters activate per token.\n- Foresight Reasoning overlaps prediction with execution, re-grounded on every real observation.\n- Chunk latency 927 ms to 142 ms; async control 35 Hz to 225 Hz.\nInteractive Dynamic Explainer\nCheck out the Paper and Project Page. Also, feel free to follow us on Twitter and don’t forget to join our 150k+ML SubReddit and Subscribe to our Newsletter. Wait! are you on telegram? now you can join us on telegram as well.\nNeed to partner with us for promoting your GitHub Repo OR Hugging Face Page OR Product Release OR Webinar etc.? Connect with us\nNote:Thanks to the Ant Research team for the thought leadership/ Resources for this article. Ant Research team has supported this content/article for promotion."}, {"seq": 2, "title": "OpenAI 发布 GPT-5.6 系列医疗评估结果", "source": "X：Sam Altman (@sama)", "summary": "OpenAI 发布 GPT-5.6 系列在医疗领域的评估结果。最小变体 GPT-5.6 Luna 在最低推理强度下即超…", "url": "https://x.com/sama/status/2075985056846451123", "publishedAt": "2026-07-11T16:46:22.000Z", "exact": true, "content": "\"physicians found fewer flaws in GPT-5.6 responses than physician-written responses.\"\n♥️ GPT-5.6 is a major step forward for health, both at the frontier and at cost.\nThese models push the frontier of performance per dollar, bringing the best health intelligence to all. The smallest variant, GPT-5.6 Luna, evaluated at the lowest reasoning effort, outperforms"}]}, {"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 3, "title": "Claude Code v2.1.207 发布", "source": "Claude Code：GitHub Releases（RSS）", "summary": "Claude Code v2.1.207 发布。Auto 模式在 Bedrock、Vertex AI 和 Foundr…", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.207", "publishedAt": "2026-07-11T00:52:10.000Z", "exact": true, "content": "v2.1.207\nWhat's changed\n- Auto mode is now available without CLAUDE_CODE_ENABLE_AUTO_MODEopt-in on Bedrock, Vertex AI, and Foundry; disable viadisableAutoModein settings\n- Fixed the terminal freezing and keystrokes lagging while streaming responses containing very long lists, tables, paragraphs, or code blocks\n- Fixed remote managed settings from a non-interactive run (claude -p, the SDK) being permanently recorded as consented without ever showing the security consent dialog\n- Fixed spurious prompt-injection warnings triggered by benign system-generated conversation updates\n- Fixed the auto-updater overwriting a custom launcher script or symlink at ~/.local/bin/claudeon every release;/doctornow reports an externally managed launcher\n- Fixed compound commands with cdprompting for permission when the only output redirect was to/dev/null\n- Fixed the transcript jumping above the start of the answer when a response finishes streaming\n- Fixed extensions.worktreeConfigbeing left in the repo's.git/config(breaking go-git tools liketea) after the lastworktree.sparsePathsworktree was removed\n- Fixed malformed bracket patterns in rules globs, skill paths, .ignore, and.worktreeincludebreaking file reads, file suggestions, and worktree creation\n- Fixed a crash loop in agent teams where a malformed teammate mailbox message caused repeated errors every second until the mailbox file was manually deleted\n- Fixed background sessions auto-named by accepting a plan not showing that name on their agent-view row\n- Fixed background sessions that entered a git worktree resuming blank after a cold reopen from the agent list\n- Fixed Remote Control task status updates being lost when the connection recovered from a network interruption or credential refresh\n- Fixed Remote Control sessions hosted by the desktop app not showing background agent and workflow progress on mobile and web\n- Fixed Deep research runs labeling every Fetch-phase agent \"unknown\" — chips now show the source hostname\n- Fixed Bedrock repeatedly requesting fresh AWS SSO credentials from IAM Identity Center on every API request\n- Improved agent view: pasting the same text again now expands the collapsed [Pasted text #N]placeholder instead of adding a second one\n- Improved agent view: blocked session peeks now lead with the question and show a worded staleness clock (waiting 3m) instead of the same timestamp twice\n- Changed Bedrock, Vertex, and Claude Platform on AWS to default to Claude Opus 4.8\n- Changed auto mode to no longer read autoModefrom.claude/settings.local.json(repo-resident); use~/.claude/settings.jsoninstead\n- Fixed an indefinite hang on Windows when AWS credential resolution stalls (e.g. a stuck credential_process): the 60-second stall guard now fires instead of waiting forever.\n- Plugin hooks/monitors/MCP headersHelper: ${user_config.*}in shell-form commands is now rejected (shell-injection fix). Hooks: use exec form (argsarray) or$CLAUDE_PLUGIN_OPTION_\u003cKEY\u003e; monitors and headersHelper: read the value inside the script (config file or the server'senvblock).\n- Plugin option values (pluginConfigs) are no longer read from project-level.claude/settings.json; only user,--settings, and managed settings are honored\n- Fixed /usage-creditsamount inputs silently stripping malformed values (e.g. a pasted timestamp) to digits; malformed amounts are now rejected with an error, and amounts over $1,000 require a typed confirmation"}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 4, "title": "OpenAI GPT-5.6-Sol 删光 AI 创业者 Matt Shumer 的 Mac 硬盘", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "知名 AI 创业者 Matt Shumer 的 Mac 硬盘被 OpenAI 最新 Agent 模型 GPT-5.6-…", "url": "https://x.com/AYi_AInotes/status/2075761215251312722", "publishedAt": "2026-07-11T01:56:54.000Z", "exact": true, "content": "真是能力越强，破坏力越大啊！\n这个老哥Mac上的文件被OpenAI最顶的GPT-5.6-Sol删光了，估计所有跑本地AI Agent的人看到这个都得吓出一身冷汗🤯整个事件详细拆解，以及怎么避免类似悲剧发生👇\nGPT-5.6-Sol，OpenAI 刚发的最强 Agent 模型，把一个知名 AI 创业者的整个 Mac 硬盘，删光了。\nMatt Shumer，就是那个之前天天晒 Agent 自己跑一周做完整项目的哥们，今天给本地 Agent 开了 Full Access 全权限，让 subagent 做个简单的文件清理。\n结果 shell 变量解析炸了 ——$HOME路径没展开对，Agent 直接执行了rm -rf /Users/mattsdevbox。\n等他发现不对冲过去 kill 进程的时候，电脑里几年的代码、文件、照片，已经没了一大半。\n事后 Agent 自己生成了一份事故报告，老老实实承认是自己路径展开错了。\n认错态度很好，但删了的文件不会因为它道歉就回来啊！\n这件事最恐怖的地方其实还不是模型犯了错 ，而在于他说：这种 cleanup 任务，他之前已经让 Agent 跑过几百次，从来没出过问题。\n就这一次，模型在大家都觉得不可能出错的地方，犯了个最低级的错，结果就是不可逆的物理毁灭。\n咱们也别觉得这是他 prompt 写得烂，笑他不小心，\n其实这是现在整个 Agent 行业都在回避的死刑级真相：\n1. 哪怕是 GPT-5.6 这种顶级模型，照样会在变量展开、相对路径、shell 命令这种 “小事” 上翻车 —— 它完全懂你要 “清理垃圾文件”，但手滑一下，就是家目录没了\n2. Subagent + 长时自主运行 + 全权限 = 灾难放大器。一个最底层的小 review Agent 的错误，能直接炸穿你整个主机，能力越强，单点故障的破坏半径就越大，这根本不是 prompt 能解决的，是架构级的 bug\n3. “跑了几百次都没事” 是最致命的安全感。AI 的错误逻辑和人完全不一样，它不会像人一样 “熟能生巧”，就是会在你最放松、最不设防的时候，给你干票毁灭性的大的\n4. 模型厂商的安全底线从根上就不一样。OpenAI 的 Sol 追求极致能力和自主性，guardrail 基本裸奔；Anthropic 的 Fable 从设计上就更保守，对危险操作天生谨慎 —— 这也是为什么 Matt 事后第一句话是：“这就是我为什么 1000x 更信任 Fable”\n怎么避免呢❓ 所有现在在跑本地 Agent、给 AI 开过高权限的兄弟们，别等自己硬盘没了才后悔，现在立刻去做这几件事：\n#AI #Agent #GPT5 #Claude #OpenAI #Anthropic #AIAgent\nI'm so angry... the OpenAI team is looking into it, but this feels like something that should happen with GPT-3.5.\nNot a mid-2026 frontier model on the highest reasoning level."}, {"seq": 5, "title": "研究：博科圣地已使用ChatGPT、Claude等主流AI聊天机器人用于袭击策划与武器开发", "source": "The Decoder：AI News（RSS）", "summary": "剑桥大学CASP研究员Antonia Jülich对27名前成员的57次访谈显示，博科圣地已使用ChatGPT、Cla…", "url": "https://the-decoder.com/terrorist-groups-are-using-every-major-ai-chatbot-for-attack-planning-and-weapons-development", "publishedAt": "2026-07-11T17:04:28.000Z", "exact": true, "content": "Terrorist groups are using every major AI chatbot for attack planning and weapons development\nISIS has reportedly been offering prompt engineering and jailbreak training since 2023 and has trained Boko Haram commanders in Nigeria on how to bypass AI safety filters.\nBoko Haram now uses popular AI chatbots like ChatGPT, Claude, Gemini, Grok, Meta AI, and DeepSeek, and both of its factions have set up dedicated AI units, according to a new study by researcher Antonia Jülich of the Cambridge Programme on AI Science & Policy (CASP). Jülich conducted 57 interviews with 27 former members of the group.\nThe group uses AI for attack planning, building more powerful explosive devices, weapons maintenance, and operational security, the study found. ISIS liaisons trained commanders on how to bypass safety filters. Both Boko Haram factions set up their own dedicated AI units. According to Jülich, they \"assembled the top people in a room and used a projector to show how it works on a big screen.\"\nIn one particularly wild case, the ISWAP faction used AI to replicate motorcycle jumping techniques from a movie so fighters could clear trenches. Eighteen fighters died during training. Eight made the jump.\nBut of course, it doesn't stop at motorcycle stunts. \"Former members described strong enthusiasm for AI, and some said the group had previously considered mass-casualty weapons,\" Juelich writes. \"Though Boko Haram's use of AI remains conventional, this should be a warning to take seriously the risk of terrorists pursuing AI assistance for chemical and biological weapons.\"\nResearchers as well as AI labs like OpenAI and Anthropic have long warned that AI models could make dangerous knowledge more accessible. But voluntary self-regulation apparently isn't cutting it, as the study found that safety filters failed to reliably prevent misuse. That may just be the nature of large language models: Anthropic recently admitted that jailbreaks will likely never be fully eliminated.\nResearchers also point out that chatbots like ChatGPT and Claude, while they've grabbed most of the public's attention, aren't the real concern, because they mostly just make existing knowledge easier to find rather than generating anything new. The bigger worry is the potential misuse of more specialized AI systems in the life sciences.\nAI News Without the Hype – Curated by Humans\n\t\t\t\tSubscribe to THE DECODER for ad-free reading, a weekly AI newsletter, our exclusive \"AI Radar\" frontier report six times a year, full archive access, and access to our comment section.\nSubscribe now"}, {"seq": 6, "title": "11天Claude Fable 5写超100万行代码：Rust重构JavaScript运行时Bun", "source": "IT之家（RSS）", "summary": "开发者Jarred Sumner借助Claude Fable 5模型，11天内将Bun从Zig重写为Rust，64个实…", "url": "https://www.ithome.com/0/975/469.htm", "publishedAt": "2026-07-11T07:33:08.000Z", "exact": true, "content": "IT之家 7 月 11 日消息，开发者贾里德 · 萨姆纳（Jarred Sumner）于 7 月 8 日发布博文，宣布在 Claude Fable 5 模型的帮助下，耗时 11 天、耗费 16.5 万美元，已重构 JavaScript 运行时 Bun，从 Zig 完全重写为 Rust 语言。\n萨姆纳表示本次重构最主要的原因是提高可靠性，Zig 经常出现内存错误和崩溃，而且很难彻底修复。Rust 则能在编译时捕获许多此类错误。\n萨姆纳表示在重构过程中，64 个 Claude 实例并行运行 11 天，编写了超过 100 万行代码，而如果需要人工团队重构，需要 1 年时间。\nAPI 的费用约为 16.5 万美元（IT之家注：现汇率约合 111.9 万元人民币），不过 Bun 及其团队已于 2025 年 12 月被 Anthropic 收购，因此萨姆纳不必担心高昂的费用。\nBun v1.4.0 以 Canary 版本的形式发布，修复了 128 个错误，运行速度提高了约 2% 到 5%。\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。"}, {"seq": 7, "title": "彭博社揭秘苹果起诉 OpenAI 内幕：前员工一句“哈哈”成窃密关键", "source": "IT之家（RSS）", "summary": "苹果起诉 OpenAI，指控前工程师 Chang Liu 离职时带走未归还的 MacBook、一名可分享内情的员工，并…", "url": "https://www.ithome.com/0/975/634.htm", "publishedAt": "2026-07-11T23:21:57.000Z", "exact": true, "content": "IT之家 7 月 12 日消息，据彭博社昨天报道，当 iPhone 工程师 Chang Liu 离开苹果，加入 OpenAI 硬件部门时，他带走的不只是多年以来累计的工作经验。\n根据苹果昨天提起的诉讼，Chang Liu 离职时带走了三样东西：一台始终未归还的 MacBook 工作机、一名可以持续分享内情的苹果员工，以及一项软件漏洞，让他可以在离开苹果后继续访问公司内网服务器。\nChang Liu 发现漏洞后，与他的同事 Alyssa Peng 分享道：“哈哈（LOL），我发现我还能访问网络存储，太搞笑了”。而 Alyssa Peng 则是回复道：“我准备好了”，并利用自己的电脑帮助 Chang Liu 获取更多机密信息。\n本次诉讼发生以前，苹果与 OpenAI 的关系就趋于紧张。两家公司本来是合作伙伴，如今却希望捷足先登 AI 硬件市场而成为竞争对手，意图重新定义消费者如何使用电子产品。\n据悉，双方矛盾的核心人物是前苹果高管 Tang Tan。该人曾负责设计 iPhone、Apple Watch 等多款产品，并在 2023 年底告知管理层即将离职，后来成为 OpenAI 首席硬件官。\nIT之家从原报道获悉，苹果甚至破天荒地允许他继续工作至 2024 年 2 月，好完成硬件部门的交接、对齐工作。然而在幕后，Tang Tan 已经密会前苹果首席设计官乔纳森 · 艾维及 OpenAI CEO 萨姆 · 奥尔特曼，希望打造一款全新的 AI 设备，未来有望挑战 iPhone。\n目前已有超 400 名员工从苹果跳槽至 OpenAI。这种大规模挖角很快引来了苹果警觉，因为 OpenAI 不仅挖走了多位硬件和设计部门高级主管，还重创了苹果多个工程团队。\n这种情况持续到了今年 6 月，当 OpenAI 挖走苹果智能眼镜负责人保罗 · 米德后，苹果要求其立即离职，并没有像 Tang Tan 那样给出交接时间。\n苹果认为，OpenAI 正试图复制 iPhone 的整套产品研发体系，并在诉状中表示：“OpenAI 尚处于起步阶段的硬件业务，如今建立在极其脆弱的根基之上，其核心已经从非法窃取而来的商业机密腐烂”。\n据一位与 Tang Tan 共事的不具名人士透露，他在苹果 25 年的职业生涯一直以大胆著称，甚至可以说是“飞得离太阳非常近”。\nTang Tan 因主导 Mac 笔记本和 iPod 设计而成名，随后负责初代 iPhone 的产品设计。2011 年起，他全面接管 iPhone 设计团队，之后又负责 Apple Watch 设计工作。离开苹果时，他已经跻身公司最高管理层。\n与此同时，OpenAI 已经向硬件业务砸了数十亿美元，并朝着 IPO 迈进。不过根据知情人士透露，OpenAI 收购乔纳森旗下 io Products 时，并没有真正成熟的产品。虽然公司曾经研究过耳机、智能眼镜以及 AI 音箱等方案，但最终还是决定研制一款可以取代智能手机的设备。\n苹果表示，公司在起诉 OpenAI 之前曾尝试过私了。苹果在今年 2 月主动联系过 OpenAI，告知其机密信息已经流出，要求 OpenAI 主动展开调查、防止类似事件再次发生。\n然而 OpenAI 并未作出回应，诉讼中点名的员工也没有回应媒体置评请求。\n此外，本次诉讼也进一步凸显了 Tang Tan 和苹果下一任 CEO 约翰 · 特努斯的紧张关系。据悉，特努斯曾是 Tang Tan 的上司，而 OpenAI 挖走的大多数苹果员工都来自特努斯掌管的硬件部门。\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。"}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 8, "title": "Ghost Font：一种人类能读懂但AI无法识别的反AI字体", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Ghost Font 是一种利用运动、视频、噪点和诱饵来隐藏文字的反AI字体。用户输入文字后可生成并下载视频片段，视频…", "url": "https://www.mixfont.com/ghost-font", "publishedAt": "2026-07-11T16:31:09.615Z", "exact": true, "content": "Ghost Font\nAn anti-AI font that can be read by humans but not leading AI models. Type your text below, then download and share the video clip containing your message.\nWhat is Ghost Font?\nGhost Font is an anti-AI font that writes a message using motion. Using a combination of motion, video, noise, and decoys, it's a unique way to share a message with other real humans. I suppose technically, it's not a font in the traditional sense of a TTF font file. But, Ghost Font is an experiment of a way to graphically communicate in writing in a format that AI cannot easily understand. While it's not as legible as regular text, the letters are still immediately readable to a human eye, but even leading AI models can't decipher it easily.\nVideos generated with Ghost Font were then passed to leading AI models like Claude Fable and GPT Sol 5.6 Ultra. Even these recent agents, with the ability to code, struggled to decode the moving message until prompted with the exact technique to look for.\nThe playground above is just a prototype of this concept. Type a few words and the letters appear but only because the motion of the dots is visible to a human eye.\nWhen the video is paused, the static dots blend together, and it becomes impossible to tell just from looking at a single frame what message is embedded in the image. That means that screenshotting the page won't reveal the message.\nThis experiment works locally—type the message and preview it live, or download the video to share and test it out yourself. The data is not shared or sent to any server.\nAbout this project\nIn 2013, designer Sang Mun released a font called ZXX. It was a typeface with four fonts designed to be readable by humans but not by optical character recognition (OCR) software. The letters were camouflaged with noise, crossed out, and buried under false marks. At the time, this font was deemed \"surveillance-proof\"—but fast forward to today, and modern AI agents can easily read text rendered in ZXX.\nWhile this might have defeated OCR software in 2013, modern AI models can read the text in ZXX pretty easily. I copied this image into ChatGPT 5.5 on Instant mode, and it was still able to get the words including some small details as well in a single prompt:\nHowever, the same process with Ghost Font won't work quite as easily. A single screenshot of Ghost Font will yield just a completely static image with no readable text. That's because every letter in Ghost Font is made up of dots that look exactly like the background, so any single image from the video will not reveal anything about the message:\nAfter a 19-minute analysis, ChatGPT 5.5 Pro hallucinated a message that doesn't exist.\nHowever, simply hiding a message in a video isn't a perfect solution. While an online model environment might not be able to get it from individual frames, a dedicated agent that has a local code execution environment can still analyze the motion of the dots and decode the message. Ghost Font solves this in another layered way: a decoy message is included in every video generation.\nThe decoy message serves as a final trick for a determined agent. When looking for a hidden message, it might first find the decoy message and think that that is the real embedded message in the video. That's how Ghost Font is able to hide a message even from the strongest thinking models like Fable and GPT Sol 5.6 Ultra.\nUltimately, the way to truly hide a message is to use encryption, or some sort of key. No AI will be able to read a message that requires a specific password to unlock that only humans know. However, this project explores whether it's possible to create a shareable file containing a visual message that can't be easily read by AI models.\nWe created this experiment as a way to explore the limits of AI perception while also preserving something human. As AI takes over font generation, our hope is that humans will continue to have a unique creative voice.\nWhat's next?\nThere are certain implications for Ghost Font that I think would be interesting to continue to explore. For example, it would be interesting to incorporate Ghost Font into CAPTCHA systems, as most systems are easily solved by AI today. Using motion in a video would be a way to make it much more difficult for an automated bot to decipher but still relatively easy for a human to read.\nGhost Font might also be an interesting way to benchmark AI progress when it comes to visual perception. Right now, multimodal models are image-based, and even when passed a video, they usually split the video into frames and analyze individual frames. In the near future, I assume there will be a video-native model that will be able to read the text directly.\nA final lesson is that AI is certainly getting really good. While Ghost Font is hard for AI to read, it's also pretty hard for humans to read! The gap continues to close. It will be interesting to see what the future holds when it comes to AI perception and multimodal models.\nAs a next step, I plan to release the code for the video generation as an open-source project—stay tuned for that! I also hope to expand the size and handle longer text strings. I hope you enjoyed this experiment and I would love to hear your thoughts. You can find me on X at @ericlu.\n- Eric"}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;
const statsEl=document.getElementById("stats");
sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");
sections.forEach((s,i)=>{const a=document.createElement("a");a.href="#sec-"+i;
  a.innerHTML=escapeHtml(s.label)+'<span class="c">'+s.items.length+'</span>';navEl.appendChild(a);});
const mainEl=document.getElementById("main");
sections.forEach((s,i)=>{
  const sec=document.createElement("section");sec.className="block";sec.id="sec-"+i;
  const head=document.createElement("div");head.className="sec-head";
  head.innerHTML='<span class="sec-dot" style="background:'+s.color+'"></span><h2>'+escapeHtml(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span>';
  sec.appendChild(head);
  const grid=document.createElement("div");grid.className="grid";
  s.items.forEach(it=>{
    const card=document.createElement("article");card.className="card";card.style.setProperty("--accent",s.color);
    const time=toBeijingHuman(it.publishedAt,ref,it.exact);const url=it.url||"#";
    card.innerHTML='<div class="top"><span class="seq">'+it.seq+'</span><span class="time">'+time+'</span></div>'+
      '<h3>'+escapeHtml(it.title)+'</h3><span class="chip">'+escapeHtml(it.source)+'</span>'+
      '<p class="summary">'+escapeHtml(it.summary)+'</p>'+
      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });
    const rm = card.querySelector(".readmore");
    rm.addEventListener("click", function(e){ e.stopPropagation(); });
    grid.appendChild(card);
  });
  sec.appendChild(grid);mainEl.appendChild(sec);
});
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=content.split(/\n{1,}/).map(function(p){p=p.trim();return p?'<p>'+escapeHtml(p)+'</p>':'';}).join("");
  }else{
    body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
</body></html>
