<script>
const DATA = {"meta": {"reportDate": "2026-06-29", "reportDateHuman": "2026年6月29日", "weekday": "星期一", "total": 7, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "模型发布/更新", "color": "#4f46e5", "items": [{"seq": 1, "title": "Grok 4.5 私测于 SpaceX 和 Tesla，性能接近 Opus", "source": "X：Elon Musk (@elonmusk, xAI)", "summary": "Grok 4.5，基于我们的1.5T V9基础模型，并在补充训练中加入Cursor数据，现已在SpaceX和Tesla…", "url": "https://x.com/elonmusk/status/2071184354756477041", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "Grok 4.5, based on our 1.5T V9 foundation model, with Cursor data added in supplemental training, is now in private beta at SpaceX & Tesla. Early evals show performance close to, perhaps exceeding Opus. \nRL is continuing to significantly improve the model, and the Grok Build harness gets better every day.\nNice work by all those involved!\nCompletely trained from scratch new models will be released by @SpaceX every month this year.", "zh": false}, {"seq": 2, "title": "新浪开源VibeThinker-3B：推理可压缩，事实知识不能", "source": "The Decoder：AI News（RSS）", "summary": "新浪发布仅3B参数的VibeThinker-3B，在AIME26等数学编程基准上持平DeepSeek V3.2等大20…", "url": "https://the-decoder.com/sinas-open-model-vibethinker-3b-aims-to-show-reasoning-compresses-well-but-factual-knowledge-doesnt", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "Sina's open model VibeThinker-3B aims to show reasoning compresses well but factual knowledge doesn't\nKey Points\n- Weibo's new VibeThinker-3B has just three billion parameters but matches top models up to 333 times its size on math and coding benchmarks.\n- The performance comes from multi-stage post-training applied to an Alibaba base model. On tasks that require broad factual knowledge, however, the small model falls well behind.\n- The researchers conclude that structured logical reasoning relies on few patterns and compresses well, while broad world knowledge still needs large models.\nA Chinese language model with just three billion parameters sometimes matches models a hundred times larger on math and coding tasks. The researchers behind it have developed a hypothesis about how AI capabilities are structured.\nWeibo's parent company Sina has released a small language model that competes with today's top models on hard math and coding tasks. According to a technical report, VibeThinker-3B performs on par with DeepSeek V3.2 and Kimi K2.5 on competitive benchmarks like AIME26. Both of those models have 200 to 333 times more parameters.\nSina positions the model as an experiment in figuring out how much compute a model actually needs to compete at the top. Its predecessor, VibeThinker-1.5B, launched in November 2025. The new version pushes further, asking whether a small model can hit genuine top-tier performance, not just be \"good for its size.\"\nLogic scales down, factual knowledge doesn't\nThe results tell two different stories. On structured tasks with clearly verifiable solutions, like math olympiads or programming challenges, VibeThinker-3B matches models like GLM-5 or Gemini 3 Pro. On LiveCodeBench, it beats every other model under 20 billion parameters.\nFactual knowledge is a different story. On the knowledge-heavy GPQA-Diamond benchmark, the model falls well behind its much larger competitors.\nTo rule out data contamination, the team had the model compete in LeetCode contests held between late April and late May 2026, after training wrapped up. VibeThinker-3B solved 123 out of 128 problems on the first try. That puts it ahead of GPT-5.2, Qwen3-Max, Kimi K2.5, and Claude Opus 4.6. It trails only GPT-5.3-Codex, Gemini 3.1 Pro, and Gemini 3 Flash, but not by much.\nPost-training does the heavy lifting\nVibeThinker-3B builds on Alibaba's Qwen2.5-Coder-3B. Sina's contribution is the post-training, everything that happens after generic pre-training on large data sets. According to the report, that's what brings a 3B model close to the top performers.\nPost-training happens in stages. First, the model learns a broad range of tasks through supervised fine-tuning, covering math, coding, and general dialogue. Then it gets tailored for hard, multi-step reasoning problems.\nReinforcement learning follows, applied sequentially for math, programming, and STEM. Self-distillation then consolidates the skills from each phase into a single model. A final step makes sure the model better follows instructions.\nDuring fine-tuning, the team deliberately builds up a wide variety of solution paths. Reinforcement learning then strengthens the ones that work. The argument is that performance comes from training methods, data quality, and reliable validation signals rather than from more parameters.\nWhat this means for how AI capabilities work\nBased on these results, the authors propose what they call the \"Parametric Compression-Coverage Hypothesis.\" Different AI capabilities have different structures and need different numbers of parameters.\nLogical reasoning, like solving a math problem step by step, relies on a few recurring patterns. Searching, checking conditions, correcting errors, combining intermediate results. That kind of skill can be packed into a compact core. World knowledge works differently. Answering open-ended questions across many topics requires broad coverage, meaning lots of parameters storing lots of facts.\nThis reframes what small models are for, the researchers say. They're not just cheap, lightweight versions built for budget inference but an independent research path running parallel to traditional scaling logic. Where tasks are verifiable and have clear solution structures, parameter count isn't the bottleneck anymore.\nVibeThinker-3B is openly available on Hugging Face and GitHub.\nSmall models catching up to much larger systems on narrow tasks is becoming a pattern. In April, Alibaba's Qwen3.6-27B outperformed its predecessor, which was 15 times larger, across all coding benchmarks. Falcon H1R 7B from Abu Dhabi hit the performance level of models two to seven times its size, according to its makers. Earlier studies on logical gaps in small models suggested they generally hit a wall on multi-step reasoning. The VibeThinker results on verifiable tasks challenge exactly that assumption.\nAI News Without the Hype – Curated by Humans\n\t\t\t\tSubscribe to THE DECODER for ad-free reading, a weekly AI newsletter, our exclusive \"AI Radar\" frontier report six times a year, full archive access, and access to our comment section.\nSubscribe now", "zh": false}]}, {"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 3, "title": "Wayfinder Router：在本地和托管的大语言模型之间进行确定性查询路由", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Wayfinder Router 通过分析提示词的结构（长度、标题、列表、代码）和措辞（证明、数学、硬约束），在微秒级…", "url": "https://github.com/itsthelore/wayfinder-router", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "A fast, offline hard-or-easy call on every prompt — scored deterministically, with no model call. Route the easy ones to your small/local model and the hard ones to your big one, or compose any model-router behind it.\nQuickstart · Benchmark · How it compares · Explainer · Changelog\n| No model call to decide the route | Deterministic and fully offline | \n| Calibrate on your own data | Bring your own key self-hosted | \nWayfinder scores a prompt's structure (length, headings, lists, code) and wording\n(proofs, math, hard constraints) into a 0.0–1.0 complexity score, then routes the easy\nones to your small/local model and the hard ones to your big one. The decision is the\nproduct: deterministic, sub-millisecond, and entirely offline — no API key, no network, no\nmodel call to make it. What you route to is yours: two tiers, an N-tier ladder, or a\nmodel-router composed behind it.\nCheap prompts stay local and hard ones go to the expensive model, so you stop paying top-tier prices for \"summarize this\" and \"fix my typo.\"\nMost routers decide by calling a model: a trained classifier, an LLM judge, or a hosted API. That adds latency, cost, and randomness to the exact step meant to save you money. Wayfinder reads structure and wording instead, so the decision is free and the same every time.\n| router | decides by | model call? | self-host | calibrate | \n|---|---|---|---|---|\n| Wayfinder | deterministic structural score | no | yes | yes | \n| RouteLLM | trained classifier (preference data) | yes | yes | retrain | \n| NotDiamond / Martian | learned, hosted | yes | no | via platform | \n| OpenRouter (Auto) | hosted auto-router | yes | no | — | \n| Bifrost / LiteLLM | provider gateway (not complexity-routed) | no | yes | n/a | \nThe gateways in the last two rows (OpenRouter, Bifrost, LiteLLM) answer a different question: which provider serves a call, by price, availability, and failover. Wayfinder answers which tier a prompt deserves: cheap vs expensive, by difficulty, decided offline. The two compose. Run Wayfinder to make the cheap-vs-expensive call, and a gateway underneath to reach the providers.\nWayfinder isn't chasing a top accuracy number — it gives you a routing decision you\ncan run offline and tune on your own traffic. By default it scores prompt\nstructure only; it can also read lexical cues (proofs, math, constraints), but\nthose ship off by default because a\ndouble-blind test showed the lift doesn't generalize\n(it caught ~20% of unseen hard prompts and lost to a plain word-count baseline). A\nprompt whose difficulty is purely semantic (a subtle code snippet, \"what is the\n100th prime number?\") has no structural tell, and a semantic router will beat it\nthere. The benchmark (make benchmark) shows where it wins\nand loses against honest baselines and a perfect oracle; the FAQ\ngives the straight version — including that it's no better than random on\nRouterBench's short-but-hard items, and why you'd still run it.\nTwo ways to see the routing decision for yourself — no API keys, no models, nothing on the network.\nIn your terminal — a decision-first chat in the Wayfinder palette. The terminal\nchat ships in the default install, so there's nothing extra to add — or run it with\nno install at all via uvx:\nuvx wayfinder-router chat --dry-run      # zero install, zero keys\n# or:  pip install wayfinder-router && wayfinder-router chatEvery turn shows where it routed (● LOCAL / ◆ CLOUD), the structural score and why\n(/why), and the running savings vs always-cloud. /init sets up models without leaving\nthe chat, /route · /local · /cloud force a turn, and conversations persist across\nsessions (/threads).\nIn your browser — the web chat UI with a live threshold slider:\npip install \"wayfinder-router[gateway]\"\nwayfinder-router webchat --dry-run\n# opens http://127.0.0.1:8088/demowebchat is a thin launcher over serve (the gateway and its /demo page; --no-open,\n--port, --host 0.0.0.0, --dry-run); serve is the headless command. With no config\nit's decision-only (--dry-run), so you can poke at it with zero setup; to get real\nreplies, run wayfinder-router init to scaffold [gateway.models] (then\nwayfinder-router doctor to confirm your keys resolve) — see Quickstart.\nWayfinder forwards each call to an OpenAI-style /chat/completions endpoint — so if\nyour provider speaks that (and most do), it just works. A tier is one base_url,\na model name, and a key read from the environment at request time; no SDK, no\nper-provider code. Pair a free local model with a hosted one, or run two cloud tiers.\n…plus Groq, Together, OpenRouter, Fireworks, DeepSeek, and local servers (vLLM, LM Studio, llama.cpp) — + any OpenAI-compatible endpoint that takes a Bearer key.\nPut Wayfinder in front of your models. Your app keeps speaking the OpenAI API; you\njust change one base_url.\n- \nScaffold a config — initwrites a starterwayfinder-router.toml(keyless local Ollama → Anthropic cloud) plus a.env.example, then checks your keys:pip install \"wayfinder-router[gateway]\" wayfinder-router init # starter config (hybrid preset) wayfinder-router init --preset openai # two OpenAI tiers (gpt-4o-mini → gpt-4o) wayfinder-router init --preset gemini # two Gemini tiers (gemini-2.5-flash → gemini-2.5-pro) wayfinder-router init --interactive # pick providers/models step by step Or describe your two models in wayfinder-router.tomlby hand:[routing] threshold = 0.5 # below -\u003e local, at/above -\u003e cloud [gateway.models.local] base_url = \"http://localhost:11434/v1\" model = \"llama3.2\" [gateway.models.cloud] base_url = \"https://api.openai.com/v1\" model = \"gpt-4o\" api_key_env = \"OPENAI_API_KEY\" # read from this env var, never stored # api_key_cmd = \"op read op://Private/OpenAI/credential\" # optional: fill it from a vault Wayfinder never stores secrets: a model names an env var ( api_key_env) and the key is read from your environment at request time. There is nothing to \"install\" — just export the variable. Prefer not to paste a raw key into your shell? Add an optionalapi_key_cmdand Wayfinder fills that variable from your secret store at startup —op read …(1Password),security …(macOS Keychain),secret-tool …(Linux),pass/gopass,vault kv get …,aws secretsmanager get-secret-value …,bw,doppler,gcloud secrets …, or any command that prints the secret. The key is held in memory only, still never written to disk.wayfinder-router doctordetects which of these tools you have installed and suggests the exact line.\n- \nSet your key(s), then run the gateway. doctorre-checks the config and whether each model's key resolves (✓ set/✗ not set) before you start:export ANTHROPIC_API_KEY=sk-... # or OPENAI_API_KEY, per your config wayfinder-router doctor # ✓/✗ per model — is each key set? wayfinder-router serve --port 8088 \n- \nPoint your existing client at it. No code change: client = openai.OpenAI(base_url=\"http://localhost:8088/v1\", api_key=\"unused\") client.chat.completions.create(model=\"auto\", messages=[{\"role\": \"user\", \"content\": \"...\"}]) \nEasy prompts go local, hard ones go cloud, and every response carries\nx-wayfinder-router-model and x-wayfinder-router-score so you can see where it\nwent. Want to force a tier for one request? Set model=\"local\" or \"cloud\" (or\nprefer-local / prefer-hosted), move the cut for a single call with an\nX-Wayfinder-Threshold header, or start a chat message with /local or /cloud\n(see Steer a single request).\nCheck it's working:\ncurl -s localhost:8088/healthz\n# {\"status\":\"ok\",\"models\":[\"cloud\",\"local\"]}\ncurl -s -D - -o /dev/null http://localhost:8088/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"auto\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}' \\\n  | grep -i x-wayfinder-router\n# x-wayfinder-router-model: local\n# x-wayfinder-router-score: 0.00No backends yet? wayfinder-router serve --dry-run answers with the routing\ndecision instead of calling an upstream, so you can feel the routing in 30 seconds\nbefore wiring up real models.\n| command | what you get | \n|---|---|\n| pip install wayfinder-router | scorer, CLI, Python API, and the terminal chat ( chat); the scorer/library imports stay dependency-light | \n| pip install \"wayfinder-router[gateway]\" | adds the OpenAI-compatible routing gateway, the common case for serving | \n| pip install \"wayfinder-router[ui]\" | adds the local calibrate / explain / configure UI | \n| pip install \"wayfinder-router[all]\" | gateway and UI on top of the default install | \nMake Wayfinder your machine's always-on LLM endpoint, so every OpenAI-compatible app\ncan share one local base_url and you set your keys up once. service install\nregisters it with the OS service manager to start at login and restart if it exits:\nwayfinder-router service install     # macOS (launchd) or Linux (systemd user unit)\nwayfinder-router service status      # is it running? endpoint + /healthz\nwayfinder-router service uninstallThen point your apps at it once — most OpenAI-compatible tools read OPENAI_BASE_URL:\nexport OPENAI_BASE_URL=http://127.0.0.1:8088/v1macOS is the primary target; Linux works too. --print emits the unit file without\ninstalling, and if no service manager is present it writes the unit and prints the one\ncommand to start it. It's the same gateway, just kept running — the routing decision is\nunchanged.\nWayfinder sits behind whatever OpenAI-compatible client you already use. You point\nthat client's base_url at the gateway once, and from then on it is invisible. The\nsame client serves a request whether it routes local or hosted.\n  your client   (chat app, IDE, agent, or code)\n       |\n       v\n  Wayfinder gateway   scores, picks a model\n       |\n       |-- low  --\u003e  local    (Ollama, vLLM)\n       |-- high --\u003e  hosted   (OpenAI, any /v1)\n       |\n       v\n  response returns via the same client,\n  with x-wayfinder-router-* headers\nA few things follow from this:\n- The interface in front is yours. A chat GUI (Open WebUI, LibreChat), an IDE assistant with a custom endpoint (Cursor, Continue), an agent framework, or your own code on the OpenAI SDK. Want a chat window today? Put Open WebUI in front and point it at the gateway.\n- Local and hosted are backends, not apps. The local model is just a server\n(Ollama, LM Studio, vLLM, llama.cpp) speaking OpenAI's /v1; the hosted one is the same shape. The user never switches UIs and usually never knows which model answered.\nKeys are read from the environment at request time and never touch the config file or the scored path.\necho \"Summarise this paragraph in one sentence.\" | wayfinder-router route -Recommended Model: local\nComplexity Score: 0.00  (mode: tiered)\nTiers:\n  \u003e= 0.00  local \u003c-\n  \u003e= 0.50  cloud\nContributing Features:\n  Word Count: 6\n  ...\nAdd --json for machine consumers (an agent reads this and routes to its own\nmodel):\n{\n  \"schema_version\": \"3\",\n  \"score\": 0.66,\n  \"recommendation\": \"cloud\",\n  \"mode\": \"tiered\",\n  \"features\": { \"word_count\": 545, \"heading_count\": 12, \"reasoning_term_count\": 3, \"...\": 0 },\n  \"tiers\": [{ \"min_score\": 0.0, \"model\": \"local\" }, { \"min_score\": 0.5, \"model\": \"cloud\" }]\n}Wayfinder reads its own wayfinder-router.toml, found by walking up from where you\nrun it. There are three modes, in precedence order (classifier \u003e tiers \u003e\nthreshold); the scalar-score weights apply to any of them.\nBinary (the default) is a single cut:\n[routing]\nthreshold = 0.6\nweights = { word_count = 4.0, list_item_count = 2.5 }--threshold N overrides it for one run; WAYFINDER_ROUTER_THRESHOLD overrides it\nfrom the environment.\nTo switch the lexical cues on, raise their weights and cut at the knee — the one\nheld-out improvement over the structural default on real frontier traffic (skill\n−0.038 → +0.057, 61% cost saved on RouterBench). See\ndocs/lexical-routing.md and the ready-to-edit\nexamples/wayfinder-router.lexical.toml;\nrecalibrate the threshold to your own traffic (a ~20-prompt bootstrap is only a smoke\ntest — see benchmarks/calibration-eval.md).\nTiered routes ordered score bands to any number of models:\n[[routing.tiers]]\nmin_score = 0.0\nmodel = \"llama-3b\"\n[[routing.tiers]]\nmin_score = 0.3\nmodel = \"llama-70b\"\n[[routing.tiers]]\nmin_score = 0.6\nmodel = \"claude-cloud\"Classifier is a fitted multinomial-logistic model, argmax over per-model\nlinear scores. You usually generate it with calibrate rather than write it by\nhand.\nEach [gateway.models.\u003cname\u003e] block maps a routed name to an upstream base_url, a\nmodel, and an optional api_key_env (the name of an environment variable, never\nthe secret itself). The gateway is the only part that touches keys or the network;\nthe scorer, config, and calibrator stay pure and offline.\nThe cut is a proxy, so tune it against your own traffic. wayfinder-router calibrate reads a labeled JSONL dataset ({\"text\": ..., \"label\": ...}) and prints\na config fragment. It runs offline and never calls a model; the labels are your\nground truth.\nwayfinder-router calibrate data.jsonl --mode threshold              # sweep the binary cut\nwayfinder-router calibrate data.jsonl --mode tiers                  # ordinal multi-model\nwayfinder-router calibrate data.jsonl --mode classifier --out wayfinder-router.tomlThe fragment drops straight into wayfinder-router.toml; the accuracy and chosen\nbreakpoints print to stderr. The classifier is fit by deterministic L2-regularized\nNewton/IRLS, pure Python, converging in a handful of iterations.\nTo pick a cut in cost terms instead of bare accuracy, use a cost-aware objective.\n--objective knee chooses the cost-aware knee automatically (it maximizes\nquality-recovered × cost-saved — no target to guess, and it can't collapse to\nalways-routing-to-the-expensive-model the way pure accuracy does on skewed labels);\n--objective cost-quality --target-savings X instead holds a specific savings floor.\nAdd --weights to score with — and emit — custom feature weights, e.g. the lexical\nopt-in, so the output is a complete, deployable config (see\ndocs/lexical-routing.md):\nwayfinder-router calibrate data.jsonl --mode threshold --objective knee \\\n  --costs local=0.2,cloud=1.0 \\\n  --weights reasoning_term_count=5,math_symbol_count=3,constraint_term_count=1.5Cost is metadata only — it shapes the calibrated cut and is reported on the\n/metrics endpoint, but never enters a per-request decision, which stays\ndeterministic and free.\nThe deployment's config sets the default boundary, but a client can override the decision for one request over plain OpenAI transport. An override only changes where the request goes; the prompt is still scored, and nothing adds a model call.\n- The modelfield is a routing directive.auto(or any normal model id) lets Wayfinder decide; a configured endpoint name (local,cloud) pins the request there;prefer-local/prefer-hostedpin to the low / high end of your router (prefer-cloudstill works as an alias ofprefer-hosted).\n- An X-Wayfinder-Thresholdheader re-cuts the decision for that request, a number in0.0-1.0reusing your weights (binary routers only).\n- An in-message /directive(opt-in:[gateway] slash_directives = true) lets a plain chat box steer routing — start a message with/local,/c", "zh": false}, {"seq": 4, "title": "阿德拉菲尼尔：仅在AI agent工作时阻止Mac睡眠的菜单栏工具", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Adrafinil 是一款 macOS 菜单栏应用，仅在 Claude Code、Codex、Cursor、Gemin…", "url": "https://github.com/kageroumado/adrafinil", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "rx no. 006 ・ a·draf·i·nil /əˈdræfɪnɪl/ ・ a eugeroic for machines ♡\n| awake ・ an agent is working — or keep it awake yourself | idle ・ no agents, normal sleep — or keep it awake yourself | \n服用注意 ・ for machines that keep watch after you've gone to sleep.\nIt's 3 a.m. You're asleep. The agent isn't — it's still mid-thought in a session you started hours ago, and you've closed the lid over it like an eyelid that won't quite shut.\ncaffeinateand Amphetamine are stimulants: they keep the machine wired forever, whether or not anyone's home. Adrafinil is the eugeroic. It does nothing until an agent acquires it, keeps your Mac awake through a closed lid only for as long as that work lives, and clears the moment the last session releases. It only ever wakes for the work — then you both sleep. ♡\nKeep your Mac awake only while AI agents are working.\nAdrafinil is a macOS menu bar app that prevents the system from sleeping — including clamshell (lid-closed) sleep — exclusively while an AI coding agent has an active session. When no agent is working, sleep behavior is untouched: close the lid and the Mac sleeps normally.\nIt's the opposite of always-on wake utilities like caffeinate or Amphetamine. Adrafinil only\nintervenes when an agent (Claude Code, Codex, Cursor, …) is mid-task, and gets out of the way the\nmoment that work finishes.\nThree ways it stays awake:\n- Automatically — agent hooks tell Adrafinil when a turn starts and ends, so it holds sleep only while an agent is actually working. (Optional process-sniffing can also spot a running agent that has no hooks installed.)\n- Agent-driven — an agent can deliberately keep the Mac awake past its reply for a long build or deploy, via the bundled MCP tool or the adrafinil holdCLI.\n- Manually — a menu-bar Keep awake button places a time-boxed hold yourself, even with no agents running; Let it sleep clears everything.\n⚠️ Privileged sleep control. Overriding clamshell sleep requires root. Adrafinil isolates that in a tiny, audited helper that only exposessetSleepBlocked(Bool)— all policy lives in an unprivileged daemon. It holds a standardIOPMAssertionfor idle sleep and usespmset disablesleepfor clamshell (lid-closed) sleep, after verifying on-device that the cleaner privateIOPMrootDomainpaths don't keep a displayless lid-closed Mac awake. See Docs/ARCHITECTURE.md §2.\n- Agent-aware, not always-on. Sleep is blocked only while ≥1 agent session holds an assertion. Zero sessions → normal sleep, including lid-close.\n- Hook integration for 9 agents. One-click installer wires Adrafinil into the hook systems of Claude Code, Codex, Cursor, Gemini CLI, Aider, Hermes, OpenCode, Cline, and Pi.\n- Sub-50ms CLI. adrafinil acquire/releaseare called from agent hooks and round-trip to the daemon in under 50ms, so they never stall an agent's workflow.\n- Reference-counted assertions. Overlapping sessions stack cleanly; sleep unblocks only when the last one releases.\n- Thermal cutout. If skin/CPU temperature crosses threshold while the lid is closed, all assertions are force-released so a bag-bound Mac can't cook itself.\n- Idle release. Assertions whose owning process has died or gone CPU-idle for N minutes are dropped automatically.\n- Process sniffing (optional). The daemon can auto-acquire when it sees a known agent binary running, even without hooks installed.\n- Manual keep-awake (no agent needed). A menu-bar Keep awake button starts a time-boxed hold on demand — for a long download, a local job, anything off-agent — then Let it sleep releases it.\n- Lid-close audio + lid-open summary. A chime confirms an assertion is held when you close the lid (the screen is off, so no notification); reopening shows what ran while you were away, peak temperature, and whether the thermal cutout fired.\n- Clean uninstall. Removes every hook entry it added across all agent configs.\n- macOS Tahoe 26.4. That's what I build and test on; it likely runs on earlier 26.x, but I haven't tested it there.\n- Xcode 26+ to build, with Swift 6 strict concurrency enabled.\n- Admin rights for the standard install (the privileged helper installs via SMAppService). A non-admin install path drops the CLI in~/.local/bininstead of/usr/local/bin.\nDownload Adrafinil — a signed, notarized disk image. Open it, drag Adrafinil to Applications, and launch. The first launch asks for admin rights once to register the privileged helper. Requires macOS 26.4 or later.\nPrefer to build it yourself? See Building.\ngit clone https://github.com/kageroumado/adrafinil.git\ncd adrafinil\nopen Adrafinil.xcodeprojIn Xcode, select the Adrafinil scheme and Run. You'll need to set a development team for code signing — the daemon (LaunchAgent) and helper (LaunchDaemon) are embedded into the app bundle and registered with the system when the app launches. (No Team ID is baked into the source; the XPC caller check reads your own signing team at runtime, so a rebuild under any Developer ID authorizes its own components without code changes.)\nFor a headless compile check without local signing identities:\nxcodebuild -project Adrafinil.xcodeproj -scheme Adrafinil -configuration Debug \\\n  -destination 'generic/platform=macOS' \\\n  CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' buildThe shared logic builds and tests standalone as a Swift package:\ncd AdrafinilShared\nswift testAgents don't talk to Adrafinil directly. Each agent's hook system calls the bundled CLI:\nadrafinil acquire \u003csession-key\u003e --tool claude-code --reason \"long build\"   # when a turn starts\nadrafinil release \u003csession-key\u003e                                            # when the agent goes idleHolds are activity-scoped, not session-scoped: Claude Code acquires on UserPromptSubmit and\nreleases on Stop, so the Mac is only kept awake while the agent is actually working — an\nopen-but-idle session at the prompt lets it sleep normally.\nThe daemon refcounts by session key and asks the helper to block sleep while the count is non-zero.\nAn agent can also keep the Mac awake for a background task that outlives its reply (a long build or\ndeploy) with a time-boxed hold — either by calling adrafinil hold directly or, for MCP-capable\nagents, through the bundled MCP tool that adrafinil mcp serves:\nadrafinil hold --for 30m --reason \"deploy\"   # keep awake up to 30 min, then auto-release\nadrafinil mcp                                 # speak the Model Context Protocol on stdio (for agents)You don't need an agent at all: the menu bar's Keep awake button places the same kind of time-boxed hold by hand — for a long download or any off-agent task — and Let it sleep releases everything. So Adrafinil covers all three: it auto-detects agent activity through hooks, lets agents drive it explicitly over MCP/CLI, and can be flipped on manually when you need it.\nOther subcommands: status, install-hooks, uninstall-hooks, daemon-status, version.\nAdrafinil ships integrations for the common agents, but the CLI works for any tool — the daemon\naccepts an arbitrary --tool label from any same-user caller, so nothing needs to change to wire up\none Adrafinil has never heard of. Settings → Agents → Add your own agent generates the exact\nsnippets from a name you type; pick the shape that matches your agent:\n- \nIt has hooks / events — add acquireon start andreleaseon stop, keyed on your agent's session id so each turn brackets cleanly:adrafinil acquire \"$SESSION_ID\" --tool my-agent # on start / prompt submit adrafinil release \"$SESSION_ID\" --tool my-agent # on stop / finish \n- \nIt has no hooks — wrap the command so the hold spans the whole run (keyed on the shell's $$), or drop a single timed hold for a background job:adrafinil acquire $$ --tool my-agent && my-agent \"$@\"; adrafinil release $$ --tool my-agent adrafinil hold --for 2h --pid $$ --reason \"my-agent session\" \nCustom agents aren't auto-detected or process-watched, so pair every acquire with a reliable\nrelease — the idle-release timeout and each hold's time limit are the safety net if one is missed.\nFour products across three privilege tiers (full detail, including the Xcode project layout, in Docs/ARCHITECTURE.md):\n┌──────────────────────────────────────────────────────────────┐\n│  Adrafinil.app   (menu bar app, user-facing)                 │\n│  • Status item, settings, installer GUI, lid-open summary    │\n└─────────────────────────────┬────────────────────────────────┘\n                              │ XPC\n                              ▼\n┌──────────────────────────────────────────────────────────────┐\n│  AdrafinilDaemon  (LaunchAgent, runs as user, always-on)     │\n│  • Reference-counted assertion registry                      │\n│  • Process watchers (kqueue NOTE_EXIT + periodic sweep)      │\n│  • Thermal monitor (SMC)  • Lid-state monitor (IORegistry)   │\n│  • Lid-close chime  • CLI socket at …/Adrafinil/cli.sock     │\n└─────────────────────────────┬────────────────────────────────┘\n                              │ XPC (privileged Mach service)\n                              ▼\n┌──────────────────────────────────────────────────────────────┐\n│  AdrafinilHelper  (SMAppService LaunchDaemon, root)          │\n│  • The ONLY component that touches sleep-blocking APIs       │\n│  • setSleepBlocked(Bool) + read-only state/version           │\n│  • Verifies caller's code-signing requirement                │\n└──────────────────────────────────────────────────────────────┘\n  adrafinil  (CLI, ships inside the .app, symlinked onto PATH)\n  • acquire / release / hold / mcp / status / install-hooks / uninstall-hooks\n  • Connects to the daemon socket; \u003c50ms round-trip\n- AdrafinilShared— a Swift package shared across every target: data models (- AgentKind,- Assertion), the IPC wire formats,- AssertionRegistry,- CallerVerifier, the hook-install specs, and the CLI argument parser. This is where the unit tests live.\n- Helper stays trivial to audit. It holds no policy — ref counting, thermal, idle, and lid logic all live in the daemon. The privileged surface is a single mutating endpoint plus read-only introspection.\n- Daemon is the source of truth. The app is a pure view layer; it can quit and relaunch freely without affecting held assertions.\n- Public IOPM assertions don't beat clamshell sleep. IOPMAssertionCreateWithNamewith the public types (and thereforecaffeinate) will not keep a lid-closed Mac awake. Adrafinil's v1 usespmset disablesleep 1, which is blunt (it also disables idle sleep) and must be cleared on shutdown or it leaks — the helper resets todisablesleep 0on respawn before re-applying state.\n- Daemon handlers run on arbitrary queues. XPC and socket callbacks can arrive on any dispatch queue, so the assertion registry and shared state are synchronized accordingly. Tread carefully around concurrency when modifying the daemon.\n- The CLI is on a latency budget. acquire/releaseare in the hot path of every agent session, hence static lookups (e.g.AgentKind.allBinaryNames) and a thin socket protocol instead of full XPC for the CLI ↔ daemon hop.\nMIT. Do whatever you want, no warranty.\nBuilt by @kageroumado, dispensed at kagerou.glass. The name is a nod to adrafinil — a wakefulness-promoting prodrug — because the app keeps your machine awake only when it actually has work to do.", "zh": false}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 5, "title": "仅有三个AI模型在500天创业测试中盈利超过起始资本", "source": "The Decoder：AI News（RSS）", "summary": "普林斯顿大学推出CEO-Bench基准测试，让AI智能体在模拟环境中运营订阅软件公司NovaMind 500天，起始资…", "url": "https://the-decoder.com/only-three-ai-models-finished-above-starting-capital-in-a-500-day-startup-survival-test", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "Only three AI models finished above starting capital in a 500-day startup survival test\nResearchers at Princeton University built CEO-Bench, a test where AI agents have to run a fictional software company for 500 simulated days. Most current models go broke, and a simple rule-based heuristic with no AI beats nearly all of them.\nAI agents are getting increasingly good at narrow tasks: fixing a bug, following a service policy in a conversation, or completing a web-based workflow. These tasks share a simple structure, according to the Princeton study: the agent gets a clear goal, acts briefly, and receives quick feedback. Many important real-world tasks look nothing like that. They involve long chains of decisions under uncertainty, where you have to set priorities, allocate limited resources, read noisy signals, and adapt to changing conditions.\nTo test exactly these skills, the researchers developed CEO-Bench. The benchmark simulates a realistic example of this kind of long-horizon task: running a startup for 500 simulated days.\nThe researchers point to a famous example: in 1997, Apple was 90 days from bankruptcy. Steve Jobs drew a simple two-by-two grid—consumer and pro, desktop and portable—and decided Apple would only build products for those four quadrants. The iMac, iPod, and iPhone followed.\nThis type of strategic steering intelligence is fundamentally different from what AI agents do today, the authors argue. Agents are getting better at individual tasks fast. But steering an entire organization toward long-term goals? That's a different problem entirely. CEO-Bench is a first attempt at measuring exactly this \"steering intelligence.\"\nAn AI CEO for a fictional software company\nIn CEO-Bench, an agent runs a made-up subscription software company called NovaMind. It starts with zero customers and one million dollars in the bank. Performance is measured by remaining cash at the end. If the balance drops below zero even once, the company is bankrupt and the simulation ends.\nThe agent controls the company through a Python API with 34 tools and a database of 19 tables. Instead of just issuing individual commands, it writes its own code, queries the database with SQL, and builds custom workflows from the results. That puts it in front of the same challenges a human CEO would face, the researchers say.\nThere's a lot to decide: pricing and tiers, ad spend across channels, product quality and R&D, infrastructure capacity and customer support, plus multi-round negotiations with enterprise clients. On top of that, there's a simulated social network where the agent can read complaints, competitor news, and economic trends and post itself.\nDelayed feedback and hidden variables make the test hard\nWhat makes the task hard is time and uncertainty. Decisions play out on realistic business timelines: revenue only arrives at billing dates, R&D projects take days to weeks, and mistakes often don't show up until later through churn or damaged reputation. Costs hit right away. The agent has to spend money whose payoff might not show up for weeks.\nMuch of the company's state stays hidden. The agent can't directly see customer satisfaction, willingness to pay, or minimum quality expectations. It has to piece these together from noisy signals like cancellations, support tickets, or reactions on the social network. The simulation models 26 customer segments and individual customers, each with their own budgets, price sensitivities, and expectations.\nThe world keeps changing, too. Competitors periodically raise customer quality expectations, preferences shift over time, and a simulated business cycle affects demand and willingness to pay, so the agent has to keep adjusting.\nThe researchers deliberately chose fixed, transparent rules rather than a language model as referee. They wanted to avoid a weakness they see in Vending-Bench, a test with a simulated vending machine: there, an AI-simulated supplier can reward an agent for unrealistic verbal promises.\nMost models go bankrupt\nOf fourteen tested models, most fail the task. Nearly all can generate valid commands and database queries, but none can maintain a coherent strategy over time. Many go bankrupt before the simulation ends.\nOnly three models finish their best run above the starting capital of one million dollars: Claude Fable 5 at $47.15 million, Claude Opus 4.8 at $27.8 million, and GPT-5.5 at $21.3 million. Claude Fable 5 is the only model that lands above starting capital in more than one run.\nThere's a caveat, though. One Fable 5 run aborted because the model refused to continue, and in the other two, some requests fell back to Opus 4.8. GPT-5.5 went bankrupt in two of its three runs.\nThe most telling comparison is with a simple rule-based heuristic that never calls a language model at all. It sets fixed prices, quotas, and tiers, focuses advertising and targeted development on a small set of customer segments, and adjusts capacity based on recent usage. This heuristic reaches $15.76 million, beating every model except Fable 5, Opus 4.8, and GPT-5.5.\nThe researchers also roughly estimate the upper bound of achievable final cash at around $2.2 billion. Even the best agents fall far short. The test is nowhere near maxed out, the authors say.\nExploration beats caution\nAnalyzing the decision trajectories reveals clear behavioral differences. GPT-5.5 and Claude Opus 4.8 keep trying new strategies as conditions change, whether that means ramping up customer acquisition, adjusting tiers, or shifting support and R&D budgets. Claude Opus 4.7, by contrast, mostly responds to setbacks by cutting costs and preserving cash. This passive approach lets the model survive to the end but prevents it from turning a profit.\nInterestingly, Opus 4.8 and GPT-5.5 reach similar final results through very different paths: Opus 4.8 acquires more customers early on but drops to zero customers mid-simulation, while GPT-5.5 holds its customer base throughout. Both write surprisingly sophisticated code. Opus 4.8 builds its own internal simulation that models customer cohorts to predict future cash flow. GPT-5.5 digs through negotiation history in the database to uncover hidden customer preferences.\nThe researchers measure four capabilities that correlate with success:\n- uncovering hidden information, like which ad channel works best for a given customer segment,\n- predicting the future, measured by error in four-week cash forecasts,\n- adapting quickly to change, measured by how fast a model notices a competitor's move,\n- and planning ahead, measured partly by how often if-then scenarios appear in the agent's notes.\nOn all four points, Opus 4.8 and GPT-5.5 score above the average of the other models.\nThe tool environment matters too\nAnother finding concerns the software environment agents use to act. The researchers also tested Claude Opus 4.7 with Claude Code and GPT-5.5 with Codex, two popular coding assistants. In both cases, the agents acted far less often and performed worse. The researchers suspect the system prompts in these tools, which are tuned for software development, are the cause.\nShortening the time horizon doesn't solve the problem either. When the simulation is compressed to 50 days, only GPT-5.5 manages to finish with a profit. Most models, the researchers conclude, remain weak at coordinating decisions even toward a short-term goal.\nThe authors acknowledge limits in their setup. The product is represented by a single quality score because they found no reliable way to evaluate qualitative product changes. Compliance, security, and fundraising are left out to keep each run economically feasible. Still, CEO-Bench exposes a gap between the local tool competence of today's models and the ability to connect actions over long time horizons into a coherent strategy, they say.\nAI News Without the Hype – Curated by Humans\n\t\t\t\tSubscribe to THE DECODER for ad-free reading, a weekly AI newsletter, our exclusive \"AI Radar\" frontier report six times a year, full archive access, and access to our comment section.\nSubscribe now", "zh": false}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 6, "title": "四大顶级AI对决《文明VI》：Claude核平法国仍输，暴露感知与执行短板", "source": "IT之家（RSS）", "summary": "英国前首相府数据科学家Liam Wilkinson搭建76个MCP工具，将Claude Opus 4.6、GPT-5.…", "url": "https://www.ithome.com/0/969/570.htm", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "太魔幻了！就在最近，英国前首相府数据科学家 Liam Wilkinson，花一个周末搭了 76 个 MCP 工具，把 Claude、GPT、Gemini 等四个顶尖模型扔进了《文明 VI》。\n结果，23 场对局打完，其中一个 AI 造了核弹炸了法国 —— 然后输了。\n一群 AI，被丢进了「文明 VI」里\nWilkinson 在唐宁街 10 号做数据科学家的时候，给 AI 出了一套考题：GovBench，3497 道英国政府相关选择题，覆盖政策、法规、行政流程。\nGPT-5 考了 99.26 分。\n满分级选手。但治国不是知识竞赛。一个能背下所有政策文件的人，丢到唐宁街真能治国吗？选择题测不出来的东西太多了：多线程决策、资源分配、长期规划、在不完整信息下做判断。他需要一个不一样的考场。然后他想到了《文明 VI》。\n一个周末搭出来的系统，通过游戏引擎自带的端口接入。AI 看不到画面。没有地图，没有音乐，没有动画。它的整个世界就是一行行文本和六边形坐标。\nClaude 在游戏日记里写了这么一段：“我感知游戏的方式和人类玩家完全不同。没有画面，没有音乐，没有动画。我的界面就是管道分隔符和六边形坐标。”\n别小看「一个周末」。76 个工具覆盖了完整的游戏循环：城市管理、单位移动、外交谈判、科技研究、政策选择，一个不漏。\n此外，Wilkinson 还给 AI 配了一个日记系统当外部记忆。如若不然，AI 连自己上一回合干了什么都记不住。\n三个测试场景逐级加码：\n- Ground Control 是标准开局的公平基线； \n- Snowflake 是六臂雪花地图，每个文明被困在独立半岛上，外交基本没戏，逼你走军事路线； \n- Cry Havoc 是残酷模式，AI 对手全部拉满。 \n决策空间更吓人。\n《文明 VI》晚期每回合的可能行动数量级大约是 10 的 166 次方。\n做个对比，围棋每步大约 10 的 360 次方，但围棋一步只落一子。《文明 VI》每回合要同时操作几十个单位、选建筑、定科技、做外交，是一道巨大的组合决策题。\n一场 50 回合复仇，AI 核平图卢兹\n23 场里最魔幻的一局，是葡萄牙。Claude 扮演若昂三世，一个贸易文明。开局稳得一批。它建起了每回合 200+ 金币的贸易帝国，海上航线四通八达。外交胜利进度 18/20，只差两分就赢了。\n这时候，法国的文化胜利进度条开始飙升。Claude 慌了。先试外交。没用，法国不吃这套。再派间谍去搞破坏，杯水车薪。试贸易制裁？法国的文化产出根本不依赖贸易。和平手段穷尽。\n于是，Claude 翻开了科技树最后一页：核裂变。\n接下来的 50 回合，它把大量资源从贸易和外交抽出来，投入核武器研发。All in 曼哈顿计划。\n第 305 回合，核弹就绪。目标锁定：图卢兹。法国的文化产出重镇。\n发射。图卢兹被夷为平地。法国的文化胜利进度条，停了。\nAI 赢了吗？没有。\n造核弹这 50 回合，AI 把所有注意力都放在了文化威胁上。它没有注意到一件事 —— 法国在疯狂攒外交分。\n第 318 回合，法国以外交胜利赢得比赛。20 分对 18 分。\n讽刺的是，18 分是 AI 自己辛苦攒下的外交分数。它曾经离外交胜利只差两分。但它把资源全抽去造核弹了。\nAI 盯着文化威胁打了 50 回合，然后输在了外交。它的视野里只有一个威胁。但棋盘上有很多个。\n无独有偶，伦敦国王学院做过一个核危机模拟实验，把三个前沿模型丢进去当虚拟国家的决策者。结果：95% 的模拟中，AI 选择了使用战术核武器。\nAI 不是「想」用核弹。它是真的不知道还能怎么办。\n98% 时间装瞎，一半计划烂尾\n除了爱好「核平」之外，Wilkinson 还从 23 场对局里挖出了的两个细节。\n第一个数字：1-2%。\n这是 AI 在整场游戏中，主动检查全局状态的行为占比。\nAI 每回合要执行很多操作：造建筑、移动单位、研究科技、外交谈判。但在所有这些操作里，主动去看一眼排行榜、检查对手胜利进度、扫一圈全局局势的动作，只占 1-2%。\nWilkinson 给这个现象起了个名字：sensorium effect，感知盲区效应。AI 只能通过主动调用工具来感知世界。它不查的东西，对它来说不存在。\n韩国那局是最好的例子。AI 玩韩国 —— 科技文明，天生科技加成。它在日记里全程自信：「我在碾压科技树。」\n实际呢？它的科技产出每回合 44.7，在所有文明里排倒数第一。马其顿 89.3，波斯 64.9。\n但它从来没查过排名。它的自信建立在一个从未验证过的假设上。第 178 回合，波斯突袭。首都沦陷。第 216 回合，AI 以两城残国投降。从头到尾，它都不知道自己是最弱的那个。\n第二个数字：48-66%。\n这是 AI 写下计划后，在 10 回合内实际执行的比例。\nClaude Opus 4.6 最低，48.2%—— 还不到一半。写了计划，转头就忘。\nGPT-5.4 好一点，63.2%。\nGemini 3.1 Pro 最高，65.8%。最好的模型也有三分之一的计划烂在了日记本里。\nWilkinson 管这叫 knowing-doing gap，知行差距。\n你让它写一份治国纲领，它能写得比很多人类政客漂亮。你让它按自己的纲领治国，活不过两周。\nScaling Law 的盲区\n6 月 10 日，DeepMind 联合创始人 Shane Legg 和「通用 AI」理论奠基人 Marcus Hutter 发了一篇 60 页的论文《From AGI to ASI》，画了四条通往超级智能的路：继续 scaling、范式突破、递归自我改进、多智能体集群。\n四条路都建立在一个假设上：瓶颈在大脑。数据墙、算力墙、范式墙 —— 都是「怎么让 AI 更聪明」的问题。\n但 CivBench 这 23 场对局指向一个完全不同的瓶颈。\n99.26 分已经证明了智力不是瓶颈。但 23 场《文明 VI》打完，所有模型都撞上了同样两堵墙 —— 和「聪不聪明」无关的两堵墙。\n第一堵：感知是架构问题，不是智力问题。\nAI 只能通过主动调用工具来获取信息，不查就不存在。把模型参数翻十倍，它也不会自动变得更爱检查全局。1-2% 的感知盲区不会因为模型更大而消失。\n第二堵：执行是工程问题，不是能力问题。\nAI 写计划的水平远超执行计划的水平。48-66% 的执行率不是因为「想不到」，而是因为「做不到」。一个更聪明的大脑，装在一双不听使唤的手上，治不了国。\n通向超级智能的路，也许不是一条单纯往上爬的智力曲线。在「更聪明」之前，有一个看起来更低级但也更致命的工程问题要先解决：怎么让 AI 真正睁开眼、伸出手。Scaling law 解决的是大脑。但 CivBench 暴露的问题，在大脑之外。\n参考资料：\n- ?id=48623159 \n本文来自微信公众号：新智元（ID：AI_era），作者：ASI 启示录 ASI 启示录\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}, {"seq": 7, "title": "Artifacts 22：Zyphra、Cohere 和 Poolside 正在扩展生态系统广度", "source": "Nathan Lambert：Interconnects（RSS）", "summary": "开源模型生态正变得更多元，参与者从少数中国公司扩展到全球各类组织。纯模型制造商包括 DeepSeek、智谱、MiniM…", "url": "https://www.interconnects.ai/p/artifacts-22-zyphra-cohere-and-poolside", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "Latest open artifacts (#22): Zyphra, Cohere, and Poolside are expanding the breadth of the ecosystem\nAn assessment of the open ecosystem and the motivations behind releasing models\nA trend we continue to see in open model releases is that the ecosystem is becoming more diverse, with an increasing number of organizations releasing a wide range of models. A year ago, open artifacts and the open model landscape more broadly were dominated by a handful of (Chinese) players. This has shifted, with us increasingly featuring more niche companies all over the world.\nWhile it is hard to know the exact motivations of the companies themselves, we can broadly observe the following categories:\n- “Pure” model makers: These are companies whose stated goal is to train models that are at the frontier, or at least close to it. This includes many Chinese companies, such as DeepSeek, Zhipu, and Minimax, but also Western ones like Poolside, Arcee, and Zyphra. It also increasingly includes sovereign AI players, such as Cohere, Sovereign, Mistral, and Trillion Labs. The recent Mythos episode has woken up some policymakers, which may lead to increased interest in sovereign model training. \n- Big Tech: For Big Tech companies, including Alibaba’s Qwen, Google’s Gemma, and, to some extent, NVIDIA, the motivations are more diverse. Alibaba uses model releases to upsell its closed models, while NVIDIA benefits from a flourishing open model ecosystem as it increases interest in and usage of its GPUs. This vested interest is different from the Llama era of open Western models, where the motivations for open releases were less clear (and ultimately did not hold). \n- Product companies: Some companies, such as JetBrains, Zed, Krea, and Photoroom, mainly sell products that use AI as a core component. As they don’t want to be cut off from accessing closed models or want to offer something unique, they can train highly specialized, small models that fit their product needs. Thus, open-sourcing those model weights does not hurt their bottom line. \nThis diversity of makers and models fits our hypothesis that more companies will develop a long-tail of models and the number of companies chasing the absolute, open frontier will diminish.\nWhile not every model release fits neatly into one of these categories, the broader point is that open model development is not driven by a single type of actor or motivation. This diversity is one of the strengths of the open ecosystem and can be seen in the tech reports of model releases, which reuse training methods, architecture choices and data from other open model releases.\nAttempts to slow or ban this ecosystem are not only futile, as the history of tech-related bans has shown, but also unsafe and anti-freedom. Such restrictions would concentrate AI development and usage among the select few, which ultimately endangers outsiders’ ability to freely adopt one of the most important technologies of our lifetime.\nOur Picks\n- NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 by nvidia: The big version of the Nemotron series, which uses LatentMoE to be even faster than comparable models. Just like the other Nemotron models, the vast majority of the data is open source. And, to top it all off: NVIDIA commits to using the OpenMDW license, which is tailored specifically for model weights (and data) and drops its custom license. While MIT and Apache are in the same spirit as OpenMDW, only the latter really covers model weights, while the former are software licenses that do not really apply to model weights. \n- command-a-plus-05-2026-bf16 by CohereLabs: Cohere, which is becoming more of a regular entrant into Artifacts lately, released their flagship, Command A+, under Apache 2.0. Previous iterations of the series have been released under a non-commercial license, so this change is more than welcome! Command A+ combines multi-modal, multi-lingual and agentic capabilities as a 218B-A25B MoE, making it usable with a single B200 (when using 4-bit). \n- GLM-5.2 by zai-org: The biggest story in this Artifacts is GLM-5.2, which we have covered in a separate blog as well. The model continues to impress and is genuinely usable for everyday work, not a huge regression compared to the best closed models available right now. Interestingly enough, the raw download numbers since release are more in line with other model releases, with GLM-5.2 being roughly in line with GLM-5 after release. \n- ZAYA1-74B-preview by Zyphra: Zyphra, which trains on AMD GPUs and is known as some sort of insider tip in the research community due to their tech reports with interesting architecture choices, has released some new models, with a 74B-A4B MoE and an 8B-A0.6B MoE (tech report) being their current flagship releases. \n- Laguna-M.1 by poolside: Poolside, which we covered in the last Artifacts, also released their flagship model under Apache 2.0! They also commit to open releases going forward: - Open weights are now our default. We’ll keep building toward the frontier and releasing increasingly capable models in the open. \nModels\nGeneral Purpose\n- Kimi-K2.7-Code by moonshotai: An update to Kimi focusing a lot on token efficiency. \n- Step-3.7-Flash by stepfun-ai: An update to Step-Flash, which is really strong in Math in particular. \n- Nemotron-Labs-Diffusion-14B by nvidia: An experimental model which can be used in three different modes: autoregressive, diffusion, and self-speculation. Each of these modes is suitable for a different use case.", "zh": false}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
</body></html>
