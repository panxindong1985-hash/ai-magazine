<script>
const DATA = {"meta": {"reportDate": "2026-06-29", "reportDateHuman": "2026年6月29日", "weekday": "星期一", "total": 7, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "模型发布/更新", "color": "#4f46e5", "items": [{"seq": 1, "title": "Grok 4.5 私测于 SpaceX 和 Tesla，性能接近 Opus", "source": "X：Elon Musk (@elonmusk, xAI)", "summary": "Grok 4.5，基于我们的1.5T V9基础模型，并在补充训练中加入Cursor数据，现已在SpaceX和Tesla进入私测。初步评估显示其性能接近，或许超越Opus。 强化学习仍在持续显著改进模型，Grok Build工具链也在日益完善。 所有参与者的出色工作！ 今年，@SpaceX 将每月发布完全从头训练的新模型。", "url": "https://x.com/elonmusk/status/2071184354756477041", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "Grok 4.5基于我们1.5T V9基础模型，并在补充训练中加入了Cursor数据，目前已在SpaceX和特斯拉进入内测阶段。早期评估显示其性能接近甚至可能超越Opus。 强化学习持续显著提升模型表现，Grok Build工具链也在日益精进。 所有参与者的工作都值得称赞！ 今年起，@SpaceX将每月发布完全从零训练的新模型。", "zh": true}, {"seq": 2, "title": "新浪开源VibeThinker-3B：推理可压缩，事实知识不能", "source": "The Decoder：AI News（RSS）", "summary": "新浪发布仅3B参数的VibeThinker-3B，在AIME26等数学编程基准上持平DeepSeek V3.2等大200–333倍的模型，LiveCodeBench超越所有20B以下模型，LeetCode竞赛解决123/128题超过GPT-5.2、Kimi K2.5等。但知识密集型GPQA-Diamond大幅落后。模型基于阿里Qwen2.5-Coder-3B，经SFT、强化学习、自蒸馏等多阶段后训练。研究提出“参数压缩-覆盖假说”：逻辑推理依赖少数可压缩模式，而广泛世界知识仍需大参数。模型已开源。", "url": "https://the-decoder.com/sinas-open-model-vibethinker-3b-aims-to-show-reasoning-compresses-well-but-factual-knowledge-doesnt", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "新浪开源模型VibeThinker-3B旨在展示推理能力可高效压缩，但事实性知识仍需大模型支撑\n\n核心要点\n- 微博推出的VibeThinker-3B仅拥有30亿参数，但在数学和编程基准测试中，其表现可媲美体积大333倍的顶尖模型。\n- 该性能源于对阿里基础模型进行的多阶段后训练。然而，在需要广泛事实性知识的任务中，这个小模型明显落后。\n- 研究人员得出结论：结构化逻辑推理依赖少量模式，可高效压缩；而广泛的世界知识仍需大模型承载。\n\n一个仅有30亿参数的中文语言模型，有时能在数学和编程任务上与比它大百倍的模型一较高下。其背后的研究人员就此提出了关于AI能力结构构成的假说。\n\n微博母公司新浪发布了一款小型语言模型，在硬核数学和编程任务上能与当今顶尖模型竞争。根据技术报告，VibeThinker-3B在AIME26等竞争性基准测试中，表现与DeepSeek V3.2和Kimi K2.5持平。后两者的参数量是前者的200到333倍。\n\n新浪将该模型定位为一次实验，旨在探究模型究竟需要多少算力才能跻身顶尖水平。其前代产品VibeThinker-1.5B于2025年11月发布。新版本更进一步，试图验证小型模型能否达到真正的顶级性能，而不仅仅是\"在其尺寸范围内表现良好\"。\n\n逻辑可缩放，事实性知识则不然\n\n结果呈现出两种截然不同的情况。在数学奥赛或编程挑战这类具有清晰可验证解决方案的结构化任务上，VibeThinker-3B的表现与GLM-5或Gemini 3 Pro等模型相当。在LiveCodeBench上，它击败了所有参数量低于200亿的其他模型。\n\n事实性知识则是另一回事。在知识密集型的GPQA-Diamond基准测试中，该模型远落后于其体积大得多的竞争对手。\n\n为排除数据污染的可能性，研究团队让该模型参加了2026年4月下旬至5月下旬（训练结束后）举办的LeetCode竞赛。VibeThinker-3B首次尝试便解决了128道题目中的123道。这使其领先于GPT-5.2、Qwen3-Max、Kimi K2.5和Claude Opus 4.6。它仅落后于GPT-5.3-Codex、Gemini 3.1 Pro和Gemini 3 Flash，但差距不大。\n\n后训练是性能提升的关键\n\nVibeThinker-3B基于阿里巴巴的Qwen2.5-Coder-3B构建。新浪的贡献在于后训练部分，即在大数据集上进行通用预训练之后的所有环节。根据报告，正是后训练使得一个3B模型接近了顶级性能。\n\n后训练分阶段进行。首先，模型通过监督微调学习广泛的任务，涵盖数学、编程和通用对话。然后，它针对困难的多步推理问题进行定制化训练。\n\n随后依次进行针对数学、编程和STEM领域的强化学习。接着通过自蒸馏将每个阶段习得的技能整合到单一模型中。最后一步确保模型能更好地遵循指令。\n\n在微调过程中，团队有意构建了多样化的解题路径。强化学习则强化那些有效的路径。其论点在于，性能源自训练方法、数据质量和可靠的验证信号，而非更多的参数。\n\n这对AI能力运作方式的启示\n\n基于这些结果，作者提出了所谓的\"参数压缩-覆盖假说\"。不同AI能力具有不同结构，所需参数量也各不相同。 逻辑推理（如逐步解数学题）依赖于少数重复模式：搜索、条件检查、纠错、整合中间结果。这类技能可压缩至紧凑核心。而世界知识则不同——回答跨领域的开放性问题需要广泛覆盖，这意味着需要大量参数存储海量事实。 研究人员表示，这重新定义了小模型的定位。它们并非仅为低成本推理而设计的廉价轻量版，而是与传统扩展逻辑并行的独立研究路径。当任务可验证且具有清晰解构时，参数量不再是瓶颈。 VibeThinker-3B已在Hugging Face和GitHub上开源。 小模型在特定任务上追赶更大系统的趋势日益明显。今年4月，阿里巴巴的Qwen3.6-27B在全部编码基准测试中超越其15倍规模的上一代模型。据开发者称，阿布扎比的Falcon H1R 7B达到了其规模2至7倍模型的性能水平。此前关于小模型逻辑缺陷的研究表明，它们通常在多步推理中遭遇瓶颈。而VibeThinker在可验证任务上的成果恰恰挑战了这一假设。\n\n**AI新闻无炒作·人工精选** 订阅《解码者》获取无广告阅读、每周AI简报、每年六期独家\"AI雷达\"前沿报告、完整档案库及评论区权限。 立即订阅", "zh": true}]}, {"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 3, "title": "Wayfinder Router：在本地和托管的大语言模型之间进行确定性查询路由", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Wayfinder Router 通过分析提示词的结构（长度、标题、列表、代码）和措辞（证明、数学、硬约束），在微秒级完成路由决策，完全离线且无需调用其他模型。默认仅使用结构特征，词汇线索因盲测未泛化而默认为关闭。对比依赖模型调用的路由器（如 RouteLLM、NotDiamond），它避免了延迟、成本和随机性。用户可在自有数据上校准评分阈值。支持任何 OpenAI 兼容 API（含 Ollama、Anthropic、Groq、vLLM 等），可自托管。提供终端和网页演示（--dry-run 无需密钥），以及基准测试和 FAQ。", "url": "https://github.com/itsthelore/wayfinder-router", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "一个快速、离线、对每个提示进行“难/易”判断的评分器——确定性评分，无需调用模型。将简单提示路由到你的小型/本地模型，将困难提示路由到你的大型模型，或者在其背后组合任意模型路由器。\n\n快速开始 · 基准测试 · 对比分析 · 原理说明 · 更新日志\n\n| 无需模型调用即可决定路由 | 确定性且完全离线 | | 基于自有数据校准 | 自带密钥自托管 |\n\nWayfinder 会分析提示的结构（长度、标题、列表、代码）和措辞（证明、数学、硬约束），生成 0.0–1.0 的复杂度评分，然后将简单提示路由到你的小型/本地模型，将困难提示路由到你的大型模型。这一决策本身就是产品：确定性、亚毫秒级、完全离线——无需 API 密钥、无需网络、无需调用模型。路由的目标完全由你决定：两层、N 层阶梯，或在其背后组合的模型路由器。\n\n低成本提示留在本地，困难提示则交给昂贵模型，这样你就不必再为“总结这段内容”和“修正我的拼写错误”支付顶级模型的价格。\n\n大多数路由器通过调用模型来决策：训练好的分类器、LLM 评判器或托管 API。这会在本应为你省钱的环节增加延迟、成本和随机性。Wayfinder 则通过分析结构和措辞来决策，因此判断过程免费且结果始终一致。\n\n| 路由器 | 决策方式 | 调用模型？ | 自托管 | 可校准 | |---|---|---|---|---| | Wayfinder | 确定性结构评分 | 否 | 是 | 是 | | RouteLLM | 训练分类器（偏好数据） | 是 | 是 | 需重新训练 | | NotDiamond / Martian | 学习型、托管 | 是 | 否 | 通过平台 | | OpenRouter (Auto) | 托管自动路由器 | 是 | 否 | — | | Bifrost / LiteLLM | 提供商网关（非复杂度路由） | 否 | 是 | 不适用 |\n\n最后两行的网关（OpenRouter、Bifrost、LiteLLM）解决的是不同问题：根据价格、可用性和故障转移，由哪个提供商处理调用。Wayfinder 解决的是提示应属于哪个层级：低成本 vs 高成本，根据难度离线判断。两者可以组合使用。运行 Wayfinder 进行低成本 vs 高成本的判断，再通过底层网关连接提供商。\n\nWayfinder 并非追求最高准确率——它提供的是一个你可以离线运行并根据自身流量调整的路由决策。默认情况下，它仅评分提示结构；它也可以读取词汇线索（证明、数学、约束），但这些功能默认关闭，因为双盲测试显示其提升效果不具备泛化能力（它只能捕捉约 20% 的未见困难提示，且输给了简单的词频基线）。如果提示的难度纯粹是语义性的（如微妙的代码片段、“第 100 个质数是什么？”），则没有结构上的线索，语义路由器会在这种情况下胜出。基准测试（运行 benchmark）展示了它在与诚实基线和完美预言机对比时的优劣；FAQ 给出了直白的说明——包括它在 RouterBench 的短而难的条目上表现不比随机好，以及为什么你仍然应该运行它。\n\n两种方式亲自查看路由决策——无需 API 密钥、无需模型、无需网络连接。\n\n在终端中——Wayfinder 面板中的决策优先聊天。终端聊天功能包含在默认安装中，因此无需额外添加——或者通过 uvx 零安装运行：\n\n``` uvx wayfinder-router chat --dry-run      # 零安装、零密钥 # 或：pip install wayfinder-router && wayfinder-router chat ```\n\n每次对话都会显示路由目标（● 本地 / ◆ 云端）、结构评分及原因。\n\n(/why)，以及始终云端模式下的运行成本对比。/init 可在不离开聊天界面的情况下设置模型，/route · /local · /cloud 强制切换对话轮次，对话内容可在不同会话（/threads）间持续保留。\n\n在浏览器中——带有实时阈值滑块的网页聊天界面： ```bash pip install \"wayfinder-router[gateway]\" wayfinder-router webchat --dry-run # 打开 http://127.0.0.1:8088/demowebchat 是一个轻量级启动器，基于 serve 命令（网关及其 /demo 页面；支持 --no-open、--port、--host 0.0.0.0、--dry-run 参数）；serve 是无头命令。无配置时仅执行决策（--dry-run），因此无需任何设置即可试用；要获得真实回复，请运行 wayfinder-router init 来搭建 [gateway.models] 配置（然后执行 wayfinder-router doctor 确认密钥解析成功）——详见快速入门指南。\n\nWayfinder 将每次调用转发至 OpenAI 风格的 /chat/completions 端点——只要你的服务商支持该协议（大多数都支持），即可直接使用。一个层级包含 base_url、模型名称和请求时从环境变量读取的密钥；无需 SDK，无需针对每个服务商编写代码。可将免费本地模型与托管模型配对，或运行两个云端层级。\n\n……此外还支持 Groq、Together、OpenRouter、Fireworks、DeepSeek 以及本地服务器（vLLM、LM Studio、llama.cpp）——以及任何接受 Bearer 密钥的 OpenAI 兼容端点。\n\n将 Wayfinder 置于模型之前。你的应用继续使用 OpenAI API；只需更改一个 base_url。\n\n- **搭建配置**——init 命令会生成初始的 wayfinder-router.toml 文件（无密钥的本地 Ollama → Anthropic 云端）以及 .env.example 文件，然后检查你的密钥：\n```bash pip install \"wayfinder-router[gateway]\" wayfinder-router init # 初始配置（混合预设） wayfinder-router init --preset openai # 两个 OpenAI 层级（gpt-4o-mini → gpt-4o） wayfinder-router init --preset gemini # 两个 Gemini 层级（gemini-2.5-flash → gemini-2.5-pro） wayfinder-router init --interactive # 逐步选择服务商/模型 ``` 或者手动在 wayfinder-router.toml 中描述你的两个模型： ```toml [routing] threshold = 0.5 # 低于阈值 -\u003e 本地，达到/高于阈值 -\u003e 云端\n\n[gateway.models.local] base_url = \"http://localhost:11434/v1\" model = \"llama3.2\"\n\n[gateway.models.cloud] base_url = \"https://api.openai.com/v1\" model = \"gpt-4o\" api_key_env = \"OPENAI_API_KEY\" # 从此环境变量读取，永不存储 # api_key_cmd = \"op read op://Private/OpenAI/credential\" # 可选：从密码库填充 ``` Wayfinder 从不存储密钥：模型指定环境变量名（api_key_env），密钥在请求时从你的环境中读取。无需“安装”任何东西——只需导出变量即可。不想在 shell 中粘贴原始密钥？添加可选的 api_key_cmd，Wayfinder 会在启动时从你的密钥库填充该变量——支持 op read …（1Password）、security …（macOS 钥匙串）、secret-tool …（Linux）、pass/gopass、vault kv get …、aws secretsmanager get-secret-value …、bw、doppler、gcloud secrets … 或任何能输出密钥的命令。密钥仅保存在内存中，永远不会写入磁盘。wayfinder-router doctor 会检测你已安装的工具并建议准确的命令。\n\n- **设置密钥，然后运行网关**。doctor 命令会重新检查配置以及每个模型的密钥是否解析成功（✓ 已设置/✗ 未设置），然后你再启动：\n```bash export ANTHROPIC_API_KEY=sk-... # 或 OPENAI_API_KEY，根据你的配置 wayfinder-router doctor # 每个模型显示 ✓/✗ —— 每个密钥是否已设置？ wayfinder-router serve --port 8088 ```\n\n将您现有的客户端指向它。无需修改代码：client = openai.OpenAI(base_url=\"http://localhost:8088/v1\", api_key=\"unused\") client.chat.completions.create(model=\"auto\", messages=[{\"role\": \"user\", \"content\": \"...\"}])\n\n简单提示走本地，复杂提示走云端，每条响应都会携带 x-wayfinder-router-model 和 x-wayfinder-router-score 字段，方便您查看路由去向。想为某个请求强制指定层级？设置 model=\"local\" 或 \"cloud\"（或 prefer-local / prefer-hosted），通过 X-Wayfinder-Threshold 标头调整单次调用的阈值，或者在聊天消息开头输入 /local 或 /cloud（参见控制单个请求）。\n\n验证是否正常工作： curl -s localhost:8088/healthz # {\"status\":\"ok\",\"models\":[\"cloud\",\"local\"]} curl -s -D - -o /dev/null http://localhost:8088/v1/chat/completions \\ -H \"Content-Type: application/json\" \\ -d '{\"model\":\"auto\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}' \\ | grep -i x-wayfinder-router # x-wayfinder-router-model: local # x-wayfinder-router-score: 0.00\n\n还没有后端？wayfinder-router serve --dry-run 会返回路由决策而非调用上游，让您在连接真实模型前，30 秒内就能感受路由效果。\n\n| 命令 | 功能 | |---|---| | pip install wayfinder-router | 评分器、CLI、Python API 和终端聊天（chat）；评分器/库导入保持轻依赖 | | pip install \"wayfinder-router[gateway]\" | 添加兼容 OpenAI 的路由网关，这是服务场景的常见配置 | | pip install \"wayfinder-router[ui]\" | 添加本地校准/解释/配置界面 | | pip install \"wayfinder-router[all]\" | 在默认安装基础上添加网关和界面 |\n\n让 Wayfinder 成为您机器上始终在线的 LLM 端点，这样所有兼容 OpenAI 的应用可以共享同一个本地 base_url，您只需设置一次密钥。service install 会将其注册到操作系统服务管理器，实现登录时启动并在退出后自动重启： wayfinder-router service install     # macOS（launchd）或 Linux（systemd 用户单元） wayfinder-router service status      # 是否运行？端点 + /healthz wayfinder-router service uninstall\n\n然后将您的应用指向它——大多数兼容 OpenAI 的工具会读取 OPENAI_BASE_URL： export OPENAI_BASE_URL=http://127.0.0.1:8088/v1\n\nmacOS 是主要目标平台，Linux 同样适用。--print 会输出单元文件但不安装，如果没有服务管理器，它会写入单元文件并打印启动命令。这仍然是同一个网关，只是保持持续运行——路由决策保持不变。\n\nWayfinder 位于您已有的任何兼容 OpenAI 的客户端之后。您只需将该客户端的 base_url 指向网关一次，之后它便隐于幕后。同一个客户端既能处理本地路由的请求，也能处理托管路由的请求。 您的客户端  （聊天应用、IDE、代理或代码） | v Wayfinder 网关   评分，选择模型 | |-- 低分  --\u003e  本地    （Ollama、vLLM） |-- 高分  --\u003e  托管    （OpenAI、任何 /v1） | v 响应通过同一客户端返回， 并携带 x-wayfinder-router-* 标头\n\n由此衍生出几个要点：\n- 前端界面由您决定。可以是聊天 GUI（Open WebUI、LibreChat）、支持自定义端点的 IDE 助手（Cursor、Continue）、代理框架，或是您基于 OpenAI SDK 编写的代码。想要一个聊天窗口？今天就可以将 Open WebUI 放在前端并指向网关。\n- 本地和托管是后端，而非应用。本地模型只是一个服务器\n\n(Ollama, LM Studio, vLLM, llama.cpp) 均兼容 OpenAI 的 /v1 接口；托管版本也采用相同格式。用户无需切换 UI，通常也不知道是哪个模型在响应。\n\n密钥在请求时从环境变量读取，绝不会触及配置文件或评分路径。\n\n```bash echo \"用一句话总结这段文字。\" | wayfinder-router route\n- 推荐模型: local\n- 复杂度评分: 0.00 (模式: 分层)\n- 层级:\n\u003e= 0.00  local \u003c- \u003e= 0.50  cloud\n- 贡献特征:\n单词数: 6 ... ```\n\n添加 `--json` 参数供机器消费（代理读取后路由至自身模型）：\n\n```json { \"schema_version\": \"3\", \"score\": 0.66, \"recommendation\": \"cloud\", \"mode\": \"tiered\", \"features\": { \"word_count\": 545, \"heading_count\": 12, \"reasoning_term_count\": 3, \"...\": 0 }, \"tiers\": [{ \"min_score\": 0.0, \"model\": \"local\" }, { \"min_score\": 0.5, \"model\": \"cloud\" }] } ```\n\nWayfinder 读取自身配置文件 `wayfinder-router.toml`，该文件通过从运行目录向上遍历查找。共有三种模式（优先级顺序：分类器 \u003e 分层 \u003e 阈值）；标量评分权重适用于任意模式。\n\n**二元模式**（默认）为单一阈值：\n\n```toml [routing] threshold = 0.6 weights = { word_count = 4.0, list_item_count = 2.5 } ```\n\n`--threshold N` 可覆盖单次运行；`WAYFINDER_ROUTER_THRESHOLD` 环境变量可覆盖全局设置。\n\n要启用词汇线索，提高其权重并在拐点处截断——这是基于真实前沿流量对结构默认值的唯一改进（技能 −0.038 → +0.057，RouterBench 上节省 61% 成本）。详见 `docs/lexical-routing.md` 和可编辑的 `examples/wayfinder-router.lexical.toml`；根据自身流量重新校准阈值（约 20 条提示的引导仅作为冒烟测试——参见 `benchmarks/calibration-eval.md`）。\n\n**分层模式**将评分区间路由至任意数量的模型：\n\n```toml [[routing.tiers]] min_score = 0.0 model = \"llama-3b\"\n\n[[routing.tiers]] min_score = 0.3 model = \"llama-70b\"\n\n[[routing.tiers]] min_score = 0.6 model = \"claude-cloud\" ```\n\n**分类器模式**是拟合的多项逻辑回归模型，基于每个模型线性评分的 argmax。通常通过 `calibrate` 生成，而非手动编写。\n\n每个 `[gateway.models.\u003cname\u003e]` 块将路由名称映射到上游 `base_url`、`model` 和可选的 `api_key_env`（环境变量名称，而非密钥本身）。网关是唯一接触密钥或网络的组件；评分器、配置和校准器保持纯净离线状态。\n\n阈值是代理参数，需根据自身流量调整。`wayfinder-router calibrate` 读取带标签的 JSONL 数据集（`{\"text\": ..., \"label\": ...}`）并输出配置片段。它离线运行，不调用任何模型；标签是您的真实基准。\n\n```bash wayfinder-router calibrate data.jsonl --mode threshold              # 扫描二元阈值 wayfinder-router calibrate data.jsonl --mode tiers                  # 有序多模型 wayfinder-router calibrate data.jsonl --mode classifier --out wayfinder-router.toml ```\n\n输出片段可直接放入 `wayfinder-router.toml`；准确率和选定断点会打印到 stderr。分类器通过确定性 L2 正则化牛顿/IRLS 拟合，纯 Python 实现，数轮迭代即可收敛。\n\n若要以成本而非纯准确率为目标选择阈值，请使用成本感知目标函数。`--objective knee` 自动选择成本感知拐点（最大化质量恢复 × 成本节省——无需猜测目标，且不会像纯准确率在偏斜标签上那样退化为始终路由至昂贵模型）。\n\n--objective cost-quality --target-savings X 用于设定具体的节省下限。 添加 --weights 参数，通过 — 进行评分并输出自定义特征权重（例如词汇选择），使输出成为完整可部署的配置（参见 docs/lexical-routing.md）： wayfinder-router calibrate data.jsonl --mode threshold --objective knee \\ --costs local=0.2,cloud=1.0 \\ --weights reasoning_term_count=5,math_symbol_count=3,constraint_term_count=1.5\n\n成本仅作为元数据——它影响校准后的阈值，并在 /metrics 端点上报，但不会进入每次请求的决策过程，该过程保持确定性和免费。\n\n部署的配置设定默认边界，但客户端可通过普通 OpenAI 传输为单个请求覆盖决策。覆盖仅改变请求的发送目标；提示仍会被评分，且不会增加模型调用。\n- model 字段是路由指令。auto（或任何普通模型 ID）让 Wayfinder 自行决策；配置的端点名称（local、cloud）将请求固定到该处；prefer-local/prefer-hosted 将请求固定到路由器的低/高端（prefer-cloud 仍可作为 prefer-hosted 的别名使用）。\n- X-Wayfinder-Threshold 标头可重新为该请求进行决策，数值范围为 0.0-1.0，复用您的权重（仅限二元路由器）。\n- 消息内的 /directive（opt-in:[gateway] slash_directives = true）允许普通聊天框控制路由——以 /local、/cloud 或 /hosted 开头的消息将覆盖路由决策。", "zh": true}, {"seq": 4, "title": "阿德拉菲尼尔：仅在AI agent工作时阻止Mac睡眠的菜单栏工具", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Adrafinil 是一款 macOS 菜单栏应用，仅在 Claude Code、Codex、Cursor、Gemini CLI、Aider、Hermes、OpenCode、Cline、Pi 等 9 种 AI coding agent 持有活跃会话时阻止系统睡眠（包括合盖睡眠）。无 agent 工作时，合盖后 Mac 正常睡眠。它通过各 agent 的钩子系统调用 CLI，往返延迟低于 50ms，支持引用计数断言、热切出（温度阈值强制释放）、空闲释放及进程嗅探。需要 macOS Tahoe 26.4，Xcode 26+ 构建，以签名公证的磁盘映像提供。", "url": "https://github.com/kageroumado/adrafinil", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "rx no. 006 ・ a·draf·i·nil /əˈdræfɪnɪl/ ・ 一种用于机器的优格醒脑剂 ♡ | 清醒 ・ 代理正在工作——或自行保持清醒 | 空闲 ・ 无代理，正常睡眠——或自行保持清醒 | 服用注意 ・ 适用于你入睡后仍需值守的机器。\n\n凌晨3点。你已入睡。但代理没有——它仍在你数小时前启动的会话中思考，而你合上的屏幕盖，像一只无法完全闭合的眼睑。 咖啡因和安非他命是兴奋剂：它们让机器永远保持通电状态，无论是否有人在场。阿屈非尼是优格醒脑剂。它本身毫无作用，直到某个代理获取它——仅在任务存续期间，通过合盖状态保持你的Mac清醒；当最后一个会话释放时，它立即清除。它只为工作而唤醒——然后你们一同安眠。♡\n\n仅在AI代理工作时保持Mac清醒。 Adrafinil是一款macOS菜单栏应用，仅在AI编程代理拥有活跃会话时阻止系统休眠——包括合盖（屏幕闭合）休眠。当无代理工作时，睡眠行为不受影响：合上盖子，Mac正常休眠。 它与caffeinate或Amphetamine这类始终唤醒的实用工具相反。Adrafinil仅在代理（Claude Code、Codex、Cursor等）处于任务中时介入，并在工作完成瞬间退出。\n\n三种保持清醒的方式：\n- 自动模式——代理钩子告知Adrafinil每次轮次开始和结束，因此仅在代理实际工作时阻止休眠。（可选进程嗅探功能也可识别未安装钩子的运行中代理。）\n- 代理驱动——代理可通过内置MCP工具或adrafinil hold CLI，在回复后故意保持Mac清醒以执行长时间构建或部署。\n- 手动模式——菜单栏的“保持清醒”按钮可自行设置限时保持，即使无代理运行；“让它休眠”则清除所有状态。\n\n⚠️ 特权睡眠控制。覆盖合盖休眠需要root权限。Adrafinil将此功能隔离在一个小型、可审计的辅助程序中，该程序仅暴露`setSleepBlocked(Bool)`——所有策略运行在无特权守护进程中。它持有标准`IOPMAssertion`用于空闲休眠，并使用`pmset disablesleep`控制合盖休眠，同时设备端验证更私有的`IOPMrootDomain`路径不会让无显示屏的合盖Mac保持唤醒。详见Docs/ARCHITECTURE.md §2。\n\n- 代理感知，非始终开启。仅当≥1个代理会话持有断言时阻止休眠。零会话→正常休眠，包括合盖。\n- 9种代理的钩子集成。一键安装器将Adrafinil接入Claude Code、Codex、Cursor、Gemini CLI、Aider、Hermes、OpenCode、Cline和Pi的钩子系统。\n- 亚50毫秒CLI。`adrafinil acquire/release`从代理钩子调用，与守护进程往返时间低于50毫秒，绝不拖慢代理工作流。\n- 引用计数断言。重叠会话干净堆叠；仅当最后一个会话释放时解除休眠阻塞。\n- 热保护切断。若合盖状态下皮肤/CPU温度超过阈值，所有断言被强制释放，防止包内Mac过热自毁。\n- 空闲释放。拥有断言的进程已终止或CPU空闲N分钟时，断言自动丢弃。\n- 进程嗅探（可选）。守护进程可在检测到已知代理二进制运行时自动获取断言，即使未安装钩子。\n\n- 手动保持唤醒（无需代理）。菜单栏的“保持唤醒”按钮可按需启动一个限时保持——用于长时间下载、本地任务或任何脱离代理的操作——然后“让它休眠”即可释放。\n- 合盖音频 + 开盖摘要。合上盖子时（屏幕关闭，因此无通知），会发出提示音确认断言已生效；重新打开盖子时，会显示您离开期间运行的内容、峰值温度以及热切断是否触发。\n- 干净卸载。移除它在所有代理配置中添加的每个钩子条目。\n- macOS Tahoe 26.4。这是我构建和测试的版本；它可能能在更早的 26.x 版本上运行，但我尚未在此版本上测试。\n- 需要 Xcode 26+ 进行构建，并启用 Swift 6 严格并发。\n- 标准安装需要管理员权限（特权助手通过 SMAppService 安装）。非管理员安装路径会将 CLI 放置在 `~/.local/bin` 中，而不是 `/usr/local/bin`。\n下载 Adrafinil——一个已签名并公证的磁盘映像。打开它，将 Adrafinil 拖到“应用程序”文件夹，然后启动。首次启动时会请求一次管理员权限以注册特权助手。需要 macOS 26.4 或更高版本。 更喜欢自己构建？请参阅“构建”部分。 ```bash git clone https://github.com/kageroumado/adrafinil.git cd adrafinil open Adrafinil.xcodeproj ``` 在 Xcode 中，选择 Adrafinil 方案并运行。您需要设置一个开发团队用于代码签名——守护进程（LaunchAgent）和助手（LaunchDaemon）嵌入到应用程序包中，并在应用程序启动时向系统注册。（源代码中未内置团队 ID；XPC 调用者检查会在运行时读取您自己的签名团队，因此使用任何开发者 ID 重新构建都会授权其自身组件，无需更改代码。）\n\n对于无需本地签名身份的无头编译检查： ```bash xcodebuild -project Adrafinil.xcodeproj -scheme Adrafinil -configuration Debug \\ -destination 'generic/platform=macOS' \\ CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' build ``` 共享逻辑作为 Swift 包独立构建和测试： ```bash cd AdrafinilShared swift test ``` 代理不会直接与 Adrafinil 通信。每个代理的钩子系统会调用捆绑的 CLI： ```bash adrafinil acquire \u003csession-key\u003e --tool claude-code --reason \"long build\"   # 当轮次开始时 adrafinil release \u003csession-key\u003e                                            # 当代理进入空闲状态时 ``` 保持是活动范围的，而非会话范围的：Claude Code 在 UserPromptSubmit 时获取，在 Stop 时释放，因此 Mac 仅在代理实际工作时保持唤醒——在提示符处打开但空闲的会话会让它正常休眠。 守护进程按会话键进行引用计数，并在计数非零时请求助手阻止休眠。 代理还可以通过限时保持，让 Mac 在回复结束后（例如长时间构建或部署）保持唤醒以执行后台任务——可以直接调用 `adrafinil hold`，或者对于支持 MCP 的代理，通过捆绑的 MCP 工具（由 `adrafinil mcp` 提供）实现： ```bash adrafinil hold --for 30m --reason \"deploy\"   # 保持唤醒最多 30 分钟，然后自动释放 adrafinil mcp                                 # 在 stdio 上使用模型上下文协议（供代理使用） ``` 您完全不需要代理：菜单栏的“保持唤醒”按钮可以手动放置相同类型的限时保持——用于长时间下载或任何脱离代理的任务——而“让它休眠”会释放所有内容。因此，Adrafinil 覆盖了所有三种情况：通过钩子自动检测代理活动，让代理通过 MCP/CLI 显式驱动，以及在需要时手动开启。\n\n其他子命令：status、install-hooks、uninstall-hooks、daemon-status、version。\n\nAdrafinil 为常见代理提供了集成支持，但 CLI 适用于任何工具——守护进程接受来自同一用户调用者的任意 `--tool` 标签，因此无需任何修改即可接入 Adrafinil 从未听说过的工具。设置 → 代理 → 添加自定义代理会根据您输入的名称生成精确的代码片段；选择与您的代理匹配的形态：\n\n- **支持钩子/事件**：添加 `acquireon start` 和 `releaseon stop`，以代理的会话 ID 为键，确保每次交互的边界清晰：\n``` adrafinil acquire \"$SESSION_ID\" --tool my-agent  # 启动/提交提示时 adrafinil release \"$SESSION_ID\" --tool my-agent  # 停止/完成时 ```\n\n- **无钩子支持**：将命令包裹起来，使持有期覆盖整个运行过程（以 shell 的 `$$` 为键），或为后台任务设置单次定时持有：\n``` adrafinil acquire $$ --tool my-agent && my-agent \"$@\"; adrafinil release $$ --tool my-agent adrafinil hold --for 2h --pid $$ --reason \"my-agent session\" ```\n\n自定义代理不会被自动检测或进程监控，因此请确保每次 `acquire` 都对应一个可靠的 `release`——空闲释放超时和每个持有的时间限制是防止遗漏的安全网。\n\n四个产品跨越三个权限层级（完整细节，包括 Xcode 项目布局，请参阅 Docs/ARCHITECTURE.md）：\n\n``` ┌──────────────────────────────────────────────────────────────┐ │  Adrafinil.app   (菜单栏应用，面向用户)                        │ │  • 状态项、设置、安装向导、开盖摘要                            │ └─────────────────────────────┬────────────────────────────────┘ │ XPC ▼ ┌──────────────────────────────────────────────────────────────┐ │  AdrafinilDaemon  (LaunchAgent，以用户身份运行，常驻)          │ │  • 引用计数的断言注册表                                        │ │  • 进程监视器 (kqueue NOTE_EXIT + 定期扫描)                    │ │  • 温度监控 (SMC)  • 开盖状态监控 (IORegistry)                 │ │  • 合盖提示音  • CLI 套接字位于 …/Adrafinil/cli.sock           │ └─────────────────────────────┬────────────────────────────────┘ │ XPC (特权 Mach 服务) ▼ ┌──────────────────────────────────────────────────────────────┐ │  AdrafinilHelper  (SMAppService LaunchDaemon，root 权限)      │ │  • 唯一接触睡眠阻塞 API 的组件                                  │ │  • setSleepBlocked(Bool) + 只读状态/版本                       │ │  • 验证调用者的代码签名要求                                     │ └──────────────────────────────────────────────────────────────┘ adrafinil  (CLI，内置于 .app 中，通过符号链接到 PATH)\n• acquire / release / hold / mcp / status / install-hooks / uninstall-hooks\n• 连接到守护进程套接字；往返时间 \u003c50ms\n```\n\n- **AdrafinilShared**——一个跨所有目标共享的 Swift 包：数据模型（- AgentKind、- Assertion）、IPC 有线格式、- AssertionRegistry、- CallerVerifier、钩子安装规范以及 CLI 参数解析器。单元测试位于此处。\n- **Helper** 保持简洁以便审计。它不持有任何策略——引用计数、温度、空闲和开盖逻辑全部位于守护进程中。特权接口仅包含一个可变端点加上只读内省。\n- **守护进程**是数据源。应用是纯视图层；它可以自由退出和重新启动，而不会影响已持有的断言。\n\n- 公开的IOPM断言无法阻止合盖休眠。使用公共类型（以及caffeinate）的IOPMAssertionCreateWithName无法让合盖的Mac保持唤醒。Adrafinil的v1版本采用pmset disablesleep 1，这种方式较为粗暴（同时也会禁用空闲休眠），且必须在关机时清除，否则会泄漏——辅助程序会在重新应用状态前，于重启时将disablesleep重置为0。\n- 守护进程处理器运行在任意队列上。XPC和套接字回调可能到达任意调度队列，因此断言注册表和共享状态需相应同步。修改守护进程时需谨慎处理并发问题。\n- CLI有延迟预算限制。acquire/release处于每个代理会话的热路径中，因此采用静态查找（如AgentKind.allBinaryNames）和轻量套接字协议替代完整XPC，用于CLI与守护进程之间的通信。\nMIT协议。可自由使用，不提供任何担保。 由@kageroumado构建，发布于kagerou.glass。名称灵感来源于adrafinil——一种促进觉醒的前体药物——因为该应用仅在机器确实有工作任务时才会保持唤醒状态。", "zh": true}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 5, "title": "仅有三个AI模型在500天创业测试中盈利超过起始资本", "source": "The Decoder：AI News（RSS）", "summary": "普林斯顿大学推出CEO-Bench基准测试，让AI智能体在模拟环境中运营订阅软件公司NovaMind 500天，起始资金100万美元。14个测试模型中，仅Claude Fable 5（最佳轮次盈利4715万美元）、Claude Opus 4.8（2780万美元）和GPT-5.5（2130万美元）在最佳运行中超过起始资本。一个不调用语言模型的简单规则启发式方法通过固定定价、配额和针对性开发达到1576万美元，超越除上述三款外的所有模型。多数模型无法保持连贯策略，在模拟结束前破产。该测试旨在衡量AI的长期战略决策能力。", "url": "https://the-decoder.com/only-three-ai-models-finished-above-starting-capital-in-a-500-day-startup-survival-test", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "在为期500天的创业生存测试中，仅有三款AI模型最终盈利超过初始资本 普林斯顿大学的研究人员构建了CEO-Bench测试平台，要求AI代理在500个模拟日内运营一家虚构的软件公司。当前多数模型以破产告终，而一个无需AI的简单规则启发式方法几乎击败了所有模型。\n\nAI代理在特定任务上表现日益精进：修复程序漏洞、遵循服务政策进行对话、完成网页端工作流程。但普林斯顿研究指出，这些任务结构简单——代理获得明确目标、执行短期操作、快速获得反馈。许多现实世界的重要任务截然不同：它们涉及长期不确定性决策链，需要设定优先级、分配有限资源、解读模糊信号并适应动态变化。\n\n为测试这些核心能力，研究人员开发了CEO-Bench基准测试。该模拟系统呈现了典型的长周期任务场景：在500个模拟日内运营一家初创企业。\n\n研究人员援引经典案例：1997年苹果公司距破产仅剩90天。乔布斯绘制了简单的2x2矩阵——消费级与专业级、台式机与便携设备——决定苹果仅开发这四个象限的产品。随后诞生了iMac、iPod和iPhone。\n\n研究团队认为，这种战略导向型智慧与当前AI代理的能力存在本质差异。AI在单项任务上进步神速，但引导整个组织实现长期目标？这完全是另一维度的问题。CEO-Bench正是首次尝试量化这种\"战略导向智能\"。\n\nAI首席执行官执掌虚构软件公司 在CEO-Bench中，代理运营名为NovaMind的虚构订阅制软件公司。初始状态为零客户、百万美元现金储备。最终绩效以剩余现金衡量，一旦余额跌破零即宣告破产，模拟终止。\n\n代理通过包含34个工具和19个数据库表的Python API掌控公司运营。不同于简单执行指令，它需要自主编写代码、通过SQL查询数据库、基于结果构建定制化工作流。研究人员表示，这使其面临与人类CEO相同的挑战。\n\n决策范围涵盖：定价策略与层级划分、跨渠道广告支出、产品质量与研发投入、基础设施容量与客户支持，以及企业客户的多轮谈判。此外还有模拟社交网络，代理可在此阅读投诉、竞品动态和经济趋势，并自主发布内容。\n\n延迟反馈与隐藏变量增加测试难度 时间与不确定性构成核心挑战。决策遵循真实商业周期：收入仅在结算日到账，研发项目耗时数天至数周，错误往往通过客户流失或声誉受损延迟显现。成本即时产生，而投资回报可能数周后才见分晓。\n\n公司多数状态保持隐蔽。代理无法直接观测客户满意度、支付意愿或最低质量预期，只能通过退订、支持工单或社交网络反应等模糊信号进行推断。该模拟系统包含26个客户细分群体及独立客户个体，每个都拥有独立的预算、价格敏感度和期望值。\n\n世界也在不断变化。竞争对手会定期提高客户质量期望，偏好会随时间推移而改变，模拟的商业周期会影响需求和支付意愿，因此智能体必须持续调整。\n\n研究人员特意选择了固定、透明的规则，而非语言模型作为裁判。他们希望避免在Vending-Bench（一个模拟自动售货机的测试）中看到的缺陷：在那里，AI模拟的供应商可能会奖励智能体做出不切实际的口头承诺。\n\n**多数模型破产**\n\n在测试的14个模型中，大多数未能完成任务。几乎所有模型都能生成有效命令和数据库查询，但没有一个能长期维持连贯策略。许多模型在模拟结束前就已破产。\n\n只有三个模型在最佳运行中最终资本超过起始的100万美元：Claude Fable 5（4715万美元）、Claude Opus 4.8（2780万美元）和GPT-5.5（2130万美元）。Claude Fable 5是唯一一个在多次运行中最终资本均高于起始资本的模型。\n\n不过有一个注意事项：Fable 5的一次运行因模型拒绝继续而中止，另外两次运行中部分请求回退到Opus 4.8。GPT-5.5在三次运行中有两次破产。\n\n最具说服力的对比是采用一个完全不调用语言模型的简单规则启发式方法。它设定固定价格、配额和层级，将广告和定向开发集中在小部分客户群体上，并根据近期使用情况调整产能。该启发式方法最终达到1576万美元，超过了除Fable 5、Opus 4.8和GPT-5.5之外的所有模型。\n\n研究人员还粗略估计了可实现最终现金的上限约为22亿美元。即使是最优秀的智能体也远未达到这一水平。作者表示，该测试远未被充分挖掘。\n\n**探索优于保守**\n\n分析决策轨迹揭示了明显的行为差异。GPT-5.5和Claude Opus 4.8在条件变化时不断尝试新策略，无论是加大客户获取力度、调整层级，还是改变支持和研发预算。相比之下，Claude Opus 4.7主要通过削减成本和保留现金来应对挫折。这种被动方式让模型能存活到最后，但无法实现盈利。\n\n有趣的是，Opus 4.8和GPT-5.5通过截然不同的路径达到了相似的最终结果：Opus 4.8早期获取更多客户，但在模拟中期客户数降至零，而GPT-5.5则在整个过程中保持了客户基础。两者都编写了令人惊讶的复杂代码。Opus 4.8构建了自己的内部模拟，对客户群体进行建模以预测未来现金流。GPT-5.5则通过数据库中的谈判历史挖掘隐藏的客户偏好。\n\n研究人员衡量了与成功相关的四种能力：\n- 发现隐藏信息，例如哪个广告渠道对特定客户群体最有效，\n- 预测未来，通过四周现金流预测的误差来衡量，\n- 快速适应变化，通过模型注意到竞争对手行动的速度来衡量，\n- 以及提前规划，部分通过智能体笔记中条件语句出现的频率来衡量。\n\n在这四个方面，Opus 4.8和GPT-5.5的得分均高于其他模型的平均水平。\n\n**工具环境也很重要**\n\n另一项发现涉及智能体用于行动的软件环境。研究人员还测试了搭载Claude Code的Claude Opus 4.7和搭载Codex的GPT-5.5——两款流行的编程助手。在这两种情况下，智能体的行动频率都大幅降低，表现也更差。研究人员怀疑，这些工具中针对软件开发优化的系统提示是罪魁祸首。\n\n缩短时间跨度同样无法解决问题。当模拟压缩至50天时，只有GPT-5.5最终实现了盈利。研究人员得出结论，大多数模型即使在短期目标面前，协调决策的能力依然薄弱。\n\n作者承认其设置存在局限性。产品仅通过单一质量评分来表征，因为他们找不到可靠的方法来评估定性的产品变化。合规性、安全性和融资环节被排除在外，以确保每次运行在经济上可行。但他们表示，CEO-Bench仍揭示了当前模型在局部工具能力与将长期行动串联成连贯策略的能力之间存在的差距。\n\n摒弃炒作的人工智能新闻——由人类精选 订阅《解码者》即可享受无广告阅读、每周AI简报、每年六期的独家\"AI雷达\"前沿报告、完整档案访问权限及评论区互动权限。 立即订阅", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 6, "title": "四大顶级AI对决《文明VI》：Claude核平法国仍输，暴露感知与执行短板", "source": "IT之家（RSS）", "summary": "英国前首相府数据科学家Liam Wilkinson搭建76个MCP工具，将Claude Opus 4.6、GPT-5.4、Gemini 3.1 Pro等四个模型放入《文明VI》进行23场对局。Claude扮演葡萄牙时，因法国文化胜利逼近，花50回合研发核弹核平图卢兹，但法国最终以外交胜利获胜。Wilkinson发现：AI主动检查全局状态仅占1-2%（感知盲区），计划后10回合内执行率仅48-66%（知行差距）。结论是智商非瓶颈，感知与执行才是关键。", "url": "https://www.ithome.com/0/969/570.htm", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "太魔幻了！就在最近，英国前首相府数据科学家 Liam Wilkinson，花一个周末搭了 76 个 MCP 工具，把 Claude、GPT、Gemini 等四个顶尖模型扔进了《文明 VI》。 结果，23 场对局打完，其中一个 AI 造了核弹炸了法国 —— 然后输了。 一群 AI，被丢进了「文明 VI」里 Wilkinson 在唐宁街 10 号做数据科学家的时候，给 AI 出了一套考题：GovBench，3497 道英国政府相关选择题，覆盖政策、法规、行政流程。 GPT-5 考了 99.26 分。 满分级选手。但治国不是知识竞赛。一个能背下所有政策文件的人，丢到唐宁街真能治国吗？选择题测不出来的东西太多了：多线程决策、资源分配、长期规划、在不完整信息下做判断。他需要一个不一样的考场。然后他想到了《文明 VI》。 一个周末搭出来的系统，通过游戏引擎自带的端口接入。AI 看不到画面。没有地图，没有音乐，没有动画。它的整个世界就是一行行文本和六边形坐标。 Claude 在游戏日记里写了这么一段：“我感知游戏的方式和人类玩家完全不同。没有画面，没有音乐，没有动画。我的界面就是管道分隔符和六边形坐标。” 别小看「一个周末」。76 个工具覆盖了完整的游戏循环：城市管理、单位移动、外交谈判、科技研究、政策选择，一个不漏。 此外，Wilkinson 还给 AI 配了一个日记系统当外部记忆。如若不然，AI 连自己上一回合干了什么都记不住。 三个测试场景逐级加码：\n- Ground Control 是标准开局的公平基线；\n- Snowflake 是六臂雪花地图，每个文明被困在独立半岛上，外交基本没戏，逼你走军事路线；\n- Cry Havoc 是残酷模式，AI 对手全部拉满。\n决策空间更吓人。 《文明 VI》晚期每回合的可能行动数量级大约是 10 的 166 次方。 做个对比，围棋每步大约 10 的 360 次方，但围棋一步只落一子。《文明 VI》每回合要同时操作几十个单位、选建筑、定科技、做外交，是一道巨大的组合决策题。 一场 50 回合复仇，AI 核平图卢兹 23 场里最魔幻的一局，是葡萄牙。Claude 扮演若昂三世，一个贸易文明。开局稳得一批。它建起了每回合 200+ 金币的贸易帝国，海上航线四通八达。外交胜利进度 18/20，只差两分就赢了。 这时候，法国的文化胜利进度条开始飙升。Claude 慌了。先试外交。没用，法国不吃这套。再派间谍去搞破坏，杯水车薪。试贸易制裁？法国的文化产出根本不依赖贸易。和平手段穷尽。 于是，Claude 翻开了科技树最后一页：核裂变。 接下来的 50 回合，它把大量资源从贸易和外交抽出来，投入核武器研发。All in 曼哈顿计划。 第 305 回合，核弹就绪。目标锁定：图卢兹。法国的文化产出重镇。 发射。图卢兹被夷为平地。法国的文化胜利进度条，停了。 AI 赢了吗？没有。 造核弹这 50 回合，AI 把所有注意力都放在了文化威胁上。它没有注意到一件事 —— 法国在疯狂攒外交分。 第 318 回合，法国以外交胜利赢得比赛。20 分对 18 分。 讽刺的是，18 分是 AI 自己辛苦攒下的外交分数。它曾经离外交胜利只差两分。但它把资源全抽去造核弹了。 AI 盯着文化威胁打了 50 回合，然后输在了外交。它的视野里只有一个威胁。但棋盘上有很多个。 无独有偶，伦敦国王学院做过一个核危机模拟实验，把三个前沿模型丢进去当虚拟国家的决策者。结果：95% 的模拟中，AI 选择了使用战术核武器。 AI 不是「想」用核弹。它是真的不知道还能怎么办。 98% 时间装瞎，一半计划烂尾 除了爱好「核平」之外，Wilkinson 还从 23 场对局里挖出了的两个细节。 第一个数字：1-2%。 这是 AI 在整场游戏中，主动检查全局状态的行为占比。 AI 每回合要执行很多操作：造建筑、移动单位、研究科技、外交谈判。但在所有这些操作里，主动去看一眼排行榜、检查对手胜利进度、扫一圈全局局势的动作，只占 1-2%。 Wilkinson 给这个现象起了个名字：sensorium effect，感知盲区效应。AI 只能通过主动调用工具来感知世界。它不查的东西，对它来说不存在。 韩国那局是最好的例子。AI 玩韩国 —— 科技文明，天生科技加成。它在日记里全程自信：「我在碾压科技树。」 实际呢？它的科技产出每回合 44.7，在所有文明里排倒数第一。马其顿 89.3，波斯 64.9。 但它从来没查过排名。它的自信建立在一个从未验证过的假设上。第 178 回合，波斯突袭。首都沦陷。第 216 回合，AI 以两城残国投降。从头到尾，它都不知道自己是最弱的那个。 第二个数字：48-66%。 这是 AI 写下计划后，在 10 回合内实际执行的比例。 Claude Opus 4.6 最低，48.2%—— 还不到一半。写了计划，转头就忘。 GPT-5.4 好一点，63.2%。 Gemini 3.1 Pro 最高，65.8%。最好的模型也有三分之一的计划烂在了日记本里。 Wilkinson 管这叫 knowing-doing gap，知行差距。 你让它写一份治国纲领，它能写得比很多人类政客漂亮。你让它按自己的纲领治国，活不过两周。 Scaling Law 的盲区 6 月 10 日，DeepMind 联合创始人 Shane Legg 和「通用 AI」理论奠基人 Marcus Hutter 发了一篇 60 页的论文《From AGI to ASI》，画了四条通往超级智能的路：继续 scaling、范式突破、递归自我改进、多智能体集群。 四条路都建立在一个假设上：瓶颈在大脑。数据墙、算力墙、范式墙 —— 都是「怎么让 AI 更聪明」的问题。 但 CivBench 这 23 场对局指向一个完全不同的瓶颈。 99.26 分已经证明了智力不是瓶颈。但 23 场《文明 VI》打完，所有模型都撞上了同样两堵墙 —— 和「聪不聪明」无关的两堵墙。 第一堵：感知是架构问题，不是智力问题。 AI 只能通过主动调用工具来获取信息，不查就不存在。把模型参数翻十倍，它也不会自动变得更爱检查全局。1-2% 的感知盲区不会因为模型更大而消失。 第二堵：执行是工程问题，不是能力问题。 AI 写计划的水平远超执行计划的水平。48-66% 的执行率不是因为「想不到」，而是因为「做不到」。一个更聪明的大脑，装在一双不听使唤的手上，治不了国。 通向超级智能的路，也许不是一条单纯往上爬的智力曲线。在「更聪明」之前，有一个看起来更低级但也更致命的工程问题要先解决：怎么让 AI 真正睁开眼、伸出手。Scaling law 解决的是大脑。但 CivBench 暴露的问题，在大脑之外。 参考资料：\n- ?id=48623159\n本文来自微信公众号：新智元（ID：AI_era），作者：ASI 启示录 ASI 启示录 广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}, {"seq": 7, "title": "Artifacts 22：Zyphra、Cohere 和 Poolside 正在扩展生态系统广度", "source": "Nathan Lambert：Interconnects（RSS）", "summary": "开源模型生态正变得更多元，参与者从少数中国公司扩展到全球各类组织。纯模型制造商包括 DeepSeek、智谱、MiniMax、Poolside、Arcee、Zyphra 及主权 AI 玩家 Cohere、Sovereign、Mistral、Trillion Labs；科技巨头如阿里 Qwen、Google Gemma 和 NVIDIA 各有不同动机；产品公司如 JetBrains、Zed、Krea、Photoroom 则训练高度专业的小模型。NVIDIA 发布 Nemotron-3-Ultra-550B-A55B-BF16，采用 LatentMoE 架构并改用 OpenMDW 许可证。Cohere 以 Apache 2.0 开源其旗舰…", "url": "https://www.interconnects.ai/p/artifacts-22-zyphra-cohere-and-poolside", "publishedAt": "2026-06-29T00:00:00.000Z", "exact": false, "content": "最新开放成果（第22期）：Zyphra、Cohere与Poolside拓展生态版图 开放生态系统评估及模型发布背后的动机\n\n我们持续观察到开放模型发布的一个趋势：生态系统正变得日益多元化，越来越多的机构发布各类模型。一年前，开放成果及更广泛的开放模型领域仍由少数（中国）参与者主导。如今格局已变，全球范围内更多细分领域的公司开始崭露头角。\n\n尽管难以确知各公司的具体动机，但大致可归纳为以下类别：\n- **“纯粹”模型制造商**：以训练前沿或接近前沿模型为明确目标的公司。包括DeepSeek、智谱、MiniMax等中国公司，以及Poolside、Arcee、Zyphra等西方企业。主权AI参与者（如Cohere、Sovereign、Mistral、Trillion Labs）也日益增多。近期Mythos事件已引起部分政策制定者关注，可能激发对主权模型训练的兴趣。\n- **科技巨头**：阿里巴巴（通义千问）、谷歌（Gemma）及某种程度上英伟达等巨头的动机更为多元。阿里巴巴通过模型发布推广闭源模型，英伟达则受益于繁荣的开放模型生态——这提升了其GPU的关注度与使用量。这种利益关联与西方Llama时代的开放模型不同（彼时开放动机模糊且最终未能持续）。\n- **产品公司**：JetBrains、Zed、Krea、Photoroom等公司主要销售以AI为核心的产品。为避免被闭源模型切断通路或提供独特功能，它们可训练高度专业化的小型模型以满足产品需求。因此开源模型权重不会损害其核心利益。\n\n这种制造者与模型的多样性印证了我们的假设：更多公司将开发长尾模型，而追逐绝对开放前沿的公司数量将减少。\n\n尽管并非所有模型发布都能严格归入上述类别，但核心在于：开放模型开发并非由单一主体或动机驱动。这种多样性正是开放生态的优势之一，在模型发布的技术报告中可见一斑——它们常复用其他开放模型的训练方法、架构选择与数据。\n\n试图限制或禁止这一生态不仅徒劳（科技禁令史已证明），更会带来安全风险与自由损害。此类限制将把AI开发与使用集中于少数群体，最终危及外界自由拥抱这个时代最重要技术的能力。\n\n**我们的推荐**\n\n- NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 by nvidia：Nemotron系列的大版本，采用LatentMoE技术，速度比同类模型更快。与其他Nemotron模型一样，绝大多数数据均为开源。更值得一提的是：NVIDIA承诺使用专为模型权重（及数据）定制的OpenMDW许可证，并弃用其自定义许可证。虽然MIT和Apache与OpenMDW精神一致，但只有后者真正覆盖模型权重，而前者作为软件许可证并不适用于模型权重。\n- command-a-plus-05-2026-bf16 by CohereLabs：近期频繁亮相Artifacts的Cohere，以Apache 2.0许可证发布了其旗舰模型Command A+。该系列此前版本均采用非商业许可证，此次转变令人欣喜！Command A+融合多模态、多语言及智能体能力，采用218B-A25B MoE架构，单张B200（4-bit模式）即可运行。\n- GLM-5.2 by zai-org：本期Artifacts最大亮点当属GLM-5.2，我们已在独立博客中详述。该模型持续惊艳，日常使用体验真实可靠，与当前最佳闭源模型相比并无明显差距。有趣的是，其发布后的原始下载量与其他模型持平，GLM-5.2与GLM-5发布后表现相当。\n- ZAYA1-74B-preview by Zyphra：在AMD GPU上训练、以技术报告中独特架构选择著称的Zyphra，发布了多款新模型。其当前旗舰产品包括74B-A4B MoE和8B-A0.6B MoE（技术报告）。\n- Laguna-M.1 by poolside：上期Artifacts报道过的poolside，同样以Apache 2.0许可证发布旗舰模型！他们还承诺未来将持续开源：开源权重现已成为我们的默认选择。我们将继续探索前沿，逐步发布能力更强的开源模型。\n\n模型 通用型\n- Kimi-K2.7-Code by moonshotai：Kimi的更新版本，重点优化令牌效率。\n- Step-3.7-Flash by stepfun-ai：Step-Flash的更新版本，尤其在数学领域表现强劲。\n- Nemotron-Labs-Diffusion-14B by nvidia：实验性模型，支持三种模式：自回归、扩散和自推测。每种模式适用于不同应用场景。", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });
    const rm = card.querySelector(".readmore");
    rm.addEventListener("click", function(e){ e.stopPropagation(); });
    grid.appendChild(card);
  });
  sec.appendChild(grid);mainEl.appendChild(sec);
});
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
