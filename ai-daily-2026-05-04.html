const DATA = {"meta": {"reportDate": "2026-05-04", "reportDateHuman": "2026年5月4日", "weekday": "星期一", "total": 9, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 1, "title": "从单张图像构建实时视频智能体：Runway Characters技术解析", "source": "Runway：News（网页）", "summary": "Runway公司推出“Characters”实时视频智能体，它能将任意单张参考图像（如真人、卡通或幻想生物照片）实时转化为具有自然对话表现力的视频角色。该技术基于其通用世界模型GWM-1，无需微调即可生成每秒24帧的高清视频，并同步口型、表情和头部运动。其核心突破在于通过自回归逐帧生成、流程优化与并行化，实现了每帧仅37毫秒的模型处理时间，以及从用户停止说话到角色开始响应仅1.75秒的服务器端延迟，从而满足了实时交互对话的严苛要求。", "url": "https://runwayml.com/news/building-runway-characters", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "## 如何构建实时视频智能体：将任意单张图片——逼真人类、卡通吉祥物或奇幻生物——转化为24fps下表情丰富的对话角色，无需微调\n\nRunway Characters是一款实时视频智能体，能将单张参考图片转化为表情丰富、可对话的视频角色。该产品基于我们的通用世界模型GWM-1构建，能以24帧/秒（fps）的高清画质生成自然的唇形同步、面部表情和头部动作。\n\nCharacters每帧的有效模型处理时间为37毫秒（超过24fps），从用户停止说话到角色开始响应的服务器端周转时间为1.75秒。\n\n本文将介绍Characters的独特之处：其可驱动的广泛内容范围、实时化实现方式，以及围绕该模型构建的产品生态系统。\n\nCharacters的输入仅需一张参考图片。系统直接从图片中提取风格，并立即开始基于实时音频生成对话视频。\n\n以下720p片段展示了Characters如何将不同风格的参考图片——从逼真人类到卡通、生物和品牌吉祥物——转化为自然生动的对话角色。\n\n**实时24fps：** Characters每帧的有效模型处理时间为37毫秒，从语音结束到首帧响应的服务器端周转时间为1.75秒。\n\n在交互式对话循环中以24fps生成高清视频，与离线视频生成存在本质区别。离线模式下每帧可花费数秒，而对话场景中每帧仅有42毫秒（1/24秒）的预算——这还未计入音频处理、网络传输以及延迟增加会破坏的\"实时感\"。在我们的实时会话中，实现了每帧37毫秒的有效模型处理时间，以及从用户停止说话到角色开始响应的1.75秒服务器端周转时间（语音智能体+视频管线）。\n\n这一突破得益于GWM-1的自回归逐帧生成：帧序列被顺序生成并实时流式传输至客户端，而非对整个片段进行迭代去噪。\n\n我们实现实时24fps的关键在于重叠处理：扩散变换器和VAE解码器通过管线拆分并发运行。这使得有效迭代成本接近max(扩散时间, 解码时间)，而非扩散时间+解码时间。\n\n每次迭代生成4个像素帧，因此在24fps下每167毫秒（4/24秒）需完成一次迭代。实测中，扩散耗时151毫秒，VAE解码耗时119毫秒；由于解码过程被重叠处理，其基本不会影响关键路径。这相当于每帧有效模型处理时间为37毫秒（151毫秒/4帧），低于41毫秒/帧的实时预算。\n\n若无重叠处理，扩散将消耗167毫秒预算的大部分，而解码会直接导致超限。通过重叠，第N-1帧的解码与第N帧的扩散同时进行。\n\n\"实时\"也体现在用户的端到端感知：从停止说话到角色开始响应的时间。综合计算：1185毫秒（语音智能体）+ 567毫秒（视频管线）= 本次会话中1.75秒的服务器端延迟。客户端↔服务器网络各增加200毫秒（往返400毫秒），具体取决于连接质量。\n\n进一步降低延迟的最大杠杆是语音代理：视频管线已经很快，我们预计随着语音代理响应时间的优化，整体周转时间将进一步缩短。 以下是实现实时性能的四项关键模型与系统级优化： 我们将推理任务分片到多个设备上，主要瓶颈在于通信开销。在专用设备上通过流水线方式并行执行张量并行扩散与VAE解码器，避免解码与Transformer争抢资源。 自回归视频每帧都会增长KV缓存。高效的驱逐/压缩策略在保持时间一致性的同时，不会牺牲吞吐量。 在某些分辨率下，内核启动开销可能成为主导。我们将前向传播捕获为静态CUDA图以减少开销，并严格约束形状与内存。 针对硬件优化注意力/矩阵乘法内核以降低延迟和内存流量。使用融合Triton内核有助于保持关键路径的高效性。 实现24fps的实时角色视频只是第一步。要构建实用的实时视频代理，还需要完善的产品生态：将角色锚定到你的领域、连接真实应用，并部署到实际对话场景中。 角色的声音是其身份与可信度的核心。我们通过文本转语音（基于提示词设计）和即时语音克隆（基于音频样本）快速获得“合适的声音”，并将其分配给角色，确保跨会话的音色一致性。 角色可在会话中为你执行操作。你可以定义其允许使用的“工具”——从UI操作（显示字幕、弹出知识卡片、更新游戏状态）到可信的后端RPC（例如通过fetch_order_status获取实时订单状态/预计到达时间），其结果会反馈到对话中。 上传自有文档（文本/Markdown格式），角色即可基于你的公司和产品知识（支持文档、常见问题解答、内部政策、技术规格等）进行对话，而非泛泛回应。 立即体验角色功能。与我们共同构建。 Runway Characters现已通过Runway API、网页及移动端应用开放使用。如果你热爱实时模型、低延迟系统，并希望打造前沿产品——我们正在招聘。", "zh": true}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 2, "title": "OpenAI的o1系统对急诊患者的诊断准确率为67%，而分诊医生的准确率仅为50%至55%", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "OpenAI的o1系统在急诊分诊诊断测试中表现优于医生。该系统对急诊患者的诊断准确率达到67%，而分诊医生的准确率仅为50%至55%。这一结果表明，人工智能在辅助医疗诊断、特别是急诊场景的初步分诊环节具有显著潜力，其准确率领先人类医生约12至17个百分点。相关研究由哈佛团队进行，具体数据来自《卫报》的报道。", "url": "https://www.theguardian.com/technology/2026/apr/30/ai-outperforms-doctors-in-harvard-trial-of-emergency-triage-diagnoses", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "从《急诊室的故事》中的乔治·克鲁尼到《匹兹堡急诊室》中的诺亚·怀尔，急诊科医生长期以来一直是备受欢迎的英雄角色。但很快，他们是否就要脱下白大褂了呢？一项开创性的哈佛研究发现，在高压的急诊分诊环节——即患者刚被紧急送医、面临生死攸关的时刻，AI系统的诊断准确率超过了人类医生。独立专家评价这一结果，称其展现了AI临床推理能力\"真正的进步\"。该研究是系列试验的一部分，测试了数百名医生与AI的应答表现。\n\n研究作者表示，发表在《科学》杂志上的结果表明，大型语言模型（LLM）\"已超越大多数临床推理基准\"。其中一项实验聚焦于波士顿某医院急诊科收治的76名患者。AI与两名人类医生各自阅读相同的标准电子健康档案——通常包含生命体征数据、人口统计信息以及护士记录的几句患者就诊原因。AI在67%的病例中给出了完全正确或高度接近的诊断，而人类医生的准确率仅为50%-55%。研究显示，在需要基于有限信息快速决策的分诊场景中，AI的优势尤为显著。当获得更详细的资料时，OpenAI的o1推理模型诊断准确率升至82%，而人类专家为70%-79%（尽管这一差异在统计学上不显著）。\n\n在制定长期治疗方案（如抗生素疗程或临终关怀规划）时，AI同样优于更大规模的人类医生群体。AI与46名医生被要求评估五个临床案例，计算机制定的方案得分89%，而使用搜索引擎等常规资源的人类医生仅得34%。但研究人员表示，急诊医生尚未到\"谢幕\"时刻。该研究仅测试了人类与AI处理可通过文本传递的患者数据的能力，未涉及AI对患者痛苦程度、外观等信号的解读。这意味着AI更像一名基于病历资料提供第二诊疗意见的临床医生。\n\n\"我不认为我们的发现意味着AI会取代医生，\"该研究主要作者之一、哈佛医学院AI实验室负责人阿尔琼·曼拉伊表示，\"但这确实意味着我们正在见证一项将重塑医学的深刻技术变革。\"另一位主要作者、研究实施地波士顿贝斯以色列女执事医疗中心的医生亚当·罗德曼博士指出，AI大型语言模型是\"数十年来最具影响力的技术之一\"。他认为，未来十年AI不会取代医生，而是以\"医生、患者与人工智能系统\"三方协作的新型\"三元诊疗模式\"融入医疗体系。\n\n在哈佛研究的某个案例中，一名患者因肺部血栓就诊且症状持续恶化。人类医生认为抗凝治疗无效，但AI发现了人类忽略的细节：患者狼疮病史可能正是导致肺部炎症的元凶。最终证实AI的判断正确。\n\n上月发布的一项研究显示，美国近五分之一的医生已在使用人工智能辅助诊断。英国皇家内科医师学会近期调查表明，英国16%的医生每日使用该技术，另有15%每周使用，其中\"临床决策支持\"是最常见的应用场景之一。\n\n英国医生最担忧的是人工智能错误及责任风险。尽管数十亿资金正涌入人工智能医疗企业，但关于AI失误后果的疑问依然存在。\n\n罗德曼指出：\"目前尚缺乏正式的责任框架。\"他强调患者最终\"希望由人类引导他们做出生死攸关的决定，以及指导他们应对棘手的治疗方案选择\"。\n\n爱丁堡大学医学信息学中心联合主任埃文·哈里森教授表示，这项研究意义重大，表明\"这些系统已不再仅能通过医学考试或解决虚拟测试案例。它们正逐渐成为临床医生有用的第二意见工具，尤其在需要扩大鉴别诊断范围、避免遗漏重要病症时更具价值。\"\n\n谢菲尔德大学数学与物理科学学院助理教授魏星博士指出，其他研究发现表明医生可能无意识地依赖AI答案而非独立思考。他说：\"随着AI在临床场景中的常规化应用，这种倾向可能愈发显著。\"他还强调研究缺乏关于AI对哪些患者群体诊断效果较差的信息，例如是否在老年患者或非英语使用者中表现更差。\n\n他表示：\"这并不能证明AI在常规临床使用中的安全性，也不意味着公众应将免费AI工具作为医疗建议的替代品。\"", "zh": true}, {"seq": 3, "title": "在谷歌TPU上实现3倍加速：UCSD利用扩散式推测解码优化LLM推理", "source": "Google Developers Blog（RSS）", "summary": "加州大学圣地亚哥分校的研究团队在谷歌TPU上成功部署了DFlash，一种基于块扩散的推测解码方法。该方法突破传统自回归草稿生成的序列性瓶颈，通过单次前向传播并行“绘制”整个候选令牌块，而非逐个预测。系统平均实现了3.13倍的推理加速，峰值性能接近EAGLE-3等现有方法的两倍。这一开源方案已集成至vLLM生态系统，通过利用“免费”的并行验证能力和针对复杂推理任务的高质量草稿预测，显著优化了TPU硬件的利用效率。", "url": "https://developers.googleblog.com/supercharging-llm-inference-on-google-tpus-achieving-3x-speedups-with-diffusion-style-speculative-decoding", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "当前大语言模型（LLM）加速领域主要由自回归推测解码主导，即轻量级草稿模型在目标验证前按顺序逐token预测。然而，这种串行草稿生成方式存在根本性执行瓶颈：生成K个候选token需要K次顺序前向传播。这种逐步依赖机制迫使系统必须等待当前token预测完成后才能启动下一个，从根本上限制了草稿阶段的加速潜力。为突破这一效率天花板，研究人员正从逐token草稿生成转向块扩散（Block Diffusion）范式——这种范式革新使得仅需O(1)次单次前向传播即可生成完整候选token块。\n\n我们很自豪能支持推动AI硬件边界的外部研究者。今天，我们特别聚焦由Hao Zhang（分页注意力机制与预填充/解码分离服务的共同发明者）领导的加州大学圣地亚哥分校（UCSD）团队达成的重大开源里程碑。他们成功在谷歌TPU上实现了块扩散推测解码（即DFlash——由UCSD Z Lab的Zhijian Liu、Jian Chen等人开发的先进扩散式推测解码技术）。\n\n通过将该创新架构直接集成到开源vLLM TPU推理生态系统中，UCSD团队在TPU v5p上实现了平均3.13倍的每秒token处理量提升，复杂数学任务峰值加速比接近6倍。在TPU v5p上进行的DFlash与EAGLE-3端到端服务对比测试中，DFlash实现了2.29倍加速，几乎是EAGLE-3（1.30倍性能增益）的两倍。\n\n以下为UCSD研究人员提供的技术深度解析，详细阐述实现方法、性能基准测试结果，以及对谷歌TPU生态系统未来发展的意义。\n\n标准LLM推理采用自回归方式生成文本。这意味着模型每生成一个token都需要完整的前向传播，严重浪费了TPU等AI加速器的大规模并行计算能力，尤其在低批次场景下更为明显。\n\n推测解码通过使用更小、更高效的\"草稿\"模型（或机制）同时预测多个未来token来缓解这一问题。随后，更大的\"目标\"模型通过单次并行前向传播验证这些草稿token。若草稿token准确，系统便以单步计算成本接受多个token，大幅降低延迟。\n\n然而，推测解码的优势常受限于草稿模型本身。现有方法大多依赖自回归草稿机制顺序生成候选token。这意味着虽然目标模型的验证过程是并行的，但草稿阶段仍受限于O(K)次串行步骤。结果，\"猜测\"token所消耗的时间开始侵蚀验证环节节省的时间，从而限制了实际加速潜力。\n\n扩散式大语言模型（dLLMs）通过引入块扩散机制彻底改变了传统的序列生成方式。不同于逐字预测下一个词，dLLM能够像\"绘画\"般一次性生成整个文本块。其中基于dLLM的典型草稿生成方法DFlash，通过提取目标模型的隐藏特征，仅需单次前向传播即可生成完整草稿令牌块。这种从O(K)到O(1)的复杂度跃迁，将草稿生成延迟降至近乎可忽略的程度，完美适配TPU高带宽矩阵乘法单元（MXU）的架构特性。\n\n加州大学圣地亚哥分校（UCSD）研究团队将DFlash集成至vLLM TPU推理框架。作为推测解码的创新方案，DFlash利用块扩散机制生成具有极高接受长度（T）的草稿令牌。在谷歌TPU上实现该方案需要深度优化：依托谷歌云工程师的架构指导，UCSD团队通过最小化系统开销，确保内存带宽与矩阵乘法单元达到完全饱和状态。通过将DFlash提案器与验证流水线高效映射至TPU架构，他们在最大化目标模型并行验证吞吐量的同时，将草稿生成阶段的额外开销降至最低。\n\n将DFlash从原始GPU/PyTorch实现移植至谷歌TPU/JAX AI堆栈生态，绝非简单的代码转译，而是需要根据TPU独特的架构优势进行系统重构。以下为UCSD团队攻克三大技术难关的具体方案：\n\n在PyTorch环境中，DFlash依赖简单动态KV管理。但基于tpu-inference的高性能TPU服务采用Pallas内核的分页注意力机制——该系统将内存划分为固定大小的页面以最大化效率。关键矛盾在于：DFlash的非因果块扩散（正是其能\"绘制\"令牌块的核心机制）与标准分页注意力存在根本性不兼容。为解决此问题，研究人员设计了双缓存架构：目标模型继续使用分页KV缓存，确保其受益于大规模服务所需的高性能Pallas内核；草稿模型则采用专用路径，通过静态设备端JAX数组完美复现原始DFlash设计，同时保持TPU原生性能。\n\nDFlash的独特之处在于其\"目标条件化\"草稿模型——通过持续观测目标模型的中间推理步骤保持智能性。这些\"隐藏状态\"被存储在随时间增长的上下文缓冲区中。为最大化主机CPU与TPU加速器间的通信效率，团队实施了2的幂次填充策略。当新投影特征被追加至缓冲区时，系统会以优化后的数据块进行传输。通过精确追踪草稿模型已\"消耗\"的上下文量，他们成功避免了重复处理或数据丢失，确保并行草稿生成的高度准确性。\n\n与标准草稿生成方法不同，DFlash具有独特的状态记忆特性，依赖跨迭代的持久化状态（包括上下文缓冲区、KV缓存位置和旋转位置编码偏移量）来维持并行块预测。在TPU优化的vLLM流水线中，转发给提案器的元数据包含当前正在验证的草稿令牌。虽然这对大多数模型而言是标准做法，但对于基于扩散的架构，这导致了\"序列长度膨胀\"——内部草稿状态与目标模型现实之间出现偏差。\n\n通过重新设计提案器使其严格同步真实已接受令牌数量，研究团队恢复了两个模型之间的完美对齐。这一调整使得块扩散逻辑能够在TPU硬件上以完全数学精度运行，最终实现了显著的加速效果。\n\n为确保严格公平的比较，加州大学圣地亚哥分校的研究人员将DFlash与TPU上当前主流的推测解码方法EAGLE-3进行了基准测试。在这项对比研究中，研究人员对两种方法使用了完全相同的硬件（TPU v5p）和相同的目标模型（Llama-3.1-8B）。\n\n这一设置代表了两种方法最实际的部署场景，因为K值的选择基于各自官方开源检查点，开箱即用无需额外微调或重新配置。像EAGLE-3这样的自回归草稿器会产生随K线性增长的顺序延迟惩罚，这通常限制它们使用较小的推测预算以保持低单令牌延迟。相比之下，DFlash使用并行块扩散在单次前向传播中预测所有令牌，使草稿生成成本基本不受K值影响。结果具有决定性：DFlash实现了2.29倍加速，而EAGLE-3仅提供1.30倍增益。在mbpp等编码任务上，DFlash将生成时间从每令牌9.81毫秒压缩至3.48毫秒，提升了2.83倍。\n\n为何差距如此之大？EAGLE-3每步自回归预测2个令牌，需要顺序前向传播并在其间插入Python编排开销。而DFlash在单次前向传播中生成包含10个高质量候选令牌的块，完全消除了这一串行瓶颈。在TPU上，这种\"高质量、高数量\"的草稿输出直接转化为更高的平均接受长度，将TPU的庞大计算潜力转化为实际服务吞吐量。\n\n为评估DFlash在谷歌TPU上的影响，加州大学圣地亚哥分校团队在TPU v5p上跨多个领域对其实现进行了基准测试，重点关注复杂推理、数学和编码——这些领域的长上下文生成通常面临高延迟问题。\n\n该团队构建了独立的JAX基准测试来评估DFlash结果。通过剥离服务层开销，他们能够隔离DFlash-on-TPU算法的原始性能。他们观察到所有数据集上的平均加速比为3.13倍，在数学推理方面尤为突出。\n\n对于math500等严谨数学任务，DFlash将生成时间从每令牌8.02毫秒降至1.40毫秒。在humaneval等编码评估中，生成速度提升了超过3.5倍。\n\n在优化过程中，研究团队发现了一个改变工程师对推测极限认知的硬件特性：K-Flat验证。\n\n在TPU v5p这类数据中心级加速器上，他们的系统性实验揭示了一个令人惊讶的事实：验证1024个token的成本与验证仅16个token的成本几乎相同。这一现象源于高端硬件上，时间消耗主要来自加载模型权重，而非针对这些序列长度的注意力机制原始计算。换言之，硬件的计算天花板如此之高，以至于检查更长\"猜测\"的额外工作几乎可以忽略不计。\n\n这一发现彻底改变了研究前沿。它证明推测解码的瓶颈并非\"验证成本\"，而是\"草稿质量\"。既然更宽的块在计算上近乎免费，开发者可以大胆扩展草稿块大小，利用更丰富的双向上下文提升准确性，而无需担心拖慢硬件速度。\n\n虽然数据中心级AI加速器使得增加块大小（K）几乎\"免费\"，但他们的扩展理论揭示，单纯增加token数量会带来边际效益递减。在当前运行点，K=16的块大小已能捕获理论最大加速比的90%以上。事实上，将K从16扩展到128，每步可能仅能多接受不到一个token。\n\n性能的真正杠杆在于质量而非数量。他们的分析表明，提升每个位置的接受概率（a）比增加块大小K的价值高出2-3倍。这改变了研究焦点：在验证成本恒定的环境下，主要瓶颈不再是系统能检查多少个token，而是预测的准确度。LLM服务的下一个前沿在于更智能的草稿训练，而非更宽的推测窗口。\n\n接受概率与任务的可预测性密切相关。团队观察到自然的\"位置衰减\"现象：块末尾的token比开头的更难猜测。在数学和编程等逻辑驱动领域，这种衰减极为缓慢，即使在块深处也能保持高接受率。而对话式聊天则更具随机性，前几个token后准确率便急剧下降。\n\n这种可预测性直接驱动加速效果。由于结构化推理产生更可预测的序列，数学和编程任务能实现更长的接受块，更有效地饱和TPU的并行验证能力。因此，DFlash在数学推理中取得最高增益，其次是编程，而对话任务则呈现中等程度的提升。\n\n此次合作的核心原则是丰富开源生态。该实现并非作为内部研究原型保留，而是完整提交至vLLM tpu-inference仓库，包含： UCSD团队正积极开发torchax提议器，使DFlash也能在PyTorch服务路径上运行。\n\n这一里程碑为谷歌TPU的下一波创新奠定了基础。通过利用DFlash独特的并行采样技术，他们正在为推测性解码（SSD）铺平道路，借助推测缓存大幅降低高吞吐环境中的延迟。为了捕捉更丰富的上下文并提升复杂推理的接受率，他们计划使用TPU RL Stack Tunix和MaxText扩展更宽的草稿块。此外，新开发的高性能JAX内核为支持基于扩散的目标模型提供了坚实基础，使vLLM-TPU生态系统始终处于高效非自回归生成的最前沿。\n\n您可以通过Colab Notebook查看底层技术报告和实现细节，或直接访问vLLM GitHub仓库深入代码。\n\n这项工作得益于TPU Builder计划，体现了我们为学术和开源社区提供高性能硬件及Google Cloud积分的使命。如果您有兴趣将TPU用于研究、教学或开源开发，欢迎联系我们！请发送邮件至tpu-builders-support@google.com与我们取得联系。\n\n致谢：衷心感谢加州大学圣地亚哥分校研究团队的Zhongyan Luo、Son Nguyen、Andy Huang。特别感谢Kyuyeun Kim、Brittany Rockwell、Chris Chan、Mitali Singh、Yixin Shi及Gang Ji团队与研究人员合作完成PR提交，以及Josh Gordon、Edgar Chen、Aditi Joshi、Shubha Rao、Mani Varadarajan、Joe Pamer、Fenghui Zhang、Hassan Sipra和Bill Jia对TPU Builder计划研究合作项目的一贯支持与投入。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 4, "title": "解决真正工程问题的Agent Skills集合", "source": "X：邵猛 (@shao__meng)", "summary": "作者@mattpocockuk公开了其.claude/目录下的实用Agent Skills集合，旨在解决四大工程痛点：1) 通过/grill-me等技能在动工前对齐需求，修复沟通鸿沟；2) 维护CONTEXT.md与ADR建立共享语言，提升代码一致性；3) 利用/tdd和/diagnose建立快速测试与诊断反馈回路；4) 通过/to-prd、/zoom-out等技能对抗代码熵增，持续投资设计。这些技能分为工程、效率与工具三类，形成从需求对齐到代码落地的完整工作流。", "url": "https://x.com/shao__meng/status/2050892004188692616", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "解决真正工程问题的 Skills：Skills For Real Engineers 作者 @mattpocockuk 公开了自己 .claude/ 目录中每天在用的 Agent Skills 集合，目标读者是在做真正工程的人们，解决真正的工程问题。 # 真正想解决的四类失败模式\n1. Agent 没做对你想要的事 —— 沟通鸿沟\n引用 The Pragmatic Programmer：\"没人确切知道自己想要什么。\" 修复：在动工前先被 Agent 反向拷问。 · /grill-me：通用版逼问 · /grill-with-docs：工程版逼问，同时维护项目术语表与 ADR 这是作者明说的\"最受欢迎的两个 Skill\"。\n2. Agent 太啰嗦 —— 缺少共享语言\n引用 Eric Evans 的 DDD：领域专家与开发者一开始说的就不是同一种语言，Agent 也一样。 修复：项目根目录维护一份 CONTEXT.md（领域词典）+ docs/adr/（架构决策记录）。 作者举了自己 course-video-manager 仓库的例子： · Before：\"a lesson inside a section of a course is made 'real' …\" · After：\"problem with the materialization cascade\" 共享语言带来的连锁收益：命名一致 → 代码可导航 → 思考 token 更少。这一条被作者称为\"整个 repo 里最酷的技术\"。\n3. 代码跑不通 —— 反馈回路缺失\n引 Pragmatic Programmer：\"反馈速率就是你的速度上限。\" 修复：把静态类型 / 浏览器 / 自动化测试的反馈接回来。 · /tdd：强制 red-green-refactor，并明确反对\"horizontal slicing\"（先把所有测试写完再实现）——只能 vertical slice，一次一个 tracer bullet · /diagnose：固定的\"复现 → 最小化 → 假设 → 插桩 → 修 → 回归测试\"诊断循环\n4. 系统变成屎山 —— Agent 加速软件熵增\n引 Kent Beck 与 John Ousterhout：每天投资设计，深模块（窄接口、厚实现）优先。 修复： · /to-prd 在写 PRD 前会问\"这个改动到底碰哪些模块\"； · /zoom-out 强制 Agent 把局部代码放回系统全景里讲； · /improve-codebase-architecture 是\"周期性救火\"——作者建议每隔几天对代码库跑一次。 # Skill 清单结构 仓库分三类，命名上都是 Slash Command 风格： Engineering（日常代码工作） grill-with-docs、tdd、diagnose、to-prd、to-issues、triage、improve-codebase-architecture、zoom-out、setup-matt-pocock-skills Productivity（通用工作流） grill-me、caveman（极简通信模式，省 ~75% token）、write-a-skill Misc（不常用工具） git-guardrails-claude-code、migrate-to-shoehorn、scaffold-exercises、setup-pre-commit 各 Skill 之间不是孤立的，而是一条从对话到落地的流水线： 对齐与设计              落地与守护 ──────              ──────── grill-with-docs   →     tdd ↓                   ↓ to-prd            diagnose ↓                   ↓ to-issues          zoom-out ↓                   ↓ triage   ───→   improve-architecture ↑                   ↓ └──── CONTEXT.md / ADR ──┘ 项目地址 github.com/mattpocock/ski…", "zh": true}, {"seq": 5, "title": "Codex推出开源工具，压力测试初创公司创意", "source": "X：Greg Brockman (@gdb)", "summary": "开发者发布了一款名为“codex-startup-pressure-test-skill”的Codex技能工具，旨在对初创公司想法进行严苛的压力测试。该工具能帮助创业者识别其创意的核心假设、暴露致命缺陷、验证问题真实性、分析真实竞争对手、规划首批10名客户，并定义一个可在两周内完成的MVP（最小可行产品）。用户可通过npm命令直接安装，该工具完全开源，相关代码库已公开。", "url": "https://x.com/gdb/status/2050972114077843772", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "创业点子检验法典 用这套技能残酷检验任何创业点子！ 大多数创业点子听起来都不错。 这套技能会告诉你它们为什么可能行不通。 只需把你的想法告诉Codex，它就会为你进行压力测试 → 找出核心假设 → 暴露致命缺陷 → 检验问题是否真实存在", "zh": true}, {"seq": 6, "title": "大多数公司尚未做好迎接AI的准备", "source": "X：宝玉 (@dotey)", "summary": "多数公司无法有效利用AI，核心障碍并非技术，而是企业自身目标模糊、战略混乱且缺乏清晰的业务流程描述。AI擅长执行明确指令，但大多数公司处于“混乱黑盒”状态，无法清晰定义目标、工作流与衡量指标。只有少数具备高度自我认知和组织纪律的公司能真正借助AI提升竞争力。企业应首先审视自身是否具备让AI有效协助的清晰内部状态，而非盲目追求技术应用。", "url": "https://x.com/dotey/status/2051057428075053120", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "作者：Daniel Miessler 原文：Most Companies Aren't Anywhere Near Ready for AI\n\n并非公司不想用AI，而是他们根本用不了。 AI不是问题，说不清目标才是问题。 很多人抱怨AI……", "zh": true}, {"seq": 7, "title": "每日仅需8条广告，广告支持型AI的经济可行性分析", "source": "Tomer Tunguz 博客（VC 分析）", "summary": "基于开源模型和商用GPU的广告支持型AI在经济上可行。计算表明，一个由4块B200 GPU组成的集群服务300名用户时，每小时成本约18美元。通过广告收入即可覆盖成本：在内容网络中每3分钟展示一条广告（CPM 3.12美元），或在搜索广告中每39分钟展示一条（CPM 38.40美元），这一广告频率已与常见的移动和网页应用相当。对于代码代理等高强度任务，可采用混合盈利模式：用户每月支付10美元订阅费并每日观看8条广告，即可支持约200万token的用量，这证明了该模式的实用性。", "url": "https://www.tomtunguz.com/ad-supported-ai-works", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "One search ad every 40 minutes pays for a trillion-parameter model. One content ad every 3 minutes does the same. The math on ad-supported AI is better than you think. When Anthropic pulled Claude Code from the $20 plan last month, it signaled an industry assumption : frontier intelligence requires frontier pricing. For open models, the economics flip. A B200 GPU costs $4.50/hour on spot markets.1 Google Search ads generate $38.40 CPM (cost per thousand impressions),2 while Google Display runs $3.12.3 | Ad Context | CPM | Impressions to Break Even (per hour) | One Ad Every… | |---|---|---|---| | Content Network | $3.12 | 5,769 | ~3 minutes | | Search | $38.40 | 469 | ~39 minutes | These numbers assume the provider runs 4 B200 Blackwells at 300 users, 50% of the theoretical maximum, leaving headroom for bursts.4 To support these costs, users would see one ad every 3 to 39 minutes. That is well below what users already tolerate : hyper-casual mobile games show six ads per session, roughly one per minute.5 There are nuances. Assuming ad fill rates (the share of ad requests that return a paid ad) and ad network revenue share, we can model effective CPMs of $1.50. At that floor, the frequency doubles. One content ad every 90 seconds still covers the cluster, comparable to what mobile users already tolerate. On the other end of the spectrum, rewarded video clears at $40 to $50 CPM with near-100% fill in gaming. A single round of rewarded video across the cluster nearly covers an hour of compute.6 But there is the question of utilization. All of these figures assume the cluster stays busy. Idle GPUs raise the per-user cost. What about heavier workloads? Agentic coding burns 10 to 20x more tokens than passive chat.7 At that rate, ad-only models can’t keep up. But a hybrid works : $10/month plus 8 ads per day covers 2 million tokens.8 It won’t fund a tokenmaxxing habit, but it will keep you shipping. Ad-supported AI is viable : open models, commodity GPUs, and ad frequencies already parallel those of mobile & web. - B200 Cloud Pricing: Compare 22+ Providers (2026) : spot market averages $3.40 to $4.50/hour across 22 cloud providers. ↩︎ - Online Advertising Costs In 2026 (Top Draw) : Google Search Ads average CPM $38.40 (derived from CPC × estimated CTR; search is typically priced per-click, converted here for comparison). ↩︎ - Online Advertising Costs In 2026 (Top Draw) : Google Display Ads average CPM $3.12. ↩︎ - GPU Concurrency Benchmark: H100 vs H200 vs B200 (AIMultiple) : Kimi K2.6 on 4x B200 supports 600 concurrent users at peak; 300 used here as a conservative operating target. ↩︎ - The 2026 AdMob & Mobile Monetization Playbook (MonetizeMore) : hyper-casual benchmark of 6 ads per session across 3.2 sessions per day. ↩︎ - Calculation : 300 users × 1 rewarded impression each × $0.05 (at $50 CPM) = $15. Cluster cost = $18/hour. $15 ÷ $18 = 83%, or about 50 minutes. ↩︎ - Claude Code vs Cursor: Speed, Accuracy & Cost Benchmark 2026 (SitePoint) : Claude Code uses 33K tokens per task; Cursor uses 188K. Heavy users run 20 to 60 tasks/day, consuming 1 to 2M tokens/hour during active sessions, 10 to 20x more than passive chat. ↩︎ - Calculation : $10/month = $0.33/day. At $0.33/day alone, cluster supports 1,309 users at 1M tokens/day each, half the target. The remaining $0.33/day gap is filled by ads. At rewarded-video CPMs of $40, that is 8 impressions/day. Combined : $10/month + 8 ads/day = 2M tokens/day per user. ↩︎", "zh": true}, {"seq": 8, "title": "60倍速冷启动：将同级GPU视为权重服务器", "source": "Runway：News（网页）", "summary": "Runway平台团队开发的NCCLBack系统，通过P2P权重传输将模型冷启动时间从数分钟缩短至数秒。其核心创新在于让新启动的GPU推理节点直接从集群内已加载权重的同级GPU获取模型参数，而非从云存储重复下载。该系统利用GPU互连（如InfiniBand、NVLink）高达200-400 Gbps的带宽，相比传统存储下载的2-10 Gbps实现了数量级提升。通过Redis协调与NCCL广播原语，NCCLBack确保了数据传输的效率和正确性，使得大规模集群部署新模型时，冷启动时间不随节点数量线性增长，基本保持恒定。", "url": "https://runwayml.com/news/60x-faster-cold-starts-treating-peer-gpus-as-weight-servers", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "如何通过GPU间广播权重替代存储下载，将模型冷启动时间从分钟级缩短至秒级，以及我们在实践中遇到的棘手问题。\n\n**冷启动的隐性成本**\n\n当GPU推理工作节点启动时，首要任务（在服务任何请求之前）是加载模型权重。对于Runway运行的这类模型，这意味着从云端存储拉取数TB参数，将其从主机内存复制到GPU内存，并调用load_state_dict。单个节点完成这一过程需要数分钟。当整个集群同时部署新模型版本时，就会形成\"惊群效应\"：数十台机器独立从同一存储后端下载相同字节，带宽饱和导致所有人的冷启动时间进一步延长。我们每天部署数十次，且多数情况下模型权重并未改变。冷启动直接制约自动扩缩容、部署速度和用户端延迟，同时拉长研发/工程反馈周期。\n\n由于模型权重变更相对罕见，高频部署伴随长冷启动，对GPU推理节点可用性造成不必要的损耗，并影响用户体验。实际上，集群中某台GPU早已加载了这些权重——五分钟前完成初始化的节点正满载权重等待任务。新节点完全可以从对等节点直接获取权重，而非重新从存储下载。这能保持生成任务持续运转，让研发团队持续交付新功能。该系统使集群更灵活：我们能快速重新平衡负载、回滚异常代码，并最大化GPU执行推理的时间。\n\n**技术方案全景**\n\n针对冷启动优化，我们尝试过多种方案：\n\n- 高速存储（NVMe缓存、并行分块下载）虽能缩短下载时间，但未改变问题本质：N个节点仍需执行N次独立下载。\n- 共享内存预加载（/dev/shm、CUDA IPC）可消除单节点冗余下载，但局限于单机环境。\n- 共享卷（NFS、EFS、Ceph）能跨机器去重下载，但增加运维负担，且速度通常远低于GPU间传输。\n- 分布式缓存（Memorystore、自定义权重服务器）引入需额外运维、容量规划与监控的系统。\n\n而点对点传输则截然不同：首个节点正常下载并加载权重，后续节点通过GPU互联直接从已加载节点接收权重。下载仅执行一次，广播可覆盖整个集群。我们基于此理念构建了NCCLBack系统（命名源自其依赖的NCCL集合通信库，以及它\"支撑\"权重加载路径的特性，顺便致敬某加拿大摇滚乐队）。\n\n**P2P传输的物理优势**\n\nP2P传输的压倒性优势源于物理定律。即便经过优化，GCS下载带宽每节点仅约2-10 Gbps；而GPU节点间的InfiniBand或RoCE链路可达200-400 Gbps；节点内的NVLink速度更甚，H100 SXM系统可达900 GB/s。当你能用GPU互联替代存储API时，就完成了从\"分钟级\"到\"秒级\"的跨越。\n\n传统模式下，每个节点独立从存储下载，冷启动时间随集群规模线性增长。而采用NCCLBack后，仅需一个节点下载，其余节点通过GPU互联在数秒内即可获取权重。\n\nNCCLBack设计：分层构建 NCCLBack并非单一的巧妙技巧，而是一个由多个子系统（发现、协调、传输与验证）构成的堆叠架构，每个子系统解决不同的问题。以下是完整协议概览：\n\n第一层：基础原理 NCCLBack的核心是利用NCCL广播原语在两个GPU工作节点之间进行一对一的权重传输。 发送方是已在GPU上加载权重的节点，接收方则是已构建模型结构（包含所有正确的张量形状、数据类型和设备）但尚未填充数值的新节点。我们称后者为\"骨架模型\"。\n\n传输过程本身很直接：双方按排序后的键顺序遍历model.state_dict()，并对每个张量调用nccl.broadcast()： ```python def transfer(model, comm, device_id): with cp.cuda.Device(device_id), cp.cuda.Stream() as stream: state_dict = model.state_dict() # 双方必须以完全相同的顺序遍历 names = sorted(state_dict.keys()) for name in names: param = state_dict[name] # 双方调用相同函数；NCCL通过rank区分 comm.broadcast( param.data_ptr(), param.data_ptr(), param.numel(), torch_to_nccl_dtype(param.dtype), 0,  # 根节点rank（发送方） stream=stream.ptr, ) stream.synchronize() ``` 键的排序比表面看起来更重要。nccl.broadcast是集合操作：双方必须以完全相同的顺序、针对完全相同的张量大小和数据类型发起调用。如果发送方与接收方的遍历顺序不同，广播会静默地将错误数据写入错误缓冲区，导致模型产生垃圾输出而不报任何错误。\n\n这就是完整的数据平面。NCCLBack的其他所有功能都是为了确保这个循环能正确、安全且无挂起地运行。\n\n第二层：发现机制 在进行广播之前，接收方需要找到发送方。这是一个协调问题。 我们通过Redis支持的队列来解决。当工作节点完成设置并加载权重后，它会向Redis发布两项信息：\n- 模型可用性：表示\"我已加载模型版本X\"的键\n- 权重哈希：逐层的完整性哈希（详见第五层）\n\n当新工作节点启动并希望接收权重时，它首先检查Redis：是否存在拥有我所需模型版本的同伴？这个检查必须在分布式工作节点组的所有rank中达成一致。如果rank 0认为同伴存在而rank 3认为不存在，当部分rank尝试P2P传输而其他rank尝试下载时，组将陷入死锁。\n\n我们通过NCCLBack中反复出现的模式来强制执行共识： ```python availability_tensor = torch.zeros(1, device=\"cuda\") if peer_exists_in_redis: availability_tensor[0] = 1 torch.distributed.all_reduce(availability_tensor, op=ReduceOp.MIN) assert bool(availability_tensor[0])  # 仅当所有rank都同意时才为True ``` all_reduce(MIN)技巧：每个rank投票，仅当最小投票值为1时才继续执行。如果任何一个rank在Redis中找不到模型，所有节点都将回退到下载模式。这是一个刻意保守的选择：我们宁愿冗余下载，也不愿冒险进行部分P2P传输导致某些rank拥有权重而其他rank没有。\n\n模型身份在此至关重要。“模型版本”是模型配置与检查点元数据的哈希值。实践中，每个检查点在部署时会被转换为safetensors格式，我们的云存储会为生成的文件提供CRC32C校验和。随后，模型配置（包含safetensors的URI及其CRC32C）会通过MD5哈希生成版本标识符。这意味着两个工作节点只有在完全一致的检查点字节和相同模型配置下才被视为兼容。若哈希值出错，两个拥有细微差异模型状态的工作节点将尝试互相传输权重，这要么导致显式失败（形状不匹配），要么造成静默错误（加载错误权重）。\n\n**第三层：握手协议** 仅通过Redis发现对端节点并不足够。Redis只能告知某个节点曾存在过，却无法确认该节点当前是否存活且可立即发送数据。若我们乐观地启动NCCL广播，而发送方已崩溃或正忙碌，ncclCommInitRank将无限期挂起。NCCL的集合通信模型在通信器创建时并无内置超时机制。\n\n因此，在调用NCCL之前，我们通过Redis执行双向存活性握手：\n- 接收方在已知Redis键（receiver_ready:{peer_id}）中存储随机整数。\n- 发送方轮询该键，待其出现后，将值加1并写回。\n- 同时，发送方在sender_ready:{peer_id}键中存储自身随机整数。\n- 接收方轮询发送方键，找到后同样加1并写回。\n\n双方验证：“我存储了X，对方将其改为X+1。”这证明两个节点均存活、响应正常且针对同一传输任务。整个握手过程采用短超时：发送方为1秒（不应为不稳定的接收方等待过久），接收方为10秒（可适当等待，因对端可能正忙）。\n\n若握手超时，接收方将优雅回退至从存储下载。此时未创建任何NCCL通信器，未占用GPU资源，也无需清理。\n\n**第四层：带防护的传输** 握手成功后，我们创建2-rank的NCCL通信器（发送方=rank 0，接收方=rank 1）并执行广播循环。但NCCL无内置超时——若对端在传输中途消失，调用将永久阻塞。我们将通信器创建与广播循环均包裹在守护线程超时中：若操作在数秒内未完成，则中止通信器并抛出TimeoutError。这确保挂起的传输不会阻塞工作节点回退至下载。\n\n**第五层：完整性验证** 传输完成后，如何确认接收方获得了正确权重？NCCL在应用层不提供校验和或完整性保证。GPU间传输中若发生静默数据损坏（如比特翻转），将产生看似正常运行但输出存在细微错误的模型。\n\n我们通过采样哈希来解决这个问题。当首个工作节点从存储（\"真实路径\"）下载并加载权重时，它会为模型的每一层计算哈希值，并将这些哈希存入Redis。对动辄数GB的模型逐字节哈希速度太慢，因此我们改用固定种子对每个参数随机采样100个元素（确保发送方和接收方采样相同索引），仅对这些样本进行哈希计算。哈希前会将数据归一化为float16格式，避免不同代码路径的数据类型差异导致误判。这样将原本数分钟的验证缩短到数秒，同时仍能捕获影响权重中极小比例数据的损坏情况。\n\n接收方通过P2P获取权重后，计算相同的哈希值并与Redis中存储的\"真实值\"比对。若任意层的哈希不匹配，则抛出WeightVerificationError异常，工作节点将重启。\n\n**骨架模型问题**\n\nNCCL的广播操作不分配内存，而是直接写入现有缓冲区。这意味着接收方必须在广播开始前预分配形状、数据类型和设备完全匹配的张量。我们将这些预分配张量称为\"容器\"，其所在的模型结构称为\"骨架模型\"。\n\n构建骨架模型需要运行模型的构造函数和初始化代码，同时跳过实际权重加载（传入skip_checkpoint=True）。对于简单模型这很直接，但生产级模型要复杂得多。视频生成管线并非单个nn.Module，而是子模块构成的图（扩散Transformer、VAE解码器、文本编码器、图像嵌入器等），每个子模块都有独立的初始化逻辑，部分模块在构造过程中会主动加载权重。\n\n在流水线架构中，不同GPU卡位承载完全不同的子模块。某张卡可能运行VAE解码器，而其他卡运行扩散Transformer。NCCLBack必须为每张卡返回正确的子模块，因为每张卡参与独立的P2P传输。接收方不仅需要骨架模型，更需要与其卡位匹配的正确骨架，且容器需与发送方广播内容完全一致。任何不匹配（不同数据类型、缺失缓冲区、来自不同代码路径的额外参数）都会导致广播崩溃或静默损坏模型。要正确实现这一点，需要一系列精心设计的抽象层，并在真实生产模型变体上进行持续集成测试。\n\n**故障分类：失败模式全记录**\n\n以下每种故障模式均在实际生产环境中发现。\n\n**灰帧事件**\n\n某些子模块在`__init__`或`instantiate_from_config`中加载真实权重，而非通过`load_state_dict`。当我们为新模型添加NCCLBack时，对整个模型调用`to_empty(device=\"cuda\")`来准备骨架容器。这正确清空了扩散Transformer的权重（后续会被P2P传输替换），但同时也清除了VAE自初始化的权重，将其替换为未初始化的垃圾数据。\n\n模型仍在运行，没有崩溃，甚至能生成视频帧。但这些帧全是灰色的：VAE解码器将学习到的重建过程应用于随机噪声，产生无结构化的褪色输出。该故障仅出现在通过NCCLBack接收权重的工作节点上；直接下载的节点运行正常，因为下载路径会正确重新初始化VAE。\n\n修复方案：仅清空NCCLBack实际传输的特定子模块。\n\nFP8 哈希不匹配 现代推理栈通常会在加载权重后（从bf16转换为FP8）作为后初始化步骤进行量化。NCCLBack原本在下载后立即对权重进行哈希处理（量化之前）。当发送方将其FP8权重广播给接收方时，接收方对接收到的内容进行哈希计算，并与Redis中的bf16哈希值比对，发现不匹配。验证失败，工作节点崩溃并重启。 修复方案：在“模型可提供服务”边界而非下载边界进行哈希处理。从下载到提供服务之间的任何转换（量化、剪枝或融合）都会改变GPU上的字节内容，完整性哈希必须反映最终状态。\n\n回退陷阱 对于量化模型，回退路径是一个陷阱。骨架模型包含FP8容器，而下载的权重是bf16格式。如果使用`load_state_dict(strict=False)`，不匹配的键会被静默忽略，模型会“成功”加载但权重已损坏。 针对此类模型的解决方案是刻意激进的：回退操作会抛出异常而非继续下载。 ```python def load_model_weights(): raise NCCLBackDownloadFallbackNotSupportedRestartRequiredError() ``` 这会强制重启并走正常的下载-量化路径。速度较慢，但结果正确。当已知回退会产生损坏状态时，应快速（且大声地）失败，并选择可信的路径。\n\n幻影网格变更 早期，模型哈希不包含设备网格拓扑信息。当我们改变张量并行布局时，哈希值保持不变（配置和检查点未变），因此不同网格布局的工作节点在Redis中匹配成功，尝试P2P传输后陷入挂起状态。发送方持有完整张量，而接收方期望的是分片张量。", "zh": true}, {"seq": 9, "title": "大语言模型（LLMs）是否改善了患者治疗结果？", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "一项新综述研究指出，尽管大语言模型（如GPT、Claude、LLaMA）在医疗领域的应用日益广泛，但目前尚无明确证据表明其直接改善了患者治疗结果。该综述分析了多项临床研究，发现这些模型在诊断支持、文书处理等方面展现出潜力，但在提升治愈率、降低死亡率或改善患者生活质量等关键临床指标上，尚未展现出统计学上的显著积极影响。研究强调，需要更多高质量的随机对照试验来评估LLMs对患者结局的实际影响。", "url": "https://garymarcus.substack.com/p/have-llms-improved-patient-outcomes", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "大型语言模型是否改善了患者预后？ 一项新综述给出了否定答案 心脏病学家兼作家埃里克·托波尔对人工智能在医学领域的应用通常比我更为乐观，但他在最新文章中得出结论：至少迄今为止，\"几乎没有证据表明大型语言模型能改善患者或医生的健康结果\"（除了协助行政工作等事务外）。 正如托波尔所言，他的综述部分灵感来源于近期《自然·医学》杂志的这篇社论，该社论也指向相同结论： 您可在此处阅读托波尔的详细综述。 这与我的近期文章《请勿轻信聊天机器人的医疗建议》观点一致——该文更侧重于患者对大型语言模型的非监督使用，而非整体临床结果，但在许多方面殊途同归。 人工智能终有一天会成为医学领域的重大福音，但当前诸如通用型聊天机器人等工具可能尚难胜任此任。", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

function linkify(escaped){

  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
</script>
