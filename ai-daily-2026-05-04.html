<script>
const DATA = {"meta": {"reportDate": "2026-05-04", "reportDateHuman": "2026年5月4日", "weekday": "星期一", "total": 9, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 1, "title": "从单张图像构建实时视频智能体：Runway Characters技术解析", "source": "Runway：News（网页）", "summary": "Runway公司推出“Characters”实时视频智能体，它能将任意单张参考图像（如真人、卡通或幻想生物照片）实时转…", "url": "https://runwayml.com/news/building-runway-characters", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "How we built a real-time video agent that transforms any single image — photorealistic human, cartoon mascot or fantasy creature — into a fully expressive conversational character at 24fps, with fast end-to-end latency. Zero fine-tuning required.\nRunway Characters is a real-time video agent that turns a single reference image into a fully expressive, conversational video character. Built on GWM-1, our General World Model, it produces natural lip-sync, facial expressions and head motions at 24 frames per second (fps) in HD.\nCharacters has an effective 37 milliseconds of model time per frame (at more than 24 fps), and 1.75 seconds server-side turn-around from when the user stops speaking to when the character starts responding.\nThis post covers what makes Characters different: the breadth of what it can animate, how we made it real-time and the product ecosystem we built around the model.\nThe input to Characters is a single reference image. That's it. The system extracts style directly from the image, and immediately begins generating conversational video conditioned on real-time audio.\nBelow are 720p clips showing Characters animating a single reference image across styles—from photorealistic humans to cartoons, creatures and brand mascots—with natural, expressive conversation.\n24fps in real time: Characters runs at an effective 37 milliseconds (ms) of model time per frame and 1.75 seconds server-side turn-around from end-of-speech to first response frame.\nGenerating HD video at 24fps in an interactive conversational loop is a fundamentally different engineering problem than offline video generation. Offline, you can spend seconds per frame.               In a conversation, you have a frame budget of 42 ms (1/24 seconds) – and that's before audio processing, network transit and the perception of “liveness” that collapses if latency creeps up. In our live sessions, we achieve an effective 37 ms of model time per frame, and 1.75 seconds of server-side turn-around (voice agent + video pipeline) from when the user stops speaking to when the character starts responding.\nWe make this possible with GWM-1's autoregressive frame-by-frame generation: frames are produced sequentially and streamed to the client as they're generated, instead of iteratively denoising an entire clip.\nWe hit real-time 24fps because of overlap: the diffusion transformer and VAE decoder run concurrently via a pipeline split. That makes the effective iteration cost closer to max(diffusion_time, decode_time) than diffusion_time + decode_time.\nEach iteration produces 4 pixel frames, so at 24fps we need one iteration every 167 ms (4/24 seconds). In our measurements, diffusion is 151 ms and VAE decoder is 119 ms; because decode is overlapped, it largely disappears from the critical path. That works out to an effective 37 ms of model time per frame (151 ms / 4 frames), under the 41 ms/frame real-time budget.\nWithout overlap, diffusion would consume most of the 167 ms budget and decode would push it over. With overlap, decode of frame N−1 runs at the same time as diffusion of frame N.\n“Real-time” is also what the user feels end-to-end: the time from when they stop speaking to when the character starts responding. Putting it together: 1185 ms (voice agent) + 567 ms (video pipeline) = 1.75 seconds server-side latency in this session. Client↔server network adds 200 ms on each side (400 ms round trip), depending on connection quality.\nThe biggest lever to bring this down further is the voice agent: the video pipeline is already fast, and we expect the overall turn-around to drop as we improve voice agent response time.\nBelow are four of the key model- and systems-level optimizations that make this real-time performance possible:\nWe shard inference across devices, where the main constraint is communication overhead. We pipeline tensor‑parallel diffusion with VAE decoder on a dedicated device so decode doesn’t contend with the transformer.\nAutoregressive video grows the KV cache every frame. Efficient eviction/compression preserves temporal consistency without sacrificing throughput.\nKernel launch overhead can dominate at some resolutions. We capture the forward pass into a static CUDA Graph to reduce overhead, with strict shape/memory constraints.\nWe tune attention/matmul kernels for our hardware to reduce latency and memory traffic. We use fused Triton kernels help keep the critical path fast.\nGetting real-time character video at 24fps is only half the story. To build a useful real-time video agent, you need the surrounding product surface area: ways to ground the character in your domain, connect it to real apps and deploy it where conversations actually happen.\nA character’s voice is core to identity and believability. We make it fast to get “the right voice” with both text-to-voice (design from a prompt) and instant voice cloning (from an audio sample), then assign it to your character for consistent tone across sessions.\nCharacters can take actions for you during a session. You define the “tools” they’re allowed to use – anything from UI actions (show captions, pop a trivia card, update game state) to trusted backend RPCs (e.g. fetch_order_status to pull a real status/ETA) whose results feed back into the conversation.\nAttach your own documents (text/Markdown) so the character can speak with your company and product knowledge—support docs, FAQs, internal policies, specs—instead of generic responses.\nTry Characters. Build with us.\nRunway Characters is available now via the Runway API and the Runway web and mobile apps. If you love real-time models, low-latency systems and shipping product at the edge of what's possible – we're hiring.", "zh": false}]}, {"label": "论文研究", "color": "#e11d48", "items": [{"seq": 2, "title": "OpenAI的o1系统对急诊患者的诊断准确率为67%，而分诊医生的准确率仅为50%至55%", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "OpenAI的o1系统在急诊分诊诊断测试中表现优于医生。该系统对急诊患者的诊断准确率达到67%，而分诊医生的准确率仅为…", "url": "https://www.theguardian.com/technology/2026/apr/30/ai-outperforms-doctors-in-harvard-trial-of-emergency-triage-diagnoses", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "From George Clooney in ER to Noah Wyle in The Pitt, emergency department doctors have long been popular heroes. But will it soon be time to hang up the scrubs?\nA groundbreaking Harvard study has found that AI systems outperformed human doctors in high-pressure emergency medicine triage, diagnosing more accurately in the potentially life and death moments when people are first rushed to hospital.\nThe results were described by independent experts as showing “a genuine step forward” in the clinical reasoning of AIs and came as part of trials that tested the responses of hundreds of doctors against an AI.\nThe authors said the results, published in the journal Science, showed large language models (LLMs) “have eclipsed most benchmarks of clinical reasoning”.\nOne experiment focused on 76 patients who arrived at the emergency room of a Boston hospital. An AI and a pair of human doctors were each given the same standard electronic health record to read – typically including vital sign data, demographic information and a few sentences from a nurse about why the patient was there. The AI identified the exact or very close diagnosis in 67% of cases, beating the human doctors, who were right only 50%-55% of the time.\nIt showed the AIs’ advantage was particularly pronounced in triage circumstances requiring rapid decisions with minimal information. The diagnosis accuracy of the AI – OpenAI’s o1 reasoning model – rose to 82% when more detail was available, compared with the 70-79% accuracy achieved by the expert humans, though this difference was not statistically significant.\nIt also outperformed a larger cohort of human doctors when asked to provide longer term treatment plans, such as providing antibiotics regimes or planning end-of-life processes. The AI and 46 doctors were asked to examine five clinical case studies and the computer made significantly better plans, scoring 89% compared with 34% for humans using conventional resources, such as search engines.\nBut it is not curtains for emergency doctors yet, the researchers said. The study only tested humans against AIs looking at patient data that can be communicated via text. The AI’s reading of signals, such as the patient’s level of distress and their visual appearance, were not tested. That means the AI was performing more like a clinician producing a second opinion based on paperwork.\n“I don’t think our findings mean that AI replaces doctors,” said Arjun Manrai, one of the lead authors of the study who heads an AI lab at Harvard Medical School. “I think it does mean that we’re witnessing a really profound change in technology that will reshape medicine.”\nDr Adam Rodman, another lead author and a doctor at Boston’s Beth Israel Deaconess medical centre where the study took place, said AI LLMs were among “the most impactful technologies in decades”. Over the next decade, he said, AI would not replace physicians but join them in a new “triadic care model … the doctor, the patient, and an artificial intelligence system”.\nIn one case in the Harvard study, a patient presented with a blood clot to the lungs and worsening symptoms. Human doctors thought the anti-coagulants were failing, but the AI noticed something the humans did not: the patient’s history of lupus meant this might be causing the inflammation of the lungs. The AI was proved correct.\nNearly one in five US physicians are already using AI to assist diagnosis, according to research published last month. In the UK, 16% of doctors are using the tech daily and a further 15% weekly, with “clinical decision-making” being one of the most common uses, according to a recent Royal College of Physicians survey.\nThe UK doctors’ biggest concerns were AI error and liability risks. Billions are being invested in AI healthcare companies, but questions remain about the consequences of AI error.\n“There is not a formal framework right now for accountability,” said Rodman, who also stressed patients ultimately “want humans to guide them through life or death decisions [and] to guide them through challenging treatment decisions”.\nProf Ewen Harrison, co-director of the University of Edinburgh’s centre for medical informatics, said the study was important and showed that “these systems are no longer just passing medical exams or solving artificial test cases. They are starting to look like useful second-opinion tools for clinicians, particularly when it is important to consider a wider range of possible diagnoses and avoid missing something important.”\nDr Wei Xing, an assistant professor at the University of Sheffield’s school of mathematical and physical sciences, said some of the other findings suggested doctors may unconsciously defer to the AI’s answer rather than thinking independently.\n“This tendency could grow more significant as AI becomes more routinely used in clinical settings,” he said. He also highlighted the lack of information about which patients the AI was worse at diagnosing and whether it struggled more with elderly patients or non-English speakers.\nHe said: “It does not demonstrate that AI is safe for routine clinical use, nor that the public should turn to freely available AI tools as a substitute for medical advice.”", "zh": false}, {"seq": 3, "title": "在谷歌TPU上实现3倍加速：UCSD利用扩散式推测解码优化LLM推理", "source": "Google Developers Blog（RSS）", "summary": "加州大学圣地亚哥分校的研究团队在谷歌TPU上成功部署了DFlash，一种基于块扩散的推测解码方法。该方法突破传统自回归…", "url": "https://developers.googleblog.com/supercharging-llm-inference-on-google-tpus-achieving-3x-speedups-with-diffusion-style-speculative-decoding", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "The current landscape of Large Language Model (LLM) acceleration is dominated by autoregressive speculative decoding, where a lightweight drafter predicts tokens sequentially before target verification. However, this serial drafting approach introduces a fundamental execution bottleneck: it requires K sequential forward passes to generate K candidate tokens. This step-by-step dependency forces the system to wait for each token to be predicted before starting the next, inherently limiting the speedup potential of the drafting phase. To break this efficiency ceiling, researchers move beyond token-by-token drafting toward block diffusion, a paradigm shift that enables generating an entire block of candidate tokens in a O(1) single forward pass.\nWe are proud to support external researchers pushing the boundaries of AI hardware. Today, we are thrilled to highlight a major open-source milestone from researchers at UCSD led by Hao Zhang, the co-inventor of paged attention and prefill/decode disaggregated serving. They successfully implemented block-diffusion speculative decoding (i.e., DFlash, a superior diffusion-style speculative decoding developed by Zhijian Liu, Jian Chen et al in Z Lab at UCSD) on Google TPUs.\nBy integrating this novel architecture directly into the open source vLLM TPU inference ecosystem, the UCSD team achieved an average 3.13x increase in tokens per second on TPU v5p, with peak speedups reaching nearly 6x for complex math tasks. In the head-to-head serving comparison between DFlash and EAGLE-3 on TPU v5p, DFlash achieved a 2.29x end-to-end serving speedup, nearly doubling the 1.30x performance gain of EAGLE-3.\nHere is a technical deep dive from the UCSD researchers detailing how they built this, their performance benchmarks, and what it means for the future of the Google TPU ecosystem.\nStandard LLM inference generates text autoregressively. This means the model requires a full forward pass for every single token generated, heavily underutilizing the massive parallel compute capabilities of AI accelerators like TPUs, especially at lower batch sizes.\nSpeculative decoding mitigates this by using a smaller, highly efficient \"draft\" model (or mechanism) to predict multiple future tokens simultaneously. The larger \"target\" model then verifies these draft tokens in a single parallel forward pass. If the draft tokens are accurate, the system accepts multiple tokens at the cost of a single step, drastically reducing latency.\nHowever, the promise of speculative decoding is often hindered by the draft model itself. Most existing methods rely on autoregressive draft mechanisms that generate candidate tokens sequentially. This means that while the target model's verification is parallel, the drafting phase remains bottlenecked by O(K) serial steps. As a result, the time spent \"guessing\" tokens begins to eat into the time saved by verification, capping the practical speedup potential.\nDiffusion LLMs (dLLMs) fundamentally change the game by replacing this sequential process with a block diffusion mechanism. Instead of guessing the next word, dLLM \"paints\" the entire block. A notable dLLM-based drafting method is DFlash. By leveraging the hidden features extracted from the target model, DFlash can generate an entire block of draft tokens in a single forward pass. This shift from O(K) to O(1) complexity reduces drafting latency to nearly negligible levels, making it the perfect architectural fit for the TPU's high-bandwidth Matrix Multiplication Units (MXUs).\nThe UCSD research team integrated DFlash into the vLLM TPU Inference framework. DFlash is a novel approach to speculative decoding that leverages block-diffusion mechanisms to propose draft tokens with exceptionally high acceptance lengths (T).\nImplementing this on Google TPUs required deep optimization. With architectural guidance from Google Cloud engineers, the UCSD team minimized the overhead to ensure that the memory bandwidth and matrix multiplication units were fully saturated. By mapping the DFlash proposer and the verification pipeline efficiently to the TPU architecture, they minimized the overhead of the drafting phase while maximizing the parallel verification throughput of the target model.\nPorting DFlash from its original GPU/PyTorch implementation to the Google TPU/JAX AI Stack ecosystem wasn't just a simple code translation; it required re-engineering the system to align with the unique architectural strengths of TPUs. Here is how the UCSD team tackled the three primary technical hurdles.\nIn the PyTorch world, DFlash relies on simple, dynamic KV management. However, high-performance TPU serving via tpu-inference uses paged attention with Pallas kernels—a system that breaks memory into fixed-size pages to maximize efficiency.\nThe catch? DFlash's non-causal block diffusion—the very thing that lets it \"paint\" a block of tokens—is fundamentally incompatible with standard paged attention. To solve this, the researchers designed a dual-cache architecture. The target model continues to use a paged KV cache, ensuring it benefits from the high-performance Pallas kernels required for large-scale serving. The draft model uses a specialized path with static on-device JAX arrays, successfully mirroring the original DFlash design while maintaining TPU-native performance.\nDFlash is unique because the draft model is \"target-conditioned\"—it stays smart by watching the target model's intermediate reasoning steps. These \"hidden states\" are stored in a context buffer that grows over time.\nTo keep communication between the host CPU and the TPU accelerator as fast as possible, the team implemented a power-of-2 padding strategy. This ensures that as newly projected features are appended to the buffer, they are transferred in optimized chunks. By meticulously tracking exactly how much context the draft model has already \"consumed,\" they prevent any duplicate processing or data loss, keeping the parallel drafting highly accurate.\nUnlike standard drafting methods, DFlash is uniquely stateful, relying on persistent state across iterations (including context buffers, KV cache positions, and RoPE offsets) to maintain its parallel block predictions. In the TPU-optimized vLLM pipeline, the metadata forwarded to the proposer included the draft tokens currently under verification. While this is standard for most models, for a diffusion-based architecture, it resulted in \"sequence length inflation\"—a misalignment where the internal draft state drifted away from the target model's reality.\nBy re-engineering the proposer to synchronize strictly with the true accepted token count, the research team restored perfect alignment between the two models. This adjustment allowed the block diffusion logic to operate with full mathematical precision on TPU hardware, unlocking the dramatic speedups they see in the final results.\nTo ensure a rigorous and fair comparison, the UCSD researchers benchmarked DFlash against the current mainstream speculative decoding method on TPUs: EAGLE-3. In this comparative study, the researchers used the exact same hardware (TPU v5p) and the same target model (Llama-3.1-8B) for both.\nThis setup represents the most practical deployment scenario for both methods, as the choice of K values is based on their respective official open-source checkpoints, used out-of-the-box without additional fine-tuning or re-configuration. Autoregressive drafters like EAGLE-3 incur a sequential latency penalty that grows linearly with K, which typically constrains them to smaller speculation budgets to maintain low per-token latency. In contrast, DFlash uses parallel block diffusion to predict all tokens in a single forward pass, making the drafting cost largely insensitive to K. The results were decisive: DFlash achieved a 2.29x speedup, while EAGLE-3 provided a 1.30x gain. On coding tasks like mbpp, DFlash compressed the generation time from 9.81ms per token down to 3.48ms, a 2.83x improvement.\nWhy is the gap so large? EAGLE-3 predicts 2 tokens per step autoregressively, requiring sequential forward passes with Python orchestration overhead between each. DFlash instead produces a block of 10 high-quality candidate tokens in a single forward pass, eliminating this serial bottleneck entirely. On TPUs, this \"high-quality, high-quantity\" draft output translates directly into a higher average acceptance length, turning the TPU's massive compute potential into real-world serving throughput.\nTo evaluate the impact of DFlash on Google TPUs, the UCSD team benchmarked their implementation across a variety of domains on TPU v5p, focusing heavily on complex reasoning, mathematics, and coding—areas where long-context generation typically suffers from high latency.\nThe UCSD team built a standalone JAX benchmark to evaluate DFlash results. By stripping away the serving layer overhead, they could isolate the raw power of the DFlash-on-TPU algorithm. They observed an average speedup of 3.13x across all datasets, with remarkable peaks in mathematical reasoning.\nFor rigorous math tasks like math500, DFlash pushed the generation time down from 8.02ms per token to 1.40ms per token. In coding evaluations like humaneval, generation speeds improved by over 3.5x.\nDuring the optimization process, the research team uncovered a hardware characteristic that changes how engineers think about speculation limits: K-Flat verification.\nOn datacenter-grade accelerators like the TPU v5p, their systematic experiments revealed a surprising reality: the cost of verifying 1024 tokens is almost identical to the cost of verifying just 16 tokens. This phenomenon occurs because, on high-end hardware, the time spent is dominated by loading model weights rather than the raw math of the attention mechanism for these sequence lengths. In other words, the hardware's computational ceiling is so high that the extra work of checking a much longer \"guess\" is essentially free.\nThis discovery shifts the entire research frontier. It proves that the bottleneck for speculative decoding isn't \"verification cost,\" but rather \"draft quality.\" Knowing that wider blocks are computationally free allows developers to boldly scale draft block size, leveraging richer bidirectional context to improve accuracy without fear of slowing down the hardware.\nWhile datacenter-grade AI accelerators make increasing the block size (K) virtually \"free,\" their scaling theory reveals that simply adding more tokens yields diminishing returns. At their current operating points, a block size of K=16 already captures over 90% of the theoretical maximum speedup. In fact, scaling K from 16 all the way to 128 would likely net less than one additional accepted token per step.\nThe true lever for performance is quality over quantity. Their analysis shows that improving the per-position acceptance probability (a) is 2–3x more valuable than increasing the block size K. This shifts the research focus: in an environment where verification cost is constant, the primary bottleneck is no longer how many tokens systems can check, but how accurately they can predict them. The next frontier of LLM serving lies in smarter draft training, not just wider speculation windows.\nAcceptance probability is deeply tied to the predictability of the task. The team observed a natural \"positional decay\" where tokens at the end of a block are harder to guess than those at the start. In logic-driven fields like math and coding, this decay is remarkably slow, maintaining high acceptance rates even deep into the block. Conversational chat, however, is more random, with accuracy dropping sharply after the first few tokens.\nThis predictability directly drives speedup. Because structured reasoning yields more predictable sequences, math and code tasks allow for much longer accepted blocks, more effectively saturating the TPU's parallel verification power. Consequently, DFlash achieves its highest gains in mathematical reasoning, followed by coding, while conversational tasks see a more moderate improvement.\nA core tenet of this partnership is enriching the open-source ecosystem. Rather than keeping this as an internal research prototype, the complete implementation has been submitted to the vLLM tpu-inference repo, encompassing:\nThe UCSD team is actively working on adding a torchax proposer so that DFlash works on the PyTorch serving path as well.\nThis milestone sets the stage for the next wave of Google TPU innovation. By leveraging DFlash's unique parallel sampling, they are paving the way for Speculative Speculative Decoding (SSD), using speculation caches to drastically reduce latency in high-throughput environments. To capture richer context and boost acceptance rates for complex reasoning, they plan to scale to wider draft blocks using the TPU RL Stack Tunix and MaxText. Furthermore, the newly developed, high-performance JAX kernels provide the bedrock for supporting diffusion-based target models, keeping the vLLM-TPU ecosystem at the absolute cutting edge of efficient, non-autoregressive generation.\nYou can review the underlying technical report and implementation details via the Colab Notebook, or dive directly into the code on the vLLM GitHub repository.\nThis work was made possible by the TPU Builder program, reflecting our mission to empower the academic and open-source community with access to high-performance hardware and Google Cloud credits. If you are interested in using TPUs for research, teaching, or open-source development, we want to hear from you! Email us tpu-builders-support@google.com to get in touch.\nAcknowledgements: A huge thank you to the research team at UCSD, including Zhongyan Luo, Son Nguyen, Andy Huang. Special thanks to Kyuyeun Kim, Brittany Rockwell, Chris Chan, Mitali Singh, Yixin Shi and Gang Ji’s team for working with research team to land the PR, and Josh Gordon, Edgar Chen, Aditi Joshi, Shubha Rao, Mani Varadarajan, Joe Pamer, Fenghui Zhang, Hassan Sipra, and Bill Jia for their unwavering support and investment in TPU Builder Program’s research partnerships.", "zh": false}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 4, "title": "解决真正工程问题的Agent Skills集合", "source": "X：邵猛 (@shao__meng)", "summary": "作者@mattpocockuk公开了其.claude/目录下的实用Agent Skills集合，旨在解决四大工程痛点：…", "url": "https://x.com/shao__meng/status/2050892004188692616", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "解决真正工程问题的 Skills：Skills For Real Engineers\n作者 @mattpocockuk 公开了自己 .claude/ 目录中每天在用的 Agent Skills 集合，目标读者是在做真正工程的人们，解决真正的工程问题。\n# 真正想解决的四类失败模式\n1. Agent 没做对你想要的事 —— 沟通鸿沟\n引用 The Pragmatic Programmer：\"没人确切知道自己想要什么。\" 修复：在动工前先被 Agent 反向拷问。\n· /grill-me：通用版逼问\n· /grill-with-docs：工程版逼问，同时维护项目术语表与 ADR\n这是作者明说的\"最受欢迎的两个 Skill\"。\n2. Agent 太啰嗦 —— 缺少共享语言\n引用 Eric Evans 的 DDD：领域专家与开发者一开始说的就不是同一种语言，Agent 也一样。 修复：项目根目录维护一份 CONTEXT.md（领域词典）+ docs/adr/（架构决策记录）。 作者举了自己 course-video-manager 仓库的例子：\n· Before：\"a lesson inside a section of a course is made 'real' …\"\n· After：\"problem with the materialization cascade\"\n共享语言带来的连锁收益：命名一致 → 代码可导航 → 思考 token 更少。这一条被作者称为\"整个 repo 里最酷的技术\"。\n3. 代码跑不通 —— 反馈回路缺失\n引 Pragmatic Programmer：\"反馈速率就是你的速度上限。\" 修复：把静态类型 / 浏览器 / 自动化测试的反馈接回来。\n· /tdd：强制 red-green-refactor，并明确反对\"horizontal slicing\"（先把所有测试写完再实现）——只能 vertical slice，一次一个 tracer bullet\n· /diagnose：固定的\"复现 → 最小化 → 假设 → 插桩 → 修 → 回归测试\"诊断循环\n4. 系统变成屎山 —— Agent 加速软件熵增\n引 Kent Beck 与 John Ousterhout：每天投资设计，深模块（窄接口、厚实现）优先。 修复：\n· /to-prd 在写 PRD 前会问\"这个改动到底碰哪些模块\"；\n· /zoom-out 强制 Agent 把局部代码放回系统全景里讲；\n· /improve-codebase-architecture 是\"周期性救火\"——作者建议每隔几天对代码库跑一次。\n# Skill 清单结构\n仓库分三类，命名上都是 Slash Command 风格：\nEngineering（日常代码工作） grill-with-docs、tdd、diagnose、to-prd、to-issues、triage、improve-codebase-architecture、zoom-out、setup-matt-pocock-skills\nProductivity（通用工作流） grill-me、caveman（极简通信模式，省 ~75% token）、write-a-skill\nMisc（不常用工具） git-guardrails-claude-code、migrate-to-shoehorn、scaffold-exercises、setup-pre-commit\n各 Skill 之间不是孤立的，而是一条从对话到落地的流水线：\n对齐与设计              落地与守护\n──────              ────────\ngrill-with-docs   →     tdd\n     ↓                   ↓\n  to-prd            diagnose\n     ↓                   ↓\n to-issues          zoom-out\n     ↓                   ↓\n   triage   ───→   improve-architecture\n     ↑                   ↓\n     └──── CONTEXT.md / ADR ──┘\n项目地址\ngithub.com/mattpocock/ski…", "zh": true}, {"seq": 5, "title": "Codex推出开源工具，压力测试初创公司创意", "source": "X：Greg Brockman (@gdb)", "summary": "开发者发布了一款名为“codex-startup-pressure-test-skill”的Codex技能工具，旨在对…", "url": "https://x.com/gdb/status/2050972114077843772", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "codex for startup ideas\nCODEX SKILL TO BRUTALLY TEST ANY STARTUP IDEA!\nMost startup ideas sound good.\nThis Codex skill tells you why they probably won’t work.\nJust give Codex your idea and it pressure-tests it for you\n-\u003e finds the core assumption\n-\u003e exposes fatal flaws\n-\u003e checks if the problem is", "zh": false}, {"seq": 6, "title": "大多数公司尚未做好迎接AI的准备", "source": "X：宝玉 (@dotey)", "summary": "多数公司无法有效利用AI，核心障碍并非技术，而是企业自身目标模糊、战略混乱且缺乏清晰的业务流程描述。AI擅长执行明确指…", "url": "https://x.com/dotey/status/2051057428075053120", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "作者：Daniel Miessler\n原文：Most Companies Aren't Anywhere Near Ready for AI\n \n并不是公司不想用 AI，而是他们根本用不了。\nAI 不是问题，说不清目标才是问题\n很多人抱怨 AI...", "zh": false}, {"seq": 7, "title": "每日仅需8条广告，广告支持型AI的经济可行性分析", "source": "Tomer Tunguz 博客（VC 分析）", "summary": "基于开源模型和商用GPU的广告支持型AI在经济上可行。计算表明，一个由4块B200 GPU组成的集群服务300名用户时…", "url": "https://www.tomtunguz.com/ad-supported-ai-works", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "One search ad every 40 minutes pays for a trillion-parameter model. One content ad every 3 minutes does the same. The math on ad-supported AI is better than you think.\nWhen Anthropic pulled Claude Code from the $20 plan last month, it signaled an industry assumption : frontier intelligence requires frontier pricing. For open models, the economics flip.\nA B200 GPU costs $4.50/hour on spot markets.1 Google Search ads generate $38.40 CPM (cost per thousand impressions),2 while Google Display runs $3.12.3\n| Ad Context | CPM | Impressions to Break Even (per hour) | One Ad Every… | \n|---|---|---|---|\n| Content Network | $3.12 | 5,769 | ~3 minutes | \n| Search | $38.40 | 469 | ~39 minutes | \nThese numbers assume the provider runs 4 B200 Blackwells at 300 users, 50% of the theoretical maximum, leaving headroom for bursts.4\nTo support these costs, users would see one ad every 3 to 39 minutes. That is well below what users already tolerate : hyper-casual mobile games show six ads per session, roughly one per minute.5\nThere are nuances. Assuming ad fill rates (the share of ad requests that return a paid ad) and ad network revenue share, we can model effective CPMs of $1.50. At that floor, the frequency doubles. One content ad every 90 seconds still covers the cluster, comparable to what mobile users already tolerate.\nOn the other end of the spectrum, rewarded video clears at $40 to $50 CPM with near-100% fill in gaming. A single round of rewarded video across the cluster nearly covers an hour of compute.6\nBut there is the question of utilization. All of these figures assume the cluster stays busy. Idle GPUs raise the per-user cost.\nWhat about heavier workloads? Agentic coding burns 10 to 20x more tokens than passive chat.7 At that rate, ad-only models can’t keep up. But a hybrid works : $10/month plus 8 ads per day covers 2 million tokens.8 It won’t fund a tokenmaxxing habit, but it will keep you shipping.\nAd-supported AI is viable : open models, commodity GPUs, and ad frequencies already parallel those of mobile & web.\n- \nB200 Cloud Pricing: Compare 22+ Providers (2026) : spot market averages $3.40 to $4.50/hour across 22 cloud providers. ↩︎ \n- \nOnline Advertising Costs In 2026 (Top Draw) : Google Search Ads average CPM $38.40 (derived from CPC × estimated CTR; search is typically priced per-click, converted here for comparison). ↩︎ \n- \nOnline Advertising Costs In 2026 (Top Draw) : Google Display Ads average CPM $3.12. ↩︎ \n- \nGPU Concurrency Benchmark: H100 vs H200 vs B200 (AIMultiple) : Kimi K2.6 on 4x B200 supports 600 concurrent users at peak; 300 used here as a conservative operating target. ↩︎ \n- \nThe 2026 AdMob & Mobile Monetization Playbook (MonetizeMore) : hyper-casual benchmark of 6 ads per session across 3.2 sessions per day. ↩︎ \n- \nCalculation : 300 users × 1 rewarded impression each × $0.05 (at $50 CPM) = $15. Cluster cost = $18/hour. $15 ÷ $18 = 83%, or about 50 minutes. ↩︎ \n- \nClaude Code vs Cursor: Speed, Accuracy & Cost Benchmark 2026 (SitePoint) : Claude Code uses 33K tokens per task; Cursor uses 188K. Heavy users run 20 to 60 tasks/day, consuming 1 to 2M tokens/hour during active sessions, 10 to 20x more than passive chat. ↩︎ \n- \nCalculation : $10/month = $0.33/day. At $0.33/day alone, cluster supports 1,309 users at 1M tokens/day each, half the target. The remaining $0.33/day gap is filled by ads. At rewarded-video CPMs of $40, that is 8 impressions/day. Combined : $10/month + 8 ads/day = 2M tokens/day per user. ↩︎", "zh": true}, {"seq": 8, "title": "60倍速冷启动：将同级GPU视为权重服务器", "source": "Runway：News（网页）", "summary": "Runway平台团队开发的NCCLBack系统，通过P2P权重传输将模型冷启动时间从数分钟缩短至数秒。其核心创新在于让…", "url": "https://runwayml.com/news/60x-faster-cold-starts-treating-peer-gpus-as-weight-servers", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "How we cut model cold-start times from minutes to seconds by broadcasting weights between GPUs instead of downloading them from storage, and the sharp edges we found along the way.\nThe Cold Start Tax\nWhen a GPU inference worker boots, the first thing it does (before it can serve a single request) is load model weights. For the kinds of models we run at Runway, this means pulling terabytes of parameters from cloud storage, copying them from host memory to GPU memory and calling load_state_dict. For a single worker, this takes minutes. For a fleet of workers rolling out a new model version simultaneously, it's a thundering herd: dozens of machines independently downloading the same bytes from the same storage backend, saturating bandwidth and inflating cold-start times for everyone. We deploy dozens of times a day, often without any model weight changes. Cold starts directly gate autoscaling, rollout speed and user-facing latency and increase the research/engineering feedback loop.\nBecause model weight changes are relatively rare, deploying so frequently with long cold starts creates an unnecessary tax on GPU inference worker availability and impacts our user experience. The weights already exist on a GPU somewhere in the cluster. A worker that finished setup five minutes ago is sitting there, fully loaded, waiting for tasks. A new worker can receive those weights directly from a peer instead of re-downloading from storage. This keeps generations flowing and allows our research and engineering teams to continuously deliver new functionality. The system makes our clusters nimble: we can quickly rebalance workloads, roll back bad code and maximize the time GPUs spend performing inference.\nThe Landscape of Approaches\nThere are several approaches to cold-start optimization, and we've tried most of them.\nFaster storage (NVMe caches, parallel chunk downloads) reduces download time but doesn't change the shape of the problem: N workers still make N independent downloads.\nShared memory preloading (/dev/shm, CUDA IPC) eliminates redundant downloads on a single node but is inherently single-machine.\nShared volumes (NFS, EFS, Ceph) can dedupe downloads across machines but add operational overhead and are typically still far slower than GPU-to-GPU transfer.\nDistributed caching (Memorystore, custom weight servers) adds another system to operate, capacity-plan, and monitor.\nPeer-to-peer transfer is different. One worker downloads and loads weights normally. Every subsequent worker receives weights directly from an already-loaded peer over the GPU interconnect. Download happens once; broadcast scales to the fleet. We built a system called NCCLBack around this idea (named after the NCCL collective it's built on and the fact that it \"backs\" the weight-loading path, and only tangentially after a certain Canadian rock band).\nThe reason P2P transfer wins so decisively is physics. GCS download bandwidth, even optimized, lands somewhere around 2–10 Gbps per worker. InfiniBand or RoCE links between GPU nodes deliver 200–400 Gbps. NVLink within a node is faster still, up to 900 GB/s on H100 SXM systems. When you can use a GPU interconnect instead of a storage API, you're moving from the world of \"minutes\" to the world of \"seconds.\"\nIn the traditional model, every worker independently downloads from storage, and cold start time scales linearly with fleet size. With NCCLBack, one worker downloads, and the rest receive weights over the GPU interconnect in seconds:\nNCCLBack Design: Building Up in Layers\nNCCLBack is not a single clever trick. It's a stack of subsystems (discovery, coordination, transfer and verification), each solving a distinct problem. Here's the full protocol at a glance:\nLayer 1: The Basic Idea\nThe core of NCCLBack is a one-to-one weight transfer between two GPU workers using NCCL's broadcast primitive.\nThe sender is a worker that already has weights loaded on GPU. The receiver is a new worker that has constructed the model structure (all the right tensor shapes, dtypes and devices) but hasn't filled them with values yet. We call this the \"skeleton model.\"\nThe transfer itself is straightforward. Both sides iterate over model.state_dict() in sorted key order and call nccl.broadcast() for each tensor:\ndef transfer(model, comm, device_id):\n    with cp.cuda.Device(device_id), cp.cuda.Stream() as stream:\n        state_dict = model.state_dict()\n        # Both sides must iterate in identical order\n        names = sorted(state_dict.keys())\n        for name in names:\n            param = state_dict[name]\n            # Same call on both sides; NCCL distinguishes by rank\n            comm.broadcast(\n                param.data_ptr(),\n                param.data_ptr(),\n                param.numel(),\n                torch_to_nccl_dtype(param.dtype),\n                0,  # root rank (sender)\n                stream=stream.ptr,\n            )\n        stream.synchronize()\nSorting the keys matters more than it looks. nccl.broadcast is a collective: both sides must issue calls in the exact same order, for the exact same tensor sizes and dtypes. If the sender iterates in a different order than the receiver, the broadcast silently writes the wrong data into the wrong buffers and you get a model that produces garbage without any error.\nThis is the entire data plane. Everything else in NCCLBack exists to make this loop run correctly, safely and without hanging.\nLayer 2: Discovery\nBefore we can broadcast, the receiver needs to find a sender. This is a coordination problem.\nWe solve it with a Redis-backed queue. When a worker finishes setup and has weights loaded, it publishes two things to Redis:\n- Model availability: a key indicating \"I have model version X loaded.\"\n- Weight hashes: per-layer integrity hashes (more on this in Layer 5).\nWhen a new worker starts and wants to receive weights, it first checks Redis: does a peer with my model version exist? This check must be unanimous across all ranks in a distributed worker group. If rank 0 thinks a peer exists but rank 3 doesn't, the group will deadlock when some ranks try P2P transfer while others try to download.\nWe enforce consensus with a pattern that shows up repeatedly throughout NCCLBack:\navailability_tensor = torch.zeros(1, device=\"cuda\")\nif peer_exists_in_redis:\n    availability_tensor[0] = 1\ntorch.distributed.all_reduce(availability_tensor, op=ReduceOp.MIN)\nassert bool(availability_tensor[0])  # True only if ALL ranks agree\nThe all_reduce(MIN) trick: every rank votes, and we proceed only if the minimum vote is 1. If any single rank can't find the model in Redis, everyone falls back to downloading. This is a deliberately conservative choice; we'd rather download redundantly than risk a partial P2P transfer that leaves some ranks with weights and others without.\nModel identity matters here. The \"model version\" is a hash of the model's configuration and checkpoint metadata. In practice, each checkpoint is converted to safetensors format during deployment, and our cloud storage provides a CRC32C checksum for the resulting file. The model config (which includes the safetensors URI and its CRC32C) is then hashed with MD5 to produce the version identifier. This means two workers only consider themselves compatible if they agree on the exact same checkpoint bytes and the same model configuration. Getting this hash wrong means two workers with subtly different model states will try to transfer weights between each other, which either fails loudly (shape mismatch) or fails silently (wrong weights loaded).\nLayer 3: Handshake\nFinding a peer in Redis isn't enough. Redis tells you a peer existed at some point; it doesn't tell you the peer is still alive and ready to send right now. If we optimistically start a NCCL broadcast and the sender has crashed or is busy, ncclCommInitRank will hang indefinitely. NCCL's collective model has no built-in timeout for communicator creation.\nSo before we touch NCCL, we run a bidirectional liveness handshake through Redis:\n- The receiver stores a random integer at a known Redis key: receiver_ready:{peer_id}.\n- The sender polls for that key. When it appears, the sender increments the value by 1 and stores it back.\n- Meanwhile, the sender has stored its own random integer at sender_ready:{peer_id}.\n- The receiver polls for the sender's key, finds it, increments by 1, and stores it back.\nBoth sides verify: \"I stored X, the other side changed it to X+1.\" This proves both peers are alive, responsive and talking about the same transfer. The entire handshake runs with short timeouts: 1 second for the sender (who shouldn't wait long for a flaky receiver), 10 seconds for the receiver (who can afford to wait since peers might just be busy).\nIf the handshake times out, the receiver cleanly falls back to downloading from storage. No NCCL communicators were created, no GPU resources were committed and no cleanup is needed.\nLayer 4: The Transfer, with Guardrails\nOnce the handshake succeeds, we create a 2-rank NCCL communicator (sender = rank 0, receiver = rank 1) and run the broadcast loop. But NCCL has no built-in timeouts — if the peer disappears mid-transfer, the call blocks forever. We wrap both communicator creation and the broadcast loop in a daemon-thread timeout: if the operation doesn't complete within a few seconds, we abort the communicator and raise a TimeoutError. This ensures a hung transfer never blocks the worker from falling back to downloading.\nLayer 5: Integrity Verification\nAfter the transfer completes, how do we know the receiver got the right weights? NCCL doesn't provide checksums or integrity guarantees at the application level. A silent data corruption (a flipped bit in a GPU-to-GPU transfer) would produce a model that runs but generates subtly wrong outputs.\nWe solve this with sampled hashing. When the first worker downloads and loads weights from storage (the \"ground truth\" path), it computes a hash for each layer of the model and stores those hashes in Redis. Hashing every byte of a multi-gigabyte model is slow, so instead we sample 100 random elements per parameter using a fixed seed (so both sender and receiver sample the same indices) and hash only those samples. We normalize to float16 before hashing so dtype differences between code paths don't cause false mismatches. This turns a minutes-long verification into a seconds-long one, while still catching any corruption that affects more than a vanishingly small fraction of the weights.\nThe receiver, after receiving weights via P2P, computes the same hashes and compares against the Redis-stored \"truth.\" If any layer's hash doesn't match, we raise a WeightVerificationError and the worker restarts.\nThe Skeleton Model Problem\nNCCL's broadcast doesn't allocate memory. It writes into existing buffers. This means the receiver must have pre-allocated tensors of exactly the right shape, dtype and device before the broadcast starts. We call these pre-allocated tensors \"containers\" and the model structure they live in the \"skeleton model.\"\nBuilding a skeleton model means running the model's constructor and initialization code while skipping the actual weight loading (passing skip_checkpoint=True). For simple models, this is straightforward. For real production models, it's far more complicated. A video generation pipeline isn't a single nn.Module; it's a graph of submodules (a diffusion transformer, a VAE decoder, text encoders, image embedders etc.), each with its own initialization logic, some of which eagerly load weights during construction.\nIn pipelined architectures, different GPU ranks host different submodules entirely. One rank might run the VAE decoder while the rest run the diffusion transformer. NCCLBack must return the correct submodule for each rank, because each rank participates in its own independent P2P transfer. The receiver doesn't just need one skeleton; it needs the right skeleton for its rank, with containers that exactly match what the sender will broadcast. Any mismatch (a different dtype, a missing buffer or an extra parameter from a different code path) and the broadcast either crashes or silently corrupts the model. Getting this right required a series of careful abstractions and relentless integration testing across real production model variants.\nHow It Breaks: A Taxonomy of Failures\nEvery failure mode below was discovered in production.\nThe Gray Frame Incident\nSome submodules load real weights inside __init__ or instantiate_from_config, not during load_state_dict. When we added NCCLBack to a new model, we called to_empty(device=\"cuda\") on the entire model to prepare skeleton containers. This correctly emptied the diffusion transformer's weights (which would be replaced by P2P transfer), but also wiped the VAE's self-initialized weights, replacing them with uninitialized garbage.\nThe model ran. It didn't crash. It generated video frames. But the frames were gray: the VAE decoder was applying a learned reconstruction to random noise, producing washed-out structureless output. The failure only manifested on workers that received weights via NCCLBack; workers that downloaded directly were fine, because the download path re-initialized the VAE correctly.\nThe fix: only empty the specific submodules that NCCLBack transfers.\nThe FP8 Hash Mismatch\nModern inference stacks often quantize weights after loading (bf16 to FP8) as a post-initialization step. NCCLBack originally hashed weights immediately after downloading, before quantization. When a sender broadcast its FP8 weights to a receiver, the receiver hashed what it got, compared against the bf16 hashes in Redis, and found a mismatch. Verification failed; the worker crashed and restarted.\nThe fix: hash at the \"model is ready to serve\" boundary, not the download boundary. Any transformation between download and serve (quantization, pruning or fusion) changes the bytes on GPU, and the integrity hashes must reflect the final state.\nThe Fallback Trap\nFor quantized models, the fallback path is a trap. The skeleton model has FP8 containers; the downloaded weights are bf16. If load_state_dict(strict=False) is used, the mismatched keys are silently ignored, and the model loads \"successfully\" with corrupt weights.\nThe solution for these models is deliberately drastic: the fallback raises an exception instead of downloading.\ndef load_model_weights():\n    raise NCCLBackDownloadFallbackNotSupportedRestartRequiredError()\nThis forces a restart down the normal download-and-quantize path. Slower, but correct. When a fallback is known to produce a corrupt state, fail fast (and loudly) and take a path you trust.\nThe Phantom Mesh Change\nEarly on, the model hash didn't include the device mesh topology. When we changed the tensor parallelism layout, the hash stayed the same (config and checkpoint hadn't changed), so workers with different mesh layouts matched in Redis, attempted a P2P transfer, and hung. The sender had full tensors while the receiver expected sha", "zh": false}, {"seq": 9, "title": "大语言模型（LLMs）是否改善了患者治疗结果？", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "summary": "一项新综述研究指出，尽管大语言模型（如GPT、Claude、LLaMA）在医疗领域的应用日益广泛，但目前尚无明确证据表…", "url": "https://garymarcus.substack.com/p/have-llms-improved-patient-outcomes", "publishedAt": "2026-05-04T00:00:00.000Z", "exact": false, "content": "Have LLMs improved patient outcomes?\nA new review suggests otherwise\nCardiologist/author Eric Topol tends to be more bullish than I am about AI in medicine, but in his latest post he concludes that at least thus far there is “very little evidence for LLMs benefiting patients or doctors for health outcomes” (aside from helping with administrative work and the like).\nAs Topol notes, his review was partly inspired by this recent editorial in Nature Medicine, which points in the same direction:\nYou can read Topol’s detailed review here.\nAll of this fits with my recent Please don’t trust your chatbot for medical advice, which focused more on unsupervised use of LLMs by patients, rather than overall clinical outcomes, but in many ways converges to a similar place.\nAI will surely someday be a major boon for medicine, but current tools such as domain-general chatbots may not be up to the job.", "zh": false}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文（纯文本归档）：图片不加载远程资源，仅以文字占位符呈现；其余文本按段落转义（防 XSS）
function linkify(escaped){
  if(!escaped) return escaped;
  var re=/(\[[^\]]+\]\((https?:\/\/[^)\s]+)\))|(https?:\/\/[^\s<>"'）】」』，。、；：！？]+)/g;
  return escaped.replace(re, function(m, g1, g2, g3){
    if(g2!==undefined){
      var label=m.substring(m.indexOf('[')+1, m.indexOf(']'));
      return '<a class="r-link" href="'+g2+'" target="_blank" rel="noopener noreferrer">'+label+'</a>';
    }
    if(g3!==undefined){
      return '<a class="r-link" href="'+g3+'" target="_blank" rel="noopener noreferrer">'+g3+'</a>';
    }
    return m;
  });
}
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=linkify(escapeHtml(p.slice(last,m.index)));
      var cap=(m[1]||'').trim()||'图片';
      out+='<span class="r-img-cap">🖼 '+escapeHtml(cap)+'</span>';
      last=_IMG_RE.lastIndex;
    }
    out+=linkify(escapeHtml(p.slice(last)));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    const sum=(it.summary||"").trim();
    if(sum){
      // 来源站点多为付费墙 / 登录墙 / 反爬限制，无法镜像全文；展示已本地存档的中文摘要兜底
      body.innerHTML='<div class="r-fallback">⚠️ 该条新闻的<b>全文镜像暂不可用</b>（来源站点可能为付费墙 / 登录墙 / 反爬限制，或原文已失效）。下方为已<b>本地存档的中文摘要</b>，可正常查看；完整原文请点击右下角「查看原文 ↗」。</div>'+
        '<p class="r-summary">'+linkify(escapeHtml(sum))+'</p>';
    }else{
      body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像与摘要。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
    }
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
